  text: 欽定四庫全書御纂春秋直解卷十上庚申景王四年在位二十有五年子王猛立是年卒弟敬王立昭公
  hash: sha256:197421ac68f61f335ced1d63a689d3e9d9bc864440ad384f7ce53d368899500e
