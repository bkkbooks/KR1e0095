  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_010-1a, image: WYG0174/WYG0174-0213a.png}
body:
  text: 名稠襄公庶子也元年春王正月公即位子野卒於季氏以毁告昭公子野之母敬歸之娣子也叔孫豹謂太子死有母弟則立之無則立長子野母非夫人不當立其娣子季氏不從蓋襄公諸子有長而應立者季利昭幼越次立之耳昭後為季所逐殞身於外嗣子復為所擯不得有國擅廢立君至於此極其亦何所不為乎然則子野之卒不得不於季氏是問矣叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢尋宋之盟也圍専楚權欲耀上國故尋盟宋之盟楚因晉有晉楚匹也之言而先晉則尋盟宜迭為先矣今請讀舊書則仍先晉蓋圍意不在盟在駕晉而已自是圍遂篡位而専主夏盟中國胥被其害武之罪大矣春秋書會不書盟亦猶以存中國云爾三月取鄆前季孫宿救台遂入鄆欲取而未得今諸侯方尋宋弭兵之盟而季以兵取鄆莒人訴於會幾為國禍焉夏秦伯之弟針出奔晉針者秦景母弟其父寵之太過使富擬於君所以奔也寵過而失道猶書弟者其過小非得罪宗社也而兄不能容亦有責焉人倫之際多兼罪之辭欲各盡其道也六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵自晉悼之伯不復事於戎狄平公甘棄前緒使諸侯南向朝楚乃復有事於羣狄蓋六卿日強皆有厚自封殖之心故棄逺猷而逐近利耳秋莒去疾自齊入于莒莒展輿出奔吳按左氏莒子生去疾及展輿去疾長也而未立展輿立矣而又廢逮莒子既弒去疾奔而展輿立則立於賊矣然未與聞乎弒苟能因立而討賊雖立於賊無傷也不能討賊則罪人耳去疾奔而復自齊入者挾大國之力以爭國耳亦非志於討賊也故書入以罪之以長而宜立故繫以莒乃展輿亦繫莒者已立也既立於賊又不能討賊故雖逾年不稱爵亦罪之也春秋之權衡審矣叔弓帥師疆鄆田春取鄆而秋疆其田汲汲於利也帥師不惟備莒亦以劫鄆以猛濟貪也季孫取鄆而自有之故使叔弓弓散卿也蓋惟季是聼矣葬邾悼公冬十有一月己酉楚子麇卒據傳麇為圍所弒而經書卒胡安國曰四年圍大合諸侯於申若正以弒君將恐天下後世以賊不必討又可從之以主盟會故權輕重而略其篡弒以扶中國非也夫亂賊不討如成宋亂之類春秋曷嘗諱之哉家鉉翁曰弒而書卒者如鄭伯髠頑如會未見諸侯卒于鄵不書弒而弒之實見今經惟書楚子麇卒是傳所載未審也蓋圍所弒者麇子宜為嗣者耳傳所載殺其二子幕及平夏如魯子般子野之類而非弒麇也麇病革圍自外急歸乘君之殞戕其子而篡其位是亦弒也當時誤傳為弒麇耳楚公子比出奔晉圍與比兄弟也麇卒而圍篡比懼出奔非其罪矣何以書以圍之罪不著故書此之出以眀變也二年春晉侯使韓起來聘前此晉聘魯者九未有以上卿將命者趙武以偷失諸侯今韓起嗣為政欲致諸侯故親來聘夏叔弓如晉報聘也秋鄭殺其大夫公孫黑黑干國紀數矣鄭人畏其強不敢討今又將作亂以疾不果始因其疾而殺之則所以討罪者非其道矣故稱國以殺而不去其官冬公如晉至河乃復季孫宿如晉據傳公以晉少薑死而往弔為晉所辭是公動不以禮而晉人猶知以禮尊公也然按之情事殊未然蓋公喪方畢似喪畢而朝即使媚晉而弔少薑公尚在路晉安從知為弔少薑而預辭之哉是必季孫先通言於晉耳季孫久結晉卿以擅魯襄公末年君臣之釁已開子野又暴卒於其家雖其事甚祕國人必有疑焉今公如晉季孫安得不畏其訴已乎故逆阻之左氏所傳晉之飾言也蓋無辭以拒公而託於少薑耳穀梁曰公如晉而不得入季孫宿如晉而得入惡季孫也是也然則昭公失國之因季氏逐君之漸晉人下比之迹不待貶而皆見矣三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝八月大雩冬大雨雹北燕伯欵出奔齊北燕伯欲去諸大夫而立其寵人固失道矣然其臣比而逐君罪可逭乎書奔責君也亦罪臣也國有君而奔無臣子矣書名者國已立君也四年春王正月大雨雹去嵗夏書大雩旱災也自冬歷春兩書大雨雹則其災尤重而為異大矣夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚子欲合諸侯而問子産曰晉其許我乎又曰諸侯其來乎蓋猶懼晉之爭而憂諸侯之不從也乃晉不敢爭諸侯遂靡然從之先書楚子傷中夏之無人也且楚子弒賊也諸侯推為盟主天下之大變也由晉平不德諸侯離心勢既外潰六卿専擅權復內移列國強家爭附之以固其私咸怠於公義矣故使元惡肆行流毒天下耳徐書爵者楚主會而徐其與國不得不詳之也革楚號而正以王爵故亦革徐號而正以王爵也淮夷列會者來會故列會也楚人執徐子徐既從會矣楚子將伐吳徐子吳出也遂以為二而執之陳傅良曰書執徐子危會申之諸侯也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳晉楚會宋以弭兵也今楚伐吳吳固晉同姓而同盟之國也而晉竟若罔聞也執齊慶封殺之慶封奔吳矣繫以齊者以賊討也罪在齊而討於吳者義無所逃也先執後殺緩辭也楚子意夲不在封因伐吳而執封吳不可下而封為吳之所庇故殺之以威吳也然殺之之心雖私而以賊討則能正其罪矣不從討賊之例而書人何也楚子亦賊賊非可以討賊也然次會伐之下將公之諸侯乎亦非也諸侯從楚而已更不得冒是名也故會先楚子執徐子復書楚人者惡之也伐首楚子執殺慶封不書楚人者削之也然則封之為賊齊之失賊魯與吳之容賊楚子非討賊之人諸侯無討賊之心其義皆具矣遂滅賴既伐國矣復滅國焉書遂甚楚暴也滅者亡國之善辭左氏載賴子面縛之事似失其實九月取鄫鄫已滅於莒魯乘莒亂取之莒也內滅國書取鄫已滅矣又罪其滅者存鄫也鄫周之建國也故曰春秋天子之事也冬十有二月乙卯叔孫豹卒五年春王正月舍中軍舍去也去中軍而併於左右二軍也初作三軍也三分公室各有其一季氏盡征之而仲叔之民尚有屬公者今舍中軍也四分公室季氏擇二而獨為一軍二家各一而合為一軍皆盡征之而貢於公則無一民屬公且季氏獨為一軍軍復擇焉則季氏強矣不但公若綴旒即二家亦弱而制於季氏也季氏又不欲尸其名使毁中軍於施氏成諸臧氏季氏之黨盛矣楚殺其大夫屈申楚伐吳屈申克朱方執慶封而楚子猶以其不致命於吳而疑其二故殺之則非其罪矣家鉉翁曰楚靈之篡羣臣從者風靡不過為保身家計耳而卒不免從逆者宜知所鑒矣公如晉公如晉為晉所辭今復如晉者內逼於臣故忍恥以自結於晉也公動無失禮為晉侯所重而晉臣譏之其言公非知禮固當但所云干盟淩小四分公室皆季之罪乃釋臣而罪君乎昭處積衰遽責以政令在家不能取亦苛論也其意不過欲晉侯逺公有言不信耳然則晉臣之黨惡而釀昭見逐其罪莫逭矣夏莒牟夷以牟婁及防兹來奔邾莒之大夫不書名微也今牟夷以地來故書之著其叛而罪魯納叛也及者以大及小也襄二十一年公如晉宿納邾叛今公如晉宿又納莒叛季實受其利公虛被其惡晉且欲以是止公謬矣秋七月公至自晉昭公如晉凡七止者一及河而不至者五惟此年得成禮而反然以受牟夷為莒所訴幾見止焉歷三時始歸其至危之也戊辰叔弓帥師敗莒師于蚡泉既納莒叛莒人來討復挾詐以敗其師不義甚矣叔弓帥師為季役也鄭玉曰晉方欲止公又敗莒師不顧伯討以成君禍比事而觀其罪見矣秦伯卒不名史失之也冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳楚始通越也晉通吳以病楚楚效之亦通越以病吳徐越稱人非君將也楚前伐吳猶假慶封為名今何名乎據傳吳伐楚而楚修怨耳圍身負大惡恃強逞暴諸侯從之皆黨惡也先儒乃以為善楚而進越過矣六年春王正月把伯益姑卒葬秦景公夏季孫宿如晉前公之在晉也晉平欲止公范鞅諫之而止蓋鞅以宿納叛而執公公必有辭而諸侯亦不服故託師討為辭以歸公而私於宿使來拜莒田以解其罪及宿如晉晉侯享之有加籩宿辭而自比於晉𨽻諂晉以重自託晉平不止不討且重其好貨蓋晉平為臣所愚而助季抑公使無以自立不知禍魯且終以自禍矣葬把文公宋華合比出奔衛寺人伊戾讒世子痤而向戌為之徴寺人桞讒華合比而華亥為之徴事出一轍而平公皆不悟也殺痤而父子之恩絶逐合比而君臣之道睽矣夫寺人近君作姦為易然必與外臣合而其姦斯售故小人以類合而內外恆相結其始也君為所眩及其勢之成也君且為所挾蔓不可除國且由之以傾覆者多矣可不戒哉秋九月大雩楚薳罷帥師伐吳楚頻伐吳卒不得志自是遂舍吳而肆毒於陳蔡冬叔弓如楚諸侯兩事晉楚既聘晉故不得不聘楚楚圍暴詐不惟季孫養安不行即二家亦憚逺役叔弓季之私人聘楚蓋季孫之意傳者多以附楚責公失事實矣齊侯伐北燕納北燕伯而不果也不書弗克者弗克有二非義不可則力不足也晉納捷災力能而義不可也諸侯失國諸侯納之事義而齊力有餘安得曰弗克以受賂中止故削其納而書伐見不為義而為暴也七年春王正月暨齊平春秋內魯故魯與他國有事多言及然有事起他國不得以魯主之者多言會至於平非可以會言矣故變文言暨暨者意起於彼而此從之也齊魯久相仇齊景立使慶封來聘魯未嘗報聘及慶封來奔而魯受之齊人讓魯是仇未解也今魯既睦於晉且南連楚東婚吳齊實懼焉今之平蓋齊求於魯故曰暨三月公如楚公屢朝晉而不禮今朝楚豈公意哉不得已也據傳楚子成章華之臺願與諸侯落之薳啓疆自謂能得魯侯蓋知季孫擅國公若寄生聞楚有命必迫公以出而不敢違耳時公婚吳吳楚仇也楚若怒公公不返矣季氏之陷君於危也罪可勝誅哉幸楚不敢因朝執公恐阻諸侯向楚之意故公得返耳然迫於強令而逺朝楚辱亦甚矣叔孫舍如齊涖盟與齊平矣故盟以結好涖者前定也蓋定於平之日矣夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚凡閲七月其至危之也冬十有一月癸未季孫宿卒宿相魯擅改軍政以自利而又外納叛邑稱兵取地襄自楚歸幾不敢入結晉強家昭屢被困他日意如逐昭宿實導之矣十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師虢之會招以陳公子書矣今曰陳侯之弟變文也罪招並罪陳侯也偃師既為世子矣又屬少子留於招何為乎招為介弟以義匡君使各安其分可也乃從君之惡而又甚之乘君之疾遂殺偃師而立留特書弟者著其親以重其惡也一事而再舉國蓋以世子繫國明國夲也國夲既戕君隨以隕且致大寇宗社以傾其禍大矣然非假招以權而私屬之不至此書弟而繫以陳侯溯禍本也夏四月辛丑陳侯溺卒陳侯因偃師之變恚而自縊是其寵留而畀以強輔不過欲厚其勢以安之耳非有殺偃師之志也乃欲兩利適以兩傷且由是而身死國亡其愚甚矣叔弓如晉賀虒祁也舉魯以見諸侯也楚人執陳行人干徵師殺之行人以赴告為職世子之死與庶孽之立非行人能與也而楚殺之蓋因陳亂以為利故殺不辜以懼陳耳陳公子留出奔鄭留立於招不書子者立非其正不成為君則猶是公子也偃師曰世子留曰公子嫡庶辨矣秋搜于紅周制四時之田搜苗獮狩乃經止書搜狩且狩止三搜止五何也常事則不書也桓狩于郎譏逺也莊及齊人狩于禚譏親仇也搜教振旅苖教茇舍獮教治兵狩教大閲因田習兵也桓書大閲莊書治兵則急而習兵非因田也素之忘備可知也郎之逺禚之親仇則志在從禽不在習兵也故交譏之也自莊而後田不書於經者六世蓋或為近禮之常或其失己見於前而可略者也至昭而季氏専魯取公之軍而與二家私分之今之搜則私家之耀武更與前之田而失禮者不同故書之以著非常之變嚴不臣之誅也搜者擇而取之順春生之令不多殺也三桓意不在獵故非春而搜示衆以不貪於獵其實則數軍實而已以非公所為故不書公以示異陳人殺其大夫公子過據傳招與過同受陳侯之屬因同殺世子今招歸罪於過而殺之耳但經書陳人乃國亂衆殺之辭傳之所載似未審也程端學曰孫氏謂招殺過而言陳人不與招殺之故以陳人自討為文也但不與招殺正當書招以見其罪肯為陳人自討之文以匿招罪乎髙氏又謂不書招殺過過亦有罪故稱人以殺如是則過乃篡逆之黨經亦不書殺其大夫矣意招以過同受屬而誣之而國之大夫亦懼楚討而共殺過以覬免故經書陳人也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐楚莊與圍皆假討陳亂為名然莊能正夏徴舒之罪故豫以討賊之辭而稱人以殺即有利陳之心然旋取而旋舍之則其罪輕矣故止書入楚圍亦賊本不可以討賊且夲無討賊之心故直揭其貪利之實而舉師言滅雖執招而放之已失賊矣故存其公子之稱如恆辭也然招之逆人皆知之即招殺過以自解楚圍肯甘受其愚而末減乎家鉉翁曰意招自知罪重郤兵開門以納圍圍德之而免其死爾是也孔奐見於宋之會亦陳卿也以為有罪則傳無其文以為無罪則經去其官杜預以為招之黨亦意之耳闕疑可也陳自鄬之會逃晉從楚而卒滅於楚蓋不能自立而失所從可責而亦可哀乃晉與諸國皆坐視而莫救更可責矣葬陳哀公賈服以葬哀公在殺孔奐之下謂為楚葬但楚之出也稱師既滅陳矣執與殺皆可以師言之至於葬豈可以師言哉是葬與上不相蒙則左載輿嬖袁克葬之似得其實夫國滅不葬此書葬者穀梁曰不與楚滅是也然葬以魯會而書陳不克赴魯無由會何以書曰次年陳災亦豈陳告乎而經復書之蓋皆以存陳耳九年春叔弓會楚子于陳楚既滅陳於是叔弓宋華亥鄭遊吉衛趙黶會楚子於陳經獨書魯者諸國畏楚各自往會之不可以衆會書也夫諸國縱不能救陳亦當同心疾楚詎反旅見以媚之乎書以病諸國也尤病晉也許遷于夷許逼於鄭嘗遷于葉矣今又不能自守欲遷以近楚楚從而遷之故以自遷為文程端學曰王綱不振諸侯吞噬不安厥居雖許男不能治其國家然亦可以觀世變矣夏四月陳災外災告則書陳滅矣則誰告胡安國曰時叔弓會楚子於陳目擊其事歸語陳故而魯史書之耳是也袁克葬陳侯據弓所聞而書陳災據弓所見而書秋仲孫貜如齊冬築郎囿公處積衰乃以囿為樂乎其志荒矣亦季孫以此蠱君也凡姦臣竊國必娛君於遊觀使荒於政以棄其民而已乃逞焉公在其術中而不悟其亡也宜哉十年春王正月夏齊欒施來奔欒高陳鮑以私憾相爭至動干戈於國內皆大逆也乃陳鮑逐欒高陳又逐鮑而陳氏遂篡齊矣書來奔罪魯納叛也季孫為之也高強不書非卿也秋七月季孫意如叔弓仲孫貜帥師伐莒鞍之戰四卿並書蓋由怒齊掃境興師也自此以後疊書諸卿者則又以四分公室之故也不屬於公而無所統故並書於册也但四分公室者三桓叔弓何與焉蓋季孫得二其一自帥其一屬之叔弓爾陳傅良曰叔弓佐意如故序於仲孫貜之上是也魯間晉衰欲一舉滅莒其惡甚矣戊子晉侯彪卒九月叔孫舍如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申虔者圍改名也名者諸侯之終事故般以見殺名虔何以名惡誘殺也般與虔皆賊賊殺賊不與以討賊之辭可耳斥而名之何也蓋虔非討般般之弒十有三年矣虔屢與之會盟今既滅陳又謀滅蔡故誘殺般欲乘虛以滅之也斥而名之蓋以重其惡胡安國曰楚虔殺般貪得一時流毒後世棄疾以是殺戎蠻商鞅以是紿魏將秦人以是劫懷王傾危成俗天下大亂聖人惡而名之其慮逺矣楚公子棄疾帥師圍蔡虔之殺般也必曰吾以賊討之今既殺之又圍蔡何則不得假討為名而滅國之志見矣棄疾從昏蓋自為也崔杼從齊光之昏而卒弒光棄疾從楚虔之昏而卒弒虔弒逆者即從昏者為之也可不察哉陳傅良曰滅不言圍言圍以病晉也前年棄疾圍陳已而滅陳曷不於此病晉蓋蔡固守三時晉已合九國于厥憖而不能師甚矣五月甲申夫人歸氏薨大搜于比蒲公生母也搜曰大著僭也魯之僭舊矣而三桓攘君權以亂王制其罪尤大况君母未葬乎仲孫貜會邾子盟于祲祥邾前倚齊以病魯魯因倚晉以弱邾今邾益弱大夫盟之卑邾也喪不二事季講搜禮仲從會盟無君甚矣秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人把人于厥憖自宋虢會盟之後晉日偷矣楚遂主會而肆其暴荀吳以不恤亡國為辭故勉為此會以謀救蔡不書救不能救也虔頓兵於蔡諸侯共起擊之義也且前以弭兵為盟楚背盟肆暴其欲無厭諸侯懼矣則用衆之力以遏凶焰亦晉復興之機也乃合九國而不敢進僅遣使如楚又不能以義責楚而為蔡請命焉卑屈己甚使楚益驕有以量諸侯而卒滅之列序諸國大夫見晉之衰而諸大夫之無能為也不待貶而惡見矣九月己亥葬我小君齊歸據傳葬齊歸公不戚恐係季孫之誣辭未可遽信以為公罪也冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之蔡侯般之出世子有居守虔既殺般遂以師圍蔡圍之而蔡不下歷八月而始滅滅矣而有不降故執陳傅良曰執者弗臣之辭均之滅國也嘗臣之矣書以歸未嘗臣之書執以歸是也用之者怒其久拒楚也稱世子者公羊謂不君般故不成其子非也父死國圍窮迫捍敵未暇立乎其位則世子其本稱也世子即子也有之痛父抗仇盡命以死與民共守無忝宗社其於世子之道盡矣善惡各以其身豈得以般故纍有耶書滅書執書用賢之也亦閔之也是般之餘殃也可為亂賊之大鑒然楚虔之惡天王不能討方伯不敢問春秋傷之十有二年春齊髙偃帥師納北燕伯于陽北燕伯奔齊十年矣齊前伐燕而不果納今復納之也書于陽蓋拒於強臣不得歸國也不名與衛侯入于夷儀同所以正君臣之分也而燕人之罪大矣三月壬申鄭伯嘉卒夏宋公使華定來聘通嗣君且拜叔弓之辱也公如晉至河乃復朝而不受為莒故也納莒叛敗莒師伐莒國皆季孫為之明年晉執意如亦知罪之在矣而辭公何哉蓋公至晉而不問莒故則無以服莒釋季而罪公又無以服諸侯故辭公而曲為季氏地不使公得盡其辭穀梁謂季氏不使公遂乎晉得其情矣五月葬鄭簡公楚殺其大夫成熊熊蓋成得臣之孫與鬭氏同出莫敖楚子信讒託討莫敖之餘而殺之則熊無罪也故稱國以惡之秋七月冬十月公子憖出奔齊據傳季孫不禮於南蒯蒯與公子憖謀去之以強公室憖以告公未幾而敗蒯以費叛憖遂奔齊其謀是而其道非也至是公與意如之釁已著其謀公益急矣楚子伐徐楚執徐子矣又伐徐何也髙閌曰徐為吳姻楚疾吳故遷怒於徐非也王樵曰楚已滅陳蔡將事於北方而患吳撓其後故乘滅陳蔡之威伐徐欲以先聲脅吳使不敢動爾其言伐徐之故是矣尚未盡虔之情也虔滅陳蔡遂以為天下事無不可為傳載其欲求周鼎為分逆志見矣不旋踵而死於乾溪天道也亂賊宜知懼矣晉伐鮮虞鮮虞白狄别種也晉不恤陳蔡而事於狄逐利自私之計耳直書而罪自見不書將與師闕文也十有三年春叔弓帥師圍費費者季孫采邑曷為圍之叛也叛者為誰季孫家臣南蒯也曷不書叛三桓竊國一民尺土皆非公有蒯叛季氏耳魯未能治季則春秋固未暇治蒯也卿為帥用大衆見費之固也季氏始城費豈意城之固而生叛哉可為營私者之戒夏四月楚公子比自晉歸于楚弒其君虔于乾溪楚子虔之弒諸儒多沿公穀言棄疾脅比立之遂謀弒虔而歸獄焉比貪其位不得不受其名春秋使比首惡明君臣之分以止亂也但果棄疾倡亂復脅比先立而圖其後春秋豈肯使棄疾漏網况虔初篡而比奔晉棄疾遂臣之今謀弒之乃不以君臣之義治棄疾而専罪比乎又臣比而旋殺之是再亂也篡而終乎其位是愚者空受惡名而黠者得志又豈所以止亂哉今據經而考左傳乃知為亂謀弒者實比首也觀從假棄疾之命召比而比即來何為乎乘釁圖篡耳虔在乾溪比有內應故書歸易辭也襲蔡而棄疾逃棄疾猶不知也盟鄧之後始合謀矣入楚而殺虔之子令於乾溪而潰虔之師虔不得不縊而比遂立焉則弒虔非比而誰即虔亦有應討之罪然比前奔晉避禍耳今歸楚逐利耳非討虔也比因親爭國故書公子以著其情固不得不書其君以正其罪楚公子棄疾殺公子比比立矣不正棄疾之弒君何也兩人同志乎篡比以長而先立棄疾譎而殺之是賊殺賊也未可謂之其君也雖棄疾之隂險更甚於比然亦由比啓亂而棄疾踵而甚之耳兩書公子見其因親爭國其惡同也秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘楚亂弒殺相尋晉昭一為此會王臣下臨諸侯畢至使乘人心疾楚請王命以討之復陳蔡以導之義聲既昭衆皆用命必無楚矣不此之為而徒會雖會亦奚以為八月甲戌同盟于平丘盟不言諸侯劉子亦與也襄二十五年重邱書同盟晉楚猶未成也自盟于宋諸侯兩事晉楚無復同盟之可言今因楚亂可以同矣乃不能修德以感人心而耀兵甲不能辨分以服人志而盟王臣不亦悖乎雖強要使同而僅同矣自是人益失望故晉合諸侯止於此公不與盟晉受邾莒之訴以辭公也晉昭此盟無名不義固不以得與為重然魯陵邾莒亦有罪焉拒不使盟不為公諱者罪在意如不在公也晉亦知罪之在而輕辱公故書以著其惡晉人執季孫意如以歸意如之執得其罪矣然其罪僅陵小已哉其尤大者在無君而専魯晉誠能請王命以大義廢之反邾莒之侵疆而魯之四分者復歸之公則魯國順正邾莒感恱諸侯咸畏威懷德伯業修矣挾之以歸何為哉蓋晉君惟臣是聽其臣與意如以氣類相倚但外示威而心非行義也故書晉人以惡之公至自會不得與於盟故以會致或以為公不願盟則往會何為乎蔡侯廬歸于蔡陳侯吳歸于陳棄疾借陳蔡之力而有楚故復陳蔡以報其功今春秋所書若陳蔡之自復何也蓋蔡為王室之親陳為盛德之後廬者蔡世子有之子吳者陳世子偃師之子宜嗣其位故直曰蔡侯陳侯也書名者著其人也直書歸而不書自楚者國其應有非楚所得制也於虔之滅則書之罪之也於棄疾之復則削之抑之也所以尊周也故曰春秋天子之事也然前滅於楚而今歸其國則制於荆蠻之實亦有不能掩者雖得復國之機究非復國之道卒為楚滅亦積漸之勢然耳曷怪焉冬十月葬蔡靈公國復而葬魯會之也公如晉至河乃復盟不得與復如晉何將欲免意如而請之歟晉固不因公而赦意如也將因晉執意如或可相機而訴之歟晉豈因公而討意如乎其見拒也固晉之惡亦自取也吳滅州來州來國名吳楚之中要害處也十有四年春意如至自晉辭公晉臣為之也執意如晉君為之也執而卒釋君不勝臣也始之執以魯侵邾莒致乏貢於晉也此之釋以魯之土地猶大所命能具也因邾莒以執而不問魯與邾莒之是非因魯以釋而若魯為季之魯非公之魯利不顧義也公見逐之禍成矣晉亦由此而卒不振利之為害大矣哉三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢微國之大夫不見於經今莒子卒而書公子意恢蓋貴戚之卿而受託孤之寄者也不言大夫以親重也而殺之則莒亂可知據傳公子鐸殺意恢逐嗣子郊公迎君之弟庚輿立之不書者蓋古者敵國不廢喪紀莒魯雖怨而去疾之卒意恢之殺尚來告及魯不會葬莒人銜之故郊公之出庚輿之入不告其後庚輿來奔而魯受之嫌怨益深故郊公之入亦不告春秋即事以明王法不必備其事也胡安國曰庚輿入國不書而出奔則書惡之也郊公出入皆不書微之也夫庚輿以叔篡姪是奪嫡也入國何以不惡之意恢以公子書豈郊公反以君而微之乎十有五年春王正月吳子夷末卒遏也餘祭也夷末也約兄弟相傳以致國乎季弟札今夷末卒札宜立矣而不立或譏其以讓釀亂非也蓋札之讓見於遏之初欲立札至夷末卒左氏無傳惟公羊云季子使而亡則夷末之失也蓋夷末宜令札在朝以繫人心烏可輕使於外逮將卒之時如可待季而無患則命待之如不能待宜深明季之節而以國授遏之子光則得嗣續之正亦愈見季之賢乃懵焉以殁而夷末之子僚遂冒居其位是釀亂者夷末豈季子哉如以季之亡為病但出使而亟歸是貪位也其亡未可厚非也二月癸酉有事于武宫籥入叔弓卒去樂卒事武主之祧久矣成六年書立武宫以示譏立而有事相沿之失其失小矣且嵗事之常不勝書此以去樂書也祭必有樂樂有文舞武舞籥文舞也其入也先文後武當籥始入叔弓暴卒故去樂蓋諸樂皆去非獨籥也廟祭事重臣卒何以去樂以弓在廟涖事而變禮也春秋常事不書失禮則書然變而得禮亦書使後世議禮者有考也胡安國曰按禮載君於祭不得成禮者詳矣而不及大臣衛太史栁莊寢疾君曰若疾革雖當祭必告是知祭不可告也然涖事而卒禮雖未有可以義起緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視己設之饌必不忍輕徹故去樂卒事其可也夏蔡朝吳出奔鄭朝吳蔡之世臣忠於蔡亦有功於楚故楚平信之而使輔蔡今之奔由楚之讒人費無極傾之故蔡人忌而逐之也則朝吳無罪矣何以書責蔡也亦閔蔡也蓋楚平復蔡亦一時之權宜而非其心蔡雖復猶制於楚而蔡侯又不能御其臣下至逐其信臣其何以國楚平初怒無極及聞逐吳以翦蔡翼之言遂不之罪後更信而任之以為楚禍讒人罔極交亂四國信哉六月丁巳朔日有食之是月傳載王太子夀卒王室之亂兆於此秋晉荀吳帥師伐鮮虞前伐鮮虞矣今又以卿帥大衆而伐之書以見其務近攻以闢地而昧逺圖也荀吳屢帥師中行氏強也冬公如晉盟而拒朝而辭不敢以為恥而又朝朝無以拒之遂謀止之皆晉臣黨季之故也其拒也可恥其受也可憂十有六年春齊侯伐徐齊景爭伯也晉既不能逺略齊果省德明政以糾合諸侯繼桓之烈可也乃內不治而事外且徐未聞有罪齊師無名矣祗以徐居齊南鄙楚平繼亂新立不能顧徐故乘釁以逐利耳其無成宜哉楚子誘戎蠻子殺之誘殺凡二皆楚也書之深惡之也戎蠻書爵蓋亦曾受王命者失名故楚子亦不名且與蔡有差矣故略之也夏公至自晉去冬如晉今夏始至傳以為見止信矣季有罪而釋公以無故而止意如之結晉以陷公至於此極其後興兵討之固非其道然亦迫於不得已世徒見登臺之請而責公始禍亦不察其情矣秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公季孫居國貴重未嘗會諸侯之喪今執於晉而親往會葬者釋前嫌而自結於新君也蓋晉交不固無以抗其君故不憚忍恥以求媚焉欽定四庫全書御纂春秋直解卷十下十有七年春小邾子來朝魯既卑矣小國猶有朝者晉亦衰矣諸侯猶有朝者然君德不修而權移於下積重莫反故同歸於亂夏六月甲戌朔日有食之周六月夏四月也正陽之月譴見於天災孰大焉祝史請用幣亦應天之文耳而意如猶止之其無君而慢天亦甚矣秋郯子來朝黃正憲曰左載叔孫舍問官於郯子有雲火龍鳥之對孔子見而學之然刪書斷自唐虞至於論官惟曰揆嶽牧伯等職而已蓋中古文明漸開世變事繁故分職正名命以民事孔子欲立萬世宜民之道故舍逺取近乃郯子譏顓頊以來不能紀逺聖人固有以折衷之矣八月晉荀吳帥師滅陸渾之戎陸渾周地其戎允姓本居瓜州在荒服之外僖二十三年晉惠誘而遷之陸渾不舉其本號而繫之陸渾者罪晉也請王命而驅使歸其所可耳因其二於楚遂貪其地襲而滅之不仁甚矣且不慮郊甸之震驚乎前書楚子之伐今書晉卿之滅皆以治其兵逼郊甸之罪冬有星孛于大辰孛于大辰者在大辰也大辰心也心三星中星曰明堂天子之象其前星太子後星庶子也又房心尾大火也故當時申須梓愼禆竈皆以為火災漢董仲舒以為應在五年王室之亂然天道逺而事應未能盡推也人君惟謹天戒修德以弭災而已矣楚人及吳戰於長岸楚屢伐吳今吳來伐而楚又與之戰故以楚及戰惡楚也不言勝敗者敵也胡安國曰楚地大兵強吳非其敵也乃楚平以內亂費無極以讒勝囊瓦以貨行謀臣策士為敵國用吳日強而楚削矣故為國以得賢為本勸賢必以去讒逺色賤貨為先不然雖廣土衆民不足恃也十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災四國同日而災異之大者自是宋臣叛而國危衛侯之兄殺而衛侯幾失國陳師敗而卿獲然則孛之應豈可僅以災當之哉惟鄭有政故無他患天變可畏人事足恃有徵矣六月邾人入鄅邾弱且危矣乃乘鄅不意襲而入之盡俘以歸豈以削於魯者償於鄅乎不義甚矣故書以惡之秋葬曹平公冬許遷于白羽許嘗遷于葉又遷于夷楚平立返于葉今又自葉遷白羽後又遷于容城然不能修德固圉屢遷何益故詳書以為後鑑十有九年春宋公伐邾討其入鄅也鄅為宋姻故伐邾而盡歸鄅俘視無名興師者差善矣胡安國曰傳載圍蟲取之而經不書豫其善而釋其取邑之罪也夏五月戊辰許世子止弒其君買據傳許悼公瘧飲世子止之藥而卒張洽曰飲藥卒豈非藥之誤以致死乎誤弒亦弒也異於楚商臣蔡般者過與故耳春秋一以弒書以臣子之於君父不可過也且遏進毒以弒之萌也己卯地震秋齊高發帥師伐莒據傳莒郊公奔齊庚輿賂齊而入立今齊伐之者蓋必事齊有未至也齊景不聞令政而以貪忿興師晏子為之佐而無所匡正所謂以其君顯者何足稱哉冬葬許悼公止弒君而自卒未得明正其誅是失賊也而悼公書葬何也蓋止自責而不立乎其位以與其弟虺是為元公則止之弒誠過也非故也故前書弒其君見止有弒之事有是事而正其罪非強加之也法無可貸也繼書悼之葬明止無弒之心無是心而寬其辭非旋赦之也情有可原也哭泣嗌不容粒以死法可已矣非失賊也故得書葬不使與故弒者同科春秋之權衡審矣二十年春王正月夏曹公孫會自鄸出奔宋奔言自有所要也鄸者會之邑會有罪曹人將治之故走其邑以冀免焉不免而後奔雖未叛而實要也紇以防求後會自鄸出奔皆要君也要以獲利褻君之賞要以免罪稽君之刑書自鄸罪會也秋盜殺衛侯之兄縶盜者誰齊豹也豹為司冦而縶奪之其姓名不登史策故書盜也縶不書公子而稱兄纍及衛侯也縶以有疾而廢故靈公得立乃縶遂干預國政無禮於國而靈亦聽之自以為厚其兄而遂以招亂兄死而身危幾亡其國書之以罪衛侯之失政也冬十月宋華亥向寧華定出奔陳華向三卿懼君之害己而首禍誘殺羣公子且劫君而質太子悖亂極矣將討而奔陳陳宋之讐欲因陳以為亂也書三人同奔以正強臣之誅然君以無信多私而兆亂亦有責焉耳十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘晉頃即位五年始修聘於諸侯蓋伯業既隳六卿爭權相忌邦交不暇及也宋華亥向寧華定自陳入于宋南里以叛華向既奔矣將乘隙為亂元公復信讒將誅華貙激而生變遂外召華向春秋略華貙仍書華向者誅首亂也凡以邑叛不繫國猶其私邑南里繫宋宋都之里名也華向入宋志在覆宋倘非宋使樂大心等禦諸橫宋其覆矣於是居盧門以南里叛宋城舊鄘及桑林之門以守分國相爭其罪尚可逭乎書自陳兼罪陳也秋七月壬午朔日有食之於是公問梓愼愼不告以省德消變之實而曰分至不為災蓋黨於季氏助之匿其情矣八月乙亥叔輒卒輒無事見經書其卒卿卒必書也冬蔡侯朱出奔楚朱者平公廬之子也朱之叔東國欲篡其位而賂費無極無極脅蔡人出朱朱奔楚訴於楚也楚子將討東國又阻於無極而止信讒而逐其臣又廢其君甚矣哉然蔡兩世殺於楚東國結楚而謀篡朱亦赴楚而自訴東國之惡固甚於朱然均忘父祖之仇無人理矣公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚華向結黨以出稱兵以入襲據南里君臣日戰君懼將奔矣賴齊之助僅而能勝其後晉會諸國敗華氏圍南里而楚人釋君助臣使薳越帥師抗諸侯之討晉畏楚固請諸宋而逸賊矣故不書晉救以略晉特書奔楚以罪楚復舉宋南里者言逆臣禍及國都而出入自由憫宋也譏不在宋矣大搜于昌間昭公之時三書搜著強臣之屢弄兵而危公也三綱軍政之本故寓戎事於田以納民於軌物今三家專魯公無軍行其本亡矣故屢書以著公出之由夏四月乙丑天王崩六月叔鞅如京師葬景王太子壽卒八年矣猛丐皆其母弟嗣宜早定而不定者王寵庶子朝也後欲立朝未及而崩於是劉單立猛而尹氏等黨朝而爭立猛不書立當立也何以知其立以下書王知之也三月而葬非禮也亂故也王室亂紀事必指其實未舉事而言王室亂特筆也夫春秋之作以尊王也故衰周雖僅守府而恆隨事以維王迹至失道之極存亡所繫則即事不足以維之因先揭其亂以明撥亂之道也王室猶云王家家實兆亂不得泛言京師也王以正天下為職而天下以家為本景王有弟不能容晚節則寵庶蔑嫡一身瞑目二子角立釁自內作黨自外分劉單所守者禮律之正然猛無寵則威不足使下尹氏所託者先王之命而朝不正則義無以服人干戈相向延及五載倘非天眷有周正者卒勝幾不祀矣彼頽帶事雖類此然頽亂於惠王二年帶亂於襄王十有六年惠襄名位久定頽帶猝發一時耳故彼尚未言亂而此特書亂也人君知此義必克己以修身父父子子而家道正正家而天下定矣劉子單子以王猛居于皇能左右之曰以下而以上可乎猛不能自定不得不賴劉單之以也以所當以如劉單之於猛所以表夾輔之功以不當以如尹氏之於朝所以著助亂之罪美惡存乎其事也侯國之嗣稱子逾年稱爵嗣王未逾年而稱子與侯國奚異哉則宜以王冠子矣然值其常王子之稱無因而見也值事之變不得不書然書王子又與他王子奚異哉且時有王子朝爭立故不得不直書王以正其名惟不稱天王則以未逾年而降尊耳既稱王矣而書名所以辨其人也皇畿內地子朝亂作故出而避于皇不言出而言居莫非王土故隨在言居也夫君前臣名今君且名臣何以不名蓋王卿不名常也劉單不失職故從其常豫之也有疑君者君必名變也王猛位未定故從其變正之也春秋之權衡審矣秋劉子單子以王猛入于王城居于皇避難也入于王城復辟也書入難辭著子朝及其黨之罪也王自當居王城失而居于皇則變矣因以兵入王城變之正也不能自入有人焉以之而入亦變之正也冬十月王子猛卒猛本宜稱王子其生也特稱王以君道治朝之爭也其卒也乃繫子以子道正猛之終也書卒者子未逾年事不紀元主不列廟故不得書崩亦不可書薨説文云薨公侯卒也景王三月而葬此猶在七月之內應稱名且以别子朝也倘已逾年當書天王崩而不名矣猛卒而弟丐立是為敬王亦劉單立之而不書當立也趙鵬飛曰王子猛卒其文與王子虎卒無異以承上王猛之文則非虎比無疑矣十有二月癸酉朔日有食之二十有三年春王正月叔孫舍如晉癸丑叔鞅卒晉人執我行人叔孫舍邾人訴魯晉當以師問魯何得執其行人書行人明舍之無罪也晉人圍郊郊王畿之邑不繫國者明王之無外也時郊為子朝所得故晉遣大夫助王圍郊書人微之也晉為方伯不躬帥諸侯直取子朝以定王位乃徐遣大夫帥偏師以圍其一邑是不能勤王而徒殘王民也其罪著矣夏六月蔡侯東國卒于楚因朝楚而卒也大仇未復反結楚嬖臣以逐其君而又朝之三綱絶矣書卒于楚明為楚所制而死非其所也秋七月莒子庚輿來奔庚輿以不義得國以不仁失位故因奔魯以示戒戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧吳伐州來楚以六國禦之書師用衆也先頓胡沈君將也後蔡陳許大夫將也不書戰未陳也敗不言楚者楚令尹死其師未與吳接吳敗六國楚師自奔難言敗楚也然楚主兵其師又大奔即不言敗亦當書潰乃沒楚不見何也深罪六國也蓋受役於楚本為不義然猶曰畏楚也今楚軍無帥既未與吳接六國何故先驅其民為楚當吳之鋒其敗也自取之耳故凡師敗必纍數之此獨略之者賤而惡之也胡子沈子書名死也君為宗社主其死與亡國等故曰滅大夫則輕矣雖死僅曰獲胡安國曰書胡子髠沈子逞滅自滅也亦猶書梁亡自亡也君死曰滅胡子沈子是也生得曰獲秦獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志也天王居于狄泉敬王也喪已逾年不可曠年無王故稱天王也尹氏乘其不戒挾子朝自外入故出居狄泉以避之雖失位而尊號無貶明正也王猛立未逾年則猶是先王之年以先王臨之大臣宜盡夾輔之力故劉單書以示臣職也敬王立已逾年則當與天下正始故不書以成君尊也尹氏立王子朝嗣子有常位不必言立立不宜立者也衛人立晉衆立也責其無王尹氏立王子朝篡立也罪其不正晉之立以公子而有次及之勢也彼既無王故削公子以示貶而明君臣之義朝之立以王子而有匹嫡之寵也亂起於王故稱王子以示譏而正父子之道乃書人猶公也書尹氏更罪其私矣尹世柄周政故變文書氏見宗強也故曰嬖子匹嫡外寵二政亂之本也八月乙未地震冬公如晉至河有疾乃復叔孫囚於晉故公如晉書有疾乃復明非晉辭之也然則不書有疾皆為晉辭可知為晉辭而猶與仲遂之至黃乃復同文若公之自歸然蓋皆以全君而諱其辱也二十有四年春王二月丙戌仲孫貜卒叔孫舍至自晉舍之至左榖經皆不書氏蓋一事而再見者卒名之其常也惟公羊書氏而胡安國以為賢之義似可從蓋舍之執非其罪且以禮自衛終不辱國固不可與意如同也故執書行人至書叔孫夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢凡滅國皆罪而亦有異吳之先君伐楚而巢人戕之巢實有罪焉且巢為楚屬國而吳滅之此入郢之漸乎葬把平公二十有五年春叔孫舍如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父王室之亂四年矣順逆之勢亦既明矣晉嘗一出圍郊無功而返今因鄭遊吉之言始慚而勉為此會且諸侯不出而委於大夫期以明年明年究未聞有勤王之實也及冬而王入成周王自入也劉單之力也諸大夫何與焉其罪不待貶而自見有鸜鵒來巢鸜鵒不踰濟魯所無也有則為異其性穴居巢則反常蓋戾氣所感也妖不勝德不知省德禍隨之矣秋七月上辛大雩季辛又雩大雩僭也又雩不言大蒙上文也既僭且瀆也災異並至區區於禱祀末矣九月己亥公孫于齊次于陽州因討意如而為所逐也季擅魯久矣至昭已若寄生乃不勝一朝之忿且與謀者皆左右親昵素與季為仇假公報私莫知為君逺慮者宜無益而反害也然則季遂不可討乎非也季之惡決之固外潰養之亦內蝕豈得以討亂病昭特昭不得其道耳時有子家羈之賢叔孫舍之忠猶為可仗公誠修德親賢俟釁而動何不可之有今至見逐季罪不容誅矣亦公自速之也書公孫正其本也罪公之失守也故曰春秋天子之事也乃不之晉而之齊者晉黨季而數辱公不得已而之齊而又未知齊之必我恤也故徘徊野次以待齊命焉耳齊侯唁公于野井弔生曰唁慰安之也齊侯來唁又取鄆居公似有親鄰恤患之意奈明年夏將納公嬖臣梁邱據受賂阻之遂不親行使大夫帥師從公圍成不克而止則為義不終矣或以唁公取鄆即為貶非也唁公禮也今年取鄆以居公明年果伐魯以納公亦未為不義也聖人豈以已甚責人乎冬十月戊辰叔孫舍卒昭之討季氏也叔孫舍如闞其司馬鬷戾首助季以抗公而孟氏繼之是三家合力以逐公也舍雖不與謀然家教不行於司馬亦舍之責也反自闞以正言動季氏而謀納公季又始許而終背之舍不知徐為君謀乃抱內愧忿見欺遂自殘以死其忠也末矣十有一月己亥宋公佐卒於曲棘曲棘宋地諸侯以境內為家故外諸侯卒於境內不地宋元以公故如晉行至曲棘而卒勇於義矣且意如妻元公之女不顧其私尤人所難故雖卒於境內特書地以録之十有二月齊侯取鄆齊三取魯地兩書人此獨舉齊侯者為公取也觀明年書公居鄆可知矣然遂為義舉乎未也季氏逐君其惡大矣昭公來孫其情迫矣齊強且近納之猶反手也景誠能請命天子號召諸侯納昭而戮意如伯政舉矣不此之為而取一邑以居公其細已甚然猶書齊侯者小善必録蓋春秋與人為善之意二十有六年春王正月葬宋元公三月公至自齊居于鄆凡公行返而告廟則書至今昭失守宗廟猶書至者存公也自野井而云自齊得見齊侯也衛侯借晉力而有夷儀言入難辭也紀實也昭公假齊力而有鄆言居正辭也尊君也鄆本君之有也然居其所不言居言居則失所矣且周公封界盡為賊臣所據雖邊境小邑非假人力亦不能有亦可哀已胡安國曰昭公失國而稱居于鄆存一國之防也襄王已出而稱居于鄭敬王未入而稱居于狄泉存天下之防也夏公圍成齊侯將納公惑於嬖臣之言僅使公子鉏帥師從公圍成成孟邑也近齊蓋不欲深入而於成卜其可納與否也則雖有師而不為公用矣故削齊師而止言公圍責齊也然成敢抗公是三家固一心也國人猶敵國也公固失民而季之首惡孟之同惡及成人之助惡皆不容誅矣秋公會齊侯莒子邾子把伯盟于鄟陵此齊景假納公之名以糾合也夫以納公召諸侯而三國從之盟可謂有行義之資矣故公雖有求入之志不書及而書會蓋將以伯事責齊也使其志能及逺雖北杏之業何難哉乃為善不勇雖會何益東周之興不可望矣桓文之績亦邈乎不再覩春秋所以終也公至自會居于鄆汪克寬曰曾子問云君去其國大宰取羣廟之主以從則昭之去鄆而返亦或告於祖禰矣其言未得經旨蓋鄆內邑也公雖失國而猶居鄆故以內為辭凡外出而返必書至惟圍成而返不書至成亦內邑也不可外公於成也後鄆潰而寓乾侯乾侯晉地不惟不可言至亦且不可言居然書在亦所以存公也皆特筆也若以曾子問為辭豈廟主從於鄆不從於乾侯乎義難通矣九月庚申楚子居卒居者棄疾改名也冬十月天王入于成周武王定鼎於郟鄏周公營以為東都是為王城洛誥所謂澗水東瀍水西者也營下都以遷殷頑民是謂成周洛誥所謂瀍水東者也曰東都蓋以鎬京為西都也曰下都蓋以王城為上都也平王東遷定都王城時子朝據王城故王入于成周成周亦王都也故不言居而言入入成周亂將定矣李瑾曰晉亦與納王無一言及之何也晉以同姓主盟不能即逐朝而安王室坐視成敗逾五年然後興師納王原情責實不忠之甚若以納王之功豫之則藏姦觀釁者勝矣尹氏召伯毛伯以王子朝奔楚子朝作亂兵敗而奔且奔於僭王之楚罪也然亦黨亂者所致故書以也前立朝止書尹氏首惡也此兼及召毛其從也久亂王室罪皆當治也且以見由王寵朝故黨盛而稽亂也愛憎起於一念禍及子孫而宗社幾不祀可不戒哉二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚此公子光使專諸弒之而稱國何也胡安國曰吳大臣之罪也蓋得致亂之由而竟云不歸獄於光則非止亂之道夫夷末卒而季札逃光為嫡嗣而僚立篡也大臣與國為體事孰大於置君乃不審其序惟意所欲非罪而何然光雖當立僚既立矣光亦臣之十有四年矣君臣之分久定一旦戕而代之非弒其君而何使當僚初立光不臣之而上訴天王言先人之意在札長嫡之次在已則僚當廢矣罪在初臣之而終弒之耳然致弒之由則以大臣當國而不知道僚貪國而不知義也止治光之弒而不正僚之篡豈足服光之心故變文稱國言吳有是事則行弒之人與致弒之由其罪皆具故曰春秋王道之權衡也楚殺其大夫郤宛郤宛之死由費無極譖於令尹囊瓦殺之也而稱國者罪楚君也君無道以令其臣致擅殺大夫紀綱亡矣秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈據傳命戍周且謀納公也宋元為公故如晉卒于曲棘衛靈欲質其公子與大夫之子於諸侯以求納公是宋衛猶知有君臣之義也士鞅取貨於季孫而辭之其惡甚矣家鉉翁曰齊為鄟陵之盟而據入季氏之錦晉為扈之會而鞅納季氏之貨二君懵然以魯之休戚無關於己孰知陳恆韜禍於齊六卿伏憂於晉使二君能為魯討賊亦足以讋內盜之膽也冬十月曹伯午卒邾快來奔季孫父子納叛世濟其凶且是時公孫于齊意如負當討之罪略不知懼其肆無忌憚何所不至哉公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯乾侯晉地不禮於齊而求晉也陽州之次待命而次也齊隨有野井之唁乾侯之次不受而次也公終由乾侯而返趙汸曰晉人以公非見卑於齊則不來故不使入其國由晉臣隂黨季氏故也夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公程端學曰滕小國魯未嘗會其葬至此會葬者見季氏之求悅於鄰國無所不至也二十有九年春公至自乾侯居于鄆公朝於晉而不得入留於乾侯期歲始返則求晉猶不若求齊也書自乾侯深責晉也齊侯使高張來唁公齊唁公二晉唁公一兩書地而此不地者以公居鄆猶在魯邑也使大夫唁卑公也高閌曰以公如晉不為晉所納故使高張來唁乃所以嗤公也是也深責齊也公如晉次于乾侯再求晉而不納又次于乾侯詳書之以存君也公既出矣史於公事亦不盡書蓋皆聖人之特筆也夏四月庚子叔詣卒秋七月冬十月鄆潰內邑不書叛况潰者民逃其上之謂邑何以書潰公居焉耳孔頴達曰公如晉而鄆潰使公不得更來當是季氏𨗳之使然是也胡安國罪公之失民似非經旨三十年春王正月公在乾侯公失國久矣前此居于鄆雖非其所而猶魯邑也今賊臣誘鄆使潰公失其居魯無公矣故書在以存公也繼此歲首必書蓋以王正正季之罪也至淹晉地而不恤晉亦何以辭其責夏六月庚辰晉侯去疾卒王室亂晉不能定魯君孫晉不能納六卿日專晉侯寄生焉耳豈惟失伯殆將失國秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚吳以徐逸吳亡公子於楚而滅之也夫光既弒君又以私怨滅徐其惡大矣徐子書名蓋奔君皆名其不名者魯史闕也劉絢曰齊滅談楚滅弦狄滅溫君奔皆不名蓋不勝強暴而奔義於國未絶也徐子既服於吳而奔安有興復之望乎故名以絶之其説亦善存以備參三十有一年春王正月公在乾侯季孫意如會晉荀躒于適厯據傳晉侯將以師納公是討意如也范鞅因言曰若召季孫而不來則信不臣矣然後伐之若何又私於季孫曰必來我任其無咎是曲為之地欺晉侯而阻其討也晉侯遂使荀躒會之季孫詭為畏罪乞憐之狀而晉侯討罪之心遂已獨不思當討之賊而可以會禮之乎君被逐而久次乾侯不容一見臣逐君而列之於會使盡其辭黑白且反易矣僅名分之倒置乎書會責晉侯也誅晉臣也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯荀躒既會意如晉侯因使唁公勸之歸國夫公與意如大義已乖季孫言以得從君為願豈其本心哉強之使合勢必生變故躒之勸歸以試公也歸則終制季手其後事晉不知也不歸則可脫季而謝公矣故書唁以著其詐家鉉翁曰意如身至乾侯既服其罪公可以歸乎曰公在外固將以客死然一二大國倘有正亂之志猶或有討一歸則在意如掌握矣傳載子家羈勸公歸曰一慚之不忍而終身慚乎夫以一乘入魯生死制於賊臣豈特一慚已乎其言未必果出於子家秋葬薛獻公冬黑肱以濫來奔濫邑名以邑叛而不繫國闕文也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞魯邑也公取之志變也公無兵矣故前取鄆書齊侯今何以能取闞季氏與之也公無復之矣姑以闞與之使即安而不復求入也然非以地與公也闞為魯羣公墓之所在致其邑入以供公資糧之費耳聖人不以歸闞之權授之季氏而特書公取以誅季孫據國之罪夏吳伐越越從楚伐吳故吳伐之是激越與楚合也故吳入郢越隨入吳吳亦失計矣哉是時吳楚越互為抗衡而晉齊亦內制於權臣而莫能復有為也可以觀世變矣秋七月冬仲孫何忌會晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周子朝奔楚而王畏子朝餘黨不敢入王城而留成周時欲定都成周以城小不足容衆因告於晉晉帥諸國城之夫不都王城而都成周是亂粗定而猶有懼也大夫會城是諸侯怠而大夫用事也然當王室危弱而能從王命以供王役可見周德及人者深而君臣之義自在人心也然何以不言京師蓋京師者王都之名自諸侯言之曰京師自天子言之則書其地以紀其實故王猛書王城敬王書成周京師無定地因王都而名爾王城前之京師定都成周則今之京師故不得不目其地以别之後書晉執宋仲幾于京師蓋指成周也十有二月己未公薨于乾侯公八年於外卒以客死意如之罪不容誅矣亦齊晉之咎也齊大國也晉尤盟主也納公易耳乃齊景不明嬖臣詭辭以蔽之晉定不綱強臣多方以誤之既貪其賂亦庇其類故使公至於此極也書薨於乾侯志變也
