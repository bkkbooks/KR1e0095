front:
  text: 欽定四庫全書御纂春秋直觧卷十二丁未敬王二十有六年三十有九年春秋終哀公
  hash: sha256:cdcf7d5a55329cf14f7885b2cb0097bac20e080640fa5cd48007b831a076f527
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_012-1a, image: WYG0174/WYG0174-0270c.png}
body:
  text: 名蔣定公庻子也元年春王正月公即位楚子陳侯隨侯許男圍蔡假報怨以淩蔡也陳從楚罪陳也昔與蔡同滅於楚而忘之耶隨自僖公二十年楚伐之後不見於經蓋世服於楚也今復見者吳入郢楚子奔隨隨免之故徳之使列於諸侯也許滅於鄭復書許男者楚封之也罪鄭之滅削楚之封不與諸侯得滅之而得封之也天子之事也胡安國曰按左氏蔡人男女以辨楚使疆於江汝之間則是蔡降而楚遷其國也止書圍何也蔡以吳入郢鞭楚平墓蔡宜得報而楚子復讐可恕也家鉉翁曰柏舉之戰蔡昭復其父祖之讐至入郢而鞭平則吳也不能報之吳而釋憾於蔡謂之復讐可乎滅頓滅胡今又圍蔡志吞小以爲利耳春秋奚取哉左謂蔡降而楚遷之何又云蔡請遷於吳乎蓋蔡民有下楚而逃生者蔡君實固守而不屈也故春秋書圍不書入鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉齊侯謀晉乆矣屢次而未成伐今晉臣久叛齊衛遂助叛以伐晉故書以病晉之不能定叛罪齊衛之黨叛也許翰曰楚專封國王道盡矣晉受衆伐伯業絶矣春秋之變至是窮矣冬仲孫何忌帥師伐邾邾事魯謹矣來會來朝且至奔喪乃邾子甫還而城􅃮以臨之隨出師以伐之公新即位非公之故三家也祲祥與拔之盟皆仲孫尸之今首伐之爲暴不顧義貪利不顧信稱兵不顧君於何忌乎何誅時列國皆併小以自大此春秋將爲戰國也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹三卿並將蓋各擅其軍也三卿並出皆自營其私也孔子用魯道化所感三家聽命且睦鄰修好邊境無事孔子行而三家張仍踵舊轍更逐利以淩小前取邾田自漷水矣今又取漷東併及沂西以蕞爾之邾三納其叛邑而三取其田幾何而不盡也恐邾控于大邦而加兵復要而盟之季爲主將不親涖而使二卿往甚矣其横也鄭玉曰季氏不盟一則不屑與盟一則包藏禍心必滅邾而始己也汪克寛曰内臣並使始於遂得臣之如齊未嘗並將也並將始於行父許僑如嬰齊之戰鞌未嘗並㑹也並會始於宿老之㑹吳未嘗並盟也今三卿並將二卿並盟强僭極矣且盟亦與他盟異奪其地而脅之盟也不亦甚乎蔑與句繹爲春秋書盟之始終可以考世變矣夏四月丙子衛侯元卒衛靈初年主威不立而盗殺其兄後且耄矣家政不修而妻逐其子無道致亂數世不定其得沒身幸矣滕子來朝晉趙鞅帥師納衛世子蒯聵于戚趙鞅怨衛助荀士未有以報衛人立聵之子輒因納聵以爭國書鞅帥師著其志在亂衛也聵仍書世子正名也聵罪未白而奔靈公後欲立郢郢辭遂止則聵猶與國未絶也但既奔矣父未命復父死之謂何又因以爲利乎且今之立者即聵子也而必爭之不父矣父雖不父子不可不子輒辭立而迎父可也今納于戚而不得入是拒父也公穀以為尊祖非也雖祖命立輒輒豈無父之人哉而拒之滅天理矣况輒之立也祗以郢辭立而言亡人之子輒在國人因而立之耳豈祖命哉秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐡鄭師敗績荀士在朝歌而齊人輸粟鄭罕達送之其帥師以防刼耳則趙鞅主是戰矣鞅嘗叛今以叛治叛而主是戰鞅之罪也達黨叛而以師狗焉逹之罪也冬十月葬衛靈公衛亂是以緩十有一月蔡遷于州來蔡殺其大夫公子駟避楚也吳滅州來而邑之蔡遷焉依吳也前年春請遷於吳今始遷者中悔也蓋公子駟止之也吳人假聘襲之蔡因殺駟以説哭而遷焉則是吳遷之也然蔡本自請遷遷而仍自爲國故以自遷爲文夫遷國大事也依人非計也國君宜以守死爲道耳駟果爲君忠計宜諫於未請之先迨與吳成言而背之乎蔡侯初既聽駟急則委罪亦非君道也故稱國以殺而不去其官三年春齊國夏衛石曼姑帥師圍戚聵在戚而輒使石曼姑圍之不同楚商臣蔡般者幾希然圍者衛志使齊主兵何也齊大國也而世伯不能以大義正輒乃助之圍父是輒之逆齊實成之也然齊何以助輒髙閌曰齊與晉爲讐若聵入則衛從晉矣所以助輒也許翰曰晉君臣稱兵而齊爲臣伐君衛父子爭國而齊助子圍父以是知齊之將亂也夏四月甲午地震五月辛卯桓宫僖宫災桓公哀八世祖僖公哀六世祖世有先後子孫尊之則一故其宫並列而不言及杜預曰親盡不毁宜爲天所災但諸侯五廟親盡祧主廟猶是也非可毁也公羊曰復立也但立宫必書武宫煬宫是矣桓僖何以不書曰鞌之戰季孫禱於武公昭公之孫季孫禱於煬公其立宫非禮甚矣故書之桓於隱爲弟僖於閔爲兄其昭穆同意其初權宜而别立宫非祧而復立也猶未大失也故略之也但隱閔既祧桓僖亦宜祧今猶有宫是三家以私意存之也三家出於桓立於僖世專魯政其諸以是爲悦而存之歟天譴以災非譴桓僖也譴三家也季孫斯叔孫州仇帥師城啟陽地震廟災變異弗圖乃以夏月用師城邑豈惟勞民不畏天矣季本曰啟陽故鄅國在邾東近費昭十八年邾人襲鄅魯既取邾漷東沂西田意鄅亦入魯因近邾故帥師城之季孫以叔孫附已與之同城而地則季孫得之宋樂髠帥師伐曹討曹之奉樂大心以亂宋也助叛啟釁亡之徵也秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳稱人衆尸之也蔡侯之不綱甚矣其事則史失之冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾叔仲爲句繹之盟逾年而圍其國棄信甚矣四年春王二月庚戌盗殺蔡侯申蔡公孫辰出奔吳按左氏蔡侯將如吳諸大夫恐其又遷也公孫翩射之而卒翩以公孫而在大夫之列非微者也何以書盗且雖微亦當書弑何以書殺是傳所載未審也黄仲炎曰盗自他國至是也賊由他國不得言弑其事已審則宣十八年邾人戕鄫子于鄫是也其謀尚秘則目其奸曰盗著其横曰殺示以當詰盗所自來與所自發也意楚使刺客賊之乎而公孫辰遂奔意與楚同謀盗迹有涉其家乎然何以不奔楚而奔吳蓋奔楚則其情必露身雖免而蔡必滅其家以爲討不若奔吳則可詭以自免亦可覬免其家也宣七年書蔡侯申卒今與高祖同名必文有一誤也蔡侯能復屢世之怨可謂有志而卒死於亂書之哀之也葬秦惠公宋人執小邾子伐曹執小邾子蓋齊景圖伯無成而宋亦志於爭伯也宋襄間齊桓之没而爭伯爲暴於小國宋景間晉之衰而爭伯亦爲暴於小國夏蔡殺其大夫公孫姓公孫霍繼盗殺而書辰奔盗發自辰可知乃蔡人疑爲姓霍而殺之春秋不去其官明非賊也未討之奸誅之莫白之寃雪之所以輔王政之窮補天地之憾也抑姓常滅沈而殺其君所謂積惡殺身者乎晉人執戎蠻子赤歸于楚戎蠻子嘗誘殺於楚矣今其後又爲楚所暴窮而歸晉晉不能庇已爲盟主羞矣執而歸楚是爲楚役也然曷不如晉執曹伯畀宋人之例而書畀楚人乎蓋畀宋人權在晉也歸于楚權在楚也公羊子所謂京師楚是也執而名者不反之辭城西郛六月辛丑亳社災亳社商社也武王克商頒商社於諸侯故國有兩社傳曰間於兩社是也亡國之社屋之不受陽也屋之故有災志災所以示儆也秋八月甲寅滕子結卒冬十有二月葬蔡昭公賊未討而書葬盗無主名也葬滕頃公五年春城毗夏齊侯伐宋定十四年齊宋㑹于洮宋從齊矣後宋伐曹執小邾子爭伯也故齊伐之晉伯衰而吳楚越爭於外齊宋爭於内春秋所以爲戰國也晉趙鞅帥師伐衛衛助齊以黨荀士荀士奔齊矣鞅度齊强而荀士未可猝制故舍之而伐衛是時聵尚在戚計納聵而得衛則可弱齊而孤荀士也家鉉翁曰輒以子拒父國夏爲之圍戚逆也聵以父伐子趙鞅爲之伐衛其順矣乎噫齊固失矣晉亦未爲得也晉欲申大義當請王命召諸侯伐衛執輒歸京師而立郢然後爲允若私於聵必求其入亦非春秋所許也况實以荀士之故而納聵以爲名乎秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公喪不計閏閏月葬非禮也六年春城邾瑕瑕繫邾邾邑也魯未嘗取之邾而遽城之恃强以廹邾也是冬伐邾明年遂入邾蓋失其險而無以抗魯也晉趙鞅帥師伐鮮虞前屢伐鮮虞貪兵也今以鮮虞助荀士而伐之忿兵也晉臣惟以貪忿興兵晉豈惟失伯殆將失國吳伐陳吳之入楚召陳而陳不從今伐之修怨也家鉉翁曰吳以太伯之後求主夏盟使其仗義以行如衛輒之拒父宋之謀曹魯之謀邾鄭之滅許請王命以討之然後有以大服人心今皆不能而爭陳於楚故春秋譏之夏齊國夏及高張來奔陳氏厚施以謀竊齊齊景業已慮之而無如何矣乃自啟釁黜長立幼陳乞所以生心也髙國從君於邪以貪固權勢不能察乞之詐而致敗遂委其所事而奔書之所以誅也同奔書及意起國夏而高張從之也由是權歸陳氏卒移齊祚其爲輕國本而任非其人之戒至明切矣叔還會吳于柤始事吳也楚强事楚吳强事吳程端學曰以魯政之不修務與吳親以資其力志柤之㑹知魯之將有吳患矣秋七月庚寅楚子軫卒楚昭復國能任賢修政而復强蓋楚敗而懼是以不亡吳勝而驕是以遂滅齊陽生入于齊齊陳乞弑其君荼陽生繫齊以長宜立也然君命立荼矣故不書公子惡爭國也陳乞召之宜無難者書入逆辭也雖宜立立之之道則逆也據傳陽生使朱毛弑荼何以歸獄於乞蓋乞志竊國故逐高國而圖廢立所以專威柄而爲攘奪之階也其始阿景公意而立荼今又外迎君而立陽生則荼之死決矣特乞不欲顯任其事待陽生而加之刃耳不然陽生一亡公子身之定否尚難自必况敢輕行弑逆不畏乞討乎春秋推見至隱以乞首惡杜亂源也又以見立幼之害也家國無釁誰能乘之君之廢立權臣之資也景公愛荼陳乞順之而立荼景公亦以爲愛荼也而適以弑荼荼弑陽生立而齊遂終爲陳氏有矣可懼哉冬仲孫何忌帥師伐邾志滅邾也宋向巢帥師伐曹志滅曹也齊晉皆失道而衰吳楚越且迭強而横鄭衛黨逆魯宋爲暴生民之害無時已矣七年春宋皇瑗帥師侵鄭左云鄭叛晉故也但自定六年晉執宋行人其好已絶何縁爲晉討叛哀九年宋又伐鄭趙鞅且欲救鄭豈宋爲晉伐鄭晉反助鄭耶左氏非也趙鵬飛曰報罕達之伐也罕達之師已七年矣其時宋鄭皆從齊而鄭尤與齊厚宋雖仇鄭而不敢報今齊景殁而内亂宋始報之也晉魏曼多帥師侵衛趙鞅伐衛未服故曼多又侵焉曼多助鞅者韓魏睦於趙也夏公會吳于鄫臣㑹之君又會之過勤矣後而被伐失所因也故從人不可以不愼秋公伐邾公無兵矣何能伐邾從季氏之意也三家屢伐邾取其土待其將滅使公主兵以受惡名而抗大國之討權奸欺君一至此哉然公惟所命而不敢違失君道甚矣八月己酉入邾以邾子益來内滅書取此則入其國執其君直書而不諱何也蓋伐邾者三家公雖在行而實不與臣獲其利君尸其名非直書其事人止知邾之被魯虐而不知公之被臣侮也邾大夫茅夷鴻保於茅請救於吳吳伐魯魯復邾子故雖入而非滅也以來與以歸同歸外辭也來内辭也宋人圍曹屢伐之又圍之志滅曹也冬鄭駟𢎞帥師救曹鄭聞宋之屢伐曹也曰宋之有曹鄭之患也故救之蓋忌宋之强耳且春有皇瑗之侵亦所以報也然而猶書救者與人爲善也列國之亂甚矣茍有救者亟與之止亂也憂世之心切矣八年春王正月宋公入曹以曹伯陽歸傳言滅經書入蘇轍因謂不言滅自滅也夫曹久困於宋非有大惡不幸而亡與諸國之滅無異何獨文致其罪以爲自滅蓋取其地而不絶其祀故止書入觀孟子時有曹交爲曹君之弟是其証矣魯入邾而執益宋入曹而執陽其暴同也吳伐我邾故也春秋詳内略外故他國被兵舉國而魯多言四鄙此止書伐我者敵已深入至於城下也敵至城下豈能不戰而退不言戰魯服也盟於城下也不言救邾者志在服魯魯盟遂還不成爲救也昭定以前三家初竊國柄猶協心以禦外侮故鄰國侵伐及四鄙而止至此則三家之勢已成各不相下莫肯爲國任患敵至徑薄國都國非其國矣夏齊人取讙及闡邾故也邾子蓋齊甥魯入邾而執邾子致齊以爲辭故致賂以悦之在此爲賂據彼則言取婉其辭以諱國惡也然不書伐則非兵取可知而魯之爲賂見矣雖諱而不没其實也招伐於吳喪地於齊爲國不義其害固如此歸邾子益于邾執而返何以言歸當歸也齊取魯邑怒猶未怠復請師於吳故懼而歸之歸之義也然爲人所脅亦不得謂之義矣齊欲存邾義也然召外兵而伐與國亦不得謂之義矣况齊之力自足制魯何事召吳召吳以禍魯卒以自禍也秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡歸邾子故也執而取之歸而歸之雖取舍任意而非爲利君子猶有取焉書歸善齊也九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘悉虜而俘之曰取隱十年宋人蔡人衛人伐戴鄭伯伐取之伐者聲其罪也曰取之猶難辭也此直書取易也譎而揜其不備也據傳使有能者無死而以二人歸則殺人多矣尚詐嗜殺生民之禍烈矣春秋所以胥爲戰國也夏楚人伐陳六年吳伐陳楚昭救陳卒於城父然卒則不能救矣陳以無援故卽吳楚惠乃忿而伐之嗣此再使臣伐之肆暴甚矣秋宋公伐鄭卓爾康曰宋景不自量妄圖興伯前年以曹伯陽歸其志益驕而皇瑗又取鄭師其視滅鄭不啻入曹之易矣連年侵伐卒喪師于嵒與雍邱相當兵驕者敗宋之謂也冬十月十年春王二月邾子益來奔據傳魯歸邾子邾子又無道吳討之囚諸樓臺栫之以棘使諸大夫奉太子以爲政今來奔逃吳也家鉉翁曰邾子無立志之人非怙惡不悛者也豈失國而返猶能無道乎蓋吳子責賂不遂而加之罪耳前吳救邾本不成救今至逞威責報邾子旣爲魯俘又復􅌤面來魯書以罪吳而病邾子也公㑹吳伐齊齊爲邾故旣取魯邑又請師於吳旣而魯歸邾子齊歸魯邑乃止吳師吳遂伐齊齊義而吳不義矣魯忘伐己之怨背歸邑之惠助吳以猾夏故書公會責魯也家鉉翁曰甚矣夫差之不仁也邾子旣得返國齊來止師齊魯無事矣吳亦得以自息其民乃反以爲怒而伐齊蓋夫差負才矜力日尋干戈聞伐國則喜聞止師則怒以是知其將亡也一三月戊戌齊侯陽生卒左云齊人弑悼公赴於師必有主名矣何以止言齊人且齊爲大國何至畏吳而弑其君以説乎經書齊侯陽生卒與常卒無異未見爲弑也時以吳師來伐而悼公適斃遂以爲弑傳不言弑者之名則得於傳聞不能指名也傳不可信信經可也夏宋人伐鄭晉趙鞅帥師侵齊齊助衛輒而黨荀士故鞅乗其有吳師遂不恤齊喪而侵之鞅罪大矣五月公至自伐齊齊侯以三月卒聞喪而還可矣久而歸制在吳也葬齊悼公衛公孟彄自齊歸于衛彄初奔鄭今書自齊必自鄭適齊也書歸内受之也彄本蒯聵之黨今歸于衛蓋見聵在戚而弱又從輒也不計義而附勢反覆之小人也薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳楚比歲伐陳爭陳於吳也故吳救陳吳豈能以存中國爲義利陳私於己耳然書救終善之也善在外責在内且傷諸夏之日衰也十有一年春齊國書帥師伐我會吳伐齊故也傳載老幼守宮次雩門之外師及齊師戰於郊故又書伐我而不言鄙蓋政在季氏生事啟釁二家不肯同力故也不書戰勝負敵也由風俗以禮義勝而諸賢致命也洙泗之化也不然國幾亡矣去歲會吳伐齊魯誠有罪然吳實主之齊畏强淩弱且居喪伐人無禮無義再速吳師以致敗又以見齊之肆暴而失計也夏陳轅頗出奔鄭頗剝下媚上以自營其私而犯衆怒也國將亡而用聚歛之臣至使衆爲政而逐之綱紀壞矣是速之亡也五月公㑹吳伐齊齊伐魯魯致之也不反其所爲而使吳禍洊及於中國誰之咎也是雖强家所爲而公與於會何以辭其責甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書吳師之來齊人皆知齊必敗即當堅守勿犯其鋒况齊患在内不在外陳氏弑主專國又值新喪危疑之會也國書爲齊世臣宜修政以輔幼君安得生事於外貪執兵柄乎且春之伐魯不義也夏之拒吳大難也陳氏推書豈以兵柄讓書哉是使其以不義結怨以犯難賈禍耳書在術中而不悟也且伐魯方歸疲兵迎戰師敗身獲爲國大殃而陳氏之勢愈固矣以書及戰罪書也書齊敗績傷之也楚敗晉則傷之吳敗齊則傷之春秋内齊晉而外僣王之吳楚天子之事也據傳將戰吳子呼叔孫而賜以甲劍鈹曰奉爾君事則魯亦與戰矣戰不書公者助吳猾夏諱之也然書會則伐見矣諱而不沒其實也平邱不盟人以爲辱春秋則不隱艾陵戰勝人以爲榮春秋爲之諱聖人以是非爲榮辱不以榮辱爲是非秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋諸侯搆怨侵伐不已大夫爭權奔亡相繼春秋之季其亂極矣十有二年春用田賦惡重歛也用者不宜用也賦有財賦有兵賦財賦者税也兵賦者乘也夏后氏授民以田而使自賦財賦也而兵賦亦寓焉商周助而不税惟計井邑邱甸而出乘故治兵謂之治賦宣公初税畝則歛財於私田矣成公作邱甲則增兵於舊制矣此之田賦據傳歛從其薄及貪冐無厭云云者宜爲財賦矣然田即畝也賦猶税也與税畝奚以異且傳云以邱亦足又似兵賦何也蓋分之爲畝總之爲田税畝傳曰履畝而税意其時履畝而視其收之盈歉因取其盈者税之非有田者槪加之故不得言田後作邱甲則兵賦於正數旣增而財賦遂亦視此爲準有定額矣猶未及乎什二也傳云以邱亦足者據時之增額言之也今之田賦則有田者旣槪加之而其額益重蓋即所謂什二乎哀公在位二十有七年年饑之問有若之對又在此後乎夏五月甲辰孟子卒昭公夫人也據傳云季氏不絻蓋不以夫人喪之也故不書薨及葬昭公娶吳女書孟子何也因其稱而稱之也語云君娶於吳爲同姓謂之吳孟子是也據實書之而昭之失禮與三家之不臣具見公會吳于槖皋尋鄫好也吳欲求伯將合諸侯也公會之病公也秋公會衛侯宋皇瑗于鄖鄖吳地衛侯宋皇瑗何以在鄖而公會之乎宋衞從吳可知也趙鵬飛曰諸侯東向事吳者魯爲之也故四書公㑹吳繼書公㑹宋衛明年書公㑹晉侯及吳子于黄池魯罪著矣宋向巢帥師伐鄭取鄭師後又三伐鄭矣冬十有二月螽冬温而螽生記異也十有三年春鄭罕逹帥師取宋師于嵒取師雖宋首惡然鄭之報亦慘矣故均罪之夏許男成卒公㑹晉侯及吳子于黄池黄池之㑹左云先晉國語云先吳但果先晉宜書公㑹晉侯吳子今書㑹晉侯及吳子則主在吳子矣蓋自吳柏舉之戰晉侯不復見者二十餘年晉固不能爲主也然不書吳子晉侯者存中國也惟先書㑹晉侯後書及吳子而吳之先晉與内晉外吳之意俱見故曰春秋之志微而章晉盟主魯望國而皆從吳世變至是極矣楚公子申帥師伐陳間吳出㑹而爭陳也畏强而淩弱也然楚猶能師而晉遂衰聖人傷之於越入吳間吳出㑹而擣虛也柏舉勝楚而越入吳黄池先晉而越又入吳均爲不務德而勤逺略之戒然柏舉猶屬義舉黄池志在爭強且屢勝而驕反忘越不共戴天之仇而憑淩上國宜其滅於越也秋公至自㑹晉魏曼多帥師侵衛黄池晉爲吳下其辱甚矣晉臣不恥復比而淩暴近國怙權自私此伯烈已盡之時也所以胥爲戰國也亦晉國極衰之候也所以分於三家也葬許元公九月螽冬十有一月有星孛于東方不言次而言方平旦衆星皆沒也周十一月夏九月也日在房心爲明堂布政之廷於是旦見與日爭明其異大矣嗣此七國並興皆以號僭周室愈不可爲也盗殺陳夏區夫春秋書盗四皆國亂無政也區夫之先徵舒爲逆而戮於楚陳猶使世爲卿陳無政矣今爲盗殺雖其事不可詳然要之以亂招亂也十有二月螽二年之内三書螽由田賦爲害民窮而天變作也十有四年春西狩獲麟周之春有子丑月狩時也魯之西爲大野狩地也得時得地則常事爾何以書爲獲麟記異也麟仁獸王者之瑞也何異焉時無王者出非其時而又見獲也獲者力得之辭麟死於兵也孔子周流天下冀道之一行而卒不行晚乃約魯史作春秋春秋明王道也茍有王者舉而行之天下猶治世也今麟出見獲故感而傷之曰吾道窮矣春秋於是絶筆焉撥亂世返諸正莫近諸春秋起隱公訖獲麟文成數萬時歴二百四十二年備矣道行於世利一時道著爲教利萬世聖人厄於遇麟死於兵亦春秋之氣運然爾天心固有在也
