front:
  text: 欽定四庫全書御纂春秋直解卷六乙未襄王二十有六年在位三十有三年子頃王立在位六年子匡王立文公
  hash: sha256:086667ea5239b9734084629f329e8748b62e98c82dd3dd47b44a3229fd2b3c1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_006-1a, image: WYG0174/WYG0174-0108c.png}
body:
  text: 名興僖公子也元年春王正月公卽位世子嗣位終先君之年稱子逾年雖未葬稱爵蓋縁始終之義一年不二君縁臣民之心不可曠年無君也即位者告廟臨羣臣也隱不即位讓也莊閔僖則繼故也桓即位安忍而自立也文則繼父也繼父即位正也二月癸亥日有食之公羊日上有朔字天王使叔服來會葬叔氏服字王之大夫也王於諸侯有弔贈含襚之禮而使來會葬則天王之加禮於魯也惠王之葬魯君不赴亦未遣使而王臣先期以待諸侯之葬魯不臣王失政比事以觀可見矣夏四月丁巳葬我君僖公天王使毛伯來錫公命毛國伯爵諸侯為王卿士者諸侯立世子必誓於王世子嗣位告於王䘮畢士服見於王而受命賜之黻冕圭璧文公在䘮未朝先來錫命蓋襄王以魯為宗國故先之然非禮矣榖梁氏曰禮有受命無來錫命晉侯伐衞晉侯以衞不朝與侵鄭之故而伐之及南陽聽先且居之言而朝王先且居伐衞乃必稱晉侯何也晉侯以伐衞而出朝王其假也故削朝王不書而以伐衞舉晉侯也晉以元咺故執衞侯其怨晉宜矣况衞新播遷不自反而乘人之災不義之甚故書以罪之叔孫得臣如京師拜錫命也天王使來錫命當俟䘮畢而躬往朝焉禮也乃僅以陪臣拜命不恭甚矣衞人伐晉衞人孔逹也書伐晉罪衞也衞即楚侵鄭不自反而伐盟主可乎故晉伐衞則罪晉衞伐晉則罪衞秋公孫敖會晉侯于戚魯卿而會伯主故直舉名氏責其伉也大夫專會諸侯自此始趙鵬飛曰孟氏自敖而專叔孫氏自得臣而横季孫氏自行父而侈冬十月丁未楚世子商臣弑其君頵自入春秋楚君之卒不見於經外之也特書楚頵以世子大逆而志之也楚僭號其立世子必不誓於王乃書世子者著元兇而討之也君於世子有君之尊有父之親書其君者目世子則父之親已見故以君之尊見義也王誠以其罪告諸侯命晉致討明大義折強楚是謂天討乃天王不之罪而晉襄徒争小故蓋討賊之義不明乆矣故曰春秋成而亂臣賊子懼公孫敖如齊既會晉又如齊蓋兩屬且圖婚也二年春王三月甲子晉侯及秦師戰于彭衙秦師敗績凡戰舉將敗稱師秦於戰稱師憫其衆而惡其將也前入滑貪兵也今則忿兵也有敗道矣晉既得志於殽秦再至宜修文告以却之或堅守以拒之秦如晉何而逞志於再戰故書及穆憤敗而不能平襄狃勝而不知止蓋交罪之丁丑作僖公主古者葬而虞虞主用桑期而練練主用栗終入廟以辨昭穆踰練作主蓋逆祀有萌議論未定也三月乙巳及晉處父盟按左氏晉以公不朝來討公如晉晉使陽處父盟公以恥之書及晉處父盟厭之也公羊氏曰陽處父不氏諱與大夫盟也榖梁氏曰不言公處父伉也為公諱也三傳之文公實與盟矣敖會晉侯公盟處父事適相當且以見政在大夫皆其君授之柄故謹而志之也公䘮未畢故出不書如反不書至則重為公諱也夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴晉致諸侯而以士縠會之是以大夫主盟矣盟宜以主者首而春秋序士縠於諸侯之下正君臣之分也晉襄席伯驟勝而驕輕蔑諸侯罪也自士縠而後凡役多書大夫大夫張也盟以討衞陳侯為衞請成執孔逹以說自十有二月不雨至于秋七月不雨溯自去冬之十二月著其乆也至於七月則八月雨矣不雨彚而書之雨則不書見不以民事繫憂樂也八月丁卯大事于大廟躋僖公大事何大祫也四時之祭有分有合合羣廟主升祭於大廟為祫並祭毁主為大祫大祫三年一舉五年又舉故曰五年而再殷祭祭書名譏非禮也時祭稱有事大祫稱大事則常禮也譏不在祭也躋升也父死子繼為易世兄終弟及為同世同世不殊昭穆而以先後為次僖雖兄甞臣於閔升居閔上以親亂義非禮甚矣冬晉人宋人陳人鄭人伐秦晉再敗秦可以已矣又復怨焉不修德而殘民以逞不待貶而惡見矣公子遂如齊納幣納幣常禮何以書譏䘮未終制而圖婚也三年春王正月叔孫得臣會晉人宋人陳人衞人鄭人伐沈沈潰討其服楚也楚商臣負覆載不容之罪晉襄不能仗義致討乃畏楚而伐服楚者夫服楚獨沈乎且沈僻在南服素未與晉之㑹盟以國小服楚何足深罪伐之而潰其民可乎蔡潰遂伐楚齊桓所以盛也沈潰不伐楚晉襄之不足有為也夏五月王子虎卒王臣以卒赴者三尹氏王子虎劉卷皆不書爵譏外交也秦人伐晉譏伐晉也秦屢敗僅而能復猶譏之何也逞志一決以求勝是怙過也故譏之史記曰秦穆既封殽尸乃誓於軍以申不用蹇叔之謀故程子曰秦人極其忿而後能悔過聖人取其終能悔焉耳秋楚人圍江商臣為逆未甞不憚晉討故前此止自固而未敢出自晉伐沈始知晉技止此耳且晉與秦搆釁秦日擬晉之後故楚間之而伐江江黄素從楚自盟貫之後與楚隙齊伯從齊晉伯從晉楚既滅黄矣今復伐江而圍之輕晉也雨螽于宋螽生於下今雨於上異之大也多而害物故雖外災而亦志之冬公如晉十有二月己巳公及晉侯盟晉以處父盟公之無禮而請改盟乃召而盟之於其都晉不能以禮謝過魯不能以禮進退參譏之晉陽處父帥師伐楚以救江伯國大夫帥師以名氏見始此大夫強也伐楚是矣書以救江者譏不能討賊惜伐楚之非伐楚也且楚人圍江豈遂空國而出晉以一大夫將偏師以臨之遂足拒楚而解江圍乎惜救江之非救江也四年春公至自晉逾年始至見去國逾時之乆也夏逆婦姜于齊夫人方逆稱女至國稱夫人有姑稱婦方逆即稱婦榖梁曰成禮於齊是也納幣於䘮中成禮於婦家失禮之中又失禮焉故不言公諱之也不書以夫人至者禮不備史略之也劉敞曰文公闇弱惰慢不能率禮以為苟若而可故卒至於禍夫婦人倫之首可不慎哉狄侵齊許翰曰狄自箕之敗至是復侵齊間晉有秦楚之難也秋楚人滅江救江而江滅責晉也江黄皆以慕義從伯而滅先書伐後書滅見齊不能救黄先書圍後書滅見晉不能救江滅無奔執之文死社稷也晉侯伐秦楚滅江晉之恥也王官之役晉避秦而不戰耳與晉何損哉乃不致役於楚而亟事於秦失緩急之宜矣伐楚則大夫往伐秦則君行失輕重之衡矣書晉侯目其人以責之也秦穆自是不復報序書終秦誓有以也衞侯使甯俞來聘衞嘗多事矣至此事大睦鄰以安社稷蓋甯俞之謀乎冬十有一月壬寅夫人風氏薨風氏僖公母也僖公崇其所生為夫人也春秋正名之書乃即以其所稱稱之而書薨不為異辭者據實書之謹禮所由變也五年春王正月王使榮叔歸含且賵榮叔王之大夫也口實曰含含且賵過辭也厚禮之加蓋遂成之為夫人也三月辛亥𦵏我小君成風葬稱小君又私諡焉仲子别宫猶疑之也不疑而全乎小君之禮自成風始也王使召伯來會葬召伯王之卿也既使大夫歸含且賵又使卿會葬禮益隆而失愈甚矣故謹而書之不敢略也夏公孫敖如晉王洊使人加禮於魯魯不往拜而亟遣使如晉比事以觀失益著矣秦人入鄀按左氏鄀叛楚即秦又貳於楚秦人入鄀是鄀本楚與國也其即秦必以秦為可恃也秦不可恃而復即楚鄀固反覆而秦遽入之亦暴矣其後鄀卒為楚所幷秋楚人滅六六臯陶之後國小而逼於楚周綱凌夷荆蠻恣横滅江滅六蠶食肆暴由無人能討楚罪故也冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳陳非大國又未嘗先聘於魯行父何以如陳蓋季友與陳有舊行父假聘以締私書之志行父之得政也秋季孫行父如晉文公即位六年未嘗一如京師而朝晉者再且使貴卿比年聘焉過矣行父與敖遂争權競出既如陳又如晉書之著大夫之日恣也八月乙亥晉侯驩卒晉襄嗣位衰絰之中西敗秦北敗狄南伐許及商臣弑逆不能討滅江滅六拱手聽之蓋驟勝而怠見小昧大也晉文當楚之強崛起勝之襄值楚亂而卒不得志於楚惜哉冬十月公子遂如晉葬晉襄公諸侯之䘮士弔大夫會葬晉文昉為伯令卿供葬事非禮也國嗣未定三月葬君亦非禮也然晉自是遂為常制矣晉殺其大夫陽處父晉狐射姑出奔狄晉襄既卒嗣子方幼殺處父者狐射姑耳稱國以殺何也晉襄使射姑将中軍趙盾佐之聴處父之言而易之遂漏言於射姑是殺處父者射姑而致其殺之者襄公也處父殺射姑奔比事屬辭可知殺之由射姑矣書出奔譏失刑也閏月不告月猶朝于廟閏者積氣盈朔虚而成月所以定四時成嵗者也告月告朔也閏月多矣獨此言不告知前此皆告也文公以閏非常月而不告輕正朔而慢時令矣王葆曰朔者月之初吉月不告則一月之政不舉矣故變文書月是也告朔於廟因有朝廟之禮猶者幸其不已之辭聖人愛禮之心也七年春公伐邾間晉難也三月甲戌取須句遂城郚魯甞取須句矣復書取者盖又入於邾也僖公取須句反其君今邾之公子叛邾在魯文公取須句使邾之公子守焉絶大皞之祀貪土地而主逋逃非義甚矣郚魯邑遂以伐邾之師城之民勞弗恤矣且東作方興而奪農時何以為國夏四月宋公王臣卒宋人殺其大夫人衆辭國亂無政衆殺之也成公在殯昭甫立而欲去羣公子穆襄之族因攻公而殺其大夫其作亂之罪莫逭矣亦昭公有以啟之也大夫不名者因公而死不可以貶倉卒遇難亦無可褒不得與孔父仇牧同也故不録其名惟書大夫則見大夫既殺君亦岌岌矣危之也成公不書葬盖深責嗣子輕舉召亂致先君葬不如禮而鄰國亦莫之㑹也戊子晉人及秦人戰于令狐晉先蔑奔秦據左𫝊此戰盖秦康公與趙盾也皆人之何也盾舍嫡嗣而外求君不臣矣秦納不正不義矣不書秦伐晉納雍者晉實召秦非秦自納雍以亂晉也則晉罪重矣盾畏禍改圗乃不謝秦而興師襲之故書晉及戰以深罪之先蔑迎雍者也從盾而覬立君之功亦有罪焉耳故書奔迎雍先返而復從師自師奔也故不言出狄侵我西鄙秦晉交争狄人窺伺遂越齊衛而逺侵魯其横甚矣魯間晉難而伐邾狄亦間晉難而侵魯魯亦可自省而知愧矣秋八月公㑹諸侯晉大夫盟于扈大夫而専主盟自此始垂隴之盟士縠甞主之矣然晉襄命之仍襄主之耳故序諸侯而目士縠今則趙盾専之矣故變文書晉大夫書大夫而盟國君者二此與荘七年齊大夫是也彼時齊無君大夫自為盟無嫌也况荘欲納糾與之盟非齊大夫敢伉公也此時晉有君大夫自為盟則無君且以大夫召諸侯而盟焉則亂君臣之義矣凡諸侯不序者皆一事而再見此則前無所見而不序義在大夫主諸侯之盟故大夫不舉名諸侯不序爵責晉大夫也亦病諸侯也大夫主盟而八國之君靡然從之故略之也冬徐伐莒徐僭號即戎後甞從齊矣故經書人今以中國無伯興師伐莒故復以號舉公孫敖如莒涖盟莒為徐故請盟於魯尋洮向之好也敖如莒假公以為私也凡魯臣如大國多結援如小國多為私八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍左氏謂扈之盟公後至晉人来討公子遂復為此盟但經既書公㑹盟矣非後至可知𫝊不足信也盖盾遂皆國之正卿復為此盟假公以締交耳遂乗文公之怠結強援以専國故基殺嫡立庶之禍汪克寛曰大夫専盟始此前此翟泉猶有僖公在焉繼此而有袁婁之盟雞澤湨梁諸侯皆在而大夫自盟矣于宋于虢晉楚之大夫狎主齊盟而諸侯不復在矣其事自衡雍始也乙酉公子遂㑹雒戎盟于暴雒戎戎居雒水者衡雍與暴皆鄭地而近王畿時有王䘮儼然㑹盟於王畿之側不臣甚矣壬午距乙酉凡四日兩書公子遂以二事出也公孫敖如京師不至而復丙戌奔莒如京師奔王䘮也公當躬徃而使大夫是無王也敖又不至而復棄君命矣宣八年公子遂如齊因疾不前猶不得已也故曰至黄乃復乃難辭也敖本無意至京師故直書不至心别有在故曰而復而轉辭也乗便奔莒也奔不言出自外也據𫝊敖奔莒從已氏魯使非其人而政刑之不立如此尚可為國乎從已氏之惡不見於經何也春秋舉大法而已未嘗𤨏屑以及其私然前書如莒涖盟今書奔莒以迹考之其有私於莒可知故曰春秋之志微而章螽宋人殺其大夫司馬宋司城来奔再稱人以殺宋又亂也書大夫而目其二官重此二官也不名者義繫於官不在其名也前昭公欲去羣公子穆襄之族作亂故六卿和公室司馬樂豫以官讓昭公之弟卬卬以親用非德選也於是公孫夀懼禍辭司城而請用其子意諸意諸以幼進非民望也昭又無禮於襄夫人夫人因戴氏之族作亂殺司馬而逐司城繼為司馬者即戴族之華孫也則主勢孤而昭之禍成矣前書宋人殺其大夫此書宋人殺其大夫司馬宋司城来奔後書宋人弑其君杵臼比事以觀昭無道而官非其人亂固有自然屢書人則宜討者衆也三族之為亂襄夫人之謀亂與公子鮑之成亂皆在討列宜分輕重以定獄春秋之誅亂賊巖矣司城者蕩意諸伯姬之子伯姬逆婦為意諸也故来奔九年春毛伯来求金職貢不修王䘮有闕求金於魯書以責魯而諸侯之不臣皆著矣王宅憂而宰輔政故不書使夫人姜氏如齊夫人出姜也前書逆婦姜譏公失禮也此書夫人正其名也如齊歸寜也常事何以書夫人生惡及視而公嬖敬嬴生倭奪嫡之機兆矣其歸寜盖有故焉春秋欲以禮已亂特於此正其名二月叔孫得臣如京師辛丑葬襄王王之葬諸侯宜親之而不親者必有故也無故而使大夫非禮也然猶止此之得臣與昭公二十二年之叔鞅而已魯號秉禮尚如是而諸侯可知矣晉人殺其大夫先都據𫝊先都士縠箕鄭父三人之死皆以争權而殺中軍佐先克也是時晉靈幼而盾當國假公以討非出君意故不得用累上之辭而書國然何以書人人者國亂無政而衆殺之之辭盾執政而其黨和之變文書人明盾之黨盛也故宋人屢殺大夫而君弑晉人屢殺大夫而君弑詳書之以為鑒也三月夫人姜氏至自齊夫人與君一體出入必告廟其行非禮以不至見罪歸寜而至正也然亦在常事不書之例出姜書至盖以明小君之重責公嬖敬嬴以階亂也吕大圭曰録叔姬之歸為歸于酅起也録出姜之至為歸于齊起也聖人之微意也晉人殺其大夫士縠及箕鄭父凡殺大夫而累數其人者其人或同事或等罪而殺之者之志亦均也書及則濫也先克之殺𫝊以為盗則原無主名盾殺先都以試之既而歸獄於士縠而箕鄭父亦與焉皆盾志也依次書之著盾之誅鋤異已而専國弑君之漸非一日之故矣楚人伐鄭楚自城濮之敗不敢争鄭滅江滅六猶其鄰國也盾執晉政専權行私晉君少志不在諸侯遂為楚所窺師復及鄭矣公子遂㑹晉人宋人衛人許人救鄭不踰時而救雖不及楚非緩也然列國稱人非師也救之為不力矣不於始動挫其鋒使得意去故晉以不競而楚遂熾聖人善其救而又惜其不善救也夏狄侵齊四侵齊矣秋八月曹伯襄卒九月癸酉地震地静常也動則為異盖隂逆而不順之象且害民也冬楚子使椒來聘自齊桓既卒而楚與宋争伯故盂之㑹書楚子自晉文襄既卒而楚與晉争伯故自此迭書楚子盖楚勢日張特書其爵以見其㡬與中國侯伯侔也𫝊者不知乃曰進之夫楚子者商臣大逆之賊也而進之耶迨楚荘既伯則楚卿書氏書名盡同於大國亦其勢然也秦人來歸僖公成風之襚春秋於君配曰夫人君之母與祖母亦曰夫人盖周世無别稱孔子亦因舊史不敢損益也成風繫之僖公則因禮之變而辨名也成風所以為夫人以子僖公也仲子何以不繋桓公桓未立而隐成父恵公之意而赴於王故繫以恵公也衣服曰襚成風之卒六年矣秦始歸襚而魯受之均非禮也盖晉既失伯秦楚伺釁故楚椒来聘秦人歸襚以結魯也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉令狐之戰其曲在晉秦之報亦恒情也不稱人稱師蓋闕文耳然秦納不正不自反而又伐晉則兵禍何時已乎楚殺其大夫宜申按左氏宜申謀弑穆王為所殺夫穆王者商臣也宜申不能早討其大逆之罪北面事之閲十年乃謀弑之是為亂耳然逆賊無人不可討亦無時不可討春秋終不宥商臣也故稱國以殺而不去其官其意微矣自正月不雨至於秋七月及蘇子盟于女栗蘇子王卿士也其盟魯盖王使之也頃王新立不能修王度以朝諸侯乃使大夫出盟非政也及者公也頃王立而公不朝乃與王臣為不相信之盟非義也及盟不書公為公諱也而責魯之意深矣冬狄侵宋狄侵宋間宋難也凡外患必内有以召之故君子治内楚子蔡侯次于厥貉凡書次兵次也商臣負罪未討其陳兵出次窺伺中原究有疑畏不前之意乃晉前以救鄭不力失鄭與陳故鄭陳從之而宋亦迎服矣然何以獨書蔡侯同次蓋三君皆廹於威力姑從楚以紓國難耳觀後新城之盟復從晉可見也惟蔡堅於從楚故特舉其爵序於楚下以正其從逆之罪十有一年春楚子伐麇厥貉之㑹宋陳鄭以大國公侯受役於楚麇㣲國也麇子獨耻之而逃盖不屈於無禮也且麇子豈不知逃之必伐伐則遂滅乎乃一敗於防渚再廹於錫穴終不求成於楚盖效死以殉義也春秋以是非為榮辱不以成敗為功罪故不書麇子之逃而特著楚之伐以惡之夏叔仲彭生會晉郤缺于承筐是時諸侯多背晉從楚故晉徴㑹以謀之然晉政在盾盾不躬出而使郤缺乎諸國莫應獨魯徃㑹魯彭生亦非執政者也則此㑹不足重矣然郤缺有能敬之徳有敗狄之勲彭生有為君逺寇亂為人和兄弟之美有死君命之志事以人成其後諸侯再合同盟新城實權輿於此矣秋曹伯来朝䘮畢来見也曹本從齊宋襄圍之則從宋晉文執之則從晉今晉失伯故朝魯以求庇也然朝於䘮畢之後不幾以事王者事魯乎非禮甚矣公子遂如宋據𫝊遂聘宋且復蕩意諸因賀楚師之不害也魯於夏㑹晉謀諸侯之從楚者而是時宋從楚逾四年新城復從晉意魯因賀宋而邀宋以從晉乎狄侵齊自僖公三十年至此狄五侵齊齊無以禦之衰至此乎冬十月甲午叔孫得臣敗狄于鹹狄横甚矣侵諸國幾徧得臣敗之紀功也鹹魯地兵不利為冦利禦冦故荘之伐戎則録過此之敗狄則紀功比其事而義見矣不書師師少也不書戰未陣也十有二年春王正月郕伯來奔按左氏郕太子朱儒自安於夫鍾國人弗徇郕伯卒郕人立君太子以夫鍾與郕邽来奔公以諸侯迎之故書郕伯趙匡曰嗣位未逾年稱子豈有君父病不視死不䘮身未即位以邑出奔而稱郕伯者乎因公以諸侯迎之遂稱郕伯是紊王綱也何厚誣春秋耶其言韙矣夫經書郕伯安見其為太子也盖嗣位未乆見逐其臣故書郕伯以正之杞伯來朝二月庚子子叔姬卒左氏以子叔姬之卒不繫國而與杞伯来朝相次遂云杞伯請絶叔姬而無絶婚公許之成公八年杞叔姬来歸則續婚者而又絶也魯何甘惟杞命是聴耶其誤明矣公穀以為許嫁而未適人者是也趙匡曰時君之女故曰子夏楚人圍巢秋滕子來朝秦伯使術來聘九年秦将伐晉故歸襚此将戰河曲故來聘盖晉主夏盟秦恐晉合諸侯以困已故有事於晉必先禮於諸侯不獨結魯也冬十有二月戊午晉人秦人戰于河曲秦伯親將趙盾禦之稱人何也交罪之也令狐之戰曲在晉秦既伐之今又来戰曲在秦凡戰皆以主及客不書晉及者秦報復不已志乎戰也故重罪之不書敗績交綏而退不大奔也季孫行父帥師城諸及鄆前城諸矣今復城大之也鄆有二成公四年城鄆西鄆也近晉此東鄆也莒邑也莒邑魯何以城盖近其地而城之也慮莒有争故帥師以徃也諸鄆近費盖行父自為封殖計耳一時兼城二邑勞民已甚况帥師而城乎十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月大室屋壞大音泰大室魯公廟也周公封於魯留相成王使伯禽就封周公魯之始祖故魯大廟祀周公其兩昭兩穆應稱宫而主則迭毁第伯禽始就封故又立大室以祀魯公雖創而得禮觀春秋書壊不書新可見矣宗廟者君所常有事以久不省故壊怠䙝祖宗於民事何有日就衰削有由矣冬公如晉承筐之㑹故也彭生約之公踐言焉自是有新城之盟衛侯㑹公于㳫承筐之㑹衛不至懼楚也今因公如晉而要於路以㑹之盖又欲通晉也觀衛而列國之情可見矣狄侵衛衛前侵狄而與之盟狄不敢加兵者十餘年今衛侯出而狄復侵衛伺釁也狄情畏威而逐利類如此十有二月己丑公及晉侯盟盟者約拒楚也不地則非禮矣公勤晉而晉慢公失伯不亦宜乎公還自晉鄭伯會公于棐衛於承筐不㑹晉耳鄭於厥貉直從楚矣衛既因魯求通鄭遂因魯求平焉其因魯何也魯望國也且睦於晉故俱以魯為介以此見人心之同而天下事果可為也魯能和鄰以輔伯而楚氛稍戢矣春秋詳書公之徃返亦以褒魯也十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾叔字下缺仲字邾居䘮而修怨魯旋報而伐䘮盖交罪之夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城宋陳鄭從楚者也許則雖文襄之伯而猶堅從楚者也魯倡從晉而四國與衛曹咸来㑹晉同外楚也靈公雖幼盾當奉以臨㑹而盾乃自尸之不已専乎盟書同衆辭不以盾主是盟也幽之同齊方伯而未盛此之同晉失伯而僅收其事殊其為同一也秋七月有星孛入于北斗有不宜有也星芒偏指曰彗四出曰孛斗言北别於南也有環域故曰入北斗居天之中宻拱宸極紀綱萬象孛入之其變甚矣公至自㑹晉人納㨗菑于邾弗克納邾世子貜且立庶子㨗菑晉出也奔晉故盾納之邾人仗義屈晉故弗克納弗者力能而義不可也盾庶能徙義乎然何以書人盖以大夫而擅置君且助不正以奪正雖聞義而屈罪僅可減而不得免也楚方聘上國次厥貉晉幸藉諸侯之助為新城之盟乃區區納一亡公子而為邾所屈盾之不義而無能亦甚矣九月甲申公孫敖卒于齊大夫在位書卒敖棄君命竄身旅死於魯絶矣何以書卒魯不能絶之也慶父擅權亂魯而敖繼之敖雖奔而二子又繼之其生也公既許之復矣故不得不録其卒於以見臣強而典型之壊也齊公子商人弑其君舍嗣位未逾年稱子未成君也縁孝子之心而為之稱也對臣子而言則固其君矣陸淳曰未逾年被弑而不曰君則亂臣皆得肆其惡故原情以立此義晉奚齊本不正故異於是宋子哀來奔子哀宋附庸蕭國之封人也宋以為卿故来奔盖宋公失道大臣死亡相繼子哀超然逺舉得㓗身去亂之義矣以惡去國曰奔外臣来魯不得諱奔若止書来無以見其去國故異其稱曰子哀褒之也不使與有罪者等也冬單伯如齊請子叔姬也子叔姬者齊君舍之母叔姬無寵舍無威故被弑文公念其女使單伯請焉不討賊而自卑以求之其取辱宜哉齊人執單伯請子叔姬何以見執盖商人弑舍必使賊殺之非明言已殺之也今曰殺其子焉用其母是直揚言商人殺之矣故怒而執之也齊人執子叔姬齊之國母而曰子叔姬自内録也兩書執者事雖連及内女不可與大夫連序以示别也商人既弑其君又執其君母而書齊人何也商人驟施於國齊人懐其私恵而不討且助其虐故書齊人書齊人則商人之罪見書商人則齊人之罪不見春秋治亂賊必治其黨也是嵗春頃王崩不書不赴也然臣之於君猶子之於父豈待赴而始奔䘮乎内不赴外不奔交罪之十有五年春季孫行父如晉三月宋司馬華孫來盟來盟曷以官舉著華族作亂而代為司馬也華孫者華督之孫華耦也督負大惡其孫復為亂黨故以華孫目之而不名義不繫於名也不稱使非君命也明年昭公弑死難者蕩意諸耳華耦為司馬未聞為君禦侮其迹較然矣夏曹伯來朝䘮畢來朝今越五年又來朝皆事天子之禮曹行之魯受之均罪也齊人歸公孫敖之䘮大夫䘮還不書此奔大夫也何以書有君命也罰不能加且容其歸失政甚矣不言來歸者齊人但致之境上而敖之子自取以葬也𫝊者謂因其子之哀請以著教非也子安得以非分之請干國之典何為著教哉六月辛丑朔日有食之鼓用牲于社單伯至自齊大夫見執返國必書至國體所繫也命大夫不名尊王命也晉郤缺帥師伐蔡戊申入蔡厥貉之次蔡首從楚新城之盟蔡復不至故伐之先書伐而後詳其入之日見伐之不服而後入也第捨楚而用事於蔡末矣惡蔡而病晉也秋齊人侵我西鄙罪齊人也抑魯有以取之焉不討賊而數求之其為賊侮也固宜季孫行父如晉告齊侵也執我則如晉侵我則如晉不自強而恃人未有能濟者也冬十有一月諸侯盟于扈新城嘗序諸侯矣於是蔡初服而八國盟以討齊則曷為不序晉終不足以有為也以討召諸侯而受賂釋賊故削晉伯而同之於諸侯且分惡於諸侯也分惡於諸侯而討賊之途廣矣十有二月齊人来歸子叔姬来歸者出也内女出者三郯伯姬杞叔姬止書来歸罪在已也子叔姬書齊人來歸罪在齊也執與歸皆制於齊深病魯也魯兩告晉而晉師不出晉亦不得辭咎矣齊侯侵我西鄙遂伐曹入其郛齊侯商人也莫之能討遂成君矣扈之㑹晉取齊賂商人知諸侯之無能益肆其暴故復侵魯也遂伐曹因其朝魯而遷怒也入其郛其暴甚矣十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟商人弑魯甥出魯女執魯使侵魯疆魯兩告晉晉不能直而齊師又至矣公遂懼而求平既約㑹矣畏齊之辱又怠於行使行父㑹之商人靳而弗與之盟故曰齊侯弗及盟夫以商人為賊則人人可討况大夫乎以為齊侯則大夫烏可敵君宜齊有辭也不明大義不能自強反為賊侮宜哉夏五月公四不視朔朔王所頒也謁上曰告臨下曰視先告朔尊王也因而朝廟敬祖也由是視朔勤民也其典巨矣四不視朔盖自二月至五月也怠以成習禮将遂廢故書以謹之左傳云疾不視朔春秋書不視朔而不書疾明怠於政非由疾也六月戊辰公子遂及齊侯盟于郪丘此以賂得盟也行父與遂皆大夫也行父乞盟則拒之遂納賂則從之齊則貪而魯益懦貪者無足責而懦者屢求可恥之甚也夫齊曲魯直不能仗義執言乞盟不已至於納賂遂與行父之謀國一何舛哉秋八月辛未夫人姜氏薨僖公之妻文公母也毁泉臺泉臺先世所築其存與毁非治亂安危之所繫勞民以毁之是彰先君之失也據左傳實為妖祥所惑譏其毁抑又以正之也楚人秦人巴人滅庸楚素恃強遇屬國無道故庸乗楚饑帥羣蠻叛之楚初畏而欲徙國幾殆矣以蔿賈謀伐庸轉敗為勝庸固自招其禍然楚盍自反乎而遂滅之罪孰大焉秦序楚下深責之也秦非楚所能脅乃黨僭號之楚以滅國是狄而已矣彼晉之失䇿亦莫甚於失秦也初失於襄再失於盾既以謬計立庶復以不義襲人怙惡報復驅之附楚楚益強而晉以不振職有由矣冬十有一月宋人弑其君杵臼弑君書賊獄定也不書賊未定也或書國賊在當國者也或書國人賊黨衆也昭之立也兩書宋人殺其大夫今書宋人弑其君則賊黨之衆可知故稱國以弑而該之曰人若曰衆不可指名而弑逆之大惡則不可掩其獄固有所歸也蕩意諸死難不書盖始而奔魯志在茍免既而復歸計圖固位雖死難非全節也十有七年春晉人衛人陳人鄭人伐宋四國稱人㣲者也伐宋討亂也以㣲者行失其義矣况討亂必求亂源襄夫人之所助國人之所奉卒簒國而有之者鮑也今不討鮑猶且立鮑是成亂也然晉将何辭以釋鮑盖即左氏所云書人弑君君無道之意乎有邪說則有暴行孔子所以懼也夏四月癸亥葬我小君聲姜九月而葬緩也無故而緩慢也文公為君無所不怠雖親䘮猶不自盡也姜不繫僖而别諡非禮也齊侯伐我西鄙郪邱甫盟又伐西鄙何也前之盟貪賂耳得賂而仍以公不至為辭遂以兵脅之齊之無道極矣魯之不振甚矣六月癸未公及齊侯盟于穀因伐而盟恥也文公之世強齊屢侵權臣竊命怠故也怠則惟事倚人故威不振怠則以重付人故權下移諸侯㑹于扈晉㑹之也公不與在穀也諸侯不序不足序也盟于扈不能討齊㑹于扈不能討宋非特不討且安定之㑹扈之惡更甚於盟扈矣家鉉翁曰桓二年宋督弑其君齊魯陳鄭㑹于稷書曰以成宋亂兩扈不書成亂何哉督之弑伯事未興故書成亂並責在㑹之諸侯今晉主夏盟乃摟諸侯以定簒賊罪浮於稷故削晉伯以示討也秋公至自穀諸侯與晉㑹扈公獨與齊盟穀棄伯從仇踰時而反故書以著其失冬公子遂如齊公以秋反遂以冬聘而齊又戒師期矣卑屈之不足紓禍也如此高閌曰公已盟而遂復徃政在遂故也十有八年春王二月丁丑公薨于臺下君不終正寢即為失正况臺下乎趙鵬飛曰三桓之横始於文而甚於昭仲遂荘公之子親而用事尤横於三桓故其禍魯尤速盖由文公怠懦不君諸大夫外結大國内懐國人以自封殖公室寖弱權移於下終不能收魯遂以微文公之責也秦伯罃卒夏五月戊戌齊人弑其君商人商人弑君當討之賊齊人君之已三年矣今邴歜閻職則僕御之賤而以私怨弑之法宜書盗乃變文而蔽罪齊人何哉盖商人得為君者以齊人受其私恵而奉之也及得志而肆暴故歜職既弑舍爵而行略無顧忌是齊人咸惡商人而欲其弑也故特書齊人見商人始由齊人而簒位終由齊人而殺身足徴天道之不爽齊人則前不能以附逆而逭誅後不能以坐視而逃刑而歜職亦齊人也不為漏網矣然果有能伸大義而討商人者如之何曰衛州吁其例也故以賊討之則斥名而書殺以正治亂也不以賊討之則稱君而書弑不以亂易亂也不以亂易亂者不使遞為亂也春秋撥亂世反之正而已矣六月癸酉葬我君文公秋公子遂叔孫得臣如齊使舉上客常辭也今則二卿並聘矣其事異故其文亦異也夫人姜氏生世子惡及視敬嬴嬖而私事遂謀立其子倭然世子齊甥也遂畏齊故挾得臣並聘以請於齊明非出己意恵公新立亦欲親魯故聴之耳遂犯不韙而謀廢立以市恩於新君而久専國柄其禍由内嬖始故曰為人君父而不通春秋之義必䝉首惡之名前有讒而不見後有賊而不知冬十月子卒子即世子惡也不名先君已葬也一年不二君故不曰公薨而曰子卒文雖異而實一也不地弑也不葬賊不討也弑立之謀發於遂而得臣行父亦與焉故前乎子卒而得臣同如齊後乎子卒而行父又如齊也其抱忠而獨立者惟叔仲彭生耳公羊紀其拒遂之言左氏載其殉君之事何以不録其莭盖舊史不斥言子惡之弑故春秋以不地見弑而彭生之死史官畏遂而不敢書則春秋亦不得而書之也夫人姜氏歸于齊繼子卒而書夫人其為嗣君之母可知歸者出也婦人之出由夫先君既薨孰出之乎况嗣子卒而夫人出則嗣子不以正終而夫人不容於魯具見矣嬖妾孽子權臣之罪尚容誅哉而齊侯庇賊忘親其惡亦著矣季孫行父如齊告立宣公也且懼夫人之訴而来討故預為之地以解之歟莒弑其君庶其按左氏莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉来奔則是以子弑父也春秋安得不從商臣之例以明正其討乎特因莒既弑君太子懼禍竊寳玉来奔莒人因加以弑君之名故季孫行父因以為言耳聖人豈以偽赴者定獄乎其書國者盖必賊由大臣而未得其主名也
