front:
  text: 欽定四庫全書御纂春秋直解卷四庚申惠王十有六年閔公
  hash: sha256:c58ae74f43a7d66755d7614229a14a8eb34237c7b0727e9ff943442f3a54d17a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_004-1a, image: WYG0174/WYG0174-0070a.png}
body:
  text: 名啓方莊公庶子也元年春王正月榖梁於莊閔僖皆以繼弒君不言即位為正但閔於莊僖則有異焉閔甫八嵗制在慶父慶父實欲自取故公不行即位之禮耳齊人救邢邢以去冬被伐而春救之書之以善齊也齊自北杏圖伯以來兩會鄄再盟幽而諸侯叛服不常自救鄭救邢斯不復二矣假仁而人翕然從之况以德行仁乎胡安國曰凡書救者未有不善者也其稱人將卑師少也得之矣夏六月辛酉葬我君莊公十有一月始克葬亂故也秋八月公及齊侯盟于落姑何以盟定公位且復季友也齊桓公為伯不討慶父之罪有軼罰矣然能順魯人之心而復季友故先為此盟使公安乎季友季友安乎公而慶父亦不敢害季友季友歸而魯有所恃亂庶可弭乎則此盟之繫於魯也重矣顧夫人慶父猶在則禍本尚未去也其書公及者别內外之辭非公之能主是盟也季子來歸稱季子而不名貴之也莊公薨子般弒閔公幼慶父擅權薑為內主國人洶洶願得季子以靖亂今來歸深喜之也喜之深則望之切春秋書此所以著國人之情哀魯人而欲季子之副其望也冬齊仲孫來按左氏齊仲孫湫來省難仲孫歸曰不去慶父魯難未巳公曰若之何去之對曰難不巳將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也公其務寧魯難而親之夫齊魯鄰封婚姻之國使來省難姻睦之道也仲孫知慶父之為難而不為請討桓公知魯難之未艾而遽以取國為問是其臣不明大義而其君欲乘之以為利三王之罪人職是故也春秋不書省難蓋不使得居美名直書曰來以紀實耳二年春王正月齊人遷陽陽國名齊恃強而遷以為巳附庸也夏五月乙酉吉禘于莊公禘王者之大祭成王之賜非禮也言吉者公羊曰未可以吉也是也喪畢而祭新主致於廟逺主遷於祧毁與未毁之主咸在則是祫也魯以得禘之故遂於祫而僭禘之備物盛樂故曰吉禘末流之一失也魯行禘於太廟後遂行於羣宮末流之又一失也莊公之薨二十有一月耳未吉而吉則忘哀而失其時猶在寢耳更褻越而失其地非禮之中又失禮焉書以詳事變而僭亦著矣秋八月辛丑公薨不地弒也孰弒之夫人孫慶父奔其人可知也不書葬賊不討也九月夫人薑氏孫于邾哀薑棄位而姣與弒二君而書薑氏非降文薑也文薑巳見蒙上文而不氏哀薑未見不可不氏以目之也孫于邾者畏桓公之義不敢歸齊也公子慶父出奔莒慶父弒般歸獄圉人犖而立閔公罪狀猶未著故夫人與慶父得幸免焉比閔公再弒則季友既歸魯人弗順而齊侯使髙子將南陽之甲亦將至矣乃懼而出奔其後雖以縊死不見於經譏失賊也冬齊髙子來盟髙子齊大夫髙傒也子男子之美稱不稱使權在髙子也齊侯使髙子將南陽之甲以來可定則定之可取則取之耳非取必於盟也髙子與魯盟而立君以定其亂是誠得大夫出疆之義而納君於善也故稱子而不名以褒之季子來歸喜之也髙子來盟感之也國勢則巳危也人情則已急也故曰魯人至今猶望髙子也十有二月狄入衛志狄禍也衛自宣公上蒸下淫惠公篡位逆命四維巳亡禍本成矣重以懿公玩物失民狄入其都非齊之存之康叔之祀滅矣淫亂之應如此其烈可不懼哉鄭棄其師按左氏鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳夫惡一臣而不能去借禦狄而畀以兵欲因以去之卒至潰亂則是鄭伯自棄其衆也然執政者亦不得辭其過曰鄭棄君臣同責也陳傅良曰髙克奔不書不足書也
