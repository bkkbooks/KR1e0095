front:
  text: 欽定四庫全書御纂春秋直觧卷八辛未定王十有七年在位二十有一年子簡王立成公
  hash: sha256:40baee0d8fccd9370d1d1147ae797bfedc0c75c03701e36492739a43ec647ef5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_008-1a, image: WYG0174/WYG0174-0152c.png}
body:
  text: 名黒肱宣公子也元年春王正月公即位二月辛酉葬我君宣公無氷經三書無氷襄公二十八年春無事繋於春桓公十四年二月無事繋於正月之事之後此則正二三月皆有事繋於二月之事之後盖氷統亥子丑月為候亥始氷丑則堅至寅而觧凍矣故以二月為限也此恒燠之罰事闗天下而國亦與焉是時成公幼政在三桓紀綱縱弛之應乎胡安國曰䇿書所載皆經邦大訓人有㣲而不登其姓名事有小而不紀其夲末至雨雹氷雪則􅊖書盖天人一理也觀隂陽寒暑之變以察其盈虚消息此敬天勤民慎於㣲之意每慎於㣲王道偹矣三月作丘甲此因謀齊難而益兵也邱甲邱出一甲也司馬法九夫為井四井為邑四邑為邱四邱為甸甸賦車一乗歩卒七十二人甲士三人是四邱共出三甲也今邱出一甲則一甸四甲而士卒凡百人總一乗計之増一甲矣積三甸計之増一乗矣作與初皆創立之名而義不同食賦之額嵗嵗取之由初而及終也兵賦之額有事用之有作而有止也然紊先王之制以重困民則一也是時行父以齊之一笑怒齊邱甲之作與後四卿之将皆行父故也其罪大矣夏臧孫許及晉侯盟于赤􅁄行父當國憾齊人之納歸父又聞其将出楚師故結晉晉既怒齊亦欲懐魯故不憚降尊而為此盟盖皆以締私而分義不顧矣故書以譏之秋王師敗績于茅戎不書戰不以戎抗王也至尊無敵無敵而有敗自敗也戎非䏻敗王師王師自敗而已自治之道也自治而天下定矣冬十月二年春齊侯伐我北鄙魯背齊事晉故齊怨之第赤棘方盟齊師隨至伐魯䘮而與晉為敵不待貶而罪見矣夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績𫝊稱衛侵齊盖乗齊伐魯而𢷬虚耳齊知之即以伐魯之師禦之新築則衛計不行矣良夫不聼石稷之言而遽戰䘮師辱國故以良夫主此戰也衛書将書帥師事起於衛明矣齊止書師其為伐魯之師明矣六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曺公子首及齊侯戰于鞌齊師敗績策書之體将舉元帥今魯四卿並書者各自将也既作邱甲掃境興師也晉郤克與魯衛諸大夫皆有憾於齊齊又伐魯敗衛故以北鄙新築為辭因以各泄其憾是四國大夫之志乎此戰也齊師敗績有敗道也無禮以生釁肆暴以結怨而又好勇輕敵宜其敗也晉賞鞌之功作六軍而六卿専晉之機兆矣季孫一怒掃境興師自是魯知有季不知有公矣良夫之子林父逐君立君為衛亂首矣大夫専政兵革繁興詐力相尚而禮若弁髦特書諸卿著當時之横而憂其繼此之禍也秋七月齊侯使國佐如師己酉及國佐盟于袁婁齊師既敗納賄求免卑亦甚矣曰如師盟不盟未可知之辭也乃郤克恃勝以不義求多於齊為國佐正辭所屈其氣遂餒而及之盟是晉欲盟而制盟反在國佐也齊伐人而自伐晉侮人而自侮可鍳已八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田齊之賄也晉得寳而魯衛各得侵地其書取與僖公取濟西田同冬楚師鄭師侵衛衛從晉伐齊故楚假救齊之名以侵衛鄭序楚下聼楚役也稱師用衆也晉既用傾國之師以勝齊遂無力救衛而十一國胥從楚矣楚居䘮而伐䘮鄭黨楚而殘夏晉争小而失大均罪也十有一月公㑹楚公子嬰齊于蜀㩀𫝊楚師侵衛遂侵我師於蜀而不書侵何也師方向魯三桓遽使公出迎未成乎侵也以望國之君㑹荆蠻之臣不諱公何也著三桓之惡也楚師本為救齊而鞌之戰季與叔實主之􅂲身被執辱故以公當之也侯伯以嘉禮㑹盟三桓徃與抗禮楚臣帥師以來使公辱焉比事以觀不臣之惡著矣楚卿書公子自此始其勢日强不得不詳之也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀楚主盟也魯無立志先諸夏而徃㑹由是楚召盟而諸國皆至矣書公及深責魯也嬰齊之出稱師著其衆也㑹書名責其抗也盟書人抑其强也諸國之大夫皆稱人惡其替也胥天下而從楚不足序矣新城從晉大夫盟此從楚大夫盟變愈下矣三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭鄭從楚猾夏晉伐之宜矣第衛方被侵畏楚不出諸國盟蜀畏楚不争楚去而乃出乎晉之無能甚矣宋衛倐楚倐晉恥也楚來公首從之楚去公首背之抑又甚矣宋衛未葬從戎罪也然從晉令晉亦有責焉耳辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭昭穆之廟皆曰宫舊主遷新主入必新之新者易檐改塗而已是時宣公方入廟不稱諡而稱新宫者以災故不忍言也三日哭哀也無譏焉以災書耳乙亥葬宋文公七月而葬盖以厚而踰時且疑於王禮也宋君背殯從戎而以厚葬明孝悖矣夏公如晉拜汶陽之田也且䘮畢而朝以事周者事晉也鄭公子去疾帥師伐許許恃楚而不事鄭鄭以此伐之然鄭且背晉而専事楚何以責許乎鄭受晉伐又伐許以怒楚是兼搆晉楚也况許者鄭之南蔽也盍釋許以為外扞而自撤之失計矣公至自晉秋叔孫僑如帥師圍􅁄􅁄不繋國内邑也公羊曰汶陽之邑也復故地而民不服者税畝邱甲賦繁役重􅁄不願為之民也成公不修徳政以来之而命将興師環而攻焉失撫綏之義矣大雩晉郤克衛孫良夫伐廧咎如赤狄之餘也㓕人國而不留餘不仁甚矣徒逐利焉耳良夫每從郤氏之役同惡也冬十有一月晉侯使荀庚来聘衛侯使孫良失来聘丙午及荀庚盟丁未及孫良夫盟㩀𫝊二卿使来聘且尋盟盖皆有君命也然来止言聘而别言盟者聘以結好盟以質疑重好而惡疑也不書公諱之也庚於晉班在三良夫於衛則上卿也先盟庚非禮也蔑周班而懼伯主也鄭伐許再伐許也惡鄭也不書人與師闕也四年春宋公使華元来聘宋未甞聘魯此繼晉衛而来聘盖因三年㑹伐鄭而相結耳衛與宋皆未終䘮而交聘非禮矣三月壬申鄭伯堅卒把伯来朝杜預曰将出叔姬先修朝禮言其故夏四月甲寅臧孫許卒公如晉公以蜀之盟背晉從楚内有懼焉故比年如晉不知過恭反以召侮矣葬鄭襄公秋公至自晉㩀𫝊公以晉侯不敬欲求成於楚行父諫之而止家鉉翁曰魯成中無主故楚之强足以動之而乞盟晉之慢足以移之而思叛從楚如晉偹書之而其失著矣冬城鄆鄆即汶陽之一邑魯既得汶陽故城鄆以自固雖時亦書重役民也鄭伯伐許三伐許矣既速葬以儉親遂背䘮而為暴且未逾年而書爵已成君也不子矣五年春王正月把叔姬来歸去年把伯来朝言其故則把伯固有辭矣故以自歸為文仲孫蔑如宋報華元也夏叔孫僑如㑹晉荀首于糓糓齊地他國大夫非過吾境而使大夫徃㑹之非禮也汪克寛曰自文公十一年彭生㑹郤缺宣公十五年蔑㑹髙固自是大夫㑹大夫率以為常魯政在三家晉政在六卿是可見矣梁山崩梁山夲在韓國以㓕於晉遂為晉有崩不繋晉為天下記異也秋大水冬十有一月己酉天王崩定王也桓王以後政不行於列國定王以後政不行於畿内不書葬魯不㑹也十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢齊自戰鞌之後服於晉兩君未相見也鄭屢伐許楚人怒焉欲從晉故大㑹以謀之定齊於新服反鄭於乆叛合宋魯衛曹邾把而申命之此復伯之機哉然天王新䘮而㑹盟不廢無王之罪視他盟有加矣六年春王正月公至自㑹㑹晉之後晏然歸國書自㑹而不奔王䘮之罪著矣二月辛巳立武宫武宫武公之宫武公周公九世孫成公十一世祖也佐宣王征伐有功故諡武諸侯五廟而魯六廟太廟太室不毁二昭二穆迭毁則武宫之毁乆矣左氏謂季文子以鞌之功立武宫而服䖍以為禱武公而勝故再立其宫公羊傳曰立者不宜立也盖季孫之罪也取鄟鄟附庸國也書取諱内㓕也衛孫良夫帥師侵宋晉令也宋以國難辭㑹故也前楚荘圍宋九月晉不之救蟲牢之盟宋實與焉未有貳心諸侯未歸又謀再㑹晉令實繁乃尤宋辭㑹使衛侵之不亦過乎良夫屢帥師専也夏六月邾子來朝公孫嬰齊如晉受侵宋之命也公比年如晉大夫又繼徃焉伯政之煩苛小國之困敝具見矣壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋魯與宋甞㑹矣甞聘矣甞同盟矣晉命伐之不敢以義諭晉而遽伐其國可乎况國之大事惟戎聼命於人而輕用之其何䏻國戰鞌四卿並書此又二卿並書大夫益强也楚公子嬰齊帥師伐鄭鄭背楚即晉是改過遷善也且又居䘮嬰齊伐之不義甚矣楚大夫帥師至此始見於經盖政在大夫列國皆然嬰齊固效尤耳冬季孫行父如晉㩀𫝊賀遷也晉遷新田擇利自便盖常事耳故不書或曰復侵宋之命也晉欒書帥師救鄭鄭即晉而楚伐之不得不救遇楚於繞角而楚師還救鄭之義伸矣乃又移師侵蔡則無名矣復遇楚於桑隧而晉師還蓋謀之不臧而知難而退也書以予其救而其侵蔡而避楚則畧之予善良而恕其不及也七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛牲變也郊牛牲之至重者鼷鼠乃得而食其角乎一食猶曰偶也再食則非人之所能備矣盖魯之僣郊天本不享鼷鼠之災又天意之不允於魯也程端學曰時成公幼弱三桓擅政鼷鼠食郊牛角天示譴也不知懼而又食其角天譴深矣吴伐郯吳太伯之後其始見經止舉國外之也為其踵楚而僣號也伐郯猾夏也楚患未艾吴復興矣夏五月曹伯來朝曹為魯兄弟之國僖文以後屢朝於魯魯未甞報聘以其小故也邦交之非禮可知矣不郊猶三望凡書免牲免牛即不郊也正月書免牛則日至不郊可知今五月則祈糓亦過時矣既不郊何以書蓋魯以五月而三望也猶之云者可已而不已之辭也不時且非禮也秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭再救鄭也伯職修矣前之救猶大夫今則九國之君親将不踰時而皆至鄭恃以不屈於楚盟蜀之後晉伯復延頼有此耳故書以予之八月戊辰同盟于馬陵晉兩救鄭皆未至而楚師退楚之兵力猶未衂也諸侯蓋同懼楚故晉於救兵未返即為此盟所以釋諸侯之懼而弭其貳楚也公至自㑹諸侯㑹而楚師退不煩兵而已得救鄭之善故即以㑹至吴入州來州来楚附庸國吴楚之介要地也吴本属楚晉使巫臣於吴教之叛楚凡属楚者吴盡取之嬰齊奔命於吴不暇内侵其鋒遂挫然目前遺楚以害後且自樹其敵盖不强於政治而藉外助終非善計也冬大雩旱也周之冬夏之秋也衛孫林父出奔晉林父良父子也孫氏世執衛政而外結晉之强家故見惡於君遂奔晉後由晉復歸為衛患者㡬四十年盖晉之强家為之援也晉君不知大義聼於强家庇亂臣以危人國而已之國亦且隂為强家所移是可鍳矣八年春晉侯使韓穿來言汶陽之田歸之于齊汶陽之田本魯地而侵於齊鞌之戰晉令齊反之魯今齊服晉而屢從晉役矣晉又思悦齊仍奪而與之來言者義不可而强為言也盖脅之也不義且失信矣反已之故曰歸得非其有曰取前於魯言取今於齊言歸何也蓋藉晉之力而不能要於道雖已田猶非已之田也故曰取順晉之命而不敢執夫義雖已田一若齊之田也故曰歸其曰歸之于齊者歸非其所也晉欒書帥師侵蔡與楚争蔡也大國争衡小國受敗前於鄭書救喜之也此於蔡書侵陋之也聖人之情見矣公孫嬰齊如莒與莒通也魯甞平莒郯莒不肯屢伐之蟲牢之盟莒人在焉故與之通後復脅於晉而伐莒魯之邦交如是乎宋公使華元來聘元非専行聘也兼為宋公圖婚爾故繼書納幣夏宋公使公孫夀來納幣婚禮不稱主人而書宋公使者無母之辭納幣不書此何以書錄伯姬也内女惟紀叔姬宋伯姬書之特詳賢之也納幣本可畧而不略斯以見其賢故特書之也嗣此書来媵書致女辭繁不殺皆此意也将有其終故錄其始也晉殺其大夫趙同趙括同括之殺由趙荘姬譛以将為亂也晉君信之而欒郤徴之故稱國以殺而不去其官然趙氏子孫以無罪死其亦盾専晉之禍歟秋七月天子使召伯來賜公命天子天王通稱也經書天王二十五此書天子書錫命二此書賜命且公糓亦皆作錫命盖𫝊寫誤耳魯成未甞入覲又無功徳可褒錫命何為哉王於魯凡三錫命桓終未入覲追錫之也文不待入覲預錫之也成八年未覲就錫之也爵命天子所以御天下而輕用之王靈替矣冬十月癸夘把叔姬卒内女來歸不書卒齊子叔姬郯伯姬是也此以把伯逆其䘮以歸不可以不書絶於把而仍以把目之示從一之義也晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯吴伐郯晉不能救力屈而服於吴豈其得已哉晉遽興師伐之是小國無所依庇而交受兵也昔已失之楚今又用之吴深責晉也魯與郯婚廹於强令亦非也衛人來媵媵不書此何以書錄伯姬也錄伯姬曷為書其媵後有晉齊焉見大國之皆來也程子曰一女之賢尚聞於諸侯况君子乎九年春王正月把伯來逆叔姬之䘮以歸把伯以叔姬為賢初不當出以為不賢則䘮不當歸㩀𫝊魯請之昔何以受之今何以請之胥失之矣公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲無事而復盟諸侯懼貳也晉自馬陵之後受林父之奔以隙衛反汶陽之田以擕魯力不敢問楚而侵蔡威不足及吴而伐郯不知自反乃以威制而約束之雖屢盟奚益哉春秋書同盟有喜其䏻同者有幸其猶同者有危其僅同而終将不同者隨事考之可矣公至自㑹二月伯姬歸于宋内女之歸常事耳常事可畧而書錄伯姬也夏季孫行父如宋致女致女不書此何以書錄伯姬也程子曰古者三月廟見始成婦也父母使人安之謂之致女魯重伯姬故使卿致晉人來媵晉伯國也伯姬之賢聞於四鄰故亦来媵秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭春㑹於蒲鄭方從晉楚人以重賂求鄭鄭畏楚之强而復貪其利竊㑹於鄧信有罪矣然旋復朝晉是終未敢背晉也而遽執之暴矣何以知其來朝既未侵伐亦非㑹盟而直書執來朝可知也執其君旋伐其國是欲出其不意而㓕之耳何以服鄭伯而慰鄭人之望後雖暫從晉而卒從楚撓中國者凡二十年尚誰咎哉故執稱人責其無王伐稱師惡其肆虐冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰㩀𫝊楚侵陳以救鄭又自陳伐莒不書救鄭者不赴鄭而侵陳非可言救鄭也亦不書侵陳者楚志不在陳而在深入以撓晉也書莒潰責晉也馬陵與蒲莒方同盟又非逺國而不救何哉莒小國豈足抗楚其無偹之罪可畧也且素與楚隔豈意楚之直犯其國哉左氏不責諸侯無謀而責莒無偹非春秋意矣楚人入鄆左𫝊以鄆為莒邑但莒已潰矣入其旁邑不足書矣此盖文十二年行父所城者崔彦直曰鄆魯邑也是也入魯邑宜先有侵伐之文今止書入者莒既潰乗勢以入鄆未可言侵伐也楚人㣲者也嬰齊在莒别以偏師入鄆也書入鄆危魯也楚猾夏之道二其一徑蔡以争鄭其一由徐而病魯秦人白狄伐晉宣公十五年秦伐晉晉未甞報晉何負於秦哉今楚伐莒以撓晉秦且結狄以攻晉是黨楚猾夏也故書以惡之白狄介秦晉迭用之以互相伐均罪也然其禍實晉唘之鄭人圍許鄭伯未釋也而圍許盖示以不急君故不畏晉而激晉鄭人欲以是為歸君之術也秦獲晉恵恵卒返國則晉之歸君得其道也不此之為而用詐且君在外而復立君階之亂矣是當國大臣之罪也城中城經書城中城二定公六年糓梁傳曰非外民也非猶譏也則中城盖在郛之内矣諸侯守在四境已非有道况降而城中城乎且勞民以外民君誰與守十年春衛侯之弟黒背帥師侵鄭晉既執鄭伯以伐鄭又命衛伐之不義甚矣衛從令而助虐亦非也葉夢得曰黒背何以稱弟兵凶戰危不以其可将者将焉而私其弟非愛弟之道也胡安國曰黒背生公孫剽孫林父出衛侯衎而立剽剽之立盖䝉父寵也與齊無知同特書以為後戒夏四月五卜郊不從乃不郊三月郊時也於二月下旬卜之歴旬而一卜至三月中旬三卜不從時已極矣僖公之四卜强也五卜凟神甚矣五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭晉執鄭伯乆而不釋而鄭亦不求君也且立君矣晉不得已伐而歸之以求成非義而勤諸侯以勦民悖矣經於十三年書鄭伯從晉伐秦則此時鄭伯歸於鄭可知不書者晉强納之非歸也齊人來媵諸侯娶女二國媵之衛晉已偹數矣齊復來媵伯姬雖賢固踰制矣魯與宋不辭非禮也丙午晉侯獳卒秋七月公如晉奔䘮送葬皆臣子事也晉䘮而公親徃焉是以事王者事晉也時晉疑魯貳於楚止公使送葬是以王禮自居也故削其葬以正無王之戮冬十月十有一年春王三月公至自晉凡九月而至乆也左氏傳曰晉人以公為貳於楚故止公請受盟而後使歸晉侯使郤犨來聘己丑及郤犨盟公方至而犨隨來陽為聘而實要盟也公敵大夫辱也故諱不書公夏季孫行父如晉報聘也黄仲炎曰晉止公九月而歸之其聘魯者豈親魯哉疑其叛而要之也魯辱於晉猶繼朝而聘豈徳晉哉畏其威而謟之也晉以要結為信魯以謟事為禮秋叔孫僑如如齊魯自鞌之戰結怨於齊後雖㑹伐來媵而聘問未修今既見疏於晉恐齊乗間而復怨故通舊好未㡬而求婚焉乃齊卒未報聘是知國務自强左右求免非善䇿也冬十月十有二年春周公出奔晉按左氏周公楚惡恵襄之逼且與伯輿争政不勝怒而出王使劉子復之盟而入三日復出奔晉是無王也是将挟晉以抗王也而晉敢受其逋逃均罪也王臣書奔者三周公楚去位者也故言出王子瑕王子朝皆為逆亂而非去位者也故不言出夏公㑹晉侯衛侯于𤨏澤公被止於晉又要盟公有憾焉今晉厲新立将合諸侯以伐秦恐魯不至故㑹之釋怨修好也衛素睦於晉又睦於魯故衛侯亦與焉秋晉人敗狄于交剛宣成之世晉每有事於狄夫欲圖伯當先攘楚雖秦猶宜置之况狄乎故書以譏之冬十月十有三年春晉侯使郤錡來乞師師制於王無王命而用人之師已為罪矣自伯主興而徴師於諸侯是直竊王之權其罪益大然事茍合義春秋錄之功首罪魁不相揜也今晉将伐秦以自報私怨恐諸侯不從以乞為辭庶無不應乃以濟其欲耳春秋即如其辭以書之者盖因以正從來徴師者之罪尊王也又以重民也僖公二十六年書如晉乞師此書來乞師魯内也晉伯也一以乞為名聖人之情見矣三月公如京師凡公如他國皆朝也則如京師亦朝也乃僖公二十八年兩書朝于王所而此不言朝者河陽踐土晉侯召王而以諸侯朝之其意主於朝而其召王則悖矣故書公朝于王所言不得其所也此則晉乞師以伐秦道出京師不可越王而徃因朝焉倘非㑹伐何朝王之有其意不在於朝故書公如京師言不可為朝也夫諸侯朝王止見於僖成二公而僖則行其事而非其道成則修其文而無其實春秋因文以示義而諸侯罪之輕重具見夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦自京師㑹伐則諸侯皆㑹京師可知而公之來為伐秦不為朝王明矣程子曰以伐秦為遂事明朝王為重曹伯廬卒于師為晉復怨而卒於外曹可憫晉可責矣秋七月公至自伐秦以伐秦告廟盖當時㡬不知朝王之當重而以伐秦為重矣夫書如不書朝著其慢也所以正事君之義以如為本事伐為繼事嚴其防也所以存尊君之禮以伐秦致誅其意也所以明忠君之誠一事而三致意焉維大倫以詔後世其㫖逺矣冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛晉容衛有罪之逋逃而復納之書自晉深罪晉也昔良夫屢從郤氏之役郤氏専晉故林夫倚以返國要君也要君者出君之漸也秋叔孫僑如如齊逆女逆女常事何以書譏失時也䘮畢即位娶元妃以奉粢盛孝也成公䘮畢十二年矣不已晏乎鄭公子喜帥師伐許四伐許矣鄭介晉楚為二國所必争而鄭每於息争之時又自以兵陵小是更相吞噬也非義甚矣而晉不問也越明年許遷于葉避鄭以依楚襄三年晉荀罃反以從楚討許何歟九月僑如以夫人婦姜氏至自齊僑如不氏以事冄見省文也婦有姑也時穆姜存焉冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒魯有兩嬰齊均公孫也前書公孫嬰齊叔肸子也此則仲遂子歸父弟也遂之立也已賜氏故魯人以仲為别而舊史因之也遂與行父比而為逆歸父欲去三桓故逐歸父而立嬰齊以後仲遂一逐一立皆行父操之也大逆如遂仍世為卿尚能國乎癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚十三年曹伯卒負芻殺世子而自立晉不䏻即請於王帥諸侯以舉九伐之典今逾三年矣假他事以會而與之盟是列姦於㑹也他日曺人請君於晉曰若有罪則君列諸㑹矣使得藉口以開釋姦之門舉動可不慎哉衛背䘮非禮也宋世子來宋公疾也晉侯執曹伯歸于京師執曹伯討其簒也近於義矣不敢自治而歸于京師近於禮矣第欲討之勿盟可也同盟而執是誘執也於義為不光王命執而執之禮也擅執之縱歸于京師命猶出於晉也於禮為不恭然入春秋來諸侯相執者多矣此猶差善於彼故書晉侯盖與之也公至自㑹夏六月宋公固卒楚子伐鄭鄭伐許故也鄭昔伐許楚不問以鄭方即楚耳今改從晉故伐之秋八月庚辰葬宋共公三月而葬速也䘮禮之茍可知矣宋華元出奔晉宋亂也蕩山作亂元欲討恐不勝故奔晉借援也宋華元自晉歸于宋自晉因晉力也宋殺其大夫山華元殺之也元為國正卿乆執政柄不能弭亂於未然迨已亂而借外援其謀下矣然猶非為私故書國殺盖制在晉權在元而宋君亦知其討亂而聼之也山不氏宋以罪討故赴不以氏因舊史也山有罪猶書大夫者存王禁也宋魚石出奔楚山黨也懼及故奔君子雖違不適仇國宋為中國之樞楚所必争而魚石托焉楚因助魚石而入彭城㡬至覆宋則魚石之罪大矣冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吴于鍾離兩㑹也先則内大夫與外大夫㑹後則諸國與吴㑹也鍾離吴地徃㑹之也㑹吴者晉志也諸國從晉而已若止書僑如㑹諸國大夫而吴亦列序焉則徃㑹之迹不具失事實矣且列國皆大夫吴其君也列序則吴君居下亂名分矣惟初㑹首晉再㑹殊吴而事實既得名分亦彰矣吴君而舉國削其僣也大夫不可敵諸侯諸侯不可僣天子也書晉㑹責晉也黄池之争盟此㑹啟之矣許遷于葉避鄭而依楚雖楚遷之一以自遷為文罪鄭也抑以責許也楚豈可依之國哉自是四遷轉徙流離不可為國故卒為鄭㓕王綱既失伯政復衰小國無以自存可哀已十有六年春王正月雨木氷記異也周正建子宜雪而雨上温也著木而氷下寒也夏四月辛未滕子卒鄭公子喜帥師侵宋晉侯執鄭伯而再伐其國㡬亡鄭故楚乗隙以賂要鄭鄭遂决從楚然怨晉而叛晉情可原也黨楚而猾夏罪莫逭也六月丙寅朔日有食之晉侯使欒黶來乞師将伐鄭也視伐秦為有名矣來乞師自卑也故孟獻子曰有勝矣伯國之患在驕不在卑甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績晉師為伐鄭而出不書伐鄭者鄭聞晉師而告楚楚子遽來故止言戰也上書乞師無他國㑹戰者不暇俟諸侯之至也敗績繋楚子者君傷則君重於師也晉靈成景三世積衰其諸卿内慢其君外怯於敵自邲之敗大勢去矣今楚又令鄭侵宋宋不支諸侯将從風而靡厲公䏻於積衰之後不假外助一戰勝楚㡬與城濮等矣第城濮之勝經營有素一戰而伯猶且不喜而憂知一勝未可恃也厲勝鄢陵豈有成謀亦倖而已乃既勝而驕侈信讒以致内亂士燮始終致儆良有以也經書楚敗績以紀其功後即事以著驕侈致禍之迹勸戒昭矣楚殺其大夫公子側師敗而将誅固法之常然主兵者将御将者君嬰齊與側素不相能楚子在軍無以御之使敵國謀臣窺其間而敗楚乃獨歸咎於側而嬰齊反藉是以擠側則非法之平矣故稱國以殺且書大夫者以王制律楚之専兼書公子者以公族之近病楚之不審也秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公鄢陵之戰公以内難而後期故晉侯不見公第魯去鄢陵逺矣乞師與戰在一月之内為期已廹况有内難乎晉遽怒魯不恕矣且不至者獨魯哉偏怒魯不公矣盖有譛者僑如也有受賂而主其譛者郤犨也晉侯勝而驕故不盡物情而信讒不恤鄰患而輕怒不見公而不諱者見公之可見也晉之過非公之恥也公至自㑹内有難外不禮於伯主其至危之也以㑹至者見公之無愧於㑹也公㑹尹子晉侯齊國佐邾人伐鄭尹子王卿士子爵鄢陵之戰鄭雖敗而猶不服故晉假王命且援王臣以涖之盖晉伯中衰厲公事周頗謹執罪歸京師興師禀王命豈尊王哉挟天子以令諸侯也春秋不與諸侯用王師故文公三年晉救江王叔桓公不書成公十三年晉伐秦劉子成子不書而此書之者救江則䖏父上抗伐秦則厲公復怨今㑹王臣討貳差善於彼也公㑹伐釋晉怒也曹伯歸自京師負芻簒逆惡莫大焉王治其罪而誅之則天討行大倫正矣今囚之二年歸而君曹是釋有罪也歸不書名以病王也此與僖公二十八年晉文執衛侯相似而實不同彼則晉書人復私怨也怨可釋也此舉爵討惡逆也逆焉可赦也彼書歸之于京師緩辭也先自治其獄也此書歸于京師急辭也惟王正其罪也衛侯雖在京師猶制於晉書歸于衛晉意也曹伯既歸京師則制於王書自京師王命也㩀𫝊曹屢求免於晉不聞一介如周而負芻得晏然反國雖王命實晉主之也然王誠早致其辟晉厲亦何辭乃遲之二年徐俟晉命春秋端夲澄源故以失刑之責歸王而譏不及晉也九月晉人執季孫行父舎之于苕丘沙隨之㑹晉侯不見公矣隨㑹伐鄭雖不見而不敢怠也又執行父不已甚乎舎置也不以歸而置于苕邱盖聞嬰齊之言而知僑如之譖也不以歸者将釋之也舎之于苕邱者不遽釋而有所要也盖恐其懐怨而貳也是以有郤犨之盟冬十月乙亥叔孫僑如出奔齊僑如知晉之覺其譖而公與行父之将歸也故奔齊書之以見世卿之强有罪不能討而齊受亂人之罪亦具矣十有二月乙丑季孫行父及晉郤犨盟于扈要盟也程端學曰執之舎之盟之晉之舉動可知矣魯君在焉而大夫自為盟晉魯之政又可知矣公至自㑹此伐鄭也以㑹致者公之危不在伐而在㑹故以㑹告也大夫執而歸必致公待行父階歸舉公為重故行父不致也乙酉刺公子偃㩀𫝊僑如通於穆姜欲去季孟而取其室公将㑹晉伐鄭穆姜送公而使逐季孟公子偃公子鉏趨過指之曰汝不可是皆君也此刺偃之由也夫行父専魯歸父甞欲去之矣僑如因是而行譖以危公乃僑如既奔矣而行父遂殺偃夫偃為穆姜所指亦脅公使從已姜豈遽謀廢立而偃實有今将之心乎行父素結晉援肆行其私幽君母殺公子名除君惡實脅君也成公庸闇拱手以聼魯愈不可為矣春秋書之以傷魯也然與刺買異辭何也戍衛不卒僖公以此罪買而告楚也故可書刺偃則其故不明以疑似䧟之耳故無可書買之刺不當偃之刺不白非僅専殺已也十有七年春衛北宫括帥師侵鄭從晉令也夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭王既以尹子㑹伐矣鄭猶不服晉復請於王故益以單子也王臣並臨魯衛齊宋大國咸至鄭仍不服盖由晉雖倖勝而内政不修不足服鄭而攘楚也然鄭屢抗王師罪可勝誅哉六月乙酉同盟于柯陵盟不舉諸侯尹單亦與也伐鄭未服而中道尋盟是疑諸侯也况尹單在乎晉厲徒欲倚王臣以令諸侯而不虞蹈慢王臣之罪也然自是遂習為常矣李㢘曰書同同外楚也不為尹單而書同也秋公至自㑹方㑹伐鄭而楚救至諸侯遂還故以㑹致齊髙無咎出奔莒無咎之奔由君母聲子之譖也慶克濁亂中閨國佐謫之聲子譖佐因及無咎然無咎為卿不䏻謀國正君亦失職矣故書奔無異文九月辛丑用郊公糓以用郊為譏不時則書九月足矣曷為言用用者非郊之正祭而用其禮也如書之類于上帝是也然惟天子有大事則可魯何所用之乎九月非時也用又非禮也晉侯使荀罃來乞師再伐鄭而無功恐諸侯怠而不應故仍以乞為名然徳不足而徒用衆豈服人之道冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭三争鄭也鄭卒不服非兵不强徳不著也兵不戢将自焚矣家鉉翁曰使厲公於鄢陵既勝之後不驕不侈而勤撫諸侯鄭将自來何以屢伐為哉十有一月公至自伐鄭㩀𫝊諸國圍鄭故以伐鄭至壬申公孫嬰齊卒于貍脤大夫卒於外則地以事見也此無事而書地何也蘇轍曰從伐鄭還而道卒也然何以卒於公至之後意以疾而留於貍脤乎十一月無壬申文誤也十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犨郤至晉厲勝於鄢陵而驕遂欲盡去諸卿而立其嬖故先殺三郤以其族大而多怨易去也第郤至於鄢陵排羣議而戰勝有功矣况卿為君之股肱黜陟生殺亦自有道乃不明徴其罪而隂用嬖臣之計襲而斃之一朝而尸三卿是自求禍也故歴數之以著其惡或以晉卿宗彊不去之終釀後患然去之亦自有道且厲非去患徒欲私其嬖耳不亦悖乎楚人㓕舒庸楚方摧敗而餘威猶足蠺食逺國然則鄢陵之功不可没矣十有八年春王正月晉殺其大夫胥童㩀𫝊欒書荀偃殺胥童兩下相殺耳何以稱國趙汸曰此将弑君而殺胥童也欒荀弑君不著於春秋則其殺胥童固不以兩下相殺告也是也先殺孔父而殤弑書及先殺胥童而厲弑不書及者童有罪不因其君也盖童致亂者也殺童者作亂者也各治其罪春秋之法也庚申晉弑其君州蒲弑君而書國趙汸曰不以賊赴是也盖欒荀使程滑弑君意即以程滑赴抑或以國亂衆弑而無主名赴魯史承赴而書必非其實春秋無所㩀以革舊史惟削偽赴而書國言晉有是事賊自可推求而得也盖比事屬辭春秋教也晉臣前見於經者皆舊為大夫者也三郤既殺胥童忽以大夫書而見殺則新為大夫者也俄而君弑則新故相激而禍在君也故曰春秋之志㣲而章晉殺其大夫國佐齊靈不能防閑其母既受母譖而逐髙無咎又用慶克故國佐忿而殺之㩀邑叛君其罪大矣齊靈與佐盟而復之而旋復殺佐又秩慶克之子慶封卒釀後禍惑亦甚矣故稱國以殺罪累上也公如晉朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城此伐宋以納魚石也何以不書納或曰不予納也然則孔寕儀行父書納将予納乎孔寕儀行父不繋陳或曰絶之於陳也然則魚石繋宋将不絶之於宋乎盖春秋指事原情文成義立非可執例求也孔寕儀行父志在復位楚子志在制陳得納而其志皆遂矣故書納以不冝納故不繋陳也魚石未甞不志復位而楚子志在亂宋豈納魚石遂已哉故不書納而書伐伐而魚石入彭城則可㩀險而扼宋矣借宋之魚石以扼宋故繋宋也入書復者深惡之也不書叛者楚驅之以亂宋耳義不繋於魚石也公至自晉晉侯使士匄來聘晉侯悼公也雖非厲之子然嗣位未逾年而稱爵非禮也於以見當國者不以厲為君而弑之者果當國者也悼未能討賊故賊名不得也來聘者勤諸侯也盖以求伯也本之不正而急功利伯者固如此秋杞伯來朝八月邾子來朝杞邾相繼來朝以晉悼首加禮於魯故來修舊好欲因魯以通晉耳然邾子尚居䘮䘮未畢不覲王况諸侯乎築鹿囿築者新立防以為囿也山林藪澤民之所利築則奪其利而自娱非義矣嗣此築囿者二盖踵而為之也故書以謹之已丑公薨于路寝冬楚人鄭人侵宋㩀𫝊宋華喜圍彭城楚子重救之乃書侵宋何也既使魚石㩀彭城矣復偕鄭而來故書侵所以著其亂宋而窺中夏之實也晉侯使士魴來乞師悼公之初猶遵厲公故事元年而後則徴師而已矣十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虚朾謀救宋也知義矣晉侯親出有勇矣不奪魯䘮得禮矣諸侯師至楚師已退故宋人辭諸侯而請其師以圍彭城先為此盟也陳傅良曰崔氏奔衛今書齊崔杼何齊納以為大夫也逐髙無咎殺國佐而杼當國伐莒伐魯皆杼帥師齊之禍靈公為之也丁未葬我君成公
