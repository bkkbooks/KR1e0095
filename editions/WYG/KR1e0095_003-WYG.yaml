front:
  text: 欽定四庫全書御纂春秋直解卷三上戊子莊王四年在位十有五年子僖王立在位五年子惠王立莊公
  hash: sha256:3920972a850350e03a0c0d5026c3bdab6a572676b015e59cf961ba69184f1d59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_003-1a, image: missing/missing}
body:
  text: 名同桓公世子也元年春王正月莊何以不書即位榖梁曰先君不以其道終則子不忍即位是也然所謂不忍者必矢志復仇死生以之豈僅以不即位明不忍巳哉三月夫人孫于齊夫人文姜也不言奔而言孫使若愧懼而去然婉辭以著其實也姜之惡大矣嗣子姜氏所出恩義𫝑難兩全春秋不書姜氏明大義不容以恩掩也左云絶不爲親是也夫既與聞乎弑則子不可以爲母臣不可以爲君故於出奔時貶之以明絶不爲親之義然終不能以禮防姜氏而復歸於魯或㑹或享一書再書而不已其滅倫廢義爲何如哉夏單伯逆王姬單伯魯之命大夫也姬繫王而不書字尊王也下嫁於齊命魯主之故逆之也齊侯之罪大矣王不致討魯先君躬受戕於齊嗣君方斬焉居䘮而命主嘉禮何哉王命之王之失也魯不力辭魯之罪也秋築王姬之館于外館者待王姬之舎以俟齊侯之逆也魯主王姬舊矣前此必有其所今築于外者知義有不可而畏齊怒又不敢辭王之命故改築于外若稍變其故然者君子曰不如不主之爲愈也冬十月乙亥陳侯林卒王使榮叔來錫桓公命春秋繫王於天明王道也王以奉天爲道故命曰天命討曰天討雖王不能奉天亦必稱天以示訓也終春秋王不稱天者止錫命桓公賵葬成風二事蓋舉重以示戒也禮諸侯䘮畢入覲則錫命魯桓簒逆終未入覲生則加聘死復追而錫命汨亂天倫孰甚焉榮氏叔字王之下大夫也王姬歸于齊公薨于齊夫人孫于齊王姬歸于齊比而書之而忘親釋仇之罪著矣齊師遷紀郱鄑郚奪其地而民猶居其所曰取奪其地而民惟我所置曰遷遷則民離散而失其常居矣紀小國也三邑既遷其不滅者幾希夫齊與紀同姓况季姜國母而王姬又甫歸于齊乃背黄盟遷紀邑其無王亦甚矣書師者民有不服脅以兵而强遷之也二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘慶父公庶兄於餘邱國名書帥師惡專兵也忘齊仇之不共戴天而淩暴無罪之小國且以長庶帥師大權下移卒致子般之禍故書以重譏之秋七月齊王姬卒王姬何以書卒以魯主之故齊赴之因比内女爲之服也主其婚又主其卒如父仇何冬十有二月夫人姜氏㑹齊侯于禚夫人孫矣書㑹復歸也前此夫人孫齊魯即主王姬以歸于齊夫人無所忌而復歸歸不書至不敢告廟也夫人巳孫齊矣而容其䝉垢以歸是再死父也旣歸矣又任其縱淫以出是重辱國也敝笱之詩所爲作耳乙酉宋公馮卒三年春王正月溺㑹齊師伐衛齊謀納朔也朔負惡奔齊齊不執之以歸于京師已爲罪矣况興師以納之乎且衞有君矣黔牟之立正也魯從仇黨惡犯正以伐同姓何哉溺不氏未賜族也不言帥師師少也夏四月葬宋莊公五月葬桓王以桓十五年崩至是七年乃葬慢之甚也莊王不子矣王官不臣矣然以天下而慢葬一人諸侯之不臣亦著矣㑹葬不書其人以㣲者徃也重責魯也葬魯君據魯言我内辭也葬鄰君别以某國外辭也王者天下之共主不敢以内辭繫之不敢以外辭别之直曰葬某王蓋爲天下書也秋紀季以酅入于齊紀季以行次書紀侯將去而命使承國也酅紀邑也以酅入齊請爲附庸以後五廟也使無紀侯之命當書奔叛而斥其名矣書入難之也齊必欲盡得紀地季雖請爲附庸而齊猶難之也然則賢之歟曰非也王政不行小弱無庇以先王之建國而聽命於强暴蓋亦不得已焉耳閔之也未見有可賢之實也冬公次於滑紀將亡矣告急於魯莊不得已而以謀於鄭爲辭鄭辭以難而莊巳若無事矣雖出次于滑然坐視紀季之入何益哉故書其次以深譏之四年春王二月夫人姜氏享齊侯于祝丘前㑹于禚齊地此享于祝丘魯地㑹與享皆非夫人之禮享則禮愈厚祝丘則地愈近而廉恥蕩然矣㑹而又享假諸侯之禮爲鳥獸之行故不得不詳其事以罪之也三月紀伯姬卒内女書卒爲之服也禮諸侯絶期内女適諸侯則尊同爲之服大功夏齊侯陳侯鄭伯遇于垂謀滅紀也齊僖之志齊襄成之孝子成父之善不成父之惡濟惡而以爲繼志誤矣春秋諸侯每託於遇而私約今三國相㑹亦託於遇其爲簡慢詭譎益可見矣紀侯大去其國前以酅入齊左氏云紀於是始判蓋披紀之半矣今大去其國左氏云紀侯不能下齊以與紀季蓋全以紀與之也夫紀之圗存雖不無失計然其心亦盡矣奈魯不能援王不能庇至使其弟爲附庸而齊猶未厭也於是盡委所有以避齊難聖人以其廹於强暴不忍殘民故不使與失地之君同科而特書大去閔紀而惡齊也六月乙丑齊侯葬紀伯姬内女書葬者三皆特筆也此則國亡而葬於仇人志變以閔之也奪人之國而葬其妻欲蓋滅國之罪而彌彰矣秋七月冬公及齊人狩于禚非禮也蒐狩有地不越境也况齊乎况及齊侯乎夫齊仇無時可通然主王姬猶天子命之也㑹于禚享于祝邱則夫人爲之今則公與齊侯狩矣與仇通莫重乎與齊狩也故齊侯稱人而公書及以著其罪五年春王正月夏夫人姜氏如齊師如齊師者徃其軍中就齊侯耳夫曰㑹曰享猶假非禮之禮以為名也至于師則婦人之徃何爲者哉秋郳黎來來朝郳附庸微國也其上世出於邾黎來其君之名也冬公㑹齊人宋人陳人蔡人伐衞復納朔也朔有罪王命立黔牟焉五國㑹伐是無王也故諸國稱人齊爲首主兵也莊從仇以抗王無君無父罪兼之矣六年春王正月王人子突救衞王人下士子突字也五國黨朔以伐衞王不能令乃使子突救衞下士例不書字特稱字而繫以王人以明正也不言師師少也將㣲而師少以當五國之衆庸有濟乎聖人褒其救而惜其不善救蓋雖望其勇於爲義而又欲其慎於成謀也自救衞無功而王命益不行於天下夏六月衞侯朔入于衞諸侯出奔而歸書復歸者與其復也朔直曰入逆辭也以王命絶之也朔謀殺二兄其惡甚矣本不當立而先君欲立之縱國人安之王亦可以治其舊惡而廢之况國人怨之而不與乎王因而立黔牟是固義之正也乃五國伐衞王人救衞衞朔入衞比事而觀而朔與五國之罪不容於誅矣五國不言納朔何也言納則罪歸納者而入者幸矣言入則罪在入者而納者亦不免也朔不言自齊何也齊雖罪首而五國黨之故均其罪於諸侯周有明王皆所當誅也秋公至自伐衞師出經年朔入告至非所至而至也螟冬齊人來歸衛寳朔之賂也朔之奔齊侯容之今連諸侯以納之故以寳賂齊齊以分於四國四國皆有罪矣而齊其首也平宋亂立華氏鼎故也拒王命納衞朔寶故也有欲貨之心而後動於惡以此結正諸侯之罪垂戒遠矣七年春夫人姜氏㑹齊侯于防防魯邑齊侯來也冬歸衞寳春即來㑹齊侯之無忌憚亦甚矣衞寳之歸左氏云文姜請之故齊侯來㑹而以夫人姜氏主之夏四月辛夘夜恒星不見夜中星隕如雨恒星謂有名之經星星謂衆星不見者精衰黯而無光也經星不見衆星可知矣如雨者多也氣消散而不攝也此天地之大變也人與天地爲一氣政治有失則象變於天故謹而書之秋大水無麥苗周之秋夏之夏也麥熟而五稼方苗皆爲水所没故無也書大水畏天災也書無麥苗重民命也畏天災重民命聖人之心也弭天災救民命帝王之政也冬夫人姜氏㑹齊侯于榖榖齊邑夫人徃也蓋一歲而再㑹矣夫人於齊侯八年而五相求于禚于祝丘猶書月自如齊師至此皆書時甚之也文姜淫而弑弑而又縱淫焉哀姜效尤子般閔公之禍魯之不絶如綫矣詳書之教人以守禮閑家遠辱止亂也八年春王正月師次于郎以俟陳人蔡人俟者相須同行之辭杜預曰期共伐郕陳蔡不至故次以俟之也陳蔡嘗從伐衞矣伐郕何以不至蓋伐衞主謀在齊陳蔡之從畏其𫝑也莊不量己力而欲效齊襄之所爲陳蔡肯以從齊者從魯乎老師匱財以俟之不智哉秋大水無麥苗又興無名之師以病民也不仁哉甲午治兵此治兵於郎也俟而不至徃則無之止則無事歸則無因潰道也河上逍遥林下䘮馬此師有焉故治之周禮獮而治兵蓋習軍政于閒暇之時也今輕次於外與國不應衆心解離不得巳而治兵黷武甚矣桓畏敵而大閲莊懼潰而治兵皆書以重譏之夏師及齊師圍郕郕降于齊師此次郎之師也及圍猶及戰魯爲首焉耳魯與郕皆文王之昭兄弟之國也莊公忘親而志於取郕始約遠而易制之陳蔡而陳蔡不至不得已要齊以圍之郕怨魯而畏强齊故寧降齊而不降魯不曰齊師降郕而曰郕降于齊師見郕之自擇所降而不服魯也魯嘗與紀㑹于郕今紀滅矣又圍郕而驅之降齊殘同姓以厚仇讐不義而又失利也秋師還春秋用師多矣未有詳書如此者出既無名俟而不至久且失據改而從仇以戕同姓畏不敢校三時而還其妄興大衆宿兵黷武甚矣故備書之據左氏慶父請伐齊而公不可則此役公自将也乃其次其及其還不稱公而稱師重衆也以著不義毒民之罪也冬十有一月癸未齊無知弑其君諸兒無知者年之子也年有寵故無知敢於作亂襄公之死淫而荒也無知之亂驕而怨也其原皆始於無禮審乎致弑之原而戒之則亂息矣謀發於連稱管至父而因無知以爲亂弑成而無知受國焉不特與聞乎故而已首惡之名烏得而辭諸徒人費死於門中石之紛如死於階下孟陽死於牀不書及其大夫者非卿也或曰近暱嬖幸之臣從君於昏而任其禍未可以死節許之也九年春齊人殺無知討賊也按左氏無知虐雍廪雍廪殺無知非如石碏之以義討也然能聲其罪而以賊討之即以討與之所以尊君父廣忠孝而絶惡逆也公及齊大夫盟于蔇謀納糾也齊大夫糾之黨也二公子各有黨盟者黨糾不來者黨小白也書公及病公也忘仇而納其子降尊而盟其臣悖義且失禮也大夫不名義繫于齊不在其名也夏公伐齊納糾齊小白入于齊公伐齊齊背蔇之盟也糾不繋齊程子曰不當有齊也小白繫齊當有齊也糾弟而小白兄也不書公子争國也公之伐齊似矣惜乎其以納糾則非義也曰納曰入皆以兵而入者魯方納糾而小白已先入矣以序當立故莒師不强於魯而得入也秋七月丁酉葬齊襄公魯㑹葬也終於事仇天理滅矣八月庚申及齊師戰于乾時我師敗績忘親仇黨不克納而逞忿以至於争故書及戰以責之大奔曰敗績内敗不書非義之甚而䘮師故獨書敗績九月齊人取子糾殺之納不書子爭國也殺則書子明其爲齊公子也愍之也魯伐齊納糾矣雖不克納齊人烏得取而殺之曰取者易辭也其言曰請君討之則生殺固在魯矣乃從齊令而殺之故曰取目齊人所以深病魯也殺糾者非小白歟其稱人而繫於國蓋鮑叔之流必殺之以絶後患故不目齊侯而稱人其臣與有責焉耳冬浚洙洙在魯北齊伐魯所必經也魯雖殺子糾猶畏齊怨故浚而深之以備齊夫立國在徳不在險忘本事末興役毒民古人未雨綢繆之意不如是之陋且悖也十年春王正月公敗齊師于長勺凡魯勝則曰敗某師蓋平辭也而爲之説者曰病公謂納糾以來齊師己實有咎又憤而與之戰意責己也夫長勺魯地齊師加己而應之何己之責或又謂魯以曹劌之語權謀取勝非三代用師比此宋襄不鼓不成列之謂聖人因時以制義未可以迂儒眇見窺之也或又謂觀長勺之敗魯不出齊下乃不移此于齊襄未死之前復仇自立猶有責焉則聖人之責宗邦終無已焉矣治經者易失之鑿其以是夫二月公侵宋聲罪致討曰伐潛師掠地曰侵莊公既倖勝於齊遂舉師以侵宋無名生釁所以致郎之師也三月宋人遷宿宿㣲國介於宋魯宋魯嘗盟于宿宋怒魯乃遷怒於宿徙其國都驅以爲己附庸非滅也故不書滅然自是宿不復見則遂滅矣先王建國而已遷之則非義使民流離失所則不仁書之罪宋也夏六月齊師宋師次于郎敗齊侵宋故也伐而書次以次爲善齊桓方挾宋以圖霸二國連師𫝑足勝魯而猶次于郎蓋以威魯也魯服斯不戰矣然皆以復怨興師去無名不義者無大相逺雖左次無善焉爾公敗宋師于乘丘敵次而已敗之無禮也同次而獨敗之用詐也偷一時之勝而重四鄰之怨惡佳兵也春秋貴義不貴詐好禮不好兵秋九月荆敗蔡師于莘以蔡侯獻舞歸荆即楚也周封熊繹於楚其爵子熊通始大僭稱王以楚舊有荆名稱荆以自大僖元年伐鄭書楚仍用周封之名告諸侯矣彼以荆來書荆以楚來書楚紀實也周有楚子而無荆王故荆君書荆荆大夫書人外之也楚君則書子楚大夫則書名正之也本王制以削其僭也民無二王凡僭號者皆削之使天下定於一也荆敗蔡則北門啟將爭衡於上國書之憂之也以歸恥之也同姓之侯而見執於蠻夷天子不敢問方伯不能討非獨蔡之恥也蔡侯名失國也胡安國曰諸侯不生名失地則名比於賤者欲使有國之君戰戰兢兢知自守也冬十月齊師滅譚譚子奔莒滅者亡國之善辭上下之同力也而滅之者之罪大矣齊方圖伯而首滅天子之建國使亡國之禍接迹於天下五伯三王之罪人齊桓其罪之魁乎國滅何以書爵無取滅之道屈於强暴焉耳不名史失之書奔責不能死位也不言出國亡無自出也十有一年春王正月夏五月戊寅公敗宋師于鄑鄑魯邑與齊取紀之鄑爲二地蓋魯在宋齊之中宋侵魯無越魯至齊之理也次郎而敗之在鄑而又敗之不亦甚乎莊公忘父仇爲諸侯所不齒又結怨四鄰君子爲之懼矣秋宋大水宋告而魯弔之也師旅雖興不廢告恤禮也因魯之弔志宋之災蓋以明同患之義聖人之仁而大也天無私覆地無私載聖無私心王無私政冬王姬歸于齊魯爲宗國主王姬則常事不書而兩書於莊公何哉前歸齊襄志其忘親媚仇明父子之道也今則仇巳死矣王命不可逆也齊桓非所仇也故止以王姬之歸爲義明夫婦之禮也其禮既明其後斯可以爲常事而不書也十有二年春王三月紀叔姬歸于酅紀亡矣曷爲謂之紀叔姬存紀也亦全叔姬之志也紀侯大去叔姬從焉至是紀侯卒不書失國也紀之宗廟在酅故叔姬奉其䘮于酅婦人雖有大歸宗國之義不歸魯而歸酅者終婦道也嘉叔姬之節且明紀季之義也前以酅入齊非利之也欲存國耳今叔姬得所歸則其效也夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧宋萬魯囚也宋公請而復之用爲大夫昵而與之博乃以一朝之忿而行大逆仇牧不能豫正其君比匪之失然臨難致命志閑其君聖人猶有取焉故書及以著其節督亦與難且位崇於牧而削之者負未討之罪而爲盗所殞此亂臣迄天誅耳何死節之有削之不得與仇牧比聖人之特筆也冬十月宋萬出奔陳萬書出奔不容於宋也書奔陳罪陳容賊也按左傳萬據國立君帥師圍亳蕭叔以公族及曹師伐之僅而能勝則萬奔陳非宋縱賊也賂陳得萬而醢之陳有罪耳然不書宋人殺萬者以賂得賊雖誅之未明正其討也是歲莊王崩不書不赴也十有三年春齊侯宋人陳人蔡人邾人㑹于北杏齊創伯也諸侯而主天下之㑹盟自北杏始宋有弑君之難齊桓欲修伯業故㑹北杏以平之齊書爵而列於首四國稱人而序於下蓋衆望在齊也桓非受命之伯衆以私尊之假仁義以竊大權使天下知有伯而不知有王罪大矣九合諸侯一匡天下功亦著焉明其罪以立大義之防錄其功以著小𥙷之效春秋固功罪之權衡也夏六月齊人滅遂北杏之㑹遂人不至故滅遂以示威三年之間兩滅無罪之小國不仁甚矣是知救邢封衛之皆假也遂君不見者殉於其位也秋七月冬公㑹齊侯盟于柯始平于齊也魯積與齊隙今齊𫝑盛矣滅譚滅遂魯人懼焉故爲柯之盟黄仲炎曰北杏之㑹魯遂皆不至魯又有納糾之憾敗師之怨乃桓㑹魯而滅遂者遂小國也利其易虐則借以立威魯望國也知其難圖則結以爲助恩威異用皆視其力放於利而巳故曰五伯者三王之罪人也十有四年春齊人陳人曹人伐宋宋背北杏之㑹也齊自夷吾得政侵伐皆書人蓋有天子之二守髙國在夷吾陪臣也故名不登於簡册乎不書師不用衆也内政作而軍令成賦於民者寡取於鄰者約矣節制定也夏單伯㑹伐宋踐柯之盟也伐宋之役齊令不及魯魯聞而遣命大夫自徃㑹之耳秋七月荆入蔡蔡侯在荆而蔡人㑹齊侯于北杏荆所以入蔡也敗其師執其君又入其國荆强甚矣齊不能救則是以蔡予荆也荆𫝑陵蔡遂漸及於鄭而猾夏之禍成矣是時齊甫修伯業又得魯失宋力難兼顧故遲之既久然後伐之耳冬單伯㑹齊侯宋公衞侯鄭伯于鄄宋鄭衞服也北杏之㑹鄭衞不至宋背之㑹于鄄皆服也曹邾不與巳服也侵伐不用大衆㑹盟不徵巳服猶有䘏諸侯之心焉魯使單伯猶疑之也十有五年春齊侯宋公陳侯衞侯鄭伯㑹于鄄前㑹鄄陳不至今来故再㑹陳以國小盟㑹皆在衞下齊桓以陳介齊楚而爲三恪故進之而先衞焉三㑹而不盟諸侯猶未固也信不固不輕盟猶近古焉魯不至終疑之也既盟于柯而又貳乎夏夫人姜氏如齊文姜不如齊八年矣鄄之㑹魯莊不與故復如齊以通二國之好桓欲求魯好以定伯業故不之拒也姜之行穢矣桓當逺嫌以示儀於諸侯乃借以結魯其爲累大矣婦人預政雖功亦罪蓋不可以一時之利而决萬世之防秋宋人齊人邾人伐郳爲宋討也郳爲宋附庸宋屬也六年郳黎来來朝則新從魯矣鄄之㑹宋服而魯不至故爲宋討郳所以固宋且懼魯也宋先齊主兵也鄭人侵宋間宋之伐郳而侵宋也鄭突賂宋求立立而遂背之賂宋求入入而又背之無信哉且兩鄄同㑹豈惟背宋亦背齊矣齊新伯諸侯方睦不從齊以禦楚而首叛齊以伐宋是自求禍也逾年而齊伐之荆又伐之鄭之不亡幸耳不守信義而尚詐力烏有不困哉冬十月十有六年春王正月夏宋人齊人衛人伐鄭討其侵宋也諸侯宋爲大既爲之伐郳又爲之伐鄭宋親而諸侯以定其謀得矣宋背盟則伐宋鄭侵宋則伐鄭以伐止伐伯權立而諸侯不敢反覆民得免於兵其事善矣但桓非受命之伯以王道正之猶有罪也且鄭突簒立不討其舊罪則亦巳矣乃因其從已列奸於㑹因其叛已假宋致討師雖有名實濟其私視私相侵伐者何遠哉宋先齊主兵也秋荆伐鄭荆患自蔡及鄭也鄭天下之樞也宻邇周畿齊方圖伯荆亦浸强北侵不已陳蔡許適當其衝而鄭尤其要害齊楚所必爭也自鄭受幽盟荆不敢窺鄭者十餘年伯功之繫於天下重矣哉冬十有二月㑹齊侯宋公陳侯衞侯鄭伯許男滑伯􅅬子同盟于幽公羊作公㑹齊伯成也書㑹公來㑹也當從公羊爲是若云因叛盟諱公不諱於叛而豫諱於此失其義矣荆與齊爭鄭鄭伯在㑹從齊也鄭陳許来近楚者皆至宋衞既固曹邾先服滑􅅬新盟近齊者皆從安内攘外不以干戈而以玉帛彬彬乎講信修睦矣盟書同同欲也荆入蔡伐鄭中國諸侯咸倚桓爲重故兩幽皆書同同盟猶未純乎主盟也若葵邱踐土則桓文之盛也而主盟矣桓首率諸侯使同盟於己則無王矣先陳於衛躋許男於滑伯執進退諸侯之權亦僭矣功首罪魁不誣也邾子克卒此邾儀父也其謂邾子克何蓋附齊而尊周故王命進其爵乎不日史夫之不葬魯不㑹也欽定四庫全書御纂春秋直解卷三下十有七年春齊人執鄭詹鄭方同盟而旋執其臣意以鄭懼楚而懷貳乎貳固爲罪亦非得已攝乎大國兩屬求免耳桓能伐楚鄭將焉徃不修徳而虐執其臣故稱人以執且不歸于京師非義也夏齊人殲于遂齊人衆辭也殲盡殺之也齊滅遂而戍之遂之五族飲戍者酒而盡殺之此遂人殲齊人也書曰齊人殲于遂不罪遂人也殺人之君私其土而刧其衆强不義之至也遂之餘民忿而殲敵理所得爲變文書之所以伸遂人復仇之志而著齊桓不義以至自殲其衆也胡安國曰亡國餘民能殲强齊之戍則申胥一身可以存楚楚雖三户可以亡秦足爲强而不義之戒而弱者亦可省身而自立矣秋鄭詹自齊逃來書逃罪詹也不守死以紓國患而竄身茍免辱命矣書自齊譏齊也執人不服久而自逸無政矣書來責魯也同幽之盟守信不篤爲逋逃主非義矣逃來與來奔皆罪辭而義不同奔以適此爲志故曰來奔逃以去彼爲志故曰逃來冬多麋麋魯所有也多則爲異陸佃曰陰盛所感惡氣之應是也是年僖王崩不書不訃也十有八年春王三月日有食之不書日與朔闕文也夏公追戎于濟西戎不書侵伐不覺其來去而追之也書追無備也書公追輕也濟西曹地書于濟西遠也戎來不能禦去乃追之輕身而事遠略失本計矣秋有􅈮􅈮魯所無也有則爲異且害人也麋􅈮皆陰物麋迷也􅈮惑也皆惡氣之應也麋􅈮必志者謹其所由致也人與天同體氣和則育氣乖則疾天與人同心世治則喜世亂則怒災者天之怒也異者氣之疾也審其致異之由而戒焉則政修而民樂故春秋不徒志異也冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟陳人之婦蓋陳侯爲其世子娶婦也鄄衛地程子曰鄄之巨室嫁女於陳公子結以其庻女媵之是也媵小事結私行不宜書以遂事書也遂有二諸侯之遂繼事之辭大夫之遂生事之辭諸侯之初事繼事一也以是非爲功罪也大夫則初事出于君命其功罪不繫於巳至於遂則生事邀功雖功亦罪矣結媵于鄄齊侯宋公在焉不遣使歸報矯命而與盟雖意在安國然非禮矣以卿而媵微者之女以臣而抗大國之君以欺而啟疆塲之禍故深罪之夫人姜氏如莒如齊猶曰父母之國也如莒何爲哉前此姜氏久不出懼齊桓也如齊歸而遂肆然罔忌遊蕩及莒意窺桓内治有缺乎齊魯所以同歸於亂歟冬齊人宋人陳人伐我西鄙魯之事齊後於諸侯又受鄭詹未討結矯命盟之齊猶屈己以受迨知其矯命也遂重其怒故連三國來伐也魯之被兵遠言鄙近言邑至城下言我以三國之力而伐鄙不深入也魯服即止矣據左傳是時王室亂衛侯朔叛王與燕納子頺桓不能勤王而汲汲服魯夫非王室之罪人歟二十年春王二月夫人姜氏如莒又如莒也如齊且不可况莒乎一之爲甚况再乎夏齊大災人火曰火天火曰災大者甚也宗廟庫廏皆盡矣齊來告魯徃弔故書凡弔者哀其禍而救其乏秋七月冬齊人伐戎戎徐戎也近魯與曹而爲患齊伯六年諸侯略定於是始伐戎二十有一年春王正月夏五月辛酉鄭伯突卒魯與鄭伯突爲黨故突之始終魯史詳焉周有子頺之亂惠王居櫟諸侯勤王者鄭與虢耳突雖有簒國之罪實有勤王之功功罪不相掩也秋七月戊戌夫人姜氏薨以夫人之禮喪之也春秋有隱痛焉冬十有二月葬鄭厲公鄭伯有納王之功勲在王室然不免諡爲厲者鄭人不能沒其簒立之實公議尚在也八月而葬緩也二十有二年春王正月肆大眚肆猶赦也眚過也肆大眚不幾有似於宥過無大乎非也張洽曰取大罪極惡而例之於眚災以赦之蓋用虞書眚災肆赦之名而不察其實也是也大眚皆肆則廢天討虧國典惡人得志而善人寃矣孔子語仲弓曰赦小過尚寛政也作春秋曰肆大眚譏失刑也寛嚴無常視其大小輕重以爲衡期於得中而已書曰咸中有慶癸丑葬我小君文姜以小君之禮葬之也合而與桓同穴也祔而配桓享祀也春秋有隱痛焉又婦人生從夫爵死從夫諡禮也既以徼倖逭天討又以非禮冒美名亦不得不志也陳人殺其公子御寇殺有舉公子者以親書也舉大夫者以貴書也兼舉大夫公子者貴且親也其上殺之則稱國惡其不請於王而專殺也専殺有罪且不可况無罪乎其下殺之則稱人人衆辭也國亂無政衆擅殺之又不在專殺之條矣以人而殺公子以公子而為人所殺以國君而至使人殺其公子皆罪也據左氏御寇爲陳世子張洽曰不稱世子未誓於王也未誓則稱公子重王命也夏五月五月非夏之首月何以配時盖五月之下有脫事耳不然則是誤以四月爲五月也秋七月丙申及齊高傒盟于防敦及之公也公忘父仇復請婚齊齊欲藉以懐魯遂使髙傒要公以盟非禮矣沒公不書為公諱也防魯地凡諸侯之盟各去其國都而必以地兩相下之義也就而與盟尊髙傒也文二年及晋處父盟公在晋也則晋為政故處父去族責晋慢公也此及齊髙傒盟公在魯也則魯為政故傒不去族惡魯媚齊也冬公如齊納幣婚禮六而納徵親迎為重納徵爲契之成親迎則事之終也納幣即納徴也逆女即親迎也盖圖婚仇女於是成矣深著莊之不孝也納幣大夫之事而莊親之非禮也春秋以訓萬世因不孝以教孝因非禮以明禮也且莊與孟任割臂為盟許為夫人生子般焉雖始合不正而夫人世子皆具矣復求婚新間舊也是以有子般之禍二十有三年春公至自齊如齊納幣而告廟桓公不愀然乎莊有人心當於斯焉變矣故書以重譏之祭叔來聘祭本畿内采地有稱伯者其爵也有稱公者則以伯而爲王三公也祭叔蓋其族也而書字則大夫也不書使非王命也假聘私行而締外交失禮違義甚矣夏公如齊觀社諸侯各有社以祀地齊社非公所及也况齊棄太公之法而習爲美觀非禮矣莊專爲社而觀之耶是爲縱抑别有所爲而藉端耶是爲淫納幣未幾復出觀社比事直書其惡著矣公至自齊棄民與政而淫於觀其何辭以告廟荆人來聘荆入蔡伐鄭浸爲中國患矣今而聘魯魯豈有徳以懷之且自荆至魯幾二千里而假聘以交宗國意蓋有在矣春秋書此以謹其始通繼書楚子則著其漸盛其謂書聘以進之者末矣公及齊侯遇于榖榖齊地如齊巳亟矣狥欲棄禮託而爲遇責魯也亦病齊也蕭叔朝公蕭附庸國叔者其君之字也叔本朝公因公在榖遂就朝焉非其地矣秋丹桓宫楹楹柱也禮天子諸侯皆黝堊丹則盛色而踰制矣冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈莊與齊桓盟柯以來屢㑹不至與髙傒盟防以後非事數出是志在得妻不在從伯也故桓既爲榖之㑹復爲扈之盟所以固魯也莊之婚齊也不以禮桓之結魯也不以義蓋交罪之二十有四年春王三月刻桓宮桷禮天子諸侯之桷斲之礱之天子加密石焉不聞刻之也刻則増華而踰制矣爲將逆女踰制夸示崇飾禰宮故書以著其失葬曹莊公夏公如齊逆女逆女常事何以書娶仇女也秋公至自齊公親迎矣先至何也夫人不從也婦人從夫者也公至不從不正其始矣八月丁丑夫人姜氏入書八月則公至蓋七月也與公有約故遲之旣久也入者逆辭也榖梁曰宗廟弗受也娶仇人子以薦舍於前其義不可受是也故削其告至變文書入且公先至則不夫夫人後入則不婦深著其悖也始之不正終必致亂兆於此矣戊寅大夫宗婦覿用幣禮夫人至大夫郊迎明日大夫見於廟宗婦見於内不同地也卿大夫羔鴈女則榛栗棗脩不同䞇也莊以奢悅夫人使大夫宗婦同覿而同用幣越禮且無别矣公之婚齊也求之甚急而齊人彌緩其於夫人也媚之備至而夫人愈伉不顧父仇委曲以狥其欲釀異日淫縱弑逆之禍其所由來者漸矣大水陰慝也夫人入而大水天人感應之際可畏哉冬戎侵曹曹羈出奔陳赤歸于曹羈曹世子而嗣位者也赤則庻子也戎侵曹納赤也賈逵曰赤戎外孫也理或然也宋執仲而突歸忽出權在仲也戎侵曹而羈出赤歸制在戎也忽未逾年不稱子羈巳逾年不稱爵不能君也突赤不書公子惡爭國也忽羈繫國國固其國也突赤不繫國不宜有國也突歸忽出鄭有君而突逐之也羈出赤歸曹巳無君而赤竊之也比事以觀而曲直分輕重著矣郭公杜預曰經闕誤也胡安國曰先儒或以爲郭亡於傳有之齊桓公之郭問父老曰郭何以亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭公善善不能用惡惡不能去所以亡也然則非有亡郭者郭自亡耳二十有五年春陳侯使女叔來聘平伐我之怨也夏五月癸丑衛侯朔卒朔拒王命而卒於位君子爲周道傷之六月辛未朔日有食之鼓用牲于社禮天子日食不舉伐鼓於社諸侯用幣於社伐鼓於朝祈用幣享用牲鼓不於朝而於社僭也不用幣而用牲舛也應天以實無實而文得禮猶具文耳况失禮乎伯姬歸于杞伯姬不書子公妹也桓公之薨二十有五年矣而始歸志失時也秋大水鼓用牲于社于門比年大水也凡天災有幣無牲非日月之眚不鼓鼓用牲非禮也于社于門非地也災沴之至其上修徳其次修政其次修救其下修禳禳而非禮則又下矣冬公子友如陳魯徃他國曰如如而繫以事譏在事也止書如公則朝也内大夫聘也然不直言朝聘者或結援或媚大非邦交之定制也友如陳報女叔之聘也又以見大夫交政中國之漸且志三桓之始也二十有六年春公伐戎前書齊伐戎矣公今伐戎雖報濟西之怨亦承齊志也然内政不治而事外不知務矣隱桓之會戎盟戎不足結之徒自貶也莊之追戎伐戎不足威之徒黷武也夏公至自伐戎勞師逾時危之也馭戎之道不弛備以啟侮亦不生事以邀功莊則戎巳去而追之戎不來而伐之以是䇿勲焉抑末矣曹殺其大夫稱國以殺者君與用事大夫同謀以殺之也其大夫不名史失之也諸侯與其大夫雖有君臣之分皆王臣也故爵出王朝不得專命也罪歸司寇不得專殺也定天下於一也曹以小國而專殺葢羈赤出入之際赤除羈黨而殺之其無王而不義亦甚矣胡安國曰諸侯之大夫㑹盟征伐雖齊晋上卿止錄名氏至其見殺雖曹莒小國亦書其官或抑或揚或予或奪聖人之用也明此然後可以司賞罰之權矣秋公㑹宋人齊人伐徐陳鄭許已服齊矣伐徐所以通江黄之路開取舒之門成伐楚之謀也宋序齊上葢此時徐必犯宋之牧圉故以宋主兵也宋齊皆人而公與焉者勤齊也不書戰徐服也諸侯不疲民力不匱師出而有成功管仲之謀也冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮夫人㑹諸侯自文姜始伯姬踵而行之行不同而迹同也冬又來而杞伯來朝僖公五年來而朝其子蓋爲夫若子謀也婦人預政而専行非正也杞伯不閑有家伯姬不守婦道莊公不循典禮參譏之夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽齊桓創伯自北杏以來宋魯之疑信未定鄭之叛服不常前雖同盟于幽猶未固也今皆服矣故尋盟以申伯令也仗義尊周安内攘外諸侯同欲而從之視他盟爲愈矣故復書同盟以許之秋公子友如陳葬原仲左氏云原仲友之舊也書如者有君命葢請於君而㑹其葬也雖有君命而越國締私故書以示譏冬杞伯姬來女歸寜曰來出曰歸姊妹稱字父母在則稱子内女歸寜見於經者此之伯姬與宣五年子叔姬而巳伯姬非子義不得歸寜不宜來者也子叔姬禮當歸寜苐與齊髙固偕來來而失宜者也禮得則常事不書矣莒慶來逆叔姬慶莒大夫也大夫爲其君逆稱女女者本其父言之兩國之尊同也自逆止稱所逆者之字就女之行次言之不敢上及其父尊卑之别也公自主之故以眀其失禮杞伯來朝杞伯不朝王而朝魯伯姬先來而已亦踵至是不閑有家而復身狥之失禮之中又失禮矣公會齊侯于城濮城濮衛地將討衞而與魯㑹豈謀衞乎夫伐衛不應謀於衛地况明春伐衛魯師不出非與魯謀審矣葢幽之再盟衛侯不至其時衛喪未終也今已終矣衛果不背前盟必將因會求好固可不戰而服之耳乃衛竟若㒺聞也是以有明春之伐二十有八年春王三月甲寅齊人伐衞衛人及齊人戰衛人敗績按左氏衛嘗伐周立子頽至是王使召伯廖賜齊侯命且請伐衛則是奉命伐衛也乃書齊人伐衛者桓以衛不與幽盟假名致討受賂而還是不能以王命討衛也故繫伐於齊罪齊也據左氏伐衛者齊侯人之者貶之也甲寅者伐衛之日也齊以是日至衛即以是日戰逆王命而抗方伯以志乎此戰也故書衛及罪衛也不地略之也以伐日戰方至其境耳故志日而不志地也夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭荆至是又伐鄭䧟其外郭及於逵市其𫝑葢岌岌矣鄭近王畿荆師及鄭則禍延王室齊桓應機救之荆師夜遯豈惟得恤鄰之義哉崇奬王室頼此舉也故書以美之春秋書救二十三而齊桓居五五伯桓公為盛有以哉程子曰齊伯主魯望國宋王者之後同救鄭以攘荆天下之大勢可觀矣冬築郿郿邑也邑何以不言城創作邑也邑必有官府民居市㕓焉城與室皆可言築言城則不足以概室也築郿於大無麥禾之時是輕用民力於其所不必為所謂時絀而舉贏也大無麥禾麥在夏禾在秋書於冬總計之也大無無之甚也新無所入舊無所餘倉廪俱竭也所以著費出之無經儲蓄之不講救荒之不預國計耗而乞糴鄰封抑末矣榖梁曰無三年之畜國非其國况虛乏至此乎臧孫辰告糴于齊告者求辭卑之也内臣以事出使先言如而後舉事此直舉告糴而不言如著其急也公羊以不稱使同於私行非也春秋於内臣概不書使也辰請糴猶有恤民之心乎然非本計矣賦役繁興而不能諌也奢侈日盛而不能止也公私交病急而求人備位請行爲名而已君子之於國也恃巳而不恃人務實而不務名二十有九年春新延廏脩舊曰新馬政有國者所必講也然去冬大無麥禾則憂民之不暇安問馬勸耕之不暇安事廏冬築郿春復新延廏厲民甚矣後世有寓賑於工者如之何曰聚失業之人而傭之使無轉徙可也此則力役征於民烏乎同夏鄭人侵許許鄭鄰也諸侯救鄭而許不至故侵之然許自盟幽之後不與齊桓之會鄭葢從齊令歟自是許從中國侵獨令鄭者因其有怨且近也秋有蜚紀異也劉向曰蜚非中國所有南越淫風所生爲蟲臭惡公娶齊淫女故蜚至冬十有二月紀叔姬卒紀亡矣猶繫紀從其志也妾媵不卒特卒叔姬崇奬節義爲後世勸也惡雖貴而必懲善無隱而不錄王道也城諸及防書及者依先後而次之也周十有二月城時也何以書大饑之餘民因未甦而亟興土工也三十年春王正月夏師次于成榖梁曰欲救鄣而不能非也趙匡曰魯蓋㑹齊圍鄣至成待命聞鄣巳降故不行也是也饑饉之餘輕用其衆師出無名非守國之道重譏之秋七月齊人降鄣鄣小國微乎微者也降者使爲巳有也齊魯圍郕郕降於齊師郕自降也降於力既屈之後此無圍伐之文而直曰降鄣脅使降也降於兵未加之前葢鄣之弱而不能自存尤甚矣雖微必錄其扶弱抑强之義歟八月癸亥葬紀叔姬紀亡矣而叔姬之卒葬也皆繫之紀見叔姬之全乎爲紀婦也紀季以酅入齊矣曰葬紀叔姬見紀季之不失爲紀臣也表苦節之貞婦憫亡國之孤臣春秋之勸善周矣魯之㑹葬雖變而得禮也九月庚午朔日有食之豉用牲于社冬公及齊侯遇于魯濟濟水歴齊魯界在齊為齊濟在魯爲魯濟左氏𫝊曰謀伐山戎也亦以下齊伐山戎比事而知之也魯師不㑹而齊人獨出則謀之未協也後獻戎㨗蓋以威魯歟齊人伐山戎山戎在北故杜預曰北戎山戎也伐之以其病燕也然不書救則其爲燕與否未可知也上書遇魯濟下書獻戎㨗志在伐戎而不在救患勞師勤逺其諸以病桓乎三十有一年春築臺于郎志勞民也春非時也臺非事也郎非地也天災時變無若莊之多國匱民貧無若莊之甚乃縱情任巳崇飾遊觀一歲而三築臺君志荒矣國政廢矣民力竭矣魯之不亡幸爾夏四月薛伯卒薛侯也稱伯時王黜之也不名史失之築臺于薛薛魯地六月齊侯來獻戎㨗㨗勝也戰勝而有獲即以所獲名㨗也下奉上曰獻凡諸侯有四夷之功則獻於王諸侯不相遺俘齊侯自矜其功以威魯且躬以戎獲來遺而其辭曰獻魯受之均罪也秋築臺于秦秦亦魯地與二國同名耳冬不雨災也冬不雨何爲災周之冬夏之秋也陰陽合而後雨不雨則氣不和而物生不遂志之謹天戒也三十有二年春城小榖冬不雨矣又城小榖民者君之命君不恤民棄其命矣其能久乎夏宋公齊侯遇于梁丘按左氏齊侯爲楚伐鄭請會於諸侯宋公請先見夏遇於梁丘梁丘去齊八百里而於宋爲近齊桓以宋之請不憚遠而就之以爵序而先宋焉其定伯宜矣秋七月癸巳公子牙卒季友以君命酖牙也則其卒之何隱其罪不以爲國獄也公有世子般牙黨慶父以脅公俄而弑械成友察其奸先幾而酖之當其罪矣誅惡於未行滅親以申義劉敞曰聖人原情議獄以季子爲忠於國而適於權故平其文使若自死然八月癸亥公薨于路寢路寢正寢也公薨必地詳凶變且以别正不正也薨于路寢正也公享國三十餘年事事越禮幸其薨也不絶於婦人之手以居正而保令終然後知禮之用大也冬十月己未子般卒子君之子也君存稱世子明當繼立而成世也君終稱子某定位於初喪而繼父也未葬猶稱名葬則不名然未逾年猶稱子一年不二君也逾年矣改元即位始稱君焉縁子之心不忍遽以成君自居必即位而始正爲君之名在臣子之分子繼君即君也於定位而即當盡事君之道矣文十四年齊侯潘卒子舍立未逾年而商人殺之經書弑其君葢恐人疑其未成君而末減故特筆以正其名子般未成君降於公而書卒内辭也般者孟任之子也慶父使圉人犖賊般於黨氏故卒而不地葢公薨必地不地變也子卒不地以示變則亦從君之例也子般卒慶父如齊比事屬辭正慶父之弑以眀其罪在必討豈以未成君而末减乎公子慶父如齊慶父如齊告立君也弑般而托以國事行因媚齊以自託焉專國日久莫敢誰何故得出入自如桓為盟主於魯爲鄰容其來而不之討書如齊魯與齊均有失爾公子友奔陳不書削之也以别於慶父也狄伐邢志狄禍也春秋之世戎先見荆次之狄又次之戎亂曹魯荆病蔡鄭狄禍邢衛微齊桓孰能匡之夫子仁管仲有以也
