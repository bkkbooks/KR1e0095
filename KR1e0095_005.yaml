front:
  text: 欽定四庫全書御纂春秋直解卷五上壬戌惠王十有八年在位二十有五年子襄王立僖公
  hash: sha256:c4f568098709e77fbf25c49000bd9aa9d5b2e08fea64eab2162ba27b85a917d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_005-1a, image: WYG0174/WYG0174-0073c.png}
body:
  text: 名申閔公之兄亦莊公庶子也元年春王正月僖於閔雖兄然既嗣其位而後之矣况閔立而僖嘗臣之公羊曰臣子一例是也故繼閔之弑不書即位也齊師宋師曹師次于聶北救邢前狄伐邢而齊救之今狄未伐而齊先救之何也前伐邢擾之而已齊用偏師而狄已退今狄既入衞齊桓䇿其必乗入衞之威而以全力偪邢故連三國之師預至聶北以為之援乃不趨所急而有次者將以俟邢之重困而市其徳也韓非子曰鮑叔曰邢不亡狄不敝狄不敝齊不重且救危之功小不如存亡之德大故次于聶北待邢亡也相持至於六月邢畏狄而潰於是有夷儀之遷夏六月邢遷于夷儀左云師逐狄人具邢器用而遷之是齊遷之也以邢遷爲文者邢欲遷也正月次于聶北六月遷于夷儀邢之忍死待救可知也而三國之師不成爲救固不待言矣齊師宋師曹師城邢邢遷夷儀夷儀固邢都矣故直曰城邢邢無力自城而齊城之使足以守故再序三師以著其實盖與之也其於師之次邢之遷不相掩也桓公於魯似治亂之義於邢似持危之德於衛似興滅之仁魯亂由慶父桓以始亂而即除之則其義不彰迨國嗣再絶而髙子來盟以靖其難故魯人至今猶望髙子也邢危衞滅由於狄桓以將危而急拯之則其德不大方滅而遽存之則其仁不深迨邢播遷而城邢以定其國衞野處而城楚邱以續其封故邢遷如歸衞國忘亡世𫝊爲羙談也蓋有事以爲利乘敗以為功其心私其功烈卑故與之而不盡與也秋七月戊辰夫人姜氏薨于夷齊人以歸夷齊地夫人孫于邾曷爲薨于夷蓋桓公召而殺之也變文書人討賊之辭也凡書以歸歸其國也討之是也以歸非也即死所而葬之可矣楚人伐鄭鄭從齊而侵許故也楚之僭王罪應討又改楚爲荆不可云周之建國矣春秋故用外蠻之例以絶之及來聘則接於魯難言荆來聘故書人今仍從周封之名則可以王法正之故從王爵以正名而因事以爲詳略至治其僭王之罪而革其號不論書荆書楚一也𫝊者於來聘書人曰嘉其慕義而進之伐鄭也而亦書人豈嘉其猾夏而進之耶八月公會齊侯宋公鄭伯曹伯邾人于檉謀救鄭也謀而不救何也前嘗救鄭矣不足懲楚㑹而謀之將大舉焉召陵之師權輿於此矣有救而非救次于聶北是也有不救而深於救㑹于檉是也九月公敗邾師于偃哀姜奔邾而邾受之公請於㑹而討之可矣既㑹于檉而敗其師於義何居繼檉之㑹而書之蓋邀其歸而敗之曲在魯也冬十月壬午公子友帥師敗莒師于酈獲莒拏友以賂求慶父於莒莒以兵責賂友敗之而獲其將莒貪而友詐也公賜友汶陽之田及費季氏於是始大仲叔之後皆立於友三桓之禍友啟之也十有二月丁巳夫人氏之喪至自齊哀姜之薨至是一百七十日矣而始至盖齊以其尸歸絶之於魯而魯請之其喪自齊而至魯也前書孫以眀其當絶繼書以歸以眀其當討則其至非也文姜生還莊以爲孝哀姜死至僖以為禮大義之不眀不至於禘廟致主不已其以病僖公也二年春王正月城楚丘齊桓城三國屬辭各異皆以實書城邢者三國之師也城緣陵承鹹之㑹諸侯即㑹鹹之諸侯也略而不序者諸侯城之而齊不與也城楚邱雖與檉之㑹相次然㑹以謀鄭非謀衞也况鄭逼楚自顧不暇何能爲衞執役宋曹既同城邢而齊宋又將㑹江黄惟魯因内難凡役不與故齊命魯獨任楚邱之役觀與城内邑同文可見矣何以不言城衞蓋邢遷夷儀邢未亡也城夷儀即邢矣於城可以言邢狄入衞衞已滅也城楚邱始有衞矣於城尚未可言衞也城邢辭繁不殺此則略之何也衞之亡已渉三載今始城之邢未亡而先城衞巳亡而後城具見桓有厚薄之私焉春秋以大公垂法故略以示譏乃公榖以爲不與齊之専封夫以地畀人而爵之之謂封衞雖爲狄入其爵自若楚邱其故地耳豈齊畀之而爵之哉至齊以伯自居止以楚邱之城爲專其説難通矣夏五月辛巳葬我小君哀姜僖請哀姜之䘮已非矣以小君葬之更不可也虞師晉師滅下陽下陽虢邑而言滅何也虞恃虢虢恃下陽下陽虞虢之塞邑也無下陽則無二國矣故言滅也首謀在晉何以使虞主兵虞貪賂假晉道以伐虢且請先伐虢故序晉上疾之也秋九月齊侯宋公江人黄人盟于貫左云服江黄也江黄近楚楚與國也楚争衡上國則江黄得議其後故服江黄者伐楚之要計也北杏之㑹至此二十有四年諸侯服從迨江黄逺來而攘楚之勢成矣故盟以結之惟宋與盟不煩諸侯也冬十月不雨此之不雨蓋自十月至夏五月每於時之首月書之者見僖之勤雨勤雨者勤民也自首月而巳憂之知所重也楚人侵鄭三爭鄭也齊師不出愼之也三年春王正月不雨夏四月不雨閔雨也歴時則書之無一時而不汲汲也徐人取舒從齊令也徐巳從齊矣齊伐楚必取道於徐及舒齊恐徐之中變也使之取舒所以絶徐於楚因以通伐楚之徑也舒國也變滅言取何也魯頌曰荆舒是懲蓋舒黨楚幾若楚屬邑矣故書取猶云取諸楚也罪舒而恕徐也六月雨喜雨也不雨屢書見公能憂民之憂雨而特書以是爲可同民之樂教人君以謹天災勤民事重國本也秋齊侯宋公江人黄人㑹于陽榖左氏云謀伐楚也去歲盟江黄以定其交矣今再㑹以堅其約而始出其謀蓋使爲犄角之援也江居新息黄居弋陽皆在楚東南諸侯厚集於陘江黄屯守其境楚師一出腹背受敵矣其不戰而來盟江黄與有助焉然惜其不爲江黄久遠計也管仲曰江黄逺齊而近楚楚伐而不能救無以宗諸侯矣不數年而楚伐江滅黄君子蓋深爲桓病之冬公子友如齊涖盟按左氏齊侯爲陽榖之㑹來尋盟公子友如齊涖盟涖盟猶云身親其盟也内辭也蓋齊定計伐楚恐其謀泄故不煩諸侯而召其大夫以戒師期定約束隨其至之先後而命之泯衆㑹之迹故止書魯卿也楚人伐鄭鄭頻受楚師未聞齊救而傳載其臣之言曰齊方勤我背徳不祥然則齊必有使鄭足支楚以待大舉之事而傳不詳耳四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘楚猾夏久矣諸侯環視莫敢誰何獨齊奮而謀伐之北威戎狄南固陳鄭徐舒既服江黄受盟而後大舉其猷逺矣序七國之君見從之者衆也侵蔡者道所必經且披楚黨也潰者民逃其上也軍威既振直舉伐楚伐者明正其罪壯之也蔡微國也安用八國之師蓋逺伐强楚勞師於道使楚得預爲之備非計也故陽爲怒蔡潛師襲蔡隨出楚不意整師臨楚楚初不及知後不及拒矣蓋伐楚其本謀而侵蔡爲先聲也陘楚地進而據險也次止也既讋以先聲復示以形勢楚茍知懼可不戰而服倘其來拒彼曲此直勝在此矣所謂節制之師也詳書之予之也夏許男新臣卒諸侯在師卒則書卒于師許男止書卒蓋陘近許疾而歸也楚屈完來盟于師盟于召陵屈氏完名楚大夫也伐楚爲大舉楚之來者亦不得不詳之也師不出而完來楚服也書來盟于師著其情也楚子不出遽許完盟退之召陵而與盟焉夫以諸侯而盟完耻也故完之來楚子使之也以自來爲文完之盟諸侯盟之也以自盟爲文諱諸侯而病桓也其執言也不敢責楚革僭號返侵疆恐激其怒而決戰也其結好也不敢强楚子使來恐需之乆而生變也師退而楚乘齊釁圍許滅黄敗徐凡捨楚而從齊者胥受荼毒焉蓋量齊師之不能復大舉也惟終桓之世不敢侵鄭則攘楚之效耳王室賴以稍尊中夏賴以少靖一匡之功固亦未可少也齊人執陳轅濤塗轅氏濤塗名陳大夫也齊道陳以伐楚及其還也濤塗畏齊師之復道陳以重病陳也説之還師濵海而東大䧟於沛澤之中顧而執濤塗是濤塗有誤軍之罪矣然道陳而陳憂其病民豈所謂節制之師乎不返已而責人故稱人以執非伯討也秋及江人黄人伐陳齊命也以江黄逺國故命魯及之及不書名微者也八月公至自伐楚以伐楚致者侵蔡所以伐楚致其本事也葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳病齊桓也執之伐之而又侵之巳甚矣諸侯方歸而又勤之已亟矣公孫兹叔牙之子故於其帥師謹而書之髙閌曰書公孫兹帥師則知諸國皆大夫帥師以㑹之矣皆貶而人之則公孫兹與貶可知矣而齊其首惡也趙鵬飛曰明年陳侯與首止之㑹則陳服也陳雖服豈心服乎五年春晉侯殺其世子申生甚晉侯也莫親於父子莫重於世嫡而至於殺者溺於色而蔽於讒也有國家而殺其世子未有不亂者也晉侯殺申生里克殺奚齊又弑卓子夷吾獲於韓原子圍死於髙梁皆是故也女戎一興骨肉不能保其生數世不能靖其亂抑申生之死可謂恭矣然而不如其行也不然則明之也隱忍而死是䧟親於不義也董子曰有國家者不可以不通春秋前有讒而不見後有賊而不知爲人臣者不可以不通春秋守經事而不知其宜遇變事而不知其權爲人君父而不通春秋之義者必䝉首惡之名爲人臣子而不通春秋之義者必陷簒弑誅死之罪若獻公者所謂前有讒而不見故䝉首惡之名申生遇變事而不知權是以不免於死而且陷父於不義杞伯姬來朝其子公羊傳曰與其子俱來朝也伯姬僖公之姑也於禮不得歸寧來巳非矣朝其子更非也父在子不當朝借曰朝焉不必其母之朝之也杞任其來魯受其禮叅譏之夏公孫兹如牟據左氏公孫兹如牟娶焉如牟聘也君命也卿非君命不越境内大夫出境則書其所往重君命也不書娶私事不足書也公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止王世子襄王也書公及諸侯而殊王世子尊之也尊之者定之也世子母弟𢃄有寵於后王欲立𢃄而廢世子然王有其意而未有其事也故齊侯有定世子之意亦不顯其事姑請於王而以㑹爲名於是帥諸侯㑹世子示共戴之而不可易則后之謀塞而世子定矣齊侯之定世子義也惜其雜以權術幾於要君也春秋書㑹王世子嘉其尊世子之意然以諸侯而㑹世子於外亦以見要君之實功罪不相揜也王世子不名别於諸侯之世子也世子無貶者非世子意也或謂世子無王命而㑹諸侯夫世子出入一制於王况失愛而恐懼之時乎若抗父出㑹則大惡矣何得無貶齊桓公之盛烈曰尊周室尊周者莫大乎㑹王世子故公及而列序諸侯辭繁而不殺也秋八月諸侯盟于首止書諸侯盟世子不與也諸侯不敢盟世子故自盟也諸侯不序者一事再見前目而後凡也既㑹以定世子又盟以固諸侯之心㑹以示義盟以立信尊周之義於斯爲篤矣鄭伯逃歸不盟左氏傳曰王使周公召鄭伯曰吾撫女以從楚蓋王惡齊定世子故命鄭無盟且將引楚以抗齊也鄭伯從王命耳何以書逃天王有命不行於諸侯而獨以命鄭乎鄭之從楚舊矣迫於諸侯而在㑹既乃託王命而先歸直書曰逃紀其實也逃者匹夫之行賤之也其從王命歟否歟非所知也故曰治春秋者不廢經而從傳楚人滅弦弦子奔黄楚復張也弦黄姻也江黄受盟於齊而犄楚楚今滅弦所以威黄而侮齊也齊不能救弦而黄又受弦子之奔楚之滅黄始此矣九月戊申朔日有食之冬晉人執虞公此晉滅虞而執虞公也不書滅何虞滅久矣蓋自下陽滅而虢因以滅虞亦隨之矣晉雖戎首實虞滅虢以自滅也且滅者亡國之善辭上下同力也虞自滅不足書滅也虞稱公天子之三公也稱人以執討晉也虞公不名明其爲公義不繫於名也不書以歸若執之晉也虞公昧於貨賄貪以自亡晉人取之如執一夫見虞公之愚而不能有其國也六年春王正月夏公㑹齊侯宋公陳侯衞侯曹伯伐鄭圍新城討鄭之逃盟也鄭貳於楚以楚近而齊逺近易伐而遠之救難待也乃決計從楚齊率六國之師以伐之所以固中國諸侯之心而折强楚憑陵之氣也伐而圍邑將與宋圍長葛楚圍緡同歟非也伐以服鄭不服斯圍之以六國之力圍一邑而不舉盖志不在爲暴也而鄭罪著矣秋楚人圍許圍許以救鄭攻齊所必救也不書救鄭者楚與齊爭鄭耳不足謂之救鄭也且許何罪而圍之乎故書以著其背盟猾夏之罪諸侯遂救許諸侯不序䝉伐鄭也救許則鄭圍釋矣捨鄭以救許是得恤患拯急之義也凡救皆善第書人者救不力書次者救不勇舉諸侯則力也曰遂則勇也許賴以存善之善也伐鄭之役齊不徴兵於許蓋留守其國以備楚也齊計周矣其不能討楚之圍許亦畏其强而不敢輕舉也冬公至自伐鄭致伐鄭者本謀也救許因伐鄭也故以伐鄭致七年春齊人伐鄭救許而解鄭圍鄭猶從楚而未服也故復伐之書人者將卑師少也齊力足以制之不煩諸侯也夏小邾子來朝周武王封帝頊之後挾於邾爲魯附庸挾之後有功又别封其子於郳莊公四年郳黎來來朝今稱子何休以為齊桓公白天子進之遂以爵通也稱小以别於邾也鄭殺其大夫申侯申侯譖陳轅濤塗而諛齊齊賜以鄭虎牢又羙城其賜邑有取死之道矣背齊從楚則鄭伯之志不反已而殺大夫以文過故著其專殺且明殺之不以其罪也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于甯母左云謀鄭也鄭世子華與盟鄭將服而使來聽命也鄭伯不自來慮見執也華謀藉齊以去其父之臣而以鄭附齊是背父而為奸也齊拒之義也而猶許華與盟終以懐鄭也是以鄭伯畏威而懐徳卒至乞盟也陳侯盟首止從伐鄭亦使世子來者陳侯在位四十年矣盖老而疾也曹伯班卒公子友如齊自是公與友迭如齊朝聘於伯主勤矣冬葬曹昭公八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子欵盟于洮按左氏七年閏月惠王崩襄王惡大叔帶之難懼不立不發䘮而告難於齊八年春盟于洮謀王室也定位而後發䘮考之經文冬十二月丁未天王崩則八年春天王尚在也秘不發䘮或取權於旬月者有之矣不可以經年且叔帶母弟更難以秘䘮欺也然以王人受命與諸侯盟諸侯盟王人而均無譏則王室之有難諸侯之同奬王室可知矣王人下士也序於方伯諸侯之上尊王命也鄭伯乞盟書乞盟鄙之也有前之逃不得不出於乞也乞盟不言使大夫親至㑹也然則得與盟乎曰觀次年葵邱得與則此盟得與可知矣乃不序而别言之者賤鄭伯之不明大義而輕於去就也夏狄伐晉乘晉亂也世子殺公子亡國内不協故狄乘之釁起房帷變生敵國可畏哉秋七月禘于大廟用致夫人夫人左以為哀姜是也致者致其主於廟也哀姜薨八年矣今始致何也蓋以罪致討雖殯葬如禮然疑而未祔於廟今因禘而卒致之非禮也冬十有二月丁未天王崩志崩不志葬魯不㑹也九年春王正月丁丑宋公御説卒宋桓公也輔齊以圖伯凡安内攘外之事無不從也滅小降弱之事未嘗與也亦賢君哉不書葬不往㑹也夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘襄王初立惠后猶在叔帶伺釁桓請王命而㑹諸侯王亦出重臣以臨之而奸謀戢矣然桓果能帥諸侯以朝王而聽命焉天王自尊叔帶不足慮矣乃於衰絰之中而講㑹盟非禮也逺致天子之宰於葵邱非度也北伐山戎南伐楚西為此㑹名為尊王實圖伯而巳矣宰周公以冡宰而兼三公也不殊㑹之者宰周公亦人臣耳非世子儲君比也宋子宋襄也喪未踰年故稱子背殯出㑹非禮也君子不奪人之喪亦不爲人奪其喪齊侯宋子皆過矣秋七月乙酉伯姬卒伯姬不稱子公姊妹也内女為夫人繫國不繫國未適人也何以書卒許嫁於諸侯也許嫁不為殤也九月戊辰諸侯盟于葵丘書諸侯盟周公不與也陳傅良曰桓於洮之㑹序王人於諸侯之上而同盟焉於葵邱序宰周公於諸侯之上而不敢同盟焉於首止不敢盟世子且帥諸侯以㑹世子焉桓知節矣是也夫自再盟幽而諸侯協治戎却狄帖楚而列國安㑹首止及洮而王室寧至葵邱而伯業盛矣經於其事而以恒辭書之不震其功而律以禮以王道治之也甲子晉侯詭諸卒公羊作甲戌晉侯外滅人國内殺其嫡身殁而亂宜哉冬晉里克殺其君之子奚齊嗣子遇弑雖未逾年稱君齊舍是也舍正也此書君之子何非正也不當立而奪嫡也不書弑不成君也十年春王正月公如齊魯始朝齊也宗國且然他國可知矣諸侯諂伯主肆故書之以傷王室之日微也狄滅温温子奔衞温在王畿狄滅之無王甚矣齊桓若不聞焉深責齊也晉里克弑其君卓及其大夫荀息卓亦庶也書弑者正其為里克之君也里克好勇而不知義當申生之被讒以死也不能爭而欲以中立茍免申生既死君立奚齊矣里克悍然不顧君臣之義而殺之然猶云有奪嫡之嫌也今荀息立卓則又弑卓其無君而怙亂也甚矣故成其君臣之名以正其罪前書殺其君之子繼書弑其君深罪里克也荀息從君于昏而書及書官者能守信以死君難視茍免者猶愈焉夏齊侯許男伐北戎時狄益熾禍及王畿不此之懲而伐北戎所謂不務徳而勤逺略乎况許近楚有楚患驅之北伐非義矣齊桓自召陵以後其志日驕故逐小利而遺大計也晉殺其大夫里克里克弑君乃稱國以殺而不去其官者晉惠不以賊討之而祗恐其不利於已也惠公賂以求入里克實迎立焉惠公固幸卓之死而竊其位但見克弑二君易若反掌又疑其志在重耳而不在己故殺之則殺之私也春秋推見至隐故以專殺之罪罪之懐私以討克雖死不服也秋七月冬大雨雪周之冬酉戌亥月也總三月而大雨雪失時也且恒寒為災故志也十有一年春晉殺其大夫㔻鄭父㔻鄭里克之黨也晉惠公賂里㔻以有晉復以私殺之郤芮贊君以報私怨其濫刑也皆以行其私也故稱國以殺而不去其官君與用事大夫同責也夏公及夫人姜氏㑹齊侯于陽榖夫人聲姜也逆至不書得禮也姜為齊侯之女歸寧可也與於㑹不可也書公及夫人婦從夫之辭與文姜異矣然禮謹於㣲其防一潰其流遂不可禦書之以明别逺嫌使人知禮法之大閑也秋八月大雩僖公初政勤於為民故雨不雨備書之今之夏方挾夫人與齊為陽榖之㑹志不在民矣旱至八月而雩亦具文耳觀春秋書法而僖之始勤終怠具見矣冬楚人伐黄為其從齊也盟貫之初不敢伐者齊勤也召陵之後反伐之者齊怠也方寸之敬肆千里之外見之矣書曰無怠無荒四夷來王十有二年春王三月庚午日有食之不書朔官失之夏楚人滅黄滅不書伐此特書之者見被伐久矣告問已至而齊不救以至於滅也江黄小而近楚既慕義而從齊矣楚憤而滅之齊坐視而不之救其志荒矣書之以閔黄惡楚而深責齊也不書出奔亦不書以其君歸胡安國謂國滅君死於其位得正焉而斃於禮為合於時為不幸者是也秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衞以衞納温子也狄滅温矣温子奔衞狄尚欲得而甘心焉亦横甚矣戎亂王室楚滅弦黄狄滅温而侵衞復侵鄭淮夷病把由桓失伯職也驕心一生戎馬四起可畏哉夏四月葬陳宣公公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹左氏傳云淮夷病把故且謀王室也然則為把者諸侯之本計其勤王祗兼及耳失重輕之衡矣故𫝊雖有致戍之事而經不書趙汸曰狄滅温而不能救也戎犯京師而不能斥也而相與致戍方伯所以蕃王室者如斯而已乎戍周不書不足書也秋九月大雩冬公子友如齊陽榖之後友如齊而伐楚甯母之後友如齊而盟洮鹹之後友如齊而城縁陵志專政也十有四年春諸侯城縁陵左云城縁陵而遷杞焉不書其人有闕也夫一事再見而不序者前目後凡也此即㑹鹹之諸侯也然夏㑹而春城無三時止鹹之理盖再㑹也非前目後凡之例矣桓徳既衰命諸侯城之而為徳不周故再㑹而不序略之也夏六月季姬及鄫子遇于防使鄫子來朝左氏傳云鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝季姬不繫鄫絶之於鄫也姬聞鄫子有事過防邀而遇之因使之朝也盖前此把伯姬來朝其子矣魯以故而怒鄫子之不朝非不以禮自處復不以禮處人者乎以怒而絶昏於鄫鄫子本不朝而使於其婦皆非也惡魯而賤鄫子也秋八月辛卯沙鹿崩沙鹿山名山崩變之大者故志之日食星隕山川崩竭繫之天下有天下者之責也諸侯有土則境内山川守土者固亦不得辭其責沙鹿崩而天王出居其山在晉而晉侯見獲有天下國家者在謹人事慎所感而已狄侵鄭狄在西北今侵衛而至於鄭幾與楚合矣鄭天下之中也楚禍南至狄禍北來楚狄交横而齊不一救益以見桓公之志不在諸侯也冬蔡侯肸卒獻舞之子也父獻舞獲於楚而卒肸立而堅於從楚齊桓公之伯也雖國潰而終無從伯之志君子深惡其忘父事仇下喬入谷也十有五年春王正月公如齊十年公如齊今閲五年又如齊夫五年一朝所以事天子也魯行之齊受之均罪也楚人伐徐楚滅黄齊不救楚遂揚兵伐徐向之從齊以病楚者楚悉攻之無齊也有以窺齊桓公之志怠而不能救也三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐徐近齊勢不得不救㑹諸侯救之可矣先盟之不協也既盟而次徒張虚聲幸楚之退其救之不力可知也諸侯在㑹而使大夫救之不成為救也桓徳益衰諸侯益離而大夫遂專政也救衞無功而王命不行救徐無功而伯令亦不行矣公孫敖慶父之子也友帥師兹帥師敖帥師三家之盛所由來矣夏五月日有食之不書日與朔官失之秋七月齊師曹師伐厲左云伐厲以救徐也徐無罪而楚伐之厲復何罪而齊伐之乎同為暴也是悖乎理也形格勢禁者攻其所必救而厲非楚所必救也是惛於勢也齊悖理矣豈惛於勢乎盖不敢當楚而無辭於徐姑分師以伐厲名為救徐實避楚也齊師既移諸侯之大夫無固志而楚益無忌也八月螽頻旱又螽志災以閔民也九月公至自㑹公以九月至則知齊曹伐厲而諸侯皆歸矣以㑹致者救徐無功也季姬歸于鄫内女初嫁曰歸來寕而返亦當曰歸常事不書也此書之明中絶也己夘晦震夷伯之廟朔晦必書月之始終也震者天之威怒也夷伯魯大夫也劉敞曰夷氏也左以夷伯為展氏則夷為展氏之諡非也雖貴卿必繫字於氏原仲髙子皆繫氏臣無舉謚於君側者也是也伯字也臣既卒矣舉字者史文也夷伯之廟震而書震夷伯之廟者必人為有以感之而天應之也君子知天之日鑒而畏其威所以事天也冬宋人伐曹齊伯至此三十餘年諸侯無擅以兵相加者今桓徳衰矣雖同盟之宋且叛齊伐曹以修怨焉夫曹於莊十四年從齊伐宋乃伯討耳且有陳焉事又易世今乃修怨乎蓋乘齊衰而圖伯也圖伯而首壊盟以虐與國更出齊桓下矣楚人敗徐于婁林以八國之衆不敢敵楚卒使徐敗伯業之隳怠荒乘之也十有一月壬戌晉侯及秦伯戰于韓獲晉侯重耳夷吾同出而夷吾弟也不當立而賂以求入簒也秦利其賂而納之貪也以公言之均罪也夷吾背秦惠三施無報以來秦師又不以禮下之而遽與之戰以私言之則秦直晉曲矣故以晉及戰深罪晉也韓晉地戰不言伐戰於晉地伐不待言也經書戰而君獲惟此賤之也不書以歸穆姬請而釋之也劉敞曰君獲不言師敗績君重於師也黄仲炎曰秦以爵書無吴楚之僭也欽定四庫全書御纂春秋直解卷五下十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都星隕至地爲石莊七年書星隕本其上而言此書隕石據其下而言後數散辭也散隕宋境計之乃得其數故繫以五鷁退飛風驅之也先數聚辭也羣飛而過宋都舉目卽得其數故冠以六隕石不言星鷁退飛不言風皆本其可見者而言石鷁人所共見其爲星爲風則非所見也謹物異以念庶徵也三月壬申公子季友卒季氏之始也友名季其行次也大夫卒書名其兼書行次者季友仲遂叔肸三人而已友爲僖之叔遂爲宣之叔其行次先君之行次也肸為宣之弟其行次今君之行次也序行次者其君所厚䘮有加禮也友忠也書公子肸賢也書公弟遂逆也則削其公子矣春秋錄善癉惡故其辭異胡𫝊以季友仲遂爲生而賜氏俾世爲卿夫世卿多矣獨友與遂乎夏四月丙申鄫季姬卒秋七月甲子公孫兹卒公子牙之子也是爲叔孫氏冬十有二月公會齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮淮夷病鄫桓爲會以謀之且博東畧之名也旣而城鄫不果則其志益怠而伯業益衰矣許以男而先邢曹邢以侯而後鄭許非禮也邢未嘗與齊會盟意欲伐衞故自請從會以求親於齊乎十有七年春齊人徐人伐英氏報楚婁林之役也楚敗徐而英氏受兵可乎夏滅項内滅國諱書取此書滅何公在會也然則孰滅之執政者滅之也友卒而公任仲遂爲政後此如楚乞師帥師入把者皆遂也意此亦遂爲之乎春秋爲君諱尊之也不為臣諱責之也秋夫人姜氏會齊侯于卞齊侯歸自會道由乎魯夫人會之於卞前此陽穀之會猶從公俱出今公未至而夫人獨出非禮甚矣左云公以滅項爲齊所止夫人會齊侯請而釋之然考之於經繼書公至不云自齊而云自會安在其為見止乎如使見止雖諱其名不應没其實此傳者之辭未足據也九月公至自會會淮而返飲至於廟也公與齊會淮齊伐英氏而公經畧淮夷魯頌所詠其卽此歟冬十有二月乙亥齊侯小白卒周道陵夷齊桓創伯以尊王安攘爲事一匡之績聖人之所許也然五伯者三王之罪人則桓公者功之首而亦罪之魁歟且一人之身前後頓異管仲相則治三豎用則亂蓋桓本中才志在功利其始也屈己糾合以成伯業旣而志得欲從遂至驕怠卒之溺於内嬖繼嗣不定身没而亂非不幸也十有八年春王正月宋公曹伯衞人邾人伐齊伐齊以納公子昭也桓無嫡而無虧爲長齊人立無虧昭奔宋左云桓與管仲屬昭於宋襄以爲太子故宋納之夫桓自立其子何藉於宋蓋宋襄前已伐曹以爭伯今因昭奔宋因誣曰桓嘗屬之故伐齊以納昭昭立則齊從宋天下孰敢不從宋是撓齊而巧於求伯也春秋推見至隱不書納而書伐以爲宋志非納也直伐䘮以亂齊而已矣故書以深惡之曹衞邾從宋爲宋欺也夏師救齊諸侯非王命不得擅興師然用之於救猶有取焉急鄰難也况齊前使高子定魯而可不報之乎書以善救而伐者之惡愈見矣五月戊寅宋師及齊師戰于甗齊師敗績此宋公也變文稱師者用衆爲暴則師爲重也穀梁曰戰不言伐客不言及蓋伐與戰均罪也書戰而伐可知矣今宋戰矣而先書伐以惡宋也凡受伐者有辭宜以禮諭之無辭宜以禮下之不能諭不能下則戰矣是戰成於受伐者也故客不言及也今以宋及何也宋旣脅殺無虧而四公子與昭之長幼猶當辨也宋仍必欲立昭則此戰宋實尸之故首宋也書敗績憫齊也桓公之澤斬矣曹衞邾從宋魯救齊不序於戰者畧之也狄救齊予救也苟有善雖狄必予之齊師旣敗狄救無及矣苟爲善雖無功必予之勸善之心無已也秋八月丁亥葬齊桓公九月始克葬亂故也冬邢人狄人伐衞衞從宋伐齊罪也然邢不早出師救齊乃結仇讐而伐同姓可乎狄稱人便文爾救齊無功移師於衞是仍前入衞之志穀梁曰進之誤矣善救齊而惡伐衞進退之權無成心也如此十有九年春王三月宋人執滕子嬰齊滕非有罪也宋圖伯而首執國君以立威又不歸之京師故稱人以罪之至盂之會而已亦受執也出爾反爾信哉諸侯卒書名名者終事也執而不返終於執矣故亦書名夏六月宋公曹人邾人盟于曹南曹南曹國之南也此宋約曹邾盟也乃不地而于曹南者曹未服也廹於宋而勉從之故方出國都而盟是要盟也鄫子會盟于邾己酉邾人執鄫子用之曹介宋邾之間旣盟宋公南歸邾子東返邾又東則鄫鄫子因盟來會後期至邾故書會盟于邾邾人執之者意與鄫有怨因宋憾鄫留鄫子而請於宋宋命執而用之耳左云用之於次睢之社以屬東夷同爲國君而用若犬豕尚有人理乎然不書宋使何宋召盟而邾用之邾承宋命可知且陷鄫子者實邾也杜預曰以邾用爲文者南靣之君善惡自專不得託於他命是也鄫子不名史失之秋宋人圍曹曹雖與盟而猶未服宋自省德可也乃輕動干戈甚至圍其國都乎半年之間執滕用鄫圍曹暴且急矣伯猶假仁此則眞不仁哉衞人伐邢衞不反已而復怨且舍狄而伐同姓故罪之冬會陳人蔡人楚人鄭人盟于齊會者誰公也首陳何也左云陳請修好於諸侯以無忘齊桓之德也夫不忘桓德請於桓之舊盟可耳何援楚而入之盟是知陳之請楚之謀也楚列齊盟自此會始蔡舊從楚鄭新從楚皆楚黨也齊棄先志延之國都而與之盟紊中外之防而爲諸侯患故於此諱公而人諸侯謹之於始也梁亡梁伯好土功輕民力虐用其民疲而内潰非有侵伐而滅之者故以自亡爲文國滅聖人之所傷惟自亡者雖亡有餘責焉書曰用顧畏于民碞懼自亡也二十年春新作南門南門天子五諸侯三言新有故也作則有加其度矣春則非時矣夏郜子來朝趙鵬飛曰郜滅久矣隱十年公敗宋師取郜卽其地郜文之昭也與魯同姓意宋滅之而魯封之乎然不見於經諸姬之存者僅矣書之蓋傷之也五月乙巳西宫災西宫小寢也災則書無㣲而不當謹也鄭人入滑滑嘗同盟於幽又在畿内而鄭入之故書以罪之秋齊人狄人盟于邢於是衞病邢蓋將爲邢謀衞也齊桓之伯也北伐戎而南伐楚齊孝之立也南盟楚而北盟狄不子矣邢屢比狄而謀衞失計矣冬楚人伐隨楚加兵於隨屢矣不見於經者告命有缺也旣引之同盟故假告命爲恐動諸侯之計二十有一年春狄侵衞侵衞爲邢也然適足速邢禍耳書以責邢結外援殘同類而卒以自殘也宋人齊人楚人盟于鹿上左氏曰宋人爲鹿上之盟以求諸侯此盟本宋公也而稱人者圖伯而求楚與之同盟自取敗辱不足為伯也齊與盟何也宋挾齊爲重齊孝公屈於立已之德不得已而從之故首宋也以是知宋襄立昭之心矣一立昭而齊楚咸居宋下不居然伯乎不知楚蓋姑與之而隂圖之而宋不悟何其愚也夏大旱旱經時久也大則甚也秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋鹿上之盟楚許宋以諸侯故會以定之宋不足主會而首宋者楚陽推之也諸國皆後楚名爲伯宋實伯楚也宋與諸國皆稱爵者荆蠻陵諸夏而執會主其變爲大不得不詳之也楚書子正名也宋所恃惟齊而齊不至陳蔡鄭許皆楚黨曹又宋仇也見執於楚宜矣不書楚執者諸侯在會拱手以聽分惡於諸侯也以伐宋甚之也非公子目夷宋不幾亡乎然則宋公之罪愈不容揜矣與僭王之楚會盟且下求焉德不足懷慮不及遠辱身敗國宜哉冬公伐邾楚執宋公諸夏之恥乃間之而伐邾乎書以病公也楚人使宜申來獻㨗楚人蓋楚子也烏乎㨗㨗乎宋也來獻者威魯也古者諸侯獻四夷之㨗於王王以警於夷今楚乃以㨗於中國者警中國乎魯不能正辭拒楚故㨗不言宋爲内諱也十有二月癸丑公會諸侯盟于薄釋宋公此會盂之諸侯也薄宋地諸侯從楚伐宋已踰時矣猶在宋地復從楚盟是諸夏胥從楚矣書會諸侯而不書會楚者不與楚專釋以存中國也會盟同日者盟非預約公畏威而來卽會卽盟也盟而卽釋楚威已伸盟與釋惟楚意也宋公不言歸而言釋自投陷穽賴人而釋無歸道也諸侯復歸猶書名此不名者未失國也二十有二年春公伐邾取須句按左氏邾人滅須句公伐邾而反其君須句風姓太皞之裔也旣反其君矣曷以滅國罪之蓋使爲魯附庸也則是魯取之耳陳傅良曰春秋嚴義利之辨苟以爲利雖反其君書取也夏宋公衞侯許男滕子伐鄭宋公釋於楚當悔過自乂乃怒鄭朝楚遽伐鄭以致楚何不自量之甚也三國猶從宋者懼楚之暴而欲中國之有伯也秋八月丁未及邾人戰于升陘及者公也内戰不書敗書戰卽敗也傳曰邾人獲公胄懸諸魚門是魯敗也記曰邾婁復之以矢自戰于升陘始也邾亦敗也不書公不書敗爲内諱也是知取須句非興滅之公矣冬十有一月己巳朔宋公及楚人戰于泓宋師敗績以宋及戰深責宋也不知義而妄戰殘民命以圖雪恥其致敗也宜矣汪克寛曰宋公身傷不言宋公敗績猶爲宋諱若鄢陵之戰直書楚子敗績矣楚子救鄭不書救又稱人㣲之也亦惡之也二十有三年春齊侯伐宋圍緡宋敗於泓楚益張矣齊侯無志於攘楚而救宋則已昧於大義矣今更助楚爲虐故書伐書圍以重其罪夏五月庚寅宋公兹父卒傷於泓故也魯畏楚而不會故不書葬也秋楚人伐陳左云討貳於宋也自曹南之盟陳不從宋其後盟齊會盂伐宋亦並從楚未見貳於宋也據傳楚子玉城頓而還意頓舊屬陳楚蓋伐陳以争頓耳冬十有一月把子卒二十有四年春王正月夏狄伐鄭據左氏鄭伐滑王使如鄭請滑鄭不聽而執王使王怒出狄師伐鄭鄭雖當討用狄則非不書王命者諱王之啟冦以滅親也不使狄之假命以猾夏也尊王而諱之惡狄而正之愛中國而存之意深哉秋七月冬天王出居于鄭避子帶之難也襄王之爲世子以母后寵弟帶而幾廢及帶招戎奔齊王猶反之帶乃搆狄攻王是不能制之以義早爲之所畀頽叔桃子以招狄之柄而假之羽翼以及於難書出言自棄宗社也諸侯以非道出曰奔天王以非道出曰居眀無外也侯國皆其有莫非王土也于鄭者圖於鄭也怒鄭而使狄伐之怒狄而與鄭圖之比事以觀失自見矣晉侯夷吾卒秦納重耳入立不書不告也二十有五年春王正月丙午衞侯燬滅邢春秋書滅國多矣滅同姓者亦不一矣衞侯何以名尤惡其挾詐也左氏云衞將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕衞伐邢二禮從國子廵城掖以赴外殺之遂滅邢葉夢得曰滅國之罪不待貶而見春秋之義常致意於所難察故殺蔡侯名楚子惡誘殺人之君也滅邢名衞侯惡誘滅人之國也夏四月癸酉衞侯燬卒文公再造衞詩載定之方中規模遠矣齊桓之伯無役不從晚從宋襄伐齊伐鄭已又滅邢耄而荒矣宋蕩伯姬來逆婦蕩伯姬魯女而歸蕩氏者也姑逆婦非禮也何以書公主之也亦非禮也宋殺其大夫罪專殺也不名史失之秋楚人圍陳納頓子于頓頓子廹於陳而奔楚故楚納之陳信有罪矣諸侯不救而假楚以廢置之權以圍示威以納示德楚之勢於是成矣葬衞文公冬十有二月癸亥公會衞子莒慶盟于洮莒以季友獲挐之故與魯絶衞文公嘗欲平之故衞爲此盟莒子疑魯未肯平乃以大夫聽命衞稱子未踰年也二十有六年春王正月己未公會莒子衞甯速盟于向申洮之盟也莒子來信之也公復會勤莒也衞知魯莒可平故不再出而使大夫也洮向二盟莒衞竟以大夫敵公非禮也然不諱公者猶以釋怨許之也齊人侵我西鄙孝公以爭國與魯有隙其盟於齊怨已釋矣乃因衞莒之盟潛師爲暴至夏又伐魯北鄙比書之罪自見矣公追齊師至酅弗及侵稱人舉將也追稱師明衆也酅齊地敵至不能應去始追之無備也敵旣出境追而至酅深入也將及之矣畏衆而反又何怯也魯之軍政如此其謀國疎矣夏齊人伐我北鄙衞人伐齊洮向之盟故也然洮向以釋怨顧乃報怨以結怨乎春秋明大義不貴小諒書以罪衞也公子遂如楚乞師乞重辭也又卑辭也已之師不以義動猶不可况人之師乎軍政不修求援友邦已非立國之道况下求荆蠻乎齊雖無道乃引楚以殘甥舅之國非義也示弱啟侮且使楚禍遠及於齊非謀也秋楚人滅夔以夔子歸祀不過祖夔祖熊摯楚乃以不祀祝融鬻熊責夔乎夔以正對而楚終滅之貪其地耳滅國爲大惡况同姓乎况無罪乎抑夔上游之國也夔滅則通於巴蜀楚益富强春秋所懼也夔子不名史失之冬楚人伐宋圍緡宋為望國楚忌之必欲翦滅而後已書伐書圍著其橫也公以楚師伐齊取穀魯乞師於楚楚利得魯以師赴之魯倚楚得齊邑公自以爲得計矣不知倚楚必事楚事楚者以國與楚也以國與楚而博齊之一邑可謂不知類矣公至自伐齊不義而反以為功告至策勲危之也受德於楚結怨於齊楚將責報無己齊亦將報怨無己向非晉文之伯魯其危哉二十有七年春把子來朝夏六月庚寅齊侯昭卒孝公乘亂爭國盟楚狄而伐宋魯雖席父威而卒不振宜哉秋八月乙未葬齊孝公乙巳公子遂帥師入把左氏云責無禮也伯姬託其子於魯今嗣位來朝執禮恭矣而師入其國慿弱犯寡已實無禮何以責人遂帥師惡專也乞師伐齊帥師入把東門氏之惡兆於此冬楚人陳侯蔡侯鄭伯許男圍宋楚主兵故首楚此楚子也而稱人抑之也四國稱爵而列其下罪從楚也前圍邑今且圍國志必滅宋也十有二月甲戌公會諸侯盟于宋圍宋而盟約久圍也圍宋則宋公不與審矣何以書盟于宋蓋盟于宋之國外不可别言地也公初不與圍以受楚惠且畏其威故往會没楚子而書會諸侯諱公惡也是時諸侯從楚者幾半天下伐齊圍宋勢蓋岌岌焉㣲城濮之戰天下尚可問乎春秋是以不没桓文之功也二十有八年春晉侯侵曹晉侯伐衞晉侯者重耳也楚伐齊而圍宋宋告急於晉狐偃曰楚得曹婚衞伐曹衞楚必救之則齊宋免矣其侵與伐皆以致楚也兩書晉侯者侵曹旣反而後伐衞蓋兩事也不書救宋者據事書之謀隱而事著也公子買戍衞不卒戍刺之晉伐衞而魯戍之從楚令也公懼晉乃殺買以免而告楚人曰不卒戍也誣殺以説晉詭辭以説楚持兩端以觀勝負得免伯討幸爾刺傷也諱專殺而輕其辭也楚人救衞凡書救多善此以衞附楚而楚救之非善楚也病晉也衞附楚可罪求盟亦可免而晉弗許以衞爲楚所必救志在致楚也謀雖工而道則小矣三月丙午晉侯入曹執曹伯畀宋人晉伐衞以致楚楚分師以救衞尚未肯釋宋悉師而來也挫其偏師使知難而退則楚未大創未可制也因移師臨曹入其國而執其君且以畀宋則楚不得不悉師一决所以成城濮之功也然入曹暴矣執曹伯無禮矣不歸京師而畀宋人非義矣夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績此戰宋公在焉獨爵晉而三國稱師者予晉伯也蘓轍曰春秋書始得諸侯者好㑹稱人兵會稱師是也晉及戰晉志也書楚師敗績見其用衆爲晉所致也趙鵬飛曰晉文功與齊桓同而勢則異桓難於合諸侯而易於制楚文難於制楚而易於宗諸侯桓之興諸侯未識所謂伯必屢會屢盟而後服其時楚方張侵伐不出蔡鄭故久而後問其罪期於服而已文之興諸侯習於從伯一揮而至矣然楚之强非曩時比師臨齊宋之郊自東以南皆楚矣非大勝之無以奪其氣而定諸侯之心文一戰而伯可謂一時之偉績矣楚殺其大夫得臣戰稱人畧之也惡猾夏也殺書官書名詳之也惡專殺也得臣有罪楚又自外於王化猶不與其專殺者天子之治無外也衞侯出奔楚懼晉也使元咺奉叔武以守未有二君故不名晉敗楚功也執曹伯出衞侯罪也功罪不相揜也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土同奬王室也晉侯序齊侯宋公之上伯業定也齊先宋以强弱為次也魯衛附楚蔡鄭從楚圍宋莒則與魯衞爲好者也一勝楚而皆至矣衞子叔武也武奉命攝位宜書弟或書字今稱子且序莒上是晉文立之也武不敢以成君自居降而稱子子者世子嗣位而未成君之稱非其名矣莊二十七年王命齊桓爲伯此亦命晉文爲伯皆不書者二公非實能尊王以盡伯職故削之也陳侯如會陳服也來不及盟故書如會不再盟不凟也公朝于王所諸侯朝王於京師廵狩則於方岳曷爲言王所非其所也來踐土而勞晉也不書勞晉全天王之尊也公朝則諸侯皆朝可知第晉不能帥諸侯以朝京師伉也諸侯因晉召盟而始朝怠也故削之而止以公朝見意焉胡安國曰春秋不以就朝爲非而以非其所爲貶正其本之意也六月衞侯鄭自楚復歸于衞晉不早復衞侯懼而出奔奔不名罪晋也今名之失國也且以其自楚歸也衞元咺出奔晉爲殺武而訴於晉所訴雖直然亂君臣之分矣陳侯欵卒秋杞伯姬來爲杞謝過也兩國之好婦人通之非禮也公子遂如齊伯姬來入把之怨釋遂如齊取穀之憾消伯權立而諸侯不敢私用兵也冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温左云討不服也從楚圍宋者四國獨許未服故謀討之陳稱子居䘮也踐土之盟使衞之臣奪君位温之會使陳之孤奪父䘮非禮也秦始與會睦於晉也天王狩于河陽是晉侯召王以諸侯見也變文書狩若王之時巡焉尊之也温在河陽書河陽大之也諱就諸侯於温也春秋尊王而全其名所以明王道也果其省德修政安見東周不可爲乎聖人尊周而欲興之無所不致意焉壬申公朝于王所河陽宻邇周京不朝京師而於河陽䙝矣是晉令也晉於一年之中兩帥諸侯以朝雖朝禮未盡春秋猶有取故河陽書狩尊周也亦全晉也晉人執衞侯歸之于京師元咺訴故也君臣無獄乃爲臣執君乎歸之于京師者緩辭也自治其獄獄定而歸之專擅甚矣且衞禍成於晉逐衞侯立叔武使兄弟相疑彼元咺亦窺晉惡衞侯而訴君耳衞元咺自晉復歸于衞諸侯之國世守之故可言復大夫之位君命之不可言復言復者抗辭也書自晉深罪晉也諸侯遂圍許諸侯不序䝉温之㑹也遂繼事也圍宋之役許實從楚踐土會盟許復不至是其自取云爾曹伯襄復歸于曹遂會諸侯圍許晉釋之也何以名晉侯疾曹伯貨筮史以復曹也劉敞曰衞侯以殺叔武名曹伯以賂反國名其惡不同其貶一也是也二十有九年春介葛盧來介國名葛盧其君也名之未命也書來者不能行朝禮畧之也公至自圍許圍許逾年不能服以圍許致者温之本謀紀實也夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉謀伐鄭也晉文召王而朝受訴執衞因疾復曹諸侯其窺之矣故許不服而鄭亦貳不自反而謀伐之晉志驕矣諸侯同盟王官莅之不與盟也洮之盟王人始與焉然猶敵諸侯也今則大夫敵之矣胡安國曰翟泉近在王城之内而王子虎下與國卿盟是謂上替國卿上盟王子是謂下陵故國卿貶稱人而王子亦與焉端其本之義是也公與盟而不能正其失故諱不書公秋大雨雹雨雹以大爲異且害稼而爲災也不書月日史失之冬介葛盧來春來公在外故又來非修禮也蓋將假道以侵蕭耳三十年春王正月夏狄侵齊晉文之爲公子也在狄久狄恃其寵故敢乘間而侵齊晉方主伯以安攘爲事置狄不問非義也秋衞殺其大夫元咺及公子瑕衞侯未入而殺元咺稱國者衞侯賂周冶而殺之也咺罪當誅而書官衞侯志在入國非眀正其罪也瑕則咺所立也書公子不予咺之立君書及見罪起元咺也意瑕尚幼而咺立㓜以擅國乎則瑕無罪也而衞侯賊殺其親之惡著矣衞侯鄭歸于衞歸不言復絶之也始歸而殺武再歸而殺瑕是長惡不悛雖得國而義不可以有國也不書自京師制在晉也趙鵬飛曰書歸于衞則命不係於王而權亦不歸於晉使若衞侯之自歸也晉人秦人圍鄭翟泉謀討鄭討而圍國暴也不見德而惟虐是聞而秦助其虐故皆稱人以貶之圍鄭不服伯業衰矣且約秦非計也秦虎狼之國導之使見諸夏之弱而有雄心釁起入滑禍延數世而不已則晉文之過也介人侵蕭再來魯而遂侵蕭惡介且罪魯也冬天王使宰周公來聘襄王以晉文兩合諸侯而朝之遂以三公下聘蓋因聘晉而歴聘朝王之諸侯非特聘魯也禮雖有王聘之文然必諸侯朝而後王有聘魯兩朝王所因晉而就朝非能朝也王不能正王法而下聘所使者又以冢宰而兼三公王室陵夷大臣失職亦甚矣公子遂如京師遂如晉公不入覲以拜王命之辱乃使陪臣報聘且如京師如晉以二事出是夷周於晉也春秋書遂若大夫之專事者爲魯諱惡且尊王也李廉曰此與成十二年公如京師遂會伐秦書法相似此本以二事出春秋則以如晉爲遂事不敢以王事同伯事也彼本以伐秦出春秋則以伐秦爲遂事不敢以伯事先王事也三十有一年春取濟西田外田必繫國不繫國魯故田也何以書取晉侯入曹班所侵地於諸侯魯於是取濟西田則是介晉力也鄆讙龜隂田復之以禮故曰歸濟西田與汶陽田皆返之以力故曰取雖返故田而不以道與力奪人田者同科若曰取非其有者耳公子遂如晉拜取田也周以禮聘晉以利啗一如周而再如晉知伯不知王知利不知義矣夏四月四卜郊不從乃免牲猶三望王以冬至祀上帝又以夏之孟春祈穀於上帝禮行於郊故曰郊魯以周公故遂得用祈穀之郊蓋僭禮也然嵗事之常不勝書每因變而書龜違者四牛災者四大非時者一蓋因變以著僭爲後世戒也日至有常期祈榖用辛則卜日於前一旬卜之不從更一旬而再卜卜不過三四卜非禮也免縱也牛在滌三月曰牲不郊猶卜免牲從則免不從則繫以待庀牲也周禮大司樂舞雲門以祀天神舞咸池以祭地示舞大韶以祀四望舞大夏以祭山川四望附乎天山川附乎地魯止三望降於王也望郊之細不郊而猶望好僭也秋七月冬把伯姬來求婦夫人之教不施境中况與鄰國締姻乎蕩伯姬逆婦非姑道也把伯姬求婦非母道也狄圍衞狄愈張也前侵齊晉不討故又圍衞晉之於衞伐而出之訟而執之今被圍而不之救視齊之存三亡國何如也然則桓文烏可並稱哉十有二月衞遷于帝丘避狄難也國之興亡在德不在險社稷之主不可以輕動周有西戎之難東遷而遂衰楚有羣蠻之叛不徙而復振唐西幸而亂宋南渡而弱書遷帝邱垂戒遠矣三十有二年春王正月夏四月己丑鄭伯㨗卒衞人侵狄秋衞人及狄盟按左氏狄有亂衛人侵狄狄請平衞人及狄盟夫衞被狄患國凡再遷幾不國矣今乘狄難而侵之迨其旣屈遂卽其地而盟之自是狄勢稍戢蓋狄情畏强侮弱而衞制之得其機也然制敵有機自治有道道之不修非本計也冬十有二月己卯晉侯重耳卒晉文經歴險阻發憤爲雄城濮踐土幾軼齊桓而上之然急功尚詐視桓之猶以德禮屬諸侯遠不逮矣乃桓没身遂衰而晉屢世伯者桓初任管仲後用三豎文之從者皆卿材也三軍之帥讓而上德故子孫賴之維持不替得人者昌信哉三十有三年春王二月秦人入滑秦助晉圍鄭乃竊與鄭盟而戍鄭及文公卒復聽杞子而謀襲鄭鄭有備謀不遂故滅滑書入者不能有其地也本謀襲鄭以未及而滅滑故畧之也齊侯使國歸父來聘報遂之聘也遂聘於今四年矣何報哉蓋晉文旣卒齊乘機圖伯故假報聘以招魯乎夏四月辛巳晉人及姜戎敗秦師于殽晉人者晉子也在殯行師宜爲罪矣乃變文書人若晉人同欲而不以晉子尸其事者全晉子也及者殊之也不使戎與晉爲序也夫秦罪宜討然當請命於王且非明正其罪邀以敗之而先君受秦大惠頓棄不顧乃全晉子何也曰滑同姓而近晉殽又晉地是門庭之冦也昔背晉約今蔑晉䘮過不在晉矣癸巳葬晉文公狄侵齊公伐邾取訾婁左云報升陘之役夫升陘已閲十年矣今蓋乘晉䘮而陵小爲逐利之計耳書伐書取其志見矣秋公子遂帥師伐邾左云邾不設備遂復伐之遂導君以不義宜其爲魯禍也家鉉翁曰齊桓之没宋楚爭伯魯乘之伐邾歲至於再晉文之没秦晉交兵魯乘之伐邾亦歲至於再晉人敗狄于箕箕晉地狄伐晉至箕其橫極矣許翰曰自狄侵齊而晉未暇討中國嵗有狄患至敗于箕而後不復犯是知戎狄之亂不得不震以武未易以德懷也冬十月公如齊晉襄初立公輕之且間晉伐邾晉交不可固矣故因齊聘而朝以自託豈謀國之道哉况周聘而卿往齊聘而公朝非禮甚矣十有二月公至自齊乙巳公薨于小寢小寢内寢也彌留之際大臣在側所以正始終明顧命也卽安於内非正也而婦寺得以爲奸矣故書以示戒公初政精明故魯頌作晚怠矣且用非其人遂兆再世之亂隕霜不殺草李梅實周十二月夏十月也霜旣隕矣草猶生而木再實反常也蓋人事之失而咎徵應之也晉人陳人鄭人伐許晉文之伯許獨堅附楚而不至伐之宜矣然襄旣覆秦於殽挫狄於箕不患威不立患德之不昭耳何乃於一年之内而三出師乎鄭貳於楚文公圍之而未服今從晉者秦襲鄭而晉敗之故也
