front:
  text: 欽定四庫全書經部五御纂春秋直解春秋類
  hash: sha256:9953fe5f894950a18505d8575bd49af39bd8839788cd4e51d58406e171739f16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_000-1a, image: WYG0174/WYG0174-0001a.png}
body:
  text: 提要臣等謹按御纂春秋直解十五卷乾隆二十三年奉敕撰以十二公為十二卷莊公僖公襄公篇頁稍繁各析一子卷實十五卷大㫖在發明尼山本義而剷除種種迂曲之說故賜名曰直解冠以御製序文揭胡安國𫝊之傅㑹臆斷以明誥天下與欽定春秋𫝊說彚纂宗㫖同符考班彪之論春秋曰平易正直春秋之義也王充之論春秋曰公羊榖梁之𫝊日月不具輒為意使平常之事有怪異之說徑直之文有曲折之義非孔子之心蘇軾之論春秋曰春秋儒者本務然此書有妙用儒者罕能領㑹多求之繩約中乃近法家者流苛細繳繞竟亦何用朱子之書春秋亦曰聖人作春秋不過直書其事而善惡自見又曰春秋𫝊例多不可信聖人紀事安有許多義例然則聖經之法戒本共見共聞聖人之勸懲亦易知易從自啖助趙匡倡廢𫝊解經之說使人人各以臆見私相揣度務為新竒以相勝而春秋以荒自孫復倡為有貶無褒之說說春秋者必事事求其所以貶求其所以貶而不得則煆鍊周內以成其罪而春秋益荒俞汝言春秋平義序謂𫝊經之失不在於淺而在於深春秋尤甚可謂片言居要矣是編恭承訓示務斟酌情理之平以求聖經之微意凡諸家所說穿鑿破碎者悉斥不採而筆削大義愈以炳然學者恭讀御纂春秋𫝊說彚纂以辨訂其是非復恭讀是編以融㑹其精要春秋之學已更無餘藴矣乾隆四十一年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書御纂春秋直解序中古之書莫大於春秋推其教不越乎屬辭比事而原夫成書之始即遊夏不能贊一辭蓋辭不待贊也彼南史董狐世稱古之遺直矧以大聖人就魯史之舊用筆削以正褒貶不過據事直書而義自為比屬其辭本非得已贊且奚為乎厥後依經作𫝊如左氏身非私淑號為素臣猶或詳於事而失之誣至公羊榖梁去聖逾逺乃有發墨守而起廢疾儼然操入室之戈者下此齦齦聚訟人自為師經生家大抵以胡氏安國張氏洽為最著及張氏廢而胡氏直與三𫝊並行其間傅㑹臆斷往往不免承學之士宜何考衷也哉我皇祖欽定𫝊說彚纂一書鎔範羣言去取精當麟經之微言大義炳若日星朕服習有年紹聞志切近因輯易詩二書竣事命在館諸臣係系是經具解以進一以彚纂為指南意在息諸說之紛岐以翼𫝊融諸𫝊之同異以尊經庶幾辭簡而事明於范寧去其所滯擇善而從之論深有取焉夫儒者猥云五經如法律春秋如斷例故啖助趙匡陸淳輩􅊖取經文書法纂而為例一一引徽切墨以求之動如鑿枘之不相入譬諸叔孫通蕭何增置傍章已後例轉多而律轉晦蓋曲說之離經甚於曲學之泥經也審矣書既成命之曰直解匪不求甚解之謂謂夫索解而過不直則義不見爾而豈獨春秋一經為然哉是所望乎天下之善讀經者乾隆二十三年秋月御製御製書春秋元年春王正月事春秋聖人尊王之經也元年春王正用開宗明義之第一也解此者自三𫝊以至後儒其說充棟或致操戈無容置議然識聖人之深意者有幾乎王道熄而作春秋春秋魯之舊史也自隱公始則不得不書隱公元年而即繼之曰春王正月前史所無有也蓋言公之元年乃禀王之春王之正而得是非尊王之義乎且是年也於齊為九年於晉為二年衛鄭以下各為其年不可婁指數而總為平王之四十九年於斯時也世人將何以紀其年而知其嵗乎是則聖人之書元年春王正月也者其亦有感於斯乎行夏之時聖人之私議不能行於時言春王而不言王春月可改而春不可改亦隱寓夏之時與王之元所謂大一統足以一天下之心而不可任其紛有不能行之嘆矣兹為開宗始義乃貫春秋之本末而絶筆於獲麟蓋聖人之道在萬世即聖人之憂在萬世是則封建之說不惟不可行於後世知聖人亦未必以為宜然也乾隆戊戌孟夏月正總裁官字位過密無法顯示御前大臣兼管理藩院事務暫行署理步軍統領事務忠勇公臣傅恆字位過密無法顯示臣來保經筵講官太子太保協辦大學士吏部尚書臣劉統勳經筵講官太子太傅吏部尚書臣汪由敦副總裁官經筵講官議政大臣户部尚書兼都統領侍衛內大臣武毅謀勇公臣兆惠太子少保議政大臣理藩院尚書兼都統臣納延泰經筵講官户部左侍郎兼管順天府府尹事務教習庶吉士臣劉綸提調官湖廣道監察御史臣覺羅巴延三户部銀庫員外郎臣額爾景額吏部文選司郎中臣袁守侗纂修官日講起居注官詹事府少詹事兼翰林院侍講學士臣梁錫璵收掌官户部顔料庫司庫臣巴尼琿户部陜西司額外主事臣馮光熊謄録官舉人臣夏秉衡舉人臣王文炯舉人臣葉能捐職州同臣王成曽捐職縣丞臣員志候選主簿臣張藎臣監生臣髙士帥監生臣潘敬蒼監生臣徐應瑞監生臣諸廷光欽定四庫全書經部五御纂春秋直解目録春秋類第一卷隱公第二卷桓公第三卷上莊公第三卷下莊公第四卷閔公第五卷上僖公第五卷下僖公第六卷文公第七卷宣公第八卷成公第九卷上襄公第九卷下襄公第十卷上昭公第十卷下昭公第十一卷定公第十二卷哀公
