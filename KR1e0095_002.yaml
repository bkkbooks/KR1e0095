front:
  text: 欽定四庫全書御纂春秋直解卷二庚午桓王九年在位二十有三年子莊王立桓公
  hash: sha256:b7aa96e51153affe2f6beb3dbeffb9927cfb6c24fda949bd00996134508071ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_002-1a, image: WYG0174/WYG0174-0021a.png}
body:
  text: 名允隱公之弟亦惠公之庶子也元年春王正月公即位繼故不書即位而桓即位何也桓自正其即位之禮蓋以罪歸寪氏為賊已就討又以嫡自居本宜立也聖人仍舊史以著實而其罪自定且以見亂賊之得志也天王之失誅也方伯之廢職也魯人之臣仇也三月公㑹鄭伯于垂鄭伯以璧假許田㑹鄭求定位也鄭方雄於諸侯且與隱睦故桓懼討而求㑹書之惡鄭伯也不能討而首㑹之復因以為利而求許田遂前此以祊來易之謀也無以為名曰吾姑假之且加璧焉魯即如其意以豫之賄賂彰矣夏四月丁未公及鄭伯盟于越垂㑹甫閲月而復為此盟蓋許田已歸得賂而深相結也割地以逭討黷利以庇罪世衰道微弒逆得志聖人傷之秋大水大水者恆雨為沴繫於時明其久也所以謹天戒憂民生警人修省也又水有所泄則不為害禹迹既湮溝洫廢而民罹害故謹而書之冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父宋自與夷立屢舉伐鄭必欲除馮是安忍也十年十一戰是阻兵也督乘民怨弒之以立馮魯為望國宋作王賔允翬馮督相繼交發人倫之變甚矣孔父名也劉敞曰君前臣名是也及纍也君弒而臣與其難惟孔父荀息仇牧三臣書及雖孔父先死亦蒙弒文之下蓋以其能與君為存亡也倘三臣不死則能討賊者必三臣也故賊必欲翦之也督不氏未賜族也諸侯受賂而立之故督之後為華氏滕子來朝譏崇賊也隱强則朝隱桓弒則朝桓不擇人而諂之宜其弱也書子時王黜之也滕侯也而稱子薛侯也而稱伯小邾無爵而稱子王朝之黜陟不行於大而行於小春秋本王制以正名天子之事也然則滕子無貶乎曰書來朝非禮可知也名爵自有定稱是非在乎其事不於事求義而以名稱為褒貶斯害春秋矣三月公㑹齊侯陳侯鄭伯于稷以成宋亂為賂故立華氏也㑹必有故不書故者故已明也稷與澶淵之㑹書故故未明也稷疑於討督澶淵疑於討般也國莫弱於無禮人莫惡於無恥禍莫慘於欲利悲莫痛於心死聚天下之諸侯受賂而共立賊貪利蔑禮至於此尚為有恥心乎弒其君取其君之財以賂諸侯而皆得立焉其誰不勸弒天下之禍靡所止矣夏四月取郜大鼎于宋戊申納于大廟華督之賂也大鼎繫郜郜文之昭也武王克商班宗􅉓於兄弟之國以為子孫藏則大鼎者必郜之分器也郜雖滅而鼎名不可易尊王賜也書取非其有而取之貪也著成亂之由也書納逆也神弗受也大廟周公廟也納於大廟賂彰而教弒也誣其祖矣秋七月紀侯來朝謀齊難也齊欲滅紀紀婚魯故來朝而謀之桓何人哉失所因矣蔡侯鄭伯會于鄧左氏曰始懼楚也蔡鄭天下之中也楚得蔡則長驅宋陳鄭許之郊得鄭則界絶齊魯秦晉之路故齊與楚爭蔡晉與楚爭鄭也其地以國鄧亦與焉鄧近楚楚姻國也蓋畏楚而託於鄧也然鄧不自保能庇蔡鄭乎書鄧之㑹惡楚之馮陵也傷周室之無政與諸侯之無謀也九月入杞書入惡桓也負大惡而入人之國無忌憚之甚也不稱將將卑也二王之後莒取其邑魯入其都君子傷之公及戎盟于唐修舊好也隱因戎之再請而始盟彼有慕而求於此也桓自與戎盟此有畏而求於彼也冬公至自唐告於廟也凡公行必告於廟反行飲至舍爵策勳焉禮也公至繁不勝書必有關得失之故而後書常事則不書也三年春正月不書王闕也未修之前史有闕文既修之後經有闕文史闕聖人因之慎也經闕後人說焉鑿也公㑹齊侯于嬴自中邱㑹後齊鄭與隱相親也鄭執周政而多詐故桓先納賂以結鄭齊為東州之大國次即乞婚以連齊書之惡齊之黨賊也抑桓之婚齊求逭討也而卒薨于齊豈非天哉其謀以自全者適所以自禍歟夏齊侯衛侯胥命于蒲胥命者相命也同列勢均不以齊侯命衛侯故曰胥命也不盟結言猶近古焉荀卿曰春秋善胥命然謂之愈於盟則可謂之正則不可其所命者非王命也且其事又有善否焉今亦未知其事之果善也六月公㑹紀侯于郕為紀結郕也齊欲滅紀郕亦與齊有怨故公與紀㑹于郕約拒齊也桓誠惡然其欲存紀則善矣春秋立勸懲之極故善人有微惡必恕之成為善之美也惡人有微善必録之開遷善之門也如其善惡而無成心焉是曰天也秋七月壬辰朔日有食之既既盡也其變大矣春秋日食三十六其既者三焉公子翬如齊逆女翬於桓之世位以卿而逆夫人尊而親之也故稱公子焉其與弒可知也與弒者而尊而親之是賞弒也賞弒者志於弒以是知桓之果首弒也九月齊侯送姜氏于歡父送女非禮也不稱女已至魯境也不稱夫人猶未成禮也據魯言齊故曰姜氏公㑹齊侯于歡齊侯以送姜氏來而公以㑹齊侯往其意在㑹不在送女也輕禮而重𫝑也輕禮必不能盡倫倫失則階厲重𫝑必不能守義義虧則召侮夫人姜氏至自齊不言翬以者既得見乎公也不言公以者不與公受姜氏于歡也因㑹乞婚因㑹成禮始之不正庸人忽之君子懼焉冬齊侯使其弟年來聘致夫人也齊侯送女其弟致女私文姜也前使弟今又使弟私年也私者禍之階文姜之淫毋亦義訓有缺乎後年之子無知作亂亦僖有以啓之也故春秋貴義不貴惠繩其偏私使歸於正有年有年者豐也歲有豐凶天之行也歲凶必書示人君先時警備及時軫恤也豐則不書十二公惟桓書有年宣書大有年餘皆不書者常也桓宣何以書幸之也桓十八年止一有年宣十八年止一大有年他年之歉可知也四年春正月公狩于郎冬田曰狩周之春則夏之冬狩時也得時何以書為于郎書也郎巖邑也前城之今狩焉習備也然非地矣搜苖獮狩不時則傷農不地則害物夏天王使宰渠伯糾來聘桓至是立四年矣王不能討又下聘焉失政矣宰不能諫復為使焉失職矣賵仲子咺與有責焉聘桓糾與有責焉王之下士以人書中士上士以名書大夫以字書卿以爵書獨宰以官書重宰也宰而名之從中士之例深責宰也是年無秋冬闕也五年春正月甲戌無事闕文也春秋記事必有始終蔡人殺陳他事之終也左𫝊云陳他殺太子免則事之始也經無見焉蓋在此乎故趙匡曰當記陳他作亂之事是也己丑陳侯鮑卒甲戌之後不逾月而卒以憂卒也是嘗㑹稷以成宋亂者遂自亂也陳桓魯桓及身而亂齊僖鄭莊身殁而亂利人之亂惡有不亂者哉夏齊侯鄭伯如紀按左氏齊鄭朝紀欲以襲之是知齊鄭之朝紀僞也紀人知之其計不行然後以朝反春秋書之使若誠朝然疾之也𫝊曰朝而經書如𫝊以紀事經以眀義也往其地曰如行朝禮曰朝惟朝王為宜故朝王雖非其地亦曰朝公朝于王所是也成十三年公從諸侯伐秦過周而朝止曰如蓋病其行禮之不專而不與其朝也朝齊晉與楚亦曰如惡其以王禮事人而不與其朝也他國來魯書朝魯者彼失禮而此受之故貶彼以見義外相朝亦曰如蓋沒其實以見義皆所以尊王也天王使仍叔之子來聘仍氏叔字王朝之大夫也仍叔之子父在子弱而已奉使世官而子弟與政也桓罪著矣一聘已非况再聘乎且以未命者將命王命輕矣周衰世卿専政爵不以德使不以能君狥其愛臣執其柄國家之敝恆必由之是年秋王伐鄭從者蔡衛陳三國而已今屢使聘魯意召兵於魯乎魯重私黨而輕王命王師之敗魯有責矣葬陳桓公他當君在而殄君嗣君由是卒是賊也賊未討而葬君魯不討而往㑹焉故書以著其罪城祝丘備齊也公將抗齊以存紀故備之夏城之不時也秋蔡人衛人陳人從王伐鄭周弱久矣桓王一旦欲振其威當權其輕重鄭之不朝固有罪矣然視宋魯篡逆楚僣王號戎執王臣罪孰重乎不擇罪而致討非義也天子之征內使卿士外任方伯鄭莊狡而善戰宜簡元老以壯其猷不命將而親征非計也且大國無從焉祗蔡衛與鄭有怨陳他計圖定位又皆稱人將卑師少以微者行也卒之不戰而衄重挫王靈自後王命益不行於天下矣屬辭之法首舉王而事繫於下則稱天王其不稱天者特文也先舉其事以屬於王而不稱天者恆辭也此之王不稱天恆辭也蓋鄭罪本當治也諸侯同伐書㑹用其師書以王者天下之共主則書從而已矣三國從王順也以微者從則蹈慢王之罪矣天子討而不伐書伐者見未盡天討之義也沒其戰隱其敗又以存天下之防也至鄭致王伐而又不服可勝誅哉大雩龍見而雩嵗之常祀故經無書六月雩者過則書旱祭也志災也天子雩於上帝諸侯雩於境內山川書大雩者雩於上帝因災以著僣也經於魯之僭皆因事而始見其詞嚴其㫖微矣螽蝗也常因旱而生志災以憫民也冬州公如曹以爵書公者宋是也以官書公者則三公也州寰內邑州公蓋食采於州而為王之三公者也伐鄭之役師敗王傷懼而謀自託焉故如曹乎何以書過魯也憫周惡鄭而責州公之無具也六年春正月實來三𫝊以實來為州公來或以實為州公名詳其文義與祭伯來相類葉夢得曰王之上士三命以名氏見中士再命宜以名見則實者王之中士也似為近之不書使非王命也書來非事也王師喪敗王臣四出天子不能庇其官王臣不能守其職蓋參譏之夏四月公㑹紀侯于郕謀齊難也齊鄭如紀故也紀茍知懼宜返而自修即不得免效死可也與桓謀之奚益哉卒之紀滅而郕降于齊再書此㑹哀紀之不能立明桓之不可倚而齊恃强吞弱其罪甚矣秋八月壬午大閲大閲簡車馬也四時均教民習戰惟仲冬大閲為詳蓋農事既畢不妨民也四時習戰皆因田而行不玩武也今畏齊防鄭不因狩而簡車馬非制也不行于夏之冬而行于周之秋不時也凡王所舉多曰大書大閲又因以著僣也蔡人殺陳他他自立逾年而斥其名賊也蔡人謂誰蔡侯也按左氏陳厲公蔡出也故蔡人殺他而立之夫蔡侯欲立其出其心私也然能正其罪其事則公也故從討賊之辭而變文稱人存公義也楚子殺陳夏徴舒而書楚人亦同此義蔡討陳之賊可乎不擇人而討廣討賊之途也而陳之臣子不能討其罪著矣故曰春秋成而亂臣賊子懼九月丁卯子同生子者繼體之稱生於夫人又以禮舉之則書蓋正始明分所以重國本杜亂源也鄭玉曰子生則書見名分之已定而明父子之親誓於天子然後稱世子見爵秩之貴而明君臣之義冬紀侯來朝桓方㑹紀紀復來朝求魯之亟也紀之荒內治而徒事倚人可見矣七年春二月己亥焚咸丘火田也咸邱地名古者昆蟲蟄而後火田蓋去莾翳以逐禽獸耳書焚咸邱則盡其地而淫獵矣搜狩之制講禮非尚殺也訓軍非盡物也淫獵則殺不以禮而物盡故譏之夏榖伯綏來朝鄧侯吾離來朝謀楚難也名之失地也蔡鄭嘗㑹于鄧矣榖鄧皆近楚楚欲有事於蔡鄭必先有事於榖鄧榖鄧距魯千四百里其朝魯者為楚所逼委國而奔意以魯為東方望國庶能安已而求援耳不知魯之不足恃也失地何以書朝彼以禮來此以禮接之安得而不書再書來朝殊見也按左氏鄧於莊十八年始滅於楚意吾離來奔而鄧復立君乎八年春正月己卯蒸冬祭曰蒸周之春夏之冬蒸時也何以書胡安國曰非為不時志也為再蒸書也天王使家父來聘家氏父字王之大夫也王蓋三聘桓矣下書逆后則此之聘蓋言婚紀乎婚紀曷為與魯言魯請之也魯欲存紀因為紀謀俾納女於王託王為重焉王娶后以母天下乃輕狥魯請可乎哉夏五月丁丑蒸五月建辰為夏之季春春祭為祠今蓋以蒸代祠也四時之祭惟蒸為腆冬則物備也非冬而蒸亟也一嵗二蒸黷也時祭當用夏之孟月若有故及日不吉用仲月今用建辰則季月也又過時而慢矣皆非禮也秋伐邾滕紀榖鄧皆朝而邾不至故伐之邾不至義也是以不義伐義也冬十月雨雪周十月夏之八月不應雨雪書以紀異且眀害稼也祭公來遂逆王后于紀祭公何以來命魯主婚也至尊不可與侯國為禮也婚禮不稱主人故不言使魯承命矣祭公宜復命且大婚之禮祖於廟而後行不可以二事出也使公來魯則輕祭公來而遂逆則輕王后女在其國稱女此稱王后何王命之斯后矣尊王命也九年春紀季姜歸于京師季字姜紀姓也歸不言以至者王者無外不可言自紀也胡安國曰自逆者而言則當尊崇其匹故從天王所命而稱王后示天下之母儀也自歸者而言則從父母所子而稱季姜化天下以婦順也此正始之道王化之基也髙閌曰后必嫡女今曰季姜非嫡也程端學曰紀畏齊而納女魯弒賊而主婚王娶紀之季女皆非也夏四月秋七月冬曹伯使其世子射姑來朝使世子來朝者攝也周官典命凡諸侯之嫡子誓於天子而攝其君下其君之禮一等未誓則以皮帛繼子男是世子固有攝其君之禮然謂朝於天子則王事不可廢耳朝桓何急乎且至正月而終生卒矣比事屬詞其非義著矣十年春王正月庚申曹伯終生卒攝朝於冬春初君卒可以辭而不辭從亂命也世子亦不得無過也夏五月葬曹桓公五月而葬正也諸侯五月同盟至魯㑹之禮也秋公㑹衛侯于桃丘弗遇期而不信也衛中變而公獨至故弗遇齊鄭急於圗紀魯欲存之伐鄭之役衛實從王是與鄭有隙矣故魯桓求㑹焉將以為援也然蒲之胥命衛與齊有舊好矣衛初以鄭故約㑹終以齊故中更於是有郎之戰書弗遇惡無信也冬十有二月丙午齊侯衛侯鄭伯來戰于郎按左氏以郎之戰為鄭請師於齊是鄭主兵乃首齊何也曰鄭忽怒而請師於齊事在五年之前桓欲存紀為齊所惡而存紀固義舉不可執以為辭姑借鄭為名結衛偕來耳春秋不循其迹而誅其心故首齊也諸侯加兵於魯衆矣此獨不稱侵伐以來戰為文者責在外也十有一年春正月齊人衛人鄭人盟于惡曹三國之君方為郎之戰逾月即為此盟則其為三國之君審矣何以不書爵而稱人吕大圭曰春秋書法凡一役再見者則人之隱十年公㑹齊侯鄭伯于中邱夏翬帥師㑹齊人鄭人伐宋此其例也人之者略之也以為不足再書其爵則人之而已矣譏辭也非奪爵以示貶也三國來戰又為此盟同絶魯也魯存紀義也而盟以絶之是誓不為義也此其可略之實也歟夏五月癸未鄭伯寤生卒春秋之初罪莫甚於鄭莊至繻葛之戰敢敗王師有王者作尚待教而後誅之哉而卒於其位君子傷之秋七月葬鄭莊公逾兩月而葬速也時突在宋蓋慮有爭焉耳九月宋人執鄭祭仲惡専執也寤生卒世子忽立突宋出也故宋人執仲使出忽而納突祭氏仲字命大夫也宋公者馮也鄭莊以馮之故屢與宋戰曽莫之報乃挾突以亂鄭而誘執其命卿使廢正而立不正不仁哉突歸于鄭突不繫鄭不宜有鄭也不稱公子爭國也歸有順辭有易辭突不順而書歸易也權在祭仲也突篡而首惡屬仲著禍本也鄭忽出奔衛忽繫鄭宜有鄭也不書爵未逾年也未逾年何以不稱子嗣父之重未周乎喪委國而出豈曰能子乃其後復歸而稱世子何也曰忽失在不能自立而非有惡之可指故春秋不忍終絶也名之者何失國而有爭國者故名以别之也或曰祭仲之為此者權也姑出忽而立突則身可不死而突可徐出忽可徐反是不然夫權者道之準也不守節死義而從人廢立悖道矣惡乎權突出忽反亦偶然耳設雍糾之計行則仲之骨已朽而突焉得出而忽焉得反君子之處事計可否不計利害其觀人也論是非不論成敗祭仲一執而突歸忽出其力足以濟而不能守義具見矣比而書之惡宋而罪祭仲也柔㑹宋公陳侯蔡叔盟于折柔魯卿也不氏未賜族也蔡侯無子蔡叔蔡侯之弟以國繫字示兄終弟及之義也魯以郎之敗而求宋陳蔡蓋以敵齊鄭也然以大夫盟諸侯非禮矣內大夫帥師自無駭始與諸侯盟自柔始公㑹宋公于夫鍾陳蔡一盟即合魯嘗敗宋而取其邑折之盟公又不往宋疑焉故公親㑹以求之也冬十有二月公㑹宋公于闞冬又㑹亟求之也十有二年春正月夏六月壬寅公㑹紀侯莒子盟于曲池尋浮來之盟也紀故也秋七月丁亥公㑹宋公燕人盟于榖丘兩㑹之後復為此盟固宋也前盟宋而兼盟陳蔡此盟宋而兼盟燕皆以廣已之援也燕南燕也姞姓八月壬辰陳侯躍卒新盟于折不葬非禮也公㑹宋公于虛冬十有一月公㑹宋公于龜既盟而又㑹何也前此兩㑹兩盟皆魯自為也繼此兩㑹以為鄭也乃左氏於榖邱之盟即有欲平宋鄭之文宋以責賂不遂與鄭不平平鄭未有成言又兩㑹以要之宋終辭平故公忿而盟鄭以伐宋屬辭比事其情見矣丙戌公㑹鄭伯盟于武父宋辭平故也鄭伯者突也宋所立也曷為背宋而盟魯不堪其責賂也魯宋𫝑盡而交踈鄭宋利盡而爭起宋朝魯而暮齊魯朝宋而暮鄭鄭朝宋而暮魯觀其離合而世道人心可知矣丙戌衛侯晉卒再書丙戌因舊史也十有二月及鄭師伐宋丁未戰于宋此公及鄭伯也內不言公而書及外不爵鄭而稱師陳傅良謂一役再見而略之者是也宋黷賂無厭故魯鄭伐之然資其力以篡國者鄭突也魯為突求平不從則亦已矣背盟不顧動衆毒民何為哉書戰于宋責魯鄭也十有三年春二月公㑹紀侯鄭伯已已及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績魯與齊戰也自戰郎以來齊不忘紀魯不忘齊二年之間三盟四㑹懼齊故也魯結宋以敵齊反因鄭而伐宋齊人因之遂結宋而連衛燕以伐魯焉燕夲與宋魯同盟見桓背盟伐宋故從宋也魯急而請救於紀鄭待紀鄭皆來而始能決日以戰故先㑹而後以已已戰也戰不地於魯都也以魯主戰自治也今日之戰丁未之戰激之也已實致寇而戰焉齊怒愈甚非所以存紀也四國敗績有敗道也齊魯爭紀齊曲魯直紀怒齊鄭怒宋雖曰從魯猶自戰也衛燕之從齊則怠矣戰稱君臣紀實也敗稱師重衆也衛宣未葬而朔稱侯逾年也喪在殯孤無外事逾年稱君則可未葬而從諸侯以即戎則不可三月葬衛宣公嗣子朔敗績而歸乃葬其親甚哉其不仁也魯與衛戰乃㑹其葬是知古人以葬為重也怨不棄義怒不廢禮惡不忘親夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹修武父之好也魯鄭伐宋又敗四國之師懼其復怨故㑹以謀之地以國曹亦與焉魯鄭同惡而曹比匪參譏之無冰燠而無冰蓋政治縱弛不眀之所致也氣失藏而萬化乖其理矣劉向曰周失之舒秦失之急故周衰無寒嵗秦末無燠年夏五春秋之作也筆削以定天下之法此之夏五闕月與事者蓋文成之後𫝊之脫漏耳鄭伯使其弟語來盟來盟稱使前定也蓋已有約未足效信復遣使以結之也突與宋惡所恃惟魯忽尚伺釁亹儀在中不任諸大夫而使其弟私也亦不得已也既而宋伐於外仲抗於內窮而出奔矣蓋得國不正禍必至此其後入櫟有鄭亦幸焉耳秋八月壬申御廪災御廪公所親耕以奉粢盛之所也天火曰災乙亥嘗壬申至乙亥方四日災於致齊之初不懼而改卜遽舉以祭慢其祖矣况周之八月夏之六月稼未登場安得新而嘗之以陳為新非嘗也著不時而紊先典也冬十有二月丁巳齊侯祿父卒祿父有圗伯之志晚從鄭伯貪利忘義以紀故遂與魯隙兵敗而抑鬱以死寤生悮之也易曰比之匪人不亦傷乎宋人以齊人蔡人衛人陳人伐鄭東遷之初以伐國為罪至於㑹伐交亂甚矣以一國而用諸侯之師自此始故特文以著其罪以者能左右之以行已意惡首禍也宋黨孽黷貨摟諸侯以伐人國其惡甚矣故皆不稱爵而書人十有五年春二月天王使家父來求車諸侯於王朝有常貢周衰諸侯不臣遂至下求所求非道益取輕於諸侯家父無所救正自取辱命之咎矣三月乙未天王崩桓王也魯宋弒君不能討喪師於鄭陵夷甚矣西周之不復平王為之也東周之不振桓王為之也夏四月己巳葬齊僖公齊僖與魯屢尋干戈而㑹葬如禮王崩則莫之赴比事以觀其罪見矣五月鄭伯突出奔蔡突之歸書宋執仲明其所以篡也罪仲重於罪突也突之奔不書仲逐突位本非其有也責突深於責仲也稱鄭伯嘗君鄭也斥名者見鄭有君也忽雖未歸國固其國也鄭世子忽復歸于鄭世子未嗣位之稱忽嗣君位五月而奔四年乃歸歸而書復復其位也何以以未嗣位之稱稱之乎蓋奔時喪未逾年今歸後始成為君方歸猶未君也不可書爵喪已除矣不可稱子探其本而特書世子所以别於突而明正也突歸忽出突出忽歸廢立易若反掌仲罪可勝誅哉許叔入于許三國入許許君奔衛許已滅矣至此十五年而鄭內亂許叔乘之復國故繫以國而書叔叔者兄弟之行次也趙匡曰言與君一體是也何以書入無王命也公㑹齊侯于艾齊與魯絶矣齊僖即世魯往㑹葬復與齊通襄居喪出㑹是蔑禮也桓喜於釋怨而狎之其禍遂兆於此邾人牟人葛人來朝三國皆附庸也何以稱人杜預曰皆附庸世子也其君書字書名故其世子降而稱人是也王喪未逾年而行嘉禮桓不赴王喪儼受人之朝且旅見焉重譏之秋九月鄭伯突入于櫟春秋一國而二君者鄭之忽與突衛之衎與剽也突入櫟而書名忽正而突不正也衎入夷儀而不名衎正而剽不正也春秋别嫌疑以明是非而已矣于櫟志大都耦國之害也制死虢君京禍太叔乃城櫟而置子元使昭公不終則莊之詒謀誤也冬十有一月公㑹宋公衛侯陳侯于袲伐鄭忽在鄭突在櫟㑹于袲謀所伐也伐鄭則伐忽也突仇宋而有功於魯故宋欲伐突魯欲伐忽㑹而謀之卒從魯而伐忽也何為從魯突又許賂也謀者狥私從者計利順逆之理舉不復問此天下所以亂也十有六年春正月公㑹宋公蔡侯衛侯于曹前冬伐忽以納突而不克此復謀伐忽也又邀蔡同㑹黨益張矣地以國曹亦與也夏四月公㑹宋公衛侯陳侯蔡侯伐鄭復伐忽也忽出五年莫有仗義而助之者突甫出而入櫟五國翕然來㑹為利而已矣突以賂結諸侯而宋則弒與夷而立之馮也魯則弒息姑而立之允也衛則殺伋夀而立之朔也同惡相比惟利是圖陳蔡牽於大國時先時後比事觀之蔑周班而行私槩可知矣逾年鄭即有髙渠彌之禍則忽之不終突之坐大五國為之矣秋七月公至自伐鄭由冬歷夏至秋而還黨篡排正以之告至矯誣甚矣自此以後忽與亹儀皆不見於經蓋魯桓黨突以定其位赴告時通忽儀亹之弒殺則不告故莫得紀焉春秋因事以見法不求備於史以著其人冬城向向地介魯莒之交隱二年莒人入向矣城之蓋欲與莒爭向也至宣四年伐莒取向向乃為魯有城未有繫月者城築之事非可月竟也冬城之時也志工役之興重民力也十有一月衛侯朔出奔齊衛立公子黔牟而朔始奔其止書朔奔何朔有罪也名之者别於黔牟也朔搆殺二兄而奪其位又淩蔑天子周室欲討二公子因之立黔牟而逐朔則黔牟之立必有王命矣朔齊出也故奔齊十有七年春正月丙辰公㑹齊侯紀侯盟于黃為紀平齊也紀處齊肘腋齊志在必取而紀反助魯敗齊齊憾深矣齊襄因公求平詭為此盟以安紀之心而弛其備後二年齊遂遷紀三邑是可以知齊人之本謀矣二月丙午公㑹邾儀父盟于趡尋蔑之盟也夏五月丙午及齊師戰于奚黃盟未幾遽興師齊惡著矣魯方為紀求平而遂與齊戰何哉六月丁丑蔡侯封人卒蔡侯鄭伯懼楚而㑹于鄧乃蔡數伐鄭違初計矣不同心禦楚而自相敝不數年而荆敗蔡謀之不臧自詒伊戚桓侯之謂乎秋八月蔡季自陳歸于蔡前書蔡叔次立者也今又書季蓋叔先蔡侯卒而次立又在季也季之歸介於蔡侯卒葬之間其為嗣位明矣歸順辭蔡侯無子而季次立非爭國也志歸不志出奔略之也左云蔡人召之榖云陳有奉焉內得衆外得助歸立莫善於季惟經書自陳則貶其不出王命耳癸巳葬蔡桓侯諡稱公非正也臣子之辭也稱本爵正也天王誄之也晉侯仇卒於平王之世諡曰文侯是也蔡桓書侯蓋告王請諡禮也及宋人衛人伐邾宋志也邾鄭嘗伐宋也衛為宋黨從宋無足深怪魯春與邾盟而秋伐之不信而佳兵可乎哉冬十月朔日有食之十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊黃盟未幾遽戰于奚奚戰未幾遽為此㑹如齊何為哉㑹而遂如夫人之志也狎齊侯而偕夫人以來㑹縱夫人而隨齊侯以如齊書公與夫人者順之之辭彼欲而此從之也不間有家而身從之禍之至也必矣㑹曰公㑹如曰公與究禍本也夏四月丙子公薨于齊內弒書薨而不地在外不論有故無故皆當書地今公與夫人如齊而公薨于齊則其故在齊而夫人固有與聞乎弒之罪也前書公與夫人如齊後書夫人孫于齊其事微而章矣丁酉公之喪至自齊傷之也不生還而喪至所以發魯之臣子不共戴天之憤也秋七月冬十有二月己丑葬我君桓公公以喪歸而成禮以葬蓋當其時欲以泯乎被弒之迹與夫人之與聞乎弒也春秋因魯史之舊文以著其實之不可掩且在臣子有不忍言者非賊在外之謂也次年書夫人姜氏孫于齊則討賊之義可知矣
