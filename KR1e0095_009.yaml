front:
  text: 欽定四庫全書御纂春秋直解卷九上己丑簡王十有四年在位十有四年子靈王立在位二十有七年子景王立襄公
  hash: sha256:58a119ff91daabcbdd95e9387455ad5c76e4563fcd94592b7ea06a3c542f0e15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_009-1a, image: WYG0174/WYG0174-0176c.png}
body:
  text: 名午成公子也元年春王正月公即位公生四年矣仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城楚取宋彭城使魚石據之且戍之三百乘矣猶繫之宋者蓋本先王之授土以辨名也楚以蠻猾夏石以臣叛君晉帥與國圍之伯職修矣書之豫之也然皆大夫而君不與則政下逮矣李廉曰宋華元會晉圍彭城猶衛石曼姑會齊圍戚然彭城書宋戚不書衛者曼姑為子拒父元為君討叛也其義審矣夏晉韓厥帥師伐鄭晉既降彭城而執魚石矣以鄭從楚亂宋因仗義伐鄭諸侯之師皆至獨晉伐之者任其勞也勞己以逸人有恤諸侯之心焉故書以豫之仲孫蔑會齊崔杼曹人邾人把人次于鄫以備楚也楚不出則一韓厥足以制鄭楚至則五國之師固在焉故書次謹於用諸侯而厚以禦楚且不輕殘鄭也齊把前不與圍後至也宋衛莒滕薛今不與次先歸也汪克寬曰齊桓伐楚師次于陘晉悼伐鄭師次于鄫皆不輕用兵重民命之意也秋楚公子壬夫帥師侵宋魚石之討諸國之執言甚正楚不敢敵晉而思泄憤於宋故書侵以正其罪九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘左氏以諸侯即位小國朝大國聘為禮然天王方崩襄公在喪而列國之朝聘如故列國不喪天王魯侯不喪先君也二年春王正月葬簡王五月而葬速也鄭師伐宋鄭之伐宋惟楚命是奉晉厲以力而不畏晉悼以義而不服迷復也夏五月庚寅夫人薑氏薨成公夫人襄之嫡母也六月庚辰鄭伯睔卒鄭附楚故諸侯不會其葬夫鄭成以楚子之集矢於目也故終附楚然楚亦自為爭諸侯耳豈為鄭哉乃懷其私恩而從惡誤矣晉師宋師衛寧殖侵鄭晉宋稱師將卑師衆也衛舉將將尊師少也鄭雖以黨楚為罪然易世矣今因其喪而亟連二國侵之是欲乘機以得志耳豈禮也哉直書而罪著矣秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚謀鄭也於是仲孫蔑倡城虎牢以逼鄭之計善謀也不果城齊未至也以崔杼意不服晉而滕薛小邾因亦不至也己丑葬我小君齊薑三月而葬速也齊諡也别諡非禮也叔孫豹如宋通嗣君也冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢申前謀也齊滕薛小邾亦皆至也兩會戚而始城則遂為繼事而非生事也虎牢鄭地不繫鄭者鄭當南北之衝而虎牢為其要害非得鄭無以禦楚非城虎牢無以制鄭既城踰年鄭來盟于雞澤而陳亦改圖北嚮則是役也不殘民而制勝其功為巨趙鵬飛曰安一國之功小安天下之功大安一國者以一國之辭繫之圍彭城繫宋是也為宋治叛臣也安天下者以天下之辭繫之城虎牢不繫鄭是也虎牢城而天下均安也楚殺其大夫公子申申為司馬而以賂聞固為罪矣然意亦嬰齊壬夫以其逼而讒之而楚子聼之乎故書法與側同三年春楚公子嬰齊帥師伐吳晉與吳會鍾離矣楚畏吳乘其後故伐之以示威焉晉事於秦而伯以衰楚事於吳而勢遂挫公如晉喪畢而朝也童子侯不朝王况同列乎夏四月壬戌公及晉侯盟于長樗晉悼修禮於諸侯出其國都而與公盟諸侯所以睦也公至自晉以朝晉至也本謀如晉故不以長樗至六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤鄭服也昔屢伐不至今不召自來何哉政教修明六卿和睦內治矣圍彭城義昭矣城虎牢謀得矣謀得則勢定義昭則人服內治則外從也然始合諸侯而盟王臣與齊桓異矣故先會後盟止書日以别之而不再言雞澤其事不足乎揚也陳侯使袁僑如會陳自辰陵即楚二十有八年矣今鄭服而陳亦來疾楚暴而慕晉義也戊寅叔孫豹及諸侯之大夫及陳袁僑盟鄭君先至諸侯既盟之矣陳臣後來使大夫與盟焉慰初附之心别君臣之分晉侯其適於情而明於禮哉書叔孫豹及諸侯之大夫見受命於君書及陳袁僑盟見以是結陳也兩書及所以具事實也乃榖梁譏之曰諸侯盟大夫又私相盟大夫張也不知此與十六年湨梁之盟異彼則諸侯會大夫盟大夫自為盟也私盟也此則諸臣之盟袁僑者即諸君之盟鄭伯者也豈私盟哉第積習生常諸侯在而大夫可衆為盟則湨梁或亦因此啓之矣是以君子愼始且晉文踐土陳侯如會文不再盟陳服晉三世不叛今袁僑如會悼使復盟陳從晉五年而逃蓋合諸侯在德與勢盟何足恃哉秋公至自會冬晉荀罃帥師伐許責許不會雞澤也許自新城以來不與諸侯之會盟困於鄭也新遷于葉楚使之自近也豈能叛楚而逺從晉晉果服楚許將焉往乃以鄭陳偶服遂侈然求多於許心褊欲速宜不得許並鄭陳而失之也四年春王三月己酉陳侯午卒夏叔孫豹如晉報荀罃之聘也秋七月戊子夫人姒氏薨公生母也與齊薑並稱夫人踵成風也葬陳成公棄楚即晉故諸侯會其葬八月辛亥葬我小君定姒逾月而葬其禮簡也據傳行父不欲以小君禮葬因匠慶之言而勉從之然遂簡其禮矣夫不欲以小君禮葬定姒果公心歟是守典也如私心歟是慢君也觀齊薑葬亦簡禮則行父蓋因君幼而慢君耳冬公如晉公甫七齡復居母喪而急於朝晉乎蓋行父以過禮媚晉耳陳人圍頓據傳楚使頓間陳而侵伐之故陳圍頓然頓雖為楚間陳陳且宜完守若楚來侵則請於晉以禦之乃不勝其忿背喪以出是致寇也五年春公至自晉夏鄭伯使公子發來聘鄭久淪於楚矣以陳踵鄭而服晉故楚不暇爭鄭鄭得少寬而修禮於諸侯蓋晉伯復興諸侯輯睦也叔孫豹鄫世子巫如晉鄫介魯與邾莒不勝三國之誅求故請專屬於魯以為附庸鄫本子爵棄王爵而屬魯魯無王命而私請於晉晉遂專而許之皆罪也諸侯之世子不宜後於大夫今鄫世子直次內臣之下而不書及自比於魯臣也然非禮矣仲孫蔑衛孫林父會吳于善道晉通吳吳再不至今使人請好晉將為之合諸侯于戚以魯衛近吳且親也故使蔑與林父先通好且告會期焉善道吳地往會之也晉倚吳以撓楚然求之過卑非禮也無逺慮矣蔑與林父不言及俱受命於晉也秋大雩楚殺其大夫公子壬夫壬夫侵欲於小國固罪然楚子亦素知之矣不禁之於先及陳怨已深而不服始歸咎而殺之非刑也且疊殺三卿不亦甚乎故書法同公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚會吳且謀陳也前殊會往會也此列會吳來也前稱吳其君也此書人其大夫也奔走天下以會吳非計矣陳侯至而言楚患故命戍陳也吳人在世子下禮也鄫列於會者魯人不利屬鄫使鄫人聼命於會也諸侯會戚屢矣林父不憚供億以悅晉內專政而外結援也公至自會冬戍陳戍以防楚患義也孰戍之魯也諸侯皆受命於戚何以獨書魯離至不可得而序也程子曰非王命而勤民逺戍罪也然助陳而拒楚與之可也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光救陳戍者戍於無事之時救者救於被兵之日既戍之又救之其謀周矣冬伐之冬救之其赴勇矣諸侯皆至睦也楚不戰避之也然則晉力足以濟矣乃士丐不能將順君美倡言有陳非吾事以致人心不協卒至失陳不亦謬乎十有二月公至自救陳以救陳至善救陳也辛未季孫行父卒六年春王三月壬午杞伯姑容卒夏宋華弱來奔秋葬杞桓公杞小而逺以婚姻之故會其葬也叔姬嫁於杞定姒乃杞女也滕子來朝莒人滅鄫鄫初求屬魯魯復通於晉而列之會矣晉坐視其滅而不救何哉公榖以莒之子後鄫子而書滅非也若莒子以其子而亂鄫之嗣是絶世非滅國也若鄫子以莒之子為己之外孫而使為己嗣則罪不在莒當如梁亡之例而書鄫亡不得言莒人滅之也况滅者亡國之善辭上下同力也二傳不可通矣冬叔孫豹如邾公初即位邾子來朝四年有狐駘之戰至是往聘釋怨以修好也季孫宿如晉宿行父子也父喪未期而遽如晉嗣父執政急自託於晉也十有二月齊侯滅萊齊圖萊久矣至是卒滅之會盟使世子滅國則親之怠於為義而勇於為不義也七年春郯子來朝夏四月三卜郊不從乃免牲卜不過三然卜郊止於三月四月而三卜則過時而不敬矣小邾子來朝城費費季氏私邑也既冒喪如晉諂事伯國又城其賜邑將何為哉然自南遺請城南氏亦世其邑蓋宿但知營私以弱公室不虞陪臣之擬其後也秋季孫宿如衛宿甫用事如晉如衛殆無虗歲皆假公以締私爾八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳伐未得志復罄兵圍之期於必得陳也十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬謀救陳也不書救不成救也陳圍三月矣陳侯蓋冒圍而來乃徐徐為會乎是不急陳徒質陳侯以要陳耳悼承厲亂故初年勵精今諸侯睦矣故憚於敵楚而懷安一念自足業由此隳惜哉鄭伯髠頑如會未見諸侯丙戌卒于鄵據傳公子騑弒之也鄭伯將會於鄬騑欲與楚鄭伯不可騑弒之曷為以卒書蓋鄭人以疾赴魯史以卒書春秋無所據而革之也特書曰如會曰未見諸侯以發人之疑而見其實也蓋如會者其事也見諸侯者其心也鄵鄭地外諸侯卒於境內不地以如會故書地也然行未逾境何遽云未見諸侯因以著鄭伯之心欲見諸侯也欲見而未得見必有故也則弒之實彰矣其名之何榖梁曰諸侯不生名此之名卒之名也卒之名何為加之如會之上見以如會卒也是也夫鄭伯弒矣而鄭人儼以疾赴使晉侯不知是不明也知而不討是縱賊也然則晉罪亦莫逭矣陳侯逃歸此與鄭伯逃齊桓首止之盟同而亦有異彼書逃歸而著其逃歸之故曰不盟專罪鄭伯也此書逃歸而其所以逃歸者無可書也兼罪晉侯也蓋陳困於楚陳侯親來求救不急赴之以致陳臣內二附楚脅君其逃也亦不得已焉耳鄭伯既而乞盟桓之義足以服鄭也陳侯遂不復來悼之德無以綏陳也趙鵬飛曰陳方受兵宜遣使告晉而自守待救乃既輕身出會矣晉不救宜請歸以死社稷晉何辭以羈之初既不慮而出終乃不告而逃雖聖人以義責人而不窮人於義然以國君而逃庸為有禮乎與鄭伯首止同辭賤之至矣八年春王正月公如晉公嗣位八年三如晉矣夏葬鄭僖公賊未討何以書葬舊史無弒文雖削其葬無以明討賊之義也鄭人侵蔡獲蔡公子燮鄭騑弒君欲從楚也乃偽若不欲從楚者而侵蔡蔡附楚久矣中國不復問其去就鄭方居喪無故而亟侵之何為哉媚晉而逭討也然因是即可致楚師而堅從楚而國人亦無辭耳騑亦狡矣哉蔡無敗績之文而獲其公子適得之也季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘會以命諸侯朝聘之數晉侯重煩諸侯而使大夫聼命意非不美然以是優諸侯而政反出於大夫毋乃以姑息為愛而不由德乎且是時君弱臣強伯主又降尊與會愈莫挽矣張洽曰大夫會諸侯必人之者所以嚴君臣之分謹上下之交而革伯者茍且之政也是也至以鄭伯與會更非矣鄭賊不討賊臣反使嗣君背喪來晉以獻捷為名何禮也哉因其適至使列於會幾以蔡捷可掩失陳之恥也直書而罪著矣公至自晉公在晉數月矣不列於會留之何為若謂不敢煩公則鄭伯固在會矣名曰優公而實少之以為會公不如其會宿也莒人伐我東鄙疆鄫田也魯主鄫以通於晉莒滅鄫晉不討於是伐魯而疆鄫田輕晉也一念之怠四國覘之矣至魯不能存鄫而竊其田以興莒師又不能禦其何以為國秋九月大雩冬楚公子貞帥師伐鄭得陳又爭鄭也向使救陳楚師焉得至鄭哉救陳則兩得也不救遂兩失矣據傳楚師至而鄭平蓋招楚以從楚鄭之本謀也晉侯使士丐來聘拜公之辱且告用師於鄭也晉屢聘魯猶知修禮諸侯宜乎大小輯睦伯事復興也九年春宋災外災來告故書夏季孫宿如晉報士丐之聘也士丐來聘報公朝也又報之過恭矣五月辛酉夫人薑氏薨宣公夫人公袓母也秋八月癸未葬我小君穆薑四月而葬速也穆薑為行父所幽以死蓋假義以逞其私忿而成襄兩公無能變焉君弱臣強一至此哉冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭去冬楚伐鄭而不能救今已逾歲又不敢伐楚而徒伐鄭其何以責鄭幸不強要鄭而用荀罃三分四軍之計以敝楚且歸謀所以省民是猶知本者故卒成三駕之功十有二月己亥同盟于戲鄭受盟也書同要之也李廉曰時諸侯皆不欲戰則內外之志咸疑怠矣盟書同雖曰同外楚而實著其反覆也幸悼公方眀卒有成績則此盟蓋盛衰之機括哉楚子伐鄭晉楚迭伐而鄭左右從大國無義小國無信也十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤晉與楚爭鄭雖得鄭而屢失之以不能絶楚之侵伐也因欲用吳以犄楚然吳強而逺故晉合諸侯逺會吳以結之柤楚地蓋示楚以已得吳也與齊桓結江黃之意同不用其兵而藉其勢也但以伯主而降尊逺會雖曰以權濟事而功烈益卑矣夏五月甲午遂滅逼陽逼陽國名妘姓因會而乘便以滅之也意以逼陽為晉吳往來之衝故滅之以通吳乎然非義矣故書以罪之公至自會楚公子貞鄭公孫輒帥師伐宋凡內外卿專將言帥師會伐用衆惟魯卿言帥師詳內而略外也他國會伐用衆惟列序某師某師而已蓋或同謀用衆或從大國之令而用衆其志不在一國故不言帥師也今鄭從楚會伐而書帥師蓋鄭自用衆以媚楚非出楚令也其惡益甚矣故書以罪之晉師伐秦此荀罃將也止書師者輕民命於所不當用則師為重也諸侯惟宋事晉最謹今宋受兵不速救而治己之私怨不知務也且楚通秦犄晉與晉通吳犄楚其計同也晉知吳楚相敝為己利乃與秦相敝以利楚計亦左矣秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭鄭從楚伐宋故晉帥諸侯伐鄭左謂晉悼三駕此其一也柤之會光列小邾子之下正也今會伐鄭光先至晉悼遂進其班於滕薛杞小邾之上眀年伐鄭光又先至更進於莒邾之上蓋以齊國大而紊禮以懷齊也光竟偃然受之伉亦甚矣故據事直書以著其失冬盜殺鄭公子騑公子發公孫輒兩下相殺兩書名氏者皆卿也卿近於君而權足亂國被殺者即有致殺之由而殺者之罪大矣故詳其名氏以正其無君亂國之罪今殺者尉止等也皆非卿也既無列於朝而伺隙竊發則其名可略而目之為盜盜固當罪而被殺者亦有招之之罪且亦國君無政之故也凡國討書國而目其大夫蓋大夫者君之大夫也衆殺書人而亦目其大夫衆既繫國則亦其國之大夫也賤而書盜豈可同君之例竊發者止此數族亦豈可用衆之例故不曰其大夫也然何不用盜殺蔡侯申之例而書盜殺鄭大夫某某乎蓋騑也堅從楚以勞中國又弒君之賊發與輒惟騑是從不書大夫者皆當討之賊也然從討賊之例當去其屬籍何以猶書公子公孫乎蓋尉止等非能以賊討不可以亂易亂也此春秋之權衡也戍鄭虎牢諸侯伐鄭師於牛首適鄭有內難若乘亂攻之入鄭必矣晉不志於克鄭而志於服鄭故於向所城之虎牢以諸侯之師戍之夫虎牢非鄭地矣而繫以鄭左云言將歸焉得其旨矣蓋求鄭服而已不貪其地也陳宗之曰既駐師扼險以逼鄭兼欲斷楚之路為鄭屏蔽鄭服則將歸焉德威並行以懷鄭也夫城而不戍猶不城也戍則宿兵峙糧退可守進可戰鄭服則保鄭以拒楚鄭二則南向足以禦楚反向足以臨鄭楚公子貞帥師救鄭凡救多善辭而亦有異伯主之救安攘之義也諸侯相救恤鄰之道也今鄭黨楚而楚救之是爭諸侯耳豈善之哉紀其實焉耳夫晉伐鄭以疲楚楚亦伐宋以撓晉晉不敢當楚楚亦不敢當晉故屢出師而不相遇今晉伐鄭而楚救鄭則當晉矣荀罃猶欲避楚是止欲勞諸侯而自完耳且以十二國而避楚之偏師亦懦矣於是鄭復從楚公至自伐鄭十有一年春王正月作三軍書費誓曰魯人三郊三遂則魯有三軍舊矣史克頌僖公曰公車千乘猶不失其舊也今書作三軍至昭五年書舍中軍似魯止二軍今增中軍後舍中軍仍為二軍何也孔頴逹曰文公以來伯主之令軍多則貢事多魯自減為二軍理或然也然則宜書復何以為作蓋軍本屬公有事諸卿更將事畢則將歸於朝車復於甸甲散於邱卒還於邑不相繫也文宣以來政在私門襄公幼弱季氏益張假立三軍因以改制三分公室各有其一且兹之三軍亦非舊制也故特書作以著亂王制弱公室之罪夏四月四卜郊不從乃不郊凡卜郊不從必卜免牲免牲則不郊矣卜免不吉而不敢免故直書不郊鄭公孫舍之帥師侵宋方晉悼初與楚爭鄭也晉楚之強弱未定故騑欲惟強是從而舍之欲仗信待晉今騑死而諸大夫亦知楚弱於晉矣舍之仍復叛晉何也晉避楚也且不特叛晉而已又侵宋以挑釁焉欲晉驟來而楚弗能敵然後可固從晉也後雖卒如其計然亦行險徼幸矣萬一事出不意國其殆哉晉以計自完鄭以計致晉君子均無取焉公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭此三駕之二也是時兵戍虎牢會伐為易故諸侯應時而至秋七月己未同盟于亳城北鄭復受盟也前盟已渝又盟何哉公至自伐鄭楚子鄭伯伐宋鄭既同盟矣而楚又來鄭伯迎服遂與之伐宋其背盟也愈速其猾夏也愈驟豈不畏晉哉不得已也晉志避楚故激使當楚也夫晉力能制楚而屢避楚止驅諸侯而用之鄭者蓋勞諸侯以困鄭敝楚而晉可全制其勝也用術不用誠計利不計義矣公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚此所謂三駕而楚不能與爭也一嵗再出楚疲而無力以應也伐而會得鄭之辭自是鄭從晉二十餘年中國賴以少安三駕雖勞其功曷可少哉雖然悼止爭鄭耳與桓之服楚文之勝楚有間矣况頻嵗興師黷武已甚楚雖疲而諸侯亦道敝矣幸吳議楚後不暇爭鄭不然諸侯道敝而無成必二恐如士丐所慮矣惡可與桓文比烈哉公至自會鄭亦與會而服則諸侯息肩矣故以會致楚人執鄭行人良霄行人使人也兵交使在其間以通命也楚不能爭鄭忿而執行人行人何罪哉書以譏之冬秦人伐晉秦與楚婚故黨楚伐晉十有二年春王三月莒人伐我東鄙圍台莒三伐魯矣伐而圍台愈暴矣季孫宿帥師救台遂入鄆文十二年行父城鄆蓋鄆本莒邑魯又於其地城之則魯亦有鄆矣此之鄆則莒之鄆也故杜預曰鄆莒邑也是也帥師救台應兵也遂入鄆則非義矣夏晉侯使士魴來聘來聘且拜師晉悼服鄭制楚而修禮於諸侯善持勝也秋九月吳子乘卒吳既列會故以卒赴不書葬避其號也冬楚公子貞帥師侵宋不伐鄭而侵宋不能爭鄭也公如晉朝且拜聘也過恭矣左以為禮何哉十有三年春公至自晉夏取邿邿微國也書取諱內滅也據傳邿亂分為三師救邿遂取之以救為名因而利之也自作三軍公無兵焉三家滅之假公命耳臣獲利而君尸名猶諱之者尊君而不欲尸其名也秋九月庚辰楚子審卒趙鵬飛曰楚既仇中國猶赴於諸侯者卜諸侯之去就也冬城防莊二十九年已城防矣今復城之者臧氏食采於防蓋因季氏首城其私邑而效之以崇其私邑乎魯有二防一近宋隱十年伐宋取防是也一近齊隱九年會齊侯于防是也此蓋近齊之防厥後齊髙厚伐魯圍防意此亦假備齊而城之歟十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向使舉上客而叔老並書者以卿為介也以卿為介者名為尊晉實季孫之自尊也而叔老不敢違魯事可知矣晉士丐鄭公孫蠆以名見卿也諸國書人皆微者也微者而加於鄭卿之上以國之強弱為序不計位之尊卑也非禮也前此晉藉吳犄楚故再往會之今晉為吳謀楚亦往會之何哉虗隆其禮而不實應其事也故晉吳之會止此二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宮括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦晉悼用十年之力帥諸侯以爭鄭僅乃得之又帥之伐秦其勞敝中國亦甚矣夫伐秦與爭鄭異復私怨耳前此伐秦多自戰春秋猶惡之况用諸侯以行私乎己未衛侯出奔齊春秋眀君臣之義而亦因其事以為權衡弒君則急於討賊而君之無道在所後逐君則臣固當誅而君亦有失馭之戒故君之見逐與臣之見逐同書奔而逐君之名氏姑略之然觀屬辭而臣之惡與君之過亦著矣衛君夏奔林父冬會諸侯之卿於其私邑則林父逐君可知也據傳衛侯不禮孫寧又歌詩誚之則失道矣而林父遂先謀亂公兩使人於林父皆殺之及公奔又追敗公徒其未至弒逆者幾希視他逐君者罪尤甚故君奔而立君必名奔君以别之今孫寧立剽而衛侯不名變文也見臣之罪大君之過微全君之尊嚴臣之誅也莒人侵我東鄙季孫宿入鄆非兵首也莒猶以為憾侵魯以報之國小而競於兵湨梁之執有由矣秋楚公子貞帥師伐吳楚以吳故不得志於北方故置鄭宋而伐吳傳載是年冬貞將卒遺言必城郢則吳為楚患迫矣冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚林父逐君晉悼不討而使大夫會之且即會於其私邑是成亂也故是春列國之會于向者大半不至亦可見人心之公而悼為荀偃邪説所誤不小矣列序諸大夫而無貶罪歸悼公譏不在大夫也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉許翰曰不盟於國而盟于劉崇向戌也但魯於晉卿從未出國而盟何於宋卿而崇之若是乎髙閌曰凡因聘而盟者必在國內宣十年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟成十年晉郤犫亦然襄五年衛孫林父亦然趙鵬飛曰魯地無劉由經繼書劉夏逆王后之事相連而誤耳姑存二説備參劉夏逆王后于齊劉采邑而即以為氏也夏名也王之上士也春秋十三王其逆后凡兩見蓋太子立而妃為后者無緣而書王逆后而非魯主婚即主婚而得禮者亦常事不書也惟祭公以遂事譏劉夏以非卿譏也齊薑歸京師不書者歸無可譏也夏齊侯伐我北鄙圍成魯舊事齊後從晉而為鞍之戰齊人怨焉然不敢加兵於魯者三十餘年畏晉也今衛侯奔齊晉侯且釋君助臣會戚以成其亂而季孫宿亦與焉故齊以晉為不足畏也遂伐魯而圍成公救成至遇自作三軍公無軍矣今公自將救成者齊師久駐三桓畏之故迫公使將蓋避其危而以公試也逮齊師退而城成郛則季叔帥師屬辭而觀其情見矣然何以不至成而至遇蓋軍非公有豈能為公用哉軍心畏齊故公帥之而不前也救書次軍能救而已不力也救書至已欲救而軍不前也以城之安自處且締其私交之固以救之危子君兼陷以無勇之譏三桓之罪可勝誅哉季孫宿叔孫豹帥師城成郛郛郭也為齊所壞故城之然孟邑而季叔城之何也三家相黨假備齊為名興大役以崇私邑也其城既固故卒為魯患而不可墮秋八月丁巳日有食之邾人伐我南鄙邾屬齊而黨莒故莒伐魯東齊伐魯北邾伐魯南魯望國非弱也不競一至此哉許翰曰政在君則民一民一則國強政在臣則民二民二則國弱魯至四鄰交侵者民分於三桓故也冬十有一月癸亥晉侯周卒周之父曰惠伯大父曰桓叔晉襄少子也厲公蒙禍周以公族迎立生十四年矣乃能力修內治勤撫諸侯救宋圍彭城制鄭城虎牢諸侯翕然歸之後雖失陳而卒得鄭楚不能爭功亞桓文焉然不能謹大夫専政之漸至孫寧逐君而成其亂其惡大矣蓋質美未學大義不眀且繼弒逆之後賊臣不除卒為所誤惜哉十有六年春王正月葬晉悼公欲會諸侯而速葬其親悖禮甚矣人倫政事之本國君風化之基晉平其何以宗諸侯三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟晉悼將為魯討莒邾未果而卒平以繼父志為名因會以圖伯也衛侯者誰剽也列姦於會失於悼而成於平也然經何以書衛侯蓋篡者皆不沒其實即所以實其篡而正其誅也齊不與者髙厚逃也於是諸侯在而大夫盟是無君也夫平公初政大夫何遽敢無君平公使之也蓋是時政多逮於大夫以為盟君不若盟臣之愈也是以使大夫盟也且六卿専晉之勢已兆意必晉臣以是誤平而平遂聼之耳前此大夫猶隂竊君權此盟之後直擅之矣平自禍其國並禍諸侯之國而諸侯亦皆聽之均難辭咎也晉人執莒子邾子以歸莒邾侵魯信有罪矣請於王執而歸于京師可也擅執二君纍囚以歸是無王也故書人以著其罪齊侯伐我北鄙齊侯自成十七年柯陵之會遂不復出惟使世子出會大夫聽命今晉為魯執莒邾齊復伐魯以報之侮晉也夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許許男請遷於晉為其臣所阻故晉伐之是晉主兵也鄭與許有怨而君來會伐曷為先鄭臣不可以先君也然鄭豈能號召諸侯鄭伯之下晉卿首列焉則主兵者亦見矣宋稱人而居衛下將卑師少也夫許男受制於臣不以義責其臣而遽以兵臨其國失恤小之道矣秋齊侯伐我北鄙圍成三伐魯而再圍成矣再圍者志必得成也大雩冬叔孫豹如晉魯不能自強急而求晉亦可鄙矣欽定四庫全書御纂春秋直解卷九下十有七年春王二月庚午邾子牼卒邾子執矣不書卒於晉歸之也歸不書不告也不書葬有怨也宋人伐陳宣十四年宋師伐陳為晉討二也此則傳不見二國致釁之由意亦晉令乎但陳侯前逃鄬之會晉之過也今楚弱矣綏之以德可以得陳遽使宋伐之乎且陳近宋宋實利之假晉以濟其私耳蓋參譏之書人將卑也夏衛石買帥師伐曹孫蒯因田而被辱自取之也蒯欲伐曹而石買乃為孫氏役乎買石碏之後碏討賊而買黨賊愧其祖矣秋齊侯伐我北鄙圍桃齊髙厚帥師伐我北鄙圍防捨成而圍桃蓋出魯不意且君臣同來分圍二邑更使魯兩不相顧也九月大雩宋華臣出奔陳華臣暴亂宗室國討不加懼而出奔失政刑矣且陳為宋之仇國而臣託焉尤可誅也冬邾人伐我南鄙邾之先君以伐魯見執嗣子在喪而又伐魯是濟惡也直書而罪著矣十有八年春白狄來春秋之時戎狄錯居中國與之會盟則有譏若其慕義而來則容而接之亦非不可惟謹所以待之之道而已夏晉人執衛行人石買石買伐曹罪也然當問之於衛今因使於晉而執之失討罪之義故書行人以著其失且買伐曹承孫氏之意耳孫寧又有逐君之大惡乃捨大治小庇孫寧而責買乎執復不歸京師故斥晉人以罪之秋齊師伐我北鄙六伐魯而四圍邑矣蓋晉悼既殁齊思爭伯故挾莒邾以病魯以為魯服則東方定可以與晉爭衡矣不知無德禮而為暴未有能濟者也冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊齊暴甚矣晉侯帥諸侯討之齊禦諸平隂畏而遁遂進圍其國書同圍猶云共圍也言其勢甚盛而齊幾亡也著齊之自取也杜預以為同心非也彼邾莒嘗病魯矣滕薛小邾亦皆屬齊矣畏晉而不敢不來豈同心之謂哉齊圍魯邑晉圍齊國是效其所為而又甚之也聖人惡為暴而又惡禁暴者之反為暴也莒子亦執於晉今會者亦晉歸之也曹伯負芻卒于師楚公子午帥師伐鄭鄭公子嘉召之也楚間鄭之從晉圍齊於是伐鄭是為寇耳况從逆臣之邪謀乎十有九年春王正月諸侯盟于祝柯此圍齊之諸侯也齊未服故再盟恐諸侯之二也晉人執邾子邾仍伐魯罪也然既同圍齊復盟于祝柯矣又執之乎不書以歸旋釋之也何以釋脅取其田也公至自伐齊取邾田自漷水田繫邾安得亂先王之疆理而取之自漷水隨漷水為界著取之多也而晉脅邾與魯豈伯主之道季孫宿如晉拜師且拜田也葬曹成公夏衛孫林父帥師伐齊晉令也齊未服故也然伐齊而使逐君之賊尸其事乎秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還善士丐也晉前圍齊今又侵之非義也士丐至榖聞喪而還得禮不伐喪之義故善之榖梁曰臣不專大名宜壇帷而歸命於介如其説不更善乎曰猶在晉境可也榖齊地駐師敵境遣介請命懈已軍心敵茍乘隙是棄師也况喪必不可伐豈進退可疑而猶待請乎帥師以出聞喪而還是不挾衆邀功而要之以禮也春秋書以示褒垂訓逺矣八月丙辰仲孫蔑卒齊殺其大夫髙厚崔杼殺之也曷為書國蓋齊靈廢世子光而立庶子牙髙厚傅之是從君於昏也然既君命立牙矣崔杼乘君疾革迎光而立之執牙而奪其位杼因殺髙厚於灑藍而兼其室是爭權相滅者杼之本謀而亦光之所欲也春秋書齊侯環卒繼書齊殺其大夫髙厚著光之逆固不得僅治杼之惡也由是政在杼而光之禍亦兆於此矣鄭殺其大夫公子嘉據傳鄭人以盜殺三卿嘉知其謀楚午之師亦嘉所召故殺之則嘉有罪矣乃子西子展遂分其室而鄭君亦聽之非義討矣故稱國以殺而不去其官冬葬齊靈公釋怨也不廢喪紀以修舊好禮也城西郛郛不繫邑國之郛也懼齊而國郛是城其守國也末矣叔孫豹會晉士丐于柯士丐曷為至柯據傳齊及晉平盟於大隧蓋士丐既返而過柯豹往會之以固晉魯之交而察齊人之情也城武城據傳豹歸曰齊猶未也不可以不懼乃城武城魯倚晉撓齊今晉齊平則勢去而孤立矣會晉而繼以城武城不勝其勞且拙也庸為國有人乎二十年春王正月辛亥仲孫速會莒人盟于向及莒平也莒侵魯為齊也晉執莒為魯也今齊將從晉故莒先平魯一不伐喪而諸侯修睦禍患之興惟禮可以已之矣速者蔑子也未練而出會非禮也夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵齊服也齊之無道晉帥諸侯圍之而不服以士丐不伐喪遂會澶淵招㩦以禮服逺以德信哉然不伐喪可嘉此盟究不足貴也光雖齊世子亦已廢矣乘父病篤執牙以奪其位是篡也衛剽亦篡也會列二篡晉盟替矣齊桓所不為也秋公至自會仲孫速帥師伐邾晉執邾子而使魯取其田晉於魯厚矣魯之報邾亦可已矣况晉甫為澶淵之盟魯邾咸與焉而又伐之可乎蔡殺其大夫公子燮蔡公子履出奔楚燮嘗獲於鄭今書蔡大夫者蓋歸於蔡也蔡從楚久矣燮欲從晉正也且先君之意也蔡乃殺之以媚楚乎故稱國以殺而不去其官履其母弟也懼禍故奔但從楚為可罪耳陳侯之弟黃出奔楚二慶迫之也書弟罪陳侯不保其弟也襄六年楚圍陳陳侯在鄬二慶使楚執黃以脅陳侯今因蔡燮背楚又誣黃同謀蓋黃以親用事二慶欲介楚力除黃而專陳政也黃不奔他國而即奔楚將與蔡履同乎曰不同履見兄燮背楚見殺而奔楚者懼纍也明己之不敢背楚也則不與兄同心矣黃因二慶之讒而奔楚者辨誣也斥二慶之惡而欲楚討之也蓋猶有為國之心差優於履也然懼纍者與辨誣者咸奔楚何也楚強而陳蔡世服焉倘奔他國楚以為討陳蔡必滅其家以説於楚不若歸命於楚其情得白庶免於禍也因是見陳蔡之不可為也其臣非黨楚即畏楚滅無日矣叔老如齊魯與齊至澶淵而始平今修聘欲固齊好也冬十月丙辰朔日有食之季孫宿如宋據傳報向戌之聘也但戌聘於今五年矣今始報之哉蓋季氏與邾為姻邾與宋為姻此宿之私行而託於聘也二十有一年春王正月公如晉晉悼之世公四如晉彼時魯國少事無求於晉而猶屢朝之蓋以公之朝為重也平公之立已六年矣公始如晉魯屢受齊與莒邾之侵伐求於晉者實多乃終平之世公僅一朝昭立而朝平者二其一為晉所辭至河而返而魯臣之聘晉者凡十蓋晉平即位湨梁首以大夫盟政自大夫出矣故不以公之朝為重也而晉伯之衰世變之下比事益見矣邾庶其以漆閭丘來奔庶其邾大夫也漆閭邱二邑名庶其食邑也以邑出為叛叛而歸魯則據其至魯而言來奔內外異辭也然舉地言奔則庶其之叛與魯之納叛兩明矣天下之惡一也執而返之義也而遂受之是貪利而為盜藪也且疆場之釁多由納叛故書以示戒夏公至自晉庶其春來公以夏至則受庶其者季孫耳李廉曰經書三叛人此年邾庶其昭五年莒牟夷三十一年黑肱春秋內大惡諱此皆直書不諱者皆公不在國而季孫受之也與僖十七年公會淮未至而直書滅項義同秋晉欒盈出奔楚士丐逐之也然欒氏之積惡有自來矣書弒君而未討黶又重之以汰禍起內亂天亡之也盈雖無大惡而亦失於間家又承積惡宜有餘殃矣楚晉之仇也盈奔楚欲因楚力以復入是無君也九月庚戌朔日有食之冬十月庚辰朔日有食之日食之變起於交推步之術皆一百七十三日始一交去交逺則日食漸少無頻食之理此年及二十四年則頻食也然漢世亦有頻食者髙帝三年及文帝三年是也或傳寫誤歟抑天道逺而難知歟曹伯來朝喪畢而來見以事王者事魯也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任左云錮欒氏也士丐畏欒盈之多士也遂信讒而逐之又懼其為亂而錮之夫盈非有犯上可誅之罪丐實忌盈於國何有且逐盈而窮治其黨濫及無辜雖叔向之賢幾且不免今又使君會諸侯以錮盈而逞其憾丐亦悖矣哉而平公聽之非君道矣且此何事而勤諸侯乎失伯職矣卒之激盈為難幾致國禍焉二十有二年是年十月庚子孔子生春王正月公至自會夏四月秋七月辛酉叔老卒公孫嬰齊子也後書叔孫者為三桓止書叔者皆肸之後冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨左云復錮欒氏也欒盈以今秋去楚適齊故復為此會以堅其約雖諸侯在列意專在齊也晉平徇柄臣之意為一亡臣再勤諸侯昏庸一至此乎齊侯在會蓋貌從而心違也明年夏盈入晉齊納之也及秋齊大出師伐晉以盟主而受伐矣公至自會楚殺其大夫公子追舒楚殺追舒以寵觀起蓋藉口之辭楚子語追舒之子棄疾曰令尹之不能爾所知也是謂其不能有事於諸侯藉寵觀起以殺之耳其罪不至死且與其子謀非君道矣故稱國以殺而不去其官二十有三年春王二月癸酉朔日有食之三月己巳杞伯丐卒夏邾畀我來奔畀我庶其之黨魯既受庶其而寵安之故畀我繼至葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳黃奔楚訴二慶也據傳陳侯亦如楚蓋惑於權臣而為黃與二慶和解之爾楚召二慶不至遂挾陳侯以圍陳二慶以城築之虐自見殺於役人故不得以討賊書而稱國病陳侯也二慶罪有輕重故書及二慶既殺黃歸易矣自楚因楚力也又以責黃之脅君也晉欒盈復入于晉入于曲沃盈既奔矣猶繫晉者士丐逐之非國討也責丐也復入者逆辭入晉則作亂以攻君矣罪盈也曲沃其舊邑也入晉後而入曲沃不克而據邑也不克而猶能據邑者曲沃不知有君惟知有盈也入晉蓋因曲沃之力不先書入曲沃者志在亂晉不在據邑也繼書入曲沃者據邑敵君猶欲亂晉也春秋備書之以正逆臣之誅秋齊侯伐衛遂伐晉盈入晉而齊伐晉傳稱齊隂納盈者信矣乃盈入不書自齊者盈以攻其君為罪齊以亂伯國為罪而盈借外權與齊助臣叛猶小矣故書入書伐舉重也伐衛遂伐晉者志本在晉而伐衛以先之欲晉之不備也盈亂於內齊撼於外晉蓋岌岌矣書以著齊之惡又以見晉之失道而召侮也八月叔孫豹帥師救晉次于雍榆救晉義也救而次則赴義不勇矣凡直書救者成其救也有名為救而削其救者不成其救也次而救救而次則失救急之義而猶存其救也僖元年齊之於邢先次後救止而有俟遙為之援也然狄終去而遷夷儀猶賴其援也此年魯之於晉先救後次畏而不前姑助之勢也然齊終還而獲晏氂猶資其勢也此功罪之權衡也己卯仲孫速卒冬十月乙亥臧孫紇出奔邾紇阿季氏為之廢長立少乃孟氏效尤遂為紇禍其奔也自取之也晉人殺欒盈盈嘗為晉大夫殺不書大夫者既出奔楚義與君絶也書人者從討賊之辭稱兵為亂義當急討也齊侯襲莒輕兵以掩其不備曰襲蓋無名不義之甚盜賊之為耳自晉未返遂襲莒不書遂者間有事也二十有四年春叔孫豹如晉仲孫羯帥師侵齊豹救晉不力因假聘以觀晉意倘晉憾魯即可白已次于雍榆之故因再請侵齊以悅晉焉觀繼書侵齊其情見矣故侵齊雖羯帥師實豹之計也然前此當救而畏齊今又無名興師以媚晉怯於為義而勇於為不義也取輕於晉為暴於齊戕民生結國禍其計舛矣羯繼速為卿未練從戎亦非禮也夏楚子伐吳楚三伐吳矣襄三年以附晉也十四年以助晉也今則晉吳不交十年矣何以伐吳晉伯既衰楚將復爭諸侯故先制吳也前之兩伐皆命將此則楚子自將也秋七月甲子朔日有食之既齊崔杼帥師伐莒齊侯襲莒身傷兵敗不得不許莒成崔杼復伐之者從君之惡以悅君也夫杼以棠薑之故已畜逆謀猶從君而悅之何也蓋齊禍已成於伐晉杼順君而伐莒正所以重民怨啓鄰釁激伯主之怒倘晉來討斷不捨齊侯而責杼也君受其名而杼因執其兵柄則可制君而成其逆謀乃齊侯且悅其從己而任之不疑其及宜矣大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀謀伐齊也齊莊新立晉不伐喪故受盟于澶淵及商任沙隨之會晉失其令齊遂輕晉甚至稱兵伐晉故晉為此會將以伐齊然會而不伐不能伐也國勢不競衆心不一也夫伯主將禁諸侯之擅相攻今伯國受伐合十二諸侯而莫能令焉書之以著晉衰而失伯也冬楚子蔡侯陳侯許男伐鄭間晉之衰而爭鄭也三國書爵序楚子下惡從楚也晉平不綱諸侯解體啓楚人窺伺之階故前日同圍齊而楚伐鄭今方會夷儀而楚子又帥三國而伐鄭晉不能正齊之罰反使楚乘隙以為鄭患矣據傳雖有救鄭之文不書者不成救也公至自會止以會致其伐而不果救不及事可知矣陳針宜咎出奔楚慶氏之黨也宜咎比匪固為罪然黃之復怨亦甚矣趙鵬飛曰成襄以還諸侯從晉者其臣亦倚晉從楚者其臣亦倚楚故其出奔者宋衛多奔晉陳蔡多奔楚各倚其國之所畏以脅其君故春秋因其志而書之以見其惡叔孫豹如京師據傳榖洛鬬毁王宫齊為王城郟蓋齊既背晉故求媚於天子且以示義於諸侯魯與齊積怨而懼晉之不競也故使豹聘王且賀城蓋假寵而釋齊怨爾然自宣七年蔑如京師後今始一見慢王甚矣大飢民乏食曰飢大則異乎常矣備荒無政何以為國二十有五年春齊崔杼帥師伐我北鄙杼又帥師矣齊侯襲莒而杼因之伐莒齊侯惡魯而杼又因之伐魯雖曰報羯之侵而意不在病魯魯人且知之矣而齊侯不悟則貪忿之心蔽之也趙與權曰兵凶器也弗戢必自焚三年之間伐衛伐晉伐莒伐魯曾弗之戢而又授兵於好亂之夫宜其不免也夏五月乙亥齊崔杼弒其君光齊莊乘父病篤而攘位當膺王誅然杼固導莊為篡者也莊固杼之君也即莊侮大陵小亂杼之室亦惟王治其罪杼惡得而斃之故書弒其君以正其罪至州綽等死難而不録者蓋以其死差足償其從君於昏之責安得與赴義者比公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀晉為會以謀報齊之伐也夫齊伐晉私怨耳齊莊死怨無可報矣惟是莊以弒死則人倫之大變義所當討晉平宜釋怨以申義帥諸侯而改治焉執戮崔杼而置君以定齊則大倫正伯業光矣乃聽杼邪説反以弒君為伐晉之故許其納賂以求成天理滅矣夫杼以五月弒君晉以是月出會杼尚未知晉師之來祗以私忿弒君而欺晉以自解晉平不知其欺是許賊臣可弒君以與大國市也知其欺則是甘受其愚惟賂是貪以成其惡也故以會而不伐深著晉平之罪六月壬子鄭公孫舍之帥師入陳去秋夷儀之會楚合陳蔡許伐鄭當陳隧者井堙木刋是年復會夷儀慮楚復來先問罪於陳勝而入之然而非道矣鄭危國也以禮息民猶懼不靖而自開兵釁乎雖有辭可執勝而不有然書入陳猶責鄭也惟視無名陵小者差善耳秋八月已已諸侯同盟于重丘此之同盟左云齊成故也杜預因曰伐齊而稱同盟明齊亦同盟但齊來者為崔杼歟概言諸侯可乎為杼所立之新君歟春秋亦何必為晉諱惡而渾言諸侯耶據傳齊使隰鉏請成慶封如師是杼與新君實未嘗來則諸侯者蓋會夷儀之諸侯也乃盟書同何也晉受賂縱賊諸侯不能遍有賂也晉懼失諸侯故同盟以要之使不叛晉耳公至自會衛侯入于夷儀會夷儀之衛侯剽也入夷儀之衛侯衎也衎入夷儀與鄭突入櫟同突名而衎不名者衎正也其入也期復其位非篡也不書歸者晉憫衎失位命衛與之一邑國猶剽有不可言歸也楚屈建帥師滅舒鳩舒先與楚俱張故曰荆舒庸蓼鳩三國皆舒也今皆滅矣滅國悉書著吞併之罪傷興滅繼絶之無人也冬鄭公孫夏帥師伐陳責鄭也入之伐之已甚矣十有二月吳子遏伐楚門于巢卒巢小國在吳楚之介文十二年楚圍巢蓋久屬楚矣吳伐楚至巢巢附楚不聽其過故門于巢門者攻其門也卒者死於兵也諸侯伐國不名今吳子名蓋以卒之名加之伐楚之上也自輕以死於兵責吳子也而巢人黨楚之罪亦具矣君殺於敵曰滅吳子不言滅者蘇轍曰死而非獲也非獲則卒也二十有六年春王二月辛卯衛寧喜弒其君剽喜受父命使納獻公以免逐君之惡剽又以公孫非次而立則喜罪宜末減矣亦以弒君書何也蓋以王法治剽則篡也宜討也使獻復國有道請於王而治其篡亦可也至於衛人凡立剽之朝者剽固其君也况寧氏親助其篡父子臣之者哉不正其罪則權臣之輕議廢立者有所藉口矣且獻既以晉力入夷儀喜亦懼禍之及獻又以茍反政由寧氏誘之則喜弒剽純為其私而已衛孫林父入于戚以叛據邑背君曰叛林父首逐獻公矣今剽弒而獻將歸故入於戚以叛逐君而復叛君書之所以誅也春秋之季大夫皆崇其私邑叛而不能討天下之亂成矣甲午衛侯衎復歸于衛復歸者位未絶也國本其國不幸而出有歸道焉苐誘喜以惡己因為利失其道矣故斥而名之夏晉侯使荀吳來聘晉為孫氏故將討衛荀吳來聘召公也公會晉人鄭良霄宋人曹人于澶淵澶淵衛地近戚晉黨孫氏討衛而疆戚田取衛西鄙以與孫氏故會澶淵也卿例書名傳以晉為趙武宋為向戌貶稱人也但宋果向戌肯居鄭下哉蓋晉宋皆微者故良霄居宋上耳敢先宋不敢先晉伯故也禮以勢易也然晉為會而使微者何也黨孫氏不義也疆戚田細事也趙鵬飛曰晉平亦知此舉為不義故不躬會而以微者主之也然何以使魯以君親之移惡於魯也蓋晉主此會則得謗林父事晉最謹衛逐林父晉莫之恤則愧林父晉素有德於魯故使魯主之則恩歸於晉怨歸於魯所以有荀吳之聘斯有澶淵之會也是也然晉平何利為此其臣尸之也六卿專晉久矣羽翼叛人使交為亂然後已為亂而莫之討也晉陽朝歌之入以至韓趙魏之分晉此會啓之矣秋宋公殺其世子痤目宋公責之也世子國本而至於殺讒故也內嬖外姦而奄寺為之附會其禍成矣乃晉獻殺申生獻與驪姬謀之宋平雖寵芮棄本無殺痤之心而棄也連奄豎結權姦共造讒而殺之可畏哉獻終身不悔平猶能徐悟而烹伊戾似與獻有間矣然芮棄之寵向戌之任不少衰嗣為世子者即棄子也雖烹伊戾奚益哉略造讒者而目宋公端其本之意也晉人執衛寧喜孫寧之罪一也孫逐君寧弒君然衎正而剽不正不得謂逐輕於弒矣晉宜先執林父以正逐衎之罪次執喜以正弒剽之罪且返戚田而定衎位則伯職修矣若止治喜則已陂况不以弒剽執喜而以爭戚與戕晉戍乎不義甚矣故書人以著其悖八月壬午許男寧卒于楚朝楚而請伐鄭也以死要之遂以四嶽之胄而卒于荆蠻失所矣冬楚子蔡侯陳侯伐鄭蕭魚之後楚三伐鄭前此楚未得逞猶有諸侯之救焉今晉無能為矣故伐而莫救而鄭亦不禦以使其逞蓋安攘之業隳矣葬許靈公二十有七年春齊侯使慶封來聘靈莊相繼齊為魯難殆三十年景始立而通好賢於日尋干戈者矣夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋晉引楚為會以弭兵也春秋之季其亂極矣周有明王亦必用兵平亂趙武何人輕言弭乎是厝火積薪之下也緣晉君暗臣私無志諸侯武受向戌之愚悅其名之美遂欲博以為功然以此約楚楚可信乎楚敝於晉吳又撓之其勢已挫以弭兵招楚楚反張矣既引為會必有所要請晉楚之從交相見楚計必出於此晉慮不及而無以拒之紊中外之防褻王爵之貴假荆蠻之權重諸侯之困天下之大變也故書以謹之衛殺其大夫寧喜喜罪應討乃衛獻約以政由寧氏則其大夫耳惡其專而殺之則殺其大夫耳然使以弒剽討喜將為義討乎非也喜與晉里克不同也克殺奚齊與弒卓克自尸之惠雖以賂立可以討克失信之過小討賊之義大也喜之弒剽獻實誘之喜之專亦獻許之信義兩失無一而可也惠殺克不以其罪獻殺喜難言其罪故皆不去其官克之殺由於惠喜之殺請之於免餘獻口未許而心許之故皆稱國以殺衛侯之弟鱄出奔晉喜納獻與鱄有約獻殺喜鱄惡其食言故奔王樵曰書弟責衛侯也書奔於殺喜之下見鱄為喜出亦責鱄也初鱄不能以大義動喜乃從獻公政由寧氏之約則信不近義言不可復殺喜者此一言也不自咎始謀之不臧乃病失信而薄兄弟之恩棄君臣之義乎再三止之而不止決於自絶坐不向衛亦已甚矣秋七月辛巳豹及諸侯之大夫盟于宋楚請交相見晉許之矣又欲爭長衷甲為劫盟之狀而故使晉知之武懼而謀於叔向遂先楚夫交相見諸侯屈於楚盟先楚晉亦屈於楚楚主夏矣猾夏不足言也閲四年會虢仍先楚又閲三年楚且合十三國而獨會申執徐子伐吳滅賴甚至滅陳滅蔡其禍愈烈何弭兵之有至左以盟先楚經改先晉殊未然蓋會在夏盟在秋爭長在盟不在會也盟既先楚矣春秋豈能先晉而亂其實故止書大夫盟而不序則楚之陵晉之偷具見而存中國之意亦寓矣大夫繫之諸侯者是時大夫無諸侯矣存諸侯也豹不氏前見也左以逆命為貶亦非也季氏欲輕貢賦之數使魯視邾滕則失位矣大夫出境有可以重社稷者專之可也况命出季氏乎冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉衛侯殺寧喜石惡其黨也故奔邾子來朝邾自晉執其君魯取其田又納其叛國益弱矣至是來朝趙鵬飛曰邾子匿怨而來非得已也姑忍以存社稷耳左以為時事誤矣秋八月大雩仲孫羯如晉交相見之禍見矣公將如楚先聘晉以請命弭兵其名疲於奔命其實也冬齊慶封來奔崔杼弒君慶封黨之既而杼家亂封因除杼以專齊今盧蒲癸王何逐慶封齊人因求崔杼之尸戮之而改葬莊公封來奔魯受之齊人來讓遂奔吳夫齊莊之弒從死者皆幸臣今為之復仇者亦幸臣也而卿大夫無能為君討賊者亦卿大夫之恥也慶封歷諸侯而入吳其後楚執而討之又中國之恥也陳傅良曰齊滅崔氏而尸杼於市經不書者佚賊也崔杼弒君偃然在位而以家禍亡其宗如是而得書臣子之不誠於君父者得以盜名矣十有一月公如楚據傳為宋之盟故公及宋公陳侯鄭伯許男如楚陳傅良曰諸侯旅見於楚始於此舉魯以見其餘也書公朝于王所見王之衰書公如楚見伯之衰十有二月甲寅天王崩乙未楚子昭卒甲寅至乙未為四十二日蓋閏月之日不書閏者范寧曰閏承前月而受其餘日故閏月之日繫前月之下史之常體也是也文六年不告月書閏譏廢政也哀五年葬齊景公書閏譏殺恩也則特筆也二十有九年春王正月公在楚正月者王朔之始諸侯有王事則從王無王事而在國則朝正於廟禮也前此公如齊如晉而或廢朝正已為失禮然伯國猶以尊王為名惟先書如後書至即足正其失今朝僭王之楚楚無王而公亦自外於王朔而無王矣故特書在楚夫昭公失國居外春秋書所在今襄公因朝而出何與失國同辭蓋國建於王自外於王朔而無王即與失國者等且失國書所在存之也此書所在責之也乃公在楚在魯而當國者誰乎季孫宿也宿專國自託居守使公朝楚楚外蠻也辱甚矣又虎狼也危甚矣且因公在外取卞尚為有君乎故書王正以正公之無王書公以正季氏之無君書在楚以著公之辱與危且明非公志也乃公所以在楚者何止公送葬也天王甫崩不奔王喪而送楚葬乎不書楚葬惡其號而削之也夏五月公至自楚留楚蓋七月外屈於楚內疏於臣其至危之也然自楚告至固終不如周也庚午衛侯衎卒閽弒吳子餘祭閽守門者也書弒何以不稱其君閽賤不可謂之其君也胡安國曰左以吳伐越獲俘以為閽亦邇怨之失也仲孫羯會晉荀盈齊高止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把凡事有是非心有公私時之諸侯皆背公而失是即其是者不純是公者不純公然彼善於此恆録之如城成周關乎王室城虎牢繫乎中國城邢城楚邱城緣陵合乎恤患是也今晉平以把出而城把則私矣然使把果危亂當城豈可反以親故置之許其是恕其私可也乃把未聞內憂外患而欲完其城晉平止可自遣大夫以助役何侈然合十一國之衆代任其勞且非時役民不亦悖乎晉侯使士鞅來聘拜城把且使魯歸把田也把子來盟把本公爵莊二十七年始見經稱伯僖二十三年二十七年及此年三稱子餘皆稱伯穀梁以為時王所黜近之然亦不應倐升倐降至此闕疑可也李廉曰此非前定之盟亦非因朝而盟蓋晉命歸把田非公義魯歸把田非誠心故把子親來以要結之耳吳子使札來聘吳圖伯也楚之大也使椒來聘秦之大也使術來聘吳之大也使札來聘其事同故其文同或以其讓國而褒之又或以其釀亂而貶之夫褒貶各以其事讓國之褒安得於聘褒之釀亂之貶安得於聘貶之秋九月葬衛獻公齊高止出奔北燕據傳齊公孫蠆公孫竈放其大夫高止許翰云臣放大夫是無君也不可以訓故以奔書非也夫以不可訓而改之將春秋所書皆可訓者耶蓋放者論罪之辭必請於君書奔則非放也傳失實信經可也燕有二其一姞姓此則姬姓而國在北故以北别之冬仲孫羯如晉報士鞅也三十年春王正月楚子使薳罷來聘報公朝也小朝而大聘猶曰僭也內朝而外聘不更辱乎是楚以齊晉之待魯者行於魯也宋之盟為之也夏四月蔡世子般弒其君固先王之法內外亂鳥獸行則滅之蔡侯淫而不父王法所當治也然其世子則有父之親君之尊而敢肆大逆人理滅矣故書以正其罪商臣不誅般又襲迹矣五月甲午宋災宋伯姬卒災與卒連而貫以日見以災卒也伯姬之室夜失火保傅不至不下堂逮乎火而死或疑其輕生非也夫子制義婦人守貞其道殊也伯姫以成九年歸宋今已老矣而一貞自守臨危不亂蓋灼知禮重於生其心素定也然則宋平無罪歟曰迫不及待情可原也聞災緩赴其罪大矣天王殺其弟佞夫諸侯殺大夫不論有罪無罪皆稱國禁專殺也殺世子與弟目君甚之也今書天王殺其弟與列國目君者同文何歟曰天王異於諸侯者得討有罪耳非遂可以殺無罪也無罪而殺則兄弟之情無貴賤一也據傳靈王崩儋括欲立佞夫佞夫弗知景王立尹言多等殺佞夫則佞夫無罪也雖尹言多等殺之承王意耳故目天王以殺而書弟深病王也王道親親以及天下忌其弟以嫌疑殺之宜諸侯之不服而周不復興也王子瑕奔晉瑕與儋括同奔晉意與括同謀乎儋括不書賤也秋七月叔弓如宋葬宋共姬叔弓叔老子也魯人髙姬之節使卿會葬然非禮矣內女書葬者三紀伯姬不書諡紀侯未殁也紀叔姬媵也不得配君之諡此書共姬從夫諡也從夫諡禮也鄭良霄出奔許自許入於鄭許為鄭仇奔許將以亂鄭也自許有奉也不書復入者方奔即入也然方奔即入亦有以激之也則公孫黑之專伐而鄭伯不能以法馭臣亦具矣鄭人殺良霄討賊也如欒盈良霄而後可殺稱兵也不書誅避王也征誅惟王行之諸侯雖伐有罪不書征雖殺有罪不書誅冬十月葬蔡景公君弒而賊不討不書葬責臣子也今世子為賊而國人且奉之為君無臣子可責矣所望者鄰國能申大義耳今不能討反使人會葬人理滅矣故書以罪之晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故臣弒其君而諸侯定之自宋督始故稷之會直書曰成宋亂子弒其父而諸國定之自蔡般始然定之之實在於會葬葬以魯會而書他國無從而見也會葬之後晉合十二國於澶淵而魯復不與是魯黨賊而晉與諸國反似討賊矣即下無討文亦似欲討而不果也故特書曰宋災故而諸國之不討賊而黨賊具見矣蓋宋不戒於火自亡其財小事耳大合諸侯不討賊而謀歸宋財不亦傎乎左乃云謀歸而無歸故諸國書人而曰宋災故尤之也不書魯大夫諱之也夫謀而不歸晉之失耳於魯何諱焉且會而不踐其約者多矣他皆無尤特於歸財一事揭其故以尤之是春秋貴惠不貴道也蓋諸國書人以歸財事細卿不行也魯為宋姻卿共葬事相恤之事必厚故此會轉不與也黃仲炎曰晉屢失討賊之義使楚竊而行之故楚旅以討陳亂為名而縣陳楚虔以討蔡亂為名而滅蔡三十有一年春王正月夏六月辛巳公薨于楚宫楚宫别宫也公辱於楚歸而不發憤修政反慕荆蠻不度之宫勞民以效之且即以楚名遂薨於此其志荒矣非僅小寢失正之比國勢益屈強臣愈橫曷怪焉秋九月癸巳子野卒左云立胡女敬歸之子子野次於季氏卒毁也趙鵬飛曰子野卒與子般卒子惡卒同文子般子惡傳以為弒子野獨以為毁吾竊疑之於時季氏之專尤非慶父與遂之比愚意子野賢季氏忌而弒之以毁言於朝而世不察耳趙氏此言為得其情蓋君貴正終必書地薨而不地有臣子所不忍言者矣子卒不地亦然先儒或謂不地不葬未成君也非也子不敢遽以成君自居子道也論臣民之分則子繼君即君也安得卒而不地夫人書葬妾母書葬外諸侯書葬安在子不書葬况先君未葬嗣子宜次殯宫曷為次於季氏則當於季氏是問矣且公薨閲四月如子野已有毁形季氏必不肯迎置其家如未有毁形安得次季氏而遂云毁卒蓋前此襄公在楚畏季不敢歸子野必憤襄之見欺而季氏憚之遂萌邪謀以為子之喪親可以毁卒因加至美之名於君以惑羣聽且立其母親娣之子以釋羣疑季之計深矣哉春秋推見至隱故直與見弒者同文已亥仲孫羯卒冬十月滕子來會葬禮諸侯之喪大夫會葬今滕子親來而魯受之皆非禮也癸酉葬我君襄公十有一月莒人弒其君密州程子曰春秋傳為案經為斷以傳考經之事迹以經别傳之真偽是讀春秋之法也傳記密州事與庶其同蓋皆以子弒父也安得不嚴其誅經於彼稱國於此稱國人則罪不在其子矣趙匡謂左傳載展輿因國人以攻莒子弒之乃立以字當作之字傳文偶誤後儒承誤而不敢改是也然展輿立於國人既立之後不能討賊不子之罪亦莫逭矣
