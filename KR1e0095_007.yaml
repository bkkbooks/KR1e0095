front:
  text: 欽定四庫全書御纂春秋直解卷七癸丑匡王五年在位六年弟定王立宣公
  hash: sha256:7c768bf45e6f691268dfaefd0b8fa19ef97658b372fb38adea10efcdec75e4ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_007-1a, image: WYG0174/WYG0174-0131c.png}
body:
  text: 名倭文公庶子也元年春王正月公卽位桓宣之簒則一而情稍殊桓首惡也宣與聞耳其卽位則同而實逈異桓以罪歸寪氏賊已就討隱爲已攝本宜立也宣則内倚仲遂外結齊援同於繼正遂自立耳故皆行卽位之禮春秋據實書之以著其惡公子遂如齊逆女桓之簒翬爲逆女宣之簒遂爲逆女其爲先君之賊時君之謀主可知翬謀成於内其婚齊以結援蓋後圗也遂謀成於齊其婚齊以固位蓋本計也權臣鄰國比而弑立竟以䘮娶明失禮且同惡也三月遂以夫人婦姜至自齊不稱公子䝉如齊也稱婦有姑也出姜歸齊矣其以妾母爲姑者敬嬴也殺嫡子出夫人汲汲乎以姑自處蓋其本志也夏季孫行父如齊據傳納賂以請㑹也自去冬至夏行父如齊者再僕僕徃來同惡之情著矣晉放其大夫胥甲父于衞晉三殺大夫皆稱人盾主之也放胥甲父稱國非盾主之矣據傳討河曲之戰不用命者則趙穿罪首也已八年矣前不討者盾庇之也今盾委曲釋穿而蔽罪於甲父甲父既放穿實懼矣於是而穿之謀亂益急明年遂有桃園之弑公㑹齊侯於平州定公位也簒弑之罪豈可以㑹得免蓋當時好賂容奸其流極之惡習也公志定位齊志得賂不書及而書㑹乃治亂賊必先治其黨之義使人不敢黨賊亂可弭矣公子遂如齊拜成且致賂也自宣之未立及位之既定遂凡三見而始終其事著首惡也六月齊人取濟西田外取内田不書諱失地之恥也此以賂齊蓋簒弑之由義不得諱也遂初許之今則致之不書致而書取深罪齊也齊惠惡商人之殺舍而自立今之子卒猶舍之弑也宣卽位猶商人之簒也夫人姜氏歸齊猶子叔姬之出也况姜乃齊女子惡齊甥滅親黨賊失其初心何也田故也黄仲炎曰許田入鄭桓簒成郜鼎入宋督罪釋濟西入齊宣位定利之禍如此其極也秋邾子來朝黄仲炎曰僖文之世邾與魯抗宣簒而反朝之者畏齊故也齊悦魯之利邾畏齊之强而是非不問矣楚子鄭人侵陳遂侵宋爭伯也楚自克庸以來日强故爭伯鄭以晉於兩扈受賂失賊故背晉然楚又未嘗以兵脅鄭何遽助楚耶侵陳者陳棄楚卽晉也遂侵宋者著爭伯之志也宋爲望國又中夏之樞故楚成前此圍宋楚荘今復侵宋宋固有罪然楚非討罪也爲暴而已陳傅良曰齊遂伐楚志不在蔡也楚遂侵宋志不在陳也南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟於宋諸夏之君分爲晉楚之從矣晉趙盾帥師救陳楚鄭侵陳遂侵宋蓋已移兵於宋矣晉師無及於陳而猶得以救書者楚鄭聞晉興師而遂去其救爲足録也不書救宋者宋負罪也書救宋典型紊矣宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭晉師卽救陳之師也楚旣去矣盾駐于棐林而以伐鄭召諸侯故四國來㑹㑹以定謀故先地而後伐伐必有師而四國止舉爵君重於師也卿與師並重而不書盾抑盾不使盾主兵也冬晉趙穿帥師侵崇崇秦與國也秦自敗殽而仇晉深結於楚今方扞楚復無故而侵秦之與國是侮秦而啟之釁也趙穿實主是謀盾何以許之意穿欲作難託伐崇以專兵盾順其意而假之權耳次年桃園之事由穿握兵也經書盾帥師穿帥師㣲而彰矣晉人宋人伐鄭鄭未服也鄭旣卽楚矣宋人弑君晉不能討棐林之役見挫於楚鄭益輕晉今又興不戢之師而偕負罪之宋以臨之其不服也宜哉二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰於大棘宋師敗績獲宋華元兩書帥師見兩國之阻兵毒衆也書及見華元之主乎是戰也書敗績書獲見華元之殄民辱國也君將不言師君獲不言敗君重於師也卿將言師卿獲言敗卿與師等也胡安國曰自行師而言以元帥爲司命自有國而言以得衆爲邦本明此義然後知王者之道輕重之權衡矣秦師伐晉河曲之戰至今七年秦晉幸無疆場之虞乃穿無故侵崇速秦之伐伐者有言可執也圍焦不書畧秦之暴著晉失也宋敗於鄭而晉復撓於秦使楚得專意北方則盾之庇私而誤國也夏晉人宋人衛人陳人侵鄭盾因救焦而復侵鄭蓋欲稍洗大棘之恥以塞宋意耳不知始謀不臧不惟不足服鄭反招楚敵蓋是時盾憂内難託於伐國握兵自衛實無鬬心故棐林之役楚囚解揚卽還今與鬬椒遇又避之而去此其心固有在也桃園之事廹矣秋九月乙丑晉趙盾弑其君夷皋趙氏專故也君失政而臣專兵内除同列外得諸侯所由來者漸矣傳曰穿弑也盾爲法受惡夫弑君何事乃釋弑者不罪使不弑者受之乎亡不出境反不討賊所以証盾之首弑也非姑以是坐之也其不出境教穿弑也曁乎返國方徳穿之不暇而又奚討焉盾造意穿從之造意者首孔子之刑書也越境乃免非孔子之言也盾不與弑雖不出亡猶將宥之果弑雖逃之海濵詎能解免哉奸雄之敢爲大逆者恃其智與辯以爲吾隂爲其實陽不受其名而聖人不爲所欺也於是乎奸雄之術窮而亂賊懼爲法受惡云乎哉冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望養而未成曰牛在滌三月曰牲牛之口傷牛自傷也魯既僭祈榖之郊今方正月又僭日至之郊且王䘮未葬幾欲同王之越紼行事矣乃者不得已之辭猶者贅辭也可已而不已也葬匡王四月而葬速也㑹者不書微也楚子伐陸渾之戎陸渾之戎允姓秦晉共遷於伊川者耳異類逼居王都秦晉之罪也然是時未聞爲患亦與楚無憾楚莊伐之蓋以窺周室也傳載其觀兵問鼎逆情著矣止書伐戎道其可道者耳先儒每以稱爵爲褒觀此則知不可通矣夏楚人侵鄭鄭從晉也據傳晉侯伐鄭鄭及晉平不書者事可畧也繼伐戎而侵鄭楚勢益張故獨書楚侵以著猾夏之罪秋赤狄侵齊狄之别種有赤狄又有白狄赤狄近晉白狄近秦宋師圍曹宋鮑簒立之二年武氏之族道昭公子而奉鮑之母弟須鮑殺之因盡逐武穆之族二族以曹師伐宋不書者非討罪不足書也然曹師何爲至宋哉鮑不自反而恃强圍國不待貶而惡見矣冬十月丙戌鄭伯蘭卒葬鄭穆公月日不具闕也冬卒而冬葬蓋在三月之内速也四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向莒郯相怨郯魯姻國也公因欲爲郯平莒夫平不可偏重亦非可用勢書公及齊蓋借勢於齊也書莒及郯蓋責重於莒也故莒人不肯見同心不服非獨其君也公不自反怒而伐之暴矣况因以爲利乎書取向深病公也秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷據傳公子宋造謀歸生從之則宋爲首乃歸獄歸生何也歸生正卿也宋有逆謀不正其誅反撓而從之其罪大矣且宋何以謀之歸生權在歸生也歸生懼宋之反譖而從其謀蓋歸生先有無君之心而宋乃以逆謀告之茍非同心彼敢同謀哉宣十年傳載鄭人討亂斲歸生之棺不聞治宋也則歸生親弑可知春秋之權衡審矣赤狄侵齊以齊之强而狄連嵗侵之齊無政而中國無伯具見矣秋公如齊公至自齊宣所以簒齊輔之也旣結以賂復僕僕而徃朝焉蓋媚大以求安也然明年髙固使齊侯止公亦殆矣春秋備書之以著齊魯之惡冬楚子伐鄭左氏鄭未服也夫鄭弑君伐之可也然楚非討罪也爭鄭耳是猾夏而已矣五年春公如齊方逾冬而又如齊失位而屈於大國已甚矣左云髙固使齊侯止公請叔姬焉夏公至自齊公五如齊獨此歴時乃返經雖諱止公之跡然繼書齊髙固逆叔姬其實不可掩矣以見止而聯姻齊臣降尊失列辱及先君乃飲至於廟乎故書以示過秋九月齊髙固來逆子叔姬魯有嫁女於大夫者矣齊髙固則以脅而得之公又自主之故書於策蓋身爲不義故忍辱而屈於人如此叔孫得臣卒不日闕文也冬齊髙固及子叔姬來禮嫁女留其送馬謙不敢自安三月廟見壻遣使反馬今固親來非禮也女嫁歲一歸寜今叔姬嫁未踰時又偕髙固而來亦非禮也且固無君事齊恣其行魯與之接紊典而縱私故書以示戒楚人伐鄭前書爵君將也此書人大夫將也傳稱荀林父救鄭而不書削之也趙盾歸生同爲大惡故同惡相保耳若書救則似善之而討賊之義隱矣六年春晉趙盾衛孫免侵陳陳卽楚故也不能服楚而徒侵陳義何居乎且盾負大惡莫之能討而摟諸侯以討人春秋傷之宣之元年楚侵陳而晉伐鄭曾無幾時楚伐鄭而晉侵陳小國之困生民之塗炭極矣夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟來盟稱使前定也定從晉也宣事齊而外晉衛與晉睦故爲晉致魯旣約言矣魯猶有疑而衛任其無咎故使良夫來盟盟而卒見辱盟不可恃審矣夏公㑹齊侯伐萊及者内爲志㑹者外爲主平莒及郯公所欲也伐萊從齊令也萊近齊而逺魯齊欲并之而魯助其虐公固甘爲齊役魯民何不幸耶秋公至自伐萊助人伐國不義也以是告至誣其祖矣大旱螽災之後繼以大旱民不聊生矣宣事齊而不恤下至爲之伐無罪以自戕其民以是薄隂陽之和而旱作經以大書危之也冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤晉自兩扈㑹盟諸侯不序失伯職也成公立已五年請王以合諸侯王命王叔涖之蓋有志於諸侯也故復序復序者望之也無王而思伯蓋亦不得已矣奈成立於盾其本不正而政猶在盾故無能爲也據傳晉人止公於㑹而不與盟公昵齊忽晉實自取之故諱而不書但冬㑹而春至考其故而自見矣八年春公至自㑹見止逾年以賂得免魯與晉均罪也夏六月公子遂如齊至黄乃復如齊者君命聘齊也乃者繼事之辭而有専意蓋至黄有疾遂因自反於何知之以卒于垂知之夫大夫受命雖死猶以尸將命豈疾而可復乎昭二十三年公如晉有疾乃復公自行也故書疾臣不可以疾而棄君命故不書疾垂訓逺矣辛已有事于大廟仲遂卒于垂有事者時享之常何以書爲猶繹去籥起文也遂如齊書公子卒則書仲者遂弑君春秋雖屢著其實而未明正其罪今因其死削其公子罪遂也仲者遂字生而賜氏自是世仲氏也罪宣也黄與垂皆齊地壬午猶繹萬入去籥繹者祭之明日賔尸也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之心於廟不繹者全始終之恩於臣猶者可已而不已也萬者舞之總名籥者文舞也去籥以示變也仲遂賊也本宜即誅然未正其罪而身爲國卿則當爲之廢繹以全君臣之義夫臣之事君以忠君之使臣以禮不辱君命之死靡他忠之盛節也敬待大臣榮生哀死禮之善物也有疾不復教臣以忠卿卒不繹教君以禮雖惡其人不可不明其道戊子夫人嬴氏薨嬴氏文公妾也稱夫人踵成風也然其實則異矣莊公夫人哀姜淫而弑君見討於齊文公夫人姜氏無罪而爲亂臣悖妾所逐義不當絶非哀姜比嬴氏與仲遂比而弑嫡子逐嫡母立其子而自尊焉亦烏得與成風比也惟王室不競伯權不立終不見討故遂以卿卒嬴以夫人薨春秋書之蓋傷之也然簒弑甫八年耳遂死於齊嬴隕於魯相距八日與哀姜慶父先後卽誅相類豈非天哉亂賊亦可以知懼矣晉師白狄伐秦晉侵崇致秦來伐自反可也白狄與秦同壤晉與爲婚而結以伐秦黨非類事佳兵故與狄同序深責之也且晉屢因伐秦而失伯今黑壤之㑹諸侯方睦不思制楚而伐秦失計甚矣楚人滅舒蓼前書徐人取舒舒已滅矣曰蓼曰庸曰鳩則其同宗而異國也滅舒蓼楚益張矣秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬己丑葬之期也克能也不克者欲葬而不能雨甚也卜以己丑延至庚寅旦猶未可遂至日中禮之變也葬者慎終之大節故謹而志之城平陽不時且非義也方舉大䘮又興此役重困民力矣楚師伐陳從晉故也楚伐陳晉不能救自是復從楚九年春王正月公如齊公至自齊有母䘮而逺朝齊忘哀甚矣夏仲孫蔑如京師宣公兩如齊而於京師缺如也今身如齊而王使徴聘則遣大夫一行比事直書而罪著矣齊侯伐萊狄比侵齊不敢報而亟伐萊齊惠之畏强凌弱也如此襄五年齊卒滅萊秋取根牟根牟微國也國何以書取諱内滅也昭八年蒐于紅自根牟至於商衛蓋即其地八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳晉楚爭陳鄭十有餘年晉因陳即楚而先㑹扈蓋俟陳服也不服始伐之庶爲有辭焉且晉嘗救陳所宜與也而卒不至故列序諸侯而繼書伐陳深責陳也旣㑹而不親伐有疾也諸侯來㑹必以師聼命不書諸侯之師者林父兼將之也新城之㑹大夫主盟扈之㑹大夫主伐㑹盟征伐皆自大夫出矣辛酉晉侯黑臀卒于扈諸侯卒皆不地外事則畧也事闗天下之得失則書故卒于師書師卒于㑹書㑹此則旣㑹而晉侯獨以疾留非㑹時也故書扈以表其志與書鄭伯卒于鄵宋公卒于曲棘意同冬十月癸酉衛侯鄭卒晉衛二君皆不書葬魯不㑹也魯専事齊衛爲之通魯於晉黑壤之㑹爲晉所止故扈之㑹魯獨不往二國繼以䘮赴亦皆不㑹非禮也兄弟雖有小忿不廢懿親宋人圍滕滕䘮不弔且用衆以圍之不仁也間晉䘮而侵小不義也趙汸曰齊桓卒而宋執滕子晉伯衰而宋圍滕中國無伯小國之憂也宋襄執滕子身亦執於楚宋文圍滕國亦圍於楚中國無道蠻夷之資也楚子伐鄭晉郤缺帥師救鄭楚間晉䘮而猾夏郤缺救之書之以善晉也前此荀林父救鄭不書何也彼時趙盾弑君而專國鄭亦方有弑君之亂故削之也今盾死而政在缺缺非盾比也明年傳載鄭斲歸生之棺意此時歸生已死矣鄭以晉救遂敗楚師於柳棼陳殺其大夫洩冶凡稱國以殺大夫皆罪専殺也而専殺之中又有異焉如申侯里克則有罪而殺之不以其罪也洩冶則無罪也陳靈與孔寜儀行父宣淫於朝洩冶進諫蓋其職耳幸而聼所全大矣不幸而死是死於忠也書之以見殺諫臣者必有弑君亡國之禍非僅明冶之無罪已也十年春公如齊公至自齊比年朝正直過六年朝王之制矣屈體媚齊一至此乎齊人歸我濟西田齊侯悦魯之媚已而歸所賂也經書歸田凡三鄆讙龜隂之田齊景動於魯之義故書曰來歸服辭也讙及闡齊悼以哀公之悔過故書曰歸順辭也此書曰歸我責辭也蓋以明賂也取之時不言我者田非宣之有簒國而因以爲利也絶之於宣也歸之時言我者田非齊之有魯田而歸魯也絶之於齊也而二國之罪著矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛書氏以族奔也君卒而奔必君所寵也嗣子在䘮髙國逐之也以其宗彊故能返於齊而爲亂公如齊奔齊䘮也不書尊内也趙汸曰奔䘮臣子之事宣事齊恭矣莫甚於奔其䘮其後成公送晉景之䘮襄公且送楚子之䘮甚則昭公弔少姜而晉不納魯曰卑矣其失自宣公始五月公至自齊癸巳陳夏徴舒弑其君平國淫於夏氏故也觀株林之詩淫而荒矣又殺忠諫宜其及也以弑君大惡故正名以治其罪六月宋師伐滕宋間晉之多故前既圍滕今又伐之故稱師深惡其凌小也公孫歸父如齊葬齊惠公公奔其䘮卿㑹其葬於齊則過而於匡王則缺其罪大矣晉人宋人衛人曹人伐鄭是時陳有弑君之禍乃釋陳而事鄭則非義矣且以討逆遺楚也貶而人之晉之失伯也宜矣秋天王使王季子來聘報仲孫蔑也公羊以王季子爲王母弟不書弟爲卿也若槩書王子不知爲母弟故書季以别之蓋明王之重魯也宣以簒立且十年未朝乃因魯聘而以母弟之貴報之王靈益不振矣公孫歸父帥師伐邾取繹宣初立邾來朝何負於魯而伐之又取邑焉暴且貪矣歸父未終父䘮而伐邾其濟惡而專魯也如是不終也宜哉大水季孫行父如齊聘新君也冬公孫歸父如齊間齊喪伐邾而即如齊畏討而卑以事齊也是年公兩如齊使其臣者三焉王下聘而不往拜命直書而罪著矣齊侯使國佐來聘魯之朝聘齊惠皆不報頃公甫立遽来聘魯何也蓋國不靖而結魯也齊惠卒崔氏奔國之不靖可知然嗣子能盡孝守禮人心自固矣彼宣之庸豈足爲助而汲汲乎既以三月而速葬復未逾年而即吉書齊侯書使著忘哀之實也胡安國曰嗣位之初舉動若此已失守身之本矣䘮師失地幾見執獲宜哉饑大水故也野有蓋藏君勤振救雖災不饑此以饑書由宣虗内事齊不恤其民而漫無補救故大水之後民遂乏食其責之深矣楚子伐鄭鄭介晉楚不能自立春秋恒閔之特以晉於兩扈失賊忿而從楚是入楚黨也嗣後鄭一從晉楚反得以叛責鄭凡五加兵焉鄭自取之矣左云晉士㑹救鄭逐楚師於潁北諸侯之師戍鄭但觀次年經書楚盟鄭而晉反㑹狄則此之救鄭逐楚且留戍者非其實矣使晉果能攘楚鄭未有甘於從楚者也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵晉不能討陳又不足庇鄭故皆折而從楚矣特序楚子於陳侯鄭伯之上著其强也胡安國以楚莊謀討陳賊而進之非也據傳楚侵鄭及櫟鄭既服并徴㑹於陳而爲此盟盟後踰三時始討夏徴舒其時陳侯在晉使辰陵有謀陳侯豈復如晉乎陳傅良又謂予楚以伯更非矣春秋所以予伯者以其尊王楚既僭號莊復觀兵問鼎卽有微善烏足贖其大惡公孫歸父㑹齊人伐莒齊令也齊魯平莒而不肯魯既伐之取向矣齊復伐之其志可知也魯㑹伐萊又㑹伐莒嵗饑而屢興師民不堪命矣秋晉侯㑹狄于欑函楚盟諸侯于辰陵晉莫敢問乃孜孜於狄且徃㑹焉晉衰甚矣楚遂假名以討陳不惟勢足陵晉義亦足以傾晉矣不自反而爲邲之戰以爭鄭宜其敗也冬十月楚人殺陳夏徴舒人者討賊辭也衛人殺州吁國討也蔡人殺陳佗鄰討也楚人殺陳夏徴舒蠻夷討也皆善之也善在逺則責在近周天子與諸夏何事乎又嚴佚賊之罰也丁亥楚子入陳殺夏徴舒書楚人公也入陳書楚子私也陳背晉而托國於楚者也徴舒以忿恥弑君楚莊有志討賊即辰陵之㑹召而戮之可矣乃盟後半載興師以來且陳侯又在晉是擣虗之計假義以圖利耳徴舒食邑在株執之株而驅之陳都轘諸栗門遂入陳而縣之假討賊而巧取國也特書丁亥於殺徴舒之下入陳之上蓋既殺徴舒遂乘間而入陳其事既白其心亦得矣入者滅而不有之辭聼申叔時之言而復封陳也納公孫寜儀行父于陳凡國君書納國其自有也順辭也楚納頓子齊納北燕伯是也二子陳大夫耳大夫去位假外權以抗君書納逆辭也故絶之而不繫於陳也二子爲陳致亂陳靈旣弑二子奔楚因誘楚以利故楚子殺徴舒而縣陳今既知陳不可取矣因納二子使執其國柄以事楚蓋其心一於利耳春秋先旌其討賊之義後著其入國且納亂臣之罪彰善癉惡纎介無遺非聖人孰能修之十有二年春葬陳靈公葬者臣子之事賊不討不葬責臣子也晉之弑州蒲也以車一乘葬於翼東門之外至是楚人殺徴舒而陳之臣子改葬其君禮也故得書葬楚子圍鄭春秋不予楚以伯其爭諸侯皆正其猾夏之罪况楚既與陳鄭盟于辰陵口血未乾遂假討賊而入陳鄭安得不懼而貳於晉楚不自反遂圍其國暴矣傳載其克城而入鄭伯屈降楚子退師許平猶未成乎入也故止書圍夏六月乙卯晉荀林父帥師及楚子戰於邲晉師敗績晉師之出以救鄭也乃春被圍而夏末始至則緩不及事無救患之實故不得書救以晉及戰者徐邈曰内晉而外楚是也書林父帥師主乎是戰者也主之者責之也夫晉景嗣靈成之後伯業不競楚莊方强晉既無及於鄭乃不量力而輕與之戰林父不能節制其屬又不能躬帥力戰楚師一乘倉卒莫措鼓於軍中倡爲奔北書敗績深罪林父也城濮晉敗楚邲則楚敗晉喜晉而惡楚者外之也外楚所以尊周也秋七月冬十有二月戊寅楚子滅蕭楚得陳鄭又敗晉師遂求逞於宋蕭宋之附庸滅蕭所以逼宋而威諸侯也蕭在宋南自楚至宋蓋千里楚之患深矣晉人宋人衛人曹人同盟于清丘宋與衛曹比鄰蕭滅而畏逼則懼而同欲倚晉然晉與諸國不能任賢明政而徒要盟以禦楚末矣新城同盟諸侯之散者復合已爲晉伯之衰今雖有懼難聨交之心而謀之無成又在新城下矣故稱人以畧之宋師伐陳衛人救陳清邱之盟陳人不與宋伐之爲晉討貳也然陳有弑君之亂晉初不能討比楚討之而定其君陳之服於楚也固無足怪宋踐要盟而代晉責陳之貳亦不自量矣附庸見滅不敢問楚而泄怒於陳故救陳者得書救言陳無罪而被兵也然清邱方盟而衛顧背晉以媚楚復何心哉兩有罪焉直書而義自見矣十有三年春齊師伐莒左云恃晉而不事齊也間晉之不競而肆暴鞌之戰所由肇端乎書師著用衆以凌小也夏楚子伐宋楚滅蕭其志在宋宋不圖自固其本輕爲兵先伐楚與國宋失計矣然宋以踐盟召兵晉不能救其何以宗諸侯秋螽冬晉殺其大夫先縠邲之敗林父實尸之即先縠違命先濟林父亦可令軍毋動按法行辟乃林父既聼韓厥之言而同濟矣魏錡趙旃重激楚怒倉卒無備而敗是林父身爲主帥應爲誅首魏趙召釁僨師先縠剛愎専恣厥罪惟均乃林父已復其位魏趙皆置不問事已逾年罪獨歸縠可乎故稱國以殺而不去其官見其出於君與大夫之喜怒而非正刑也十有四年春衛殺其大夫孔達爲救陳故悦於晉也孔達尋陳衛之舊約而背晉之新盟至欲以身紓國難其志可憫其事則舛矣今晉來討而達以縊死非衛殺之也然進謀者臣制命者君始則用其謀以行私既則用其死以謝過失君道矣故稱國以殺而不去其官夏五月壬申曹伯夀卒晉侯伐鄭邲之戰以救鄭也師不用命故敗今乃不知省徳而務武不思制楚而殘鄭其圖伯也末矣秋九月楚子圍宋宋不量已而伐陳固爲失計然楚爭中夏鄭服必次及宋雖無釁亦不免於兵故始則滅蕭以逼之今又使不假道以挑之伐之不屈繼之以圍得宋平而後已甚矣楚之暴也是時晉莫急於救宋乃勞師於鄭而置宋度外至比之鞭長不及鄭既不得宋復失之楚氛日熾而晉遂一敗不振徒畏楚强而昧緩急之宜故也葬曹文公冬公孫歸父㑹齊侯于榖楚圍宋逾時其勢危矣宋入楚則次及齊魯然齊强而魯弱畏楚尤甚欲兼事楚而懼齊責也故於㑹謀之明年歸父㑹楚子則禀命於齊而齊許之可知矣齊何以許之蓋楚使申舟聘齊未至而宋殺之齊楚固欲交好矣十有五年春公孫歸父㑹楚子于宋楚以無名不義圍宋已歴三時堅守不下宋志亦可憫矣魯望國也縱不能救忍助虐乎乃㑹楚於宋城之下使圍者益張受圍者益困而無望矣且兵未及魯望風薦賄獨何心哉歸父㑹齊方還卽往㑹楚則其謀可知矣夏五月宋人及楚人平楚圍宋乆矣宋不下望救也楚千里而圍國乆不下師老矣此與城濮之勢同晉復伯之機也晉不出而魯㑹焉宋絶望故不得不與楚平不舉國而書人者榖梁謂上下欲之是也華元以情告子反以義許之宋不甘城下之盟楚子亦勉而從之也平先宋内辭也亦著宋之義也而不救者之失亦見矣六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸潞氏赤狄之别種戎狄無爵其書爵必㑹受王命者也潞之罪在其臣鄷舒執而戮之安定潞子改紀其政而返可也滅其國而以其君歸何義乎且楚逞志於宋坐視而不救狄無晉虞而妄興大師私利其土悖矣故林父爲帥不書而書師責其失伯且惡暴也秦人伐晉此秦桓公也曷爲稱人蓋秦以晉敗於楚乘隙而動非義矣故秦伯自將稱人晉雖敗秦不書畧晉而責秦也王札子殺召伯毛伯王札子杜預曰王子札也生殺王之柄周衰諸侯旣已專殺今内臣一朝而殺二卿王不能討王靈益墮矣秋螽仲孫蔑㑹齊髙固于無婁自齊惠後魯事齊漸怠宋之㑹又兼事楚齊蓋有以議魯矣髙固娶於魯故蔑因固之出而往㑹焉以自解於齊也本之不正惟事畏人亦可鄙矣初税畝治地殷曰助周曰徹助别公私徹則通公私徹猶是助耳宣之税畝左氏云榖出不過藉旣藉矣又履畝而税之是過藉也變法以厚歛書初病其作俑以厲民終於哀公則二猶不足矣冬蝝生蝝螽子也周之冬夏之秋也榖將熟而蝝生災重及民也天災洊至不畏天而剝民故謹而志之饑宣再書饑矣加賦凶嵗坐視民死失君道矣十有六年春王正月晉人滅赤狄甲氏及留吁晉滅潞氏猶有辭也甲氏其别種留吁尤其微者耳復何罪而滅之使無遺類乎况欑函之㑹未幾而滅狄者三大無信矣晉自爲楚敗惟務并狄土以自肥其五伯之罪人矣士㑹爲將而書人深貶之也夏成周宣榭災成周東都也宣榭宣王之榭也其制有堂無室以便射宣王講武於此詩所謂復㑹諸侯於東都者是也振衰戡亂以成中興之業其遺跡僅存遇災而燬天示意以儆周也秋郯伯姬來歸以自歸爲文有過而出也夫婦人倫之本風化之源至於出則人倫變而教化衰矣張洽曰雖諸侯之尊當謝不教而受之也冬大有年十八年中屢書災僅一大有年亦云幸矣書之以爲民慶也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公自楚莊之强蔡許不見於經屬楚也宣公爲人計利不顧義其初資齊得國獨厚於齊雖天王之尊盟主之强猶簡其禮今則附楚蔡許爲楚之私皆㑹其葬比事而其情見矣六月癸卯日有食之己未公㑹晉侯衛侯曹伯邾子同盟于斷道榖梁曰同外楚也楚已得宋晉侯懼而爲此盟公雖附楚因晉徴㑹又從晉也且當是時宋鄭陳蔡從楚衛曹邾從晉而魯兩屬今晉侯親出而四君偕來故書同然不修政自强而要盟以相固則亦末矣至徴㑹於齊而齊侯以婦人之笑怒郤克是以有明春之伐與成二年鞌之戰秋公至自㑹冬十有一月壬午公弟叔肸卒諸侯之兄弟爲卿本其先君而書公子以别於今君也其以事見而書兄及弟變文也義繫於事也至於卒則非以事見而以人著矣肸不爲卿卒不應書其書卒重其人也故不以貴别而以親通曰公弟賢之也宣弑立肸心非之以義故不爲臣以親故不去得弟道矣公於其卒有加禮故書叔録異數也肸不爲卿而其後則世爲卿此叔氏之始也十有八年春晉侯衛世子臧伐齊斷道同外楚而齊不與非義也苐齊爲伯餘惟晉文之盛齊從之今晉伯衰矣能必齊之從乎且楚侵軼中原晉不之問而勤師伐齊是避楚而殘夏也諸侯齊秦爲大晉旣失秦今復怒齊楚莊不死將收卞莊之利矣衛從之懲孔逹之殺也書世子譏也世子不可以帥師也公伐把魯把世婚僖文之世皆來朝宣立而不至不至義也宣伐之適以自暴其惡而張把之義也夏四月秋七月邾人戕鄫子于鄫賊在内曰弑自外曰戕戕者殘賊而殺之也人微者繫以邾謀出邾子也前用鄫子今戕鄫子邾惡極矣地以鄫罪鄫也用鄫子于邾而不報戕鄫子于鄫而無衛鄫之臣子其罪大矣甲戌楚子旅卒楚君自是始書卒蓋魯事之一如齊晉故從赴而書書子正其爵也不葬者其僭號不可書故削之也楚旅以前雖僭號猾夏至睥睨周鼎力爭諸侯則旅爲尤横論者乃謂進之是以爵之貴之是以卒之失春秋之㫖矣公孫歸父如晉宣公之初一意事齊及楚圍宋卽使歸父㑹楚至晉徴㑹公卽自徃㑹晉晉伐齊而齊服又使歸父聘晉蓋惟利爲向背而已據傳歸父謀因晉力去三桓以强公室但仲遂身爲大逆歸父嗣專國柄乃以已之不正正人乎卽去三桓歸父亦一三桓也於公室何益哉况不能以禮已亂而召外兵適以速禍耳宣此舉爲失計矣是時晉政亦在强家又事晉未乆故所謀無成冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊還自晉事畢也至笙未及國也遂奔者君薨而家遣不可以返也不言出自外奔也宣以仲遂立已而愛歸父用之太專三桓忌之乆矣今又謀去三桓益重其怨公薨而三怨作故奔夫遂之弑立爲子孫計耳不旋踵而家遣子奔可鍳矣傳載季孫追論仲遂之罪臧孫比而逐歸父不以君薨爲戚不以嗣君爲意罪不容誅矣歸父聞君薨家遣墠帷成踊反命乎介於禮有足觀者惜謀之不臧宜其及也
