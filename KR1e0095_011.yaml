front:
  text: 欽定四庫全書御纂春秋直解卷十一壬辰敬王十有一年定公
  hash: sha256:86984968109a2c3bf053b6e42fd2cb7d33844365d5a024c3ba8449f234931451
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0095_WYG_011-1a, image: WYG0174/WYG0174-0249a.png}
body:
  text: 名宋昭公弟亦襄公庶子也元年昭以去冬薨定以今夏立魯蓋半載無君矣乃即以定之元冠年者史追書也聖人因之以繫國統也春先君喪既逾年嗣君不論行即位之禮與否必書正月所以奉王朔而謹始也昭之世子既為强臣拒於外不得立其立定公又在六月故不書正月見定無以正始也王三月晉人執宋仲幾于京師定之元無正故從常年事在三月之例而書王三月諸侯城成周仲幾不受功罪也然當請王命而執之茍不請王命自外執之已為不可况于京師乎况以大夫尸之乎且執以歸晉後雖歸于京師不足書矣胡安國曰雖以王事討有罪然執于京師是無王也履霜之漸也故書其地謹之也每謹於初禍亂熄矣夏六月癸亥公之喪至自乾侯薨閲七月越葬期而書至示變也戊辰公即位戊辰者癸亥後六日也春秋即位不日以有常期不煩書也嗣子定位於柩前即日行之周書乙丑王崩召公逆子釗入翼室是也即位於逾年嵗首行之商書惟元祀十有二月乙丑伊尹祀于先王奉嗣王祗見厥祖是也天子諸侯一也定即位於喪至之六日既非即日柩前之禮又非逾年嵗首之期蓋惟意如所制故書日以示變也授受國之大節昭有嫡子定何以立授之季氏耳宜如尹氏立王子朝之例而書季氏立公子宋今書即位如恆辭者諱國惡也定不能執禮以辭當奉義以討終於不討難免篡位之罪矣秋七月癸巳葬我君昭公三時始歸逾月遽葬書以示變也九月大雩僭也且在喪而用盛樂不忌喪矣立煬宮煬公魯公之子考公弟也昭公出意如禱於煬公昭薨於外遂以為獲神佑踰典制以立久祧之宮其無忌憚亦何所不為哉冬十月隕霜殺菽周十月夏八月也非隕霜之候而霜異矣菽耐霜殺菽則他禾可知為災甚矣穀梁云舉重是也僖三十三年十有二月隕霜不殺草是時禾已收穀梁云舉輕非也二年春王正月夏五月壬辰雉門及兩觀災因災以著僭也按明堂位天子五門臯庫雉路應是也魯有庫雉路三門庫門制似臯門雉門制似應門則僭矣天子外闕兩觀諸侯外闕一觀魯設兩觀亦僭也定受位於賊臣而臨民之所一朝化為煨燼天之示警至矣使定遇災而懼革其僭禮反之於正自其身始庶得撥亂之道乎秋楚人伐吳自襄三年至此楚六伐吳一與吳戰戎首而佳兵宜其有入郢之禍冬十月新作雉門及兩觀魯僭王制其始由成王之賜然意在尊周公使得用郊禘之祭耳後世相沿遂無所不僭僖二十年書新作南門南門即魯之三門也新作者有加其舊也庫門制似臯門雉門制似應門其即始此歟今因災而新何必言作蓋天災示警仍其僭而不革是無應天之實并無畏天之心故仍新作之辭以示罪三年春王正月公如晉至河乃復家鉉翁曰說者謂意如不請於晉而立定公故晉怒而辭公愚以為未得其情也意如逐昭客死擁定篡位皆晉卿為之羽翼今定如晉而晉辭公蓋意如之謀所以操縱其君使一切惟己是聼也昭惟不能堪故陷於大禍定則俯首下氣茍以君位自居矣二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔何忌以大夫而盟諸侯邾子方在喪而出㑹盟均罪也然邾迫於强大亦非得已何忌脅勢以凌小國之君甚矣四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚平邱之會晉以無道失人心更二十餘年無會盟之事楚昭繼平之昏亂而稚劣不君囊瓦柄國黷貨虐小至以裘馬之故拘留唐蔡之君蔡昭怨憤如晉乞師晉請命於王王臣下臨而十七國一呼而集蓋人心同疾楚也且楚已具亡形民心咸離屬國多叛吳復撓之晉能奉辭伐罪廓清南服功軼桓文矣奈晉卿貪鄙又私懼其君奉王靈以服楚威權復收必於勢家不利故求賂以離蔡假旄以賤鄭用散諸侯以隳其君之功而固其私晉定昏庸莫能自主世未有內治不修而外威可立者也且亦由悼平以來不謹操持以至此極耳故不能明正楚罪掠其境而遂還書侵陋之也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之據傳晉以沈不㑹召陵使蔡伐之夫沈屬楚未始通晉何以責其不㑹且㑹於召陵者衆矣何能為哉不能制楚而逞虐於小國晉之罪也出沈不意滅其國而執其君公孫姓之罪也蔡君屢殺於楚乃效尤而殺沈子蔡侯之罪也書滅書殺哀沈子也惟書以歸則病其不能死位焉耳五月公及諸侯盟于皋鼬盟言諸侯劉子不與也劉子定王室之亂因晉請命而下㑹蓋有興王之志乎與㑹不與盟亦得王人下㑹之體惜權出於晉劉子不得行其志也明年王人殺子朝於楚則此舉亦不為無功矣晉謀楚無成此盟何為哉王樵曰召陵伐楚屈完來盟召陵侵楚諸侯自盟書之陋之也是也凡公後於㑹而盟書公此與於㑹矣復書公者公受國於意如因朝晉見却汲汲求為此盟蓋不盟或恐如曹負芻之既㑹而後執也把伯成卒于㑹卒于師而書㑹譏侵楚而無功也六月葬陳惠公陳子背殯出㑹返而葬親非禮也許遷于容城許雖附楚楚亦弱矣故召陵不敢違晉今楚遷許使自近然亦許之志也知晉不能庇己也故仍以自遷為文秋七月公至自㑹不致侵楚譏無功也且公以得盟為幸也劉卷卒召陵之㑹劉子下臨㑹罷而卒故來赴葬把悼公楚人圍蔡蔡滅沈故也然蔡受晉令蔡圍而晉不救何也晉士鞅衛孔圉帥師伐鮮虞謀楚不能討盟蔡不能救捨大計而事鮮虞晉卿貪鄙之謀也葬劉文公王臣以卒赴而魯往葬皆為私交既書王臣之卒以示戒其義已明雖赴則必葬而魯之失禮可諱也今劉文公書葬以賢書也不得與尹氏王子虎一例也生稱劉子因王事而舉爵也卒目劉卷內臣與外臣異也葬稱劉文公則因魯㑹而書也固各有當也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚為蔡屢世不共戴天之仇蔡求晉晉無能為也且致蔡圍國之禍焉改而乞師於吳遂復其世仇兼紓中國之積憤其事偉矣書以者録蔡也吳稱爵君將也君將而為蔡所以亦善吳也不書救者吳為蔡以救不待言也第楚敗吳興中國日衰矣書之傷之也書吳及戰而非責辭蓋與城濮義同楚囊瓦出奔鄭師敗瓦不死而奔罪其誤國而又以身免也庚辰吳入郢郢楚都也入國直言國而不言都書入郢特筆也楚罪大矣滅之可也入何足言吳之罪在郢也據傳吳入郢以班處宮無人理矣故變入國之文而書都而吳以號舉春秋因善惡以寓褒譏王道之權衡也五年春王三月辛亥朔日有食之夏歸粟于蔡據左氏魯歸之據公榖諸侯皆歸之未詳孰是如諸侯皆歸之必晉命也意晉愧不能救蔡而以是慰蔡乎是昧大計而市小惠也至於魯力不足救蔡蔡以師旅之後困於饑魯自歸之則善也然終春秋世列國豈無饑而歸粟獨見於蔡且於蔡以吳敗楚之明年則歸粟非恤蔡也畏吳也借蔡以締交耳春秋豫之而不盡豫蓋欲進魯以誠也誠於為義則大道明而天下定矣於越入吳於越即越也稱越者三昭公時也稱於越者三定哀時也蓋越處荒逺先代苗裔周有天下就其地而封之其國號因其自稱而已春秋前稱越其舊號乎後稱於越其改號乎亦因其自稱而已必求其義以寓褒貶則鑿矣吳方在郢而越入之倚伏之機可畏哉且深責越之助不義以撓吳吳亦失道而無以持勝也六月丙申季孫意如卒魯弒君之賊二逐君之賊一罪微有分而皆當討桓同謀而弒宣與聞乎弒非可責以討賊也故翬死不書遂死去族討翬遂即以罪桓宣也定則並不與聞逐君祗以位非己有為季所援而立耳使能如叔孫舍之不賞私勞致討意如其濟功足贖愆不濟亦為以身殉義乃貪位茍安忘仇忍辱將始之不正者終於不正矣春秋書意如以卿卒之常定何以逭其責秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞晉臣貪人土地屢伐而又圍之故書以著其惡六年春王正月癸亥鄭游速帥師滅許以許男斯歸鄭貪暴於許久矣許依楚圖存至於四遷今吳敗楚而許失援鄭遂滅之許不知自强甘心從楚固為失道然鄭乘釁逐利滅人宗社其罪大矣李亷曰鄭入許而齊鄭之黨合天下遂無王鄭滅許而齊鄭之黨又合天下遂無伯二月公侵鄭宣十八年公伐把後魯無君將者八十年蓋軍分於三桓而季氏尤擅其權也今意如死其子斯雖嗣而幼故公復將然非公能收權陽虎乘隙專政挾公以為重耳其無兵也政在大夫其有兵也政在陪臣然春秋書公喜之也庶幾其有為也據傳周儋翩率王子朝之徒作亂鄭為出師蹂王畿之六邑晉命魯討之則王事也乃不能聲罪致討僅潛師以掠其境蓋虎祗藉以攬權非有勤王之實故書侵惜公又制於陪臣而用兵非其道也公至自侵鄭魯不假道於衛衛將追之公孫發諫之而止書至危之也夏季孫斯仲孫何忌如晉斯以獻鄭俘何忌以報夫人之幣夫一卿將命可兼他事今二卿並使非制也陽虎强遣之以媚晉也劉敞曰季仲專國而虎能制之此其無所忌而必為亂之效也然不介晉權亂亦不得發意如媚晉以逐君故虎媚晉以傾三桓春秋彰往察來書以著虎亂所自也秋晉人執宋行人樂祁犁晉執宋仲幾宋不敢怨今復聘晉其事晉勤矣何以不免此非其君為之其臣為之也禍起於趙鞅而范鞅與之爭權競賂也召陵之後諸侯皆二乃復執宋使權臣相傾不顧國是如是哉宋叛晉始於此范中行與趙搆怨亦始於此冬城中城成九年城之此復城何增修之也汪克寬曰陽虎欲去三家託懼齊鄭而城之將挾公以自固耳季孫斯仲孫何忌帥師圍鄆昭二十五年齊取鄆以居公後鄆潰遂二於齊今圍鄆而不書伐齊者內邑也齊納叛也然齊之納叛有由矣始以居公後以季之誘鄆潰以傾公則齊之過小而季之罪大矣今不先以辭令而遽用師雖志復舊邑非其道矣明年齊來伐連歲交兵蓋始於此七年春王正月夏四月秋齊侯鄭伯盟于鹹諸侯咸二於晉故齊景出而求諸侯鄭怨晉故從齊也然鄭方得罪王室而齊與之相結不亦悖乎家鉉翁曰所謂盟主必上而尊王次而救災恤患先天下之難然後可以服人而成伯業魯昭為臣所逐齊不能納而遂己王室有儋翩之難又不能勤王見義不為而欲乘機以襲伯無是理也陳傅良曰此特相盟也齊桓以來未之有也於是再見諸侯無主盟矣是故書石門以志諸侯之合書鹹以志諸侯之散齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙據傳鹹之盟齊徵會於衛衛欲從齊而難於叛晉使結聘齊而私於齊侯曰執結以侵我齊侯從之乃盟于沙衛侯譎晉以附齊豈邦交之道乃結稱行人而執目齊人若不罪衛而深責齊者惡齊之逞力以求伯也然方侵即盟衛之詐亦具矣大雩齊國夏帥師伐我西鄙齊既得鄭得衛於是伐魯魯嘗侵鄭而與齊爭鄆矣今伐之者所以堅鄭也抑以威魯也許翰曰景乘晉衰而欲以力定伯是知時之或可而不知己之不可也九月大雩冬十月八年春王正月公侵齊公至自侵齊報齊伐也魯固有辭然不量已而輕以復怨為事非計也二月公侵齊三月公至自侵齊逾月而再侵齊雖曰修怨公何甘蹈危險如是哉蓋有晉命耳觀齊再伐而晉師至瓦可見矣昭公之出晉黨臣拒君尚不及齊稍有恤患之意今堅從晉令豈公志哉陽虎之謀也季以媚晉為事虎踵而甚之虎作亂而逃終以倚晉是其驗也大夫專政蠧公之國陪臣專政危公之身再書侵書至病公也曹伯露卒夏齊國夏帥師伐我西鄙魯以修怨為事意在擾齊故書侵齊以圖伯為事意在脅魯故書伐紀實也公㑹晉師于瓦齊師來伐魯無以禦之急而求於晉聞有晉師公出㑹之書以病公也前則輕身搆怨今則離國不守幸齊師自退耳倘齊深入魯其殆哉晉不直赴魯難而師次于瓦瓦衛地也不成救矣帥師者士鞅而不書蓋書士鞅似以他事㑹而不知晉以師來與師之不成救也公至自瓦不以㑹致者非同常㑹故以地致秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛討其從齊也其書侵何晉公室卑其臣各顧其私而不恤公故小有侵略而還蓋不修德而用力力復不競也書遂者不足服鄭何能服衛譏其徒失人心而無益也家鉉翁曰伐所當伐則受伐者伏其辜而諸侯聳動當伐而坐視不當伐而輕舉適以召侮耳鄭乘儋翩之亂以犯王畿且滅許國晉以無與已事而委之魯今因鄭從齊而自侵之又因而及衛豈伯討乎故書以貶之葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛侵衛者媚晉也季與仲合而逐昭公自後事事同之今陽虎專政挾公以為重故季仲愈相結以自固逮虎執季復以仲之救得免春秋每於季仲比而書之蓋著其同惡相濟之實冬衛侯鄭伯盟于曲濮約背晉也晉侵鄭衛故也侵之而愈叛晉之術窮矣故君子尚德不尚力知不足恃也從祀先公三傳釋從為順而先公則無所指注疏因文二年躋僖公為逆祀遂以升閔降僖為說但逆祀成於臧氏且閲數世矣非季之罪也馮山以從為後隨先之義昭薨於外喪歸而季氏欲溝絶其域不使同於先公既而止葬於墓道南葬既不得合於墓則主自不得祔於廟矣虎欲彰季之罪以媚國人始以昭公從祀不書昭公內諱也但前此書吉禘于莊公書大事于大廟躋僖公今言從祀而不目昭公雖諱不應若是之晦而難明也薛季宣曰魯之祭也躋僖公外昭公從祀者始正其禮也兼用二說則經傳合矣蓋閔僖與昭皆可以先公目之且左云順祀先公而祈焉意適當大祫羣公皆在故即概言先公聖人因事以著其實而善惡自見蓋從祀正也不書曰亦不書大事見不由公命也繼書盜則盜為之也蓋假正以售其大不正也故曰春秋之志微而章盜竊寶玉大弓盜謂陽虎也寶玉大弓周公之分器子孫宜世守之者也虎將享季孫斯於蒲圃而殺之賴仲孫之救以免虎戰不勝遂如公宮取寶玉大弓以出夫陪臣謀殺大夫是叛而為亂也然季之罪大矣虎果執而請其罪收其權以歸之公夫豈不可乃逞私憾而欲殺之不勝而入公宮取分器則盜也分器而盜竊之魯之無人而失政也以不書叛罪季氏以盜治陽虎以失分器責魯侯天子之事也九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓盜之竊也將以為賂於他國而求容也今將走齊齊以求伯為事倘不義其竊而詰之反為害矣故遺之堤下則似盜歸之也盜竊而盜歸之何以為國故書得然徒得所竊而已不得盜也魯之失政亦具矣六月葬鄭獻公秋齊侯衛侯次于五氏齊挾衛以爭伯而晉力尚强未敢顯言伐之故次于五氏五氏晉地也蓋有所窺伺而未能矣家鉉翁曰陳傅良云傳言伐晉而經書次重絶晉也愚謂厥貉之次楚商臣窺中國也五氏之次齊景公圖繼伯也書次同而所以為次則異伯國子孫豈可與僭王之楚同日語哉晉平以來舉伯權而遜之楚春秋固無望於晉矣齊能修桓公之業春秋將姑與之豈云諸侯不當即齊而重絶晉乎乃齊景不能尊王而安諸夏反睨晉衰而屢次以求逞則非義矣故書次以譏之秦伯卒冬葬秦哀公十年春王三月及齊平陽虎再侵齊以搆怨今虎出矣魯用孔子首與齊平蓋齊魯唇齒也則睦齊為要務矣是時虎在齊將謀禍魯故三桓亦咸知聖人謀國之善而俯首聼命焉聖人一用而君行制臣從令內安其國外睦其鄰如此然何以書及蓋侵齊為魯禍則平齊固魯志也聖人順人心之所欲而已夏公㑹齊侯于夾谷魯卿特㑹諸侯舊矣今書公㑹公始為政也春秋重盟㑹君出必以上卿相之三桓嘗與齊搆釁今新與齊平恐齊意不測故使公試其危三桓亦不敢出孔子甫用於魯而魯大治故使孔子攝相焉治聲既動於未㑹之先禮意復感於為相之際故㑹而不盟昭七年暨齊平叔孫舍如齊涖盟定十年及鄭平叔還如鄭涖盟平則必盟也今不書盟不煩盟也是知為國以禮服物以誠侵伐可以不事詛誓可以不作大道之行規模宏遠矣公至自夾谷至以地特㑹也自參以上則不地晉趙鞅帥師圍衛沙之盟衛始叛晉士鞅遂侵衛衛侯復與晉盟趙鞅乃使賤者盟以辱之衛遂絶晉與齊為五氏之次今之圍討五氏之次也其何以服衛哉且晉既衰凡役皆侵而此獨圍者衛嘗伐邯鄲午於寒氏趙氏之私怨也故圍以求逞焉趙鞅之罪不容誅矣齊人來歸鄆歡龜隂田書來歸彼自歸之也齊强於天下伐盟主虐與國今而自歸者禮之所動誠之所感存神過化人莫能測也於此見人皆可與為善而聖人之道之大也東周可為者此也乃鄭祊衛寶亦書來歸何也彼以利結此以義服自歸則一其情則殊也左氏乃云夾谷之㑹齊人要魯曰齊師出而魯不以甲車三百乘從齊者有如此盟孔子因使兹無還要以歸田若然是齊之賤魯甚矣齊既歸田魯將遂為齊役乎經不書盟其誣明矣至左與穀又載却萊兵誅優施夫兩君好㑹而挾兵以為威敢殺以為能乃戰國傾危之習豈聖人之事先儒謂不足信誠然叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑圍之何叛也前南蒯以費叛今侯犯以郈叛蒯猶假强公室為名犯祗與叔孫有隙耳亦不書叛者三桓無君而專魯故家臣槩不書叛也秋叔孫州仇仲孫何忌帥師圍郈前圍之而不服叔孫宜改過遷善退守臣節則陪臣無所藉口而自敗矣乃復用兵以逞宜郈之愈不服也卒用駟赤誘侯犯以逐之而郈附於齊竟為齊有於是齊復歸郈此蓋聖人道化所感不然齊何有於叔孫哉宋樂大心出奔曹宋公使大心於晉而以疾辭固為有罪乃樂溷遂伺宋公之怒而誣以惡言宋公逐之亦難免信讒之咎矣宋公子地出奔陳宋公取地之馬以與嬖人向魋地怒而奪之君固失道地亦無君矣地聼公母弟辰之言而奔欲公止之也而不止地與辰固為要君公亦重嬖而輕親矣蓋參譏之冬齊侯衛侯鄭游速㑹于安甫尋鹹沙之好為衛謀晉難也叔孫州仇如齊既歸田又致郈故州仇如齊謝焉息民講禮彬彬矣宋公之弟辰暨仲他石彄出奔陳辰為地請公弗聼故奔奔陳從地也宋公溺於嬖故辰書弟責宋公也辰重小諒而棄其君兄故書奔罪辰也仲他石彄私事辰以從之奔亦惡二卿也十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛蕭宋邑也叛則其罪大仍書弟何也鄭段圖篡春秋亟正其誅故不書弟今辰為地請不許而奔君仍不止是叛以有激而成且叛與圖篡有間矣書叛足正其罪宋公寵嬖蔑親其咎大矣故仍書弟分惡於宋公也奔非辰所欲以要君耳故書暨叛為辰所欲以泄忿耳故書及及與暨皆就辰為義非以二卿與地為義奔以二卿蒙辰之下叛以二卿與地蒙辰之下是暨與及又以辨首從耳深罪辰以明君臣之義也君雖不君臣不可以不臣如是而後天下之為君臣者定夏四月秋宋樂大心自曹入于蕭四叛在蕭大心入焉是亦叛矣不書叛者蓋辰叛首也二卿與地皆同謀也樂大心非同謀聞叛而附叛耳附叛與叛微有間矣春秋書法各如其罪而纖悉不爽彼以深刻釋經者謬矣冬及鄭平侵齊侵鄭非公意也今及齊平又及鄭平者孔子行乎季孫故公為政而三桓亦知與鄰搆怨之非而從之也講信修睦而兵刑漸靖聖人所以仁天下也左氏不明大義以叛晉為說夫春秋貴尊王其有取於從伯者以伯假尊王為名耳然猶罪伯者無尊王之實而徒知從伯者亦不得無罪也今晉失道猶以叛晉為說不亦誤乎叔還如鄭涖盟平齊而州仇如齊平鄭而叔還如鄭臣從令也定君臣之分結四鄰之好內外無事矣聖人之聨天下也以仁而定天下也以禮十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈夷其險固曰墮三家四分公室各崇私邑以自衛而家臣因以屢叛是自衛者適為盜資也季氏之專為甚故家臣之禍尤酷因謀所以靖亂舉孔子於公而試用之已而政聲四逹齊歸侵地遂攝相事墮三都孰墮之使自墮之迎其機而導之也於是侯犯方叛故州仇首墮郈家臣無所據以叛大夫則大夫之叛公者亦失所據矣是絶其為亂之原也家臣從大夫順公室張而上下各得其理矣必帥師者侯犯雖奔懼餘黨之踵亂也衛公孟彄帥師伐曹彄為縶之子縶字公孟其子以字為氏也曹之罪不見於經而衛伐之蓋淩小耳故書以罪之季孫斯仲孫何忌帥師墮費州仇自墮郈斯亦自墮費乃約何忌同墮者費强也昔季友賜費後大城之以為魯患意如逐君而無禍保費故也今墮之是復强幹弱枝之勢也孔子行乎季孫蓋以都城無過百雉順理而言適有動乎季孫之心而絶不疑其害己也國有不起之疾治之而即愈此以禮為國之效也秋大雩孔子在位而魯猶僭禮蓋有害而不能治者聼孔子以治之餘則不能皆聼之也冬十月癸亥公㑹齊侯盟于黃十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成郈費墮而成則圍之且書公者仲孫不欲墮也郈費為二家患而公斂在成方有功於仲孫其不欲墮也固宜費强已墮成奚恃哉徐將聼命矣定公遽自圍之輕出而無功惜公失計而自褻其威也成雖內邑强不能克故書至然成之不墮固亦未害孔子自必有處矣既而齊人歸女樂而孔子行惜哉十有三年春齊侯衛侯次于垂葭再次以謀伐晉而爭伯也夫齊桓創伯將何所爭晉文襲伯又豈爭於齊而得乎齊景宜先治內內既治請命於周號召諸侯晉衰而內難方作烏能與齊爭乃亟事於晉其計左矣據傳齊衛謀伐晉河內其臣惟邴意兹以為可蓋料晉不及救也此僥幸茍且之計由是軍中或言晉師至或言無晉師齊侯為之恐動故次而未能伐計既左而進退復失據以是求伯不亦遠乎夏築蛇淵囿大搜于比蒲三桓竊國軍政而築郎囿以娛昭公公為所愚而卒見逐今魯用孔子以王道化齊而歸田以王道用魯而墮邑公室之張日可俟矣乃定公庸弱而孔子行圍成不克歸而以囿為樂兵柄仍歸臣下故築囿大搜比書於册君荒臣橫故態復作興復無望矣衛公孟彄帥師伐曹逾年再伐書以深罪之秋晉趙鞅入于晉陽以叛據左氏趙鞅殺邯鄲午而邯鄲叛藉秦圍邯鄲荀寅士吉射不與圍而將作亂董安于勸鞅先備之而鞅守晉命不敢始禍及荀士伐趙氏之宮鞅始奔晉陽高閌曰鞅拒荀士而書叛蓋著其不由君命專土興兵之罪但荀士始禍則鞅為被禍既伐其宮事已急矣君臣睽隔何能請命即以專土為罪情猶可原今釋始禍而罪為後不亦顚乎蓋荀士遂亡而趙氏歸晉此皆趙氏之飾辭而左氏輕信之耳且即左氏所載而趙氏之罪已不可掩鞅初擅殺午已為無君荀躒右趙而左荀士猶曰三臣始禍則鞅非為後明矣蓋荀士始禍者先謀攻鞅也鞅始禍者聞謀先發如公羊所云以除君側之惡為名者是也而董安于卒以先發難誅則鞅罪定矣聖人豈不察情而輕以叛加鞅乎冬晉荀寅士吉射入于朝歌以叛荀躒曰三臣始禍而獨逐鞅刑已不鈞矣請皆逐之夫晉侯已命逐鞅荀士亦始禍何以未逐以是知荀士為先謀而非先發審矣晉陽私邑朝歌公邑荀士與趙為敵諒亦自發其私邑之兵矣今皆逐之故荀士又襲據公邑以抗君也自秋及冬其臣三叛晉衰甚矣是由晉主夏盟不能尊王王室有難猶且不恤故其臣效尤耳晉又屢助鄰叛叛臣即出其國豈非積惡之炯戒歟晉趙鞅歸于晉三叛之罪一也韓魏為鞅請而晉君許之故書歸易辭也叛而歸失刑甚矣先儒以鞅之歸為善辭彼孫林父亦書歸何善之有薛弒其君比其事不可詳矣稱國則當國大臣之罪也十有四年春衛公叔戍來奔衛趙陽出奔宋據傳公叔戍將去夫人之黨夫人南子誣以為亂而逐之并及趙陽家鉉翁曰南子之惡稔矣戍以宗國之老正之所得為也然非戍所能為也臣欲正君必先自正戍怙富而驕素無國中之譽事不濟而速禍宜也二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸楚又滅國也頓子㑹召陵故也頓從中國而莫之救無王無伯君子傷之陳嘗滅於楚而助楚滅頓意以與頓有舊怨乎修怨而忘從楚之恥不義甚矣且楚患百餘年柏舉之敗其威始戢諸侯無從楚者而陳獨從之楚勢復張又中國之罪人也楚主兵陳為役則以頓子歸歸楚也夏衛北宮結來奔公孫戍之故也五月於越敗吳于檇李吳子光卒敗詐戰也卒繫敗下因傷而卒也然非身戕於陳故不言滅亦不書地者去檇李未遠也以逆得國佳兵不已至於亡身宜矣然吳為太伯之後吳子又有攘楚之功越以楚故屢與吳難越之罪尚容誅哉而周之子孫日失其序春秋不能無慨焉公㑹齊侯衛侯于牽齊侯兩次以謀晉而未能今晉有荀士之釁復㑹以謀之蓋挾其叛以撓晉亂君臣之義矣魯親受臣禍而公亦與焉何也荀士舊有德於季氏今之㑹三家為之公不得已也孔子既行公復受制於臣如此公至自㑹秋齊侯宋公㑹于洮自齊景規伯鄭衛魯既與之盟宋初未忍絶晉今始從齊也是時衛有公叔戍之釁宋有公子辰之難宋之從齊蓋求靖亂耳傳謂牽洮二㑹皆謀救荀士也齊不能為二國定亂反挾之以助晉之叛臣故書以惡之天王使石尚來歸脤石氏尚名王之元士也脤祭肉盛以蜃器故名脤周禮大宗伯以膰脤親兄弟之國蓋謂助祭而受脤也今非助祭而遠頒於魯故異其文曰歸受脤禮也歸脤非禮也然頒之王而不曰賜何也神貺也非可言賜也宣十年王季子來聘後無一介至魯今晉伯已衰孔子相魯之餘魯勢稍振故使石尚來以親魯禮雖失而意則厚矣王號猶存祭尚具典魯能輔之以禮東周何不可為乎惜定公不君復制於臣魯終於微而王靈不可復振歸脤之後無書焉傷之也春秋蓋惓惓於周無己也衛世子蒯聵出奔宋據左氏蒯聵欲殺夫人為所覺訴於靈公聵懼而奔劉敞曰聵雖不善謀安有此事哉且殺夫人聵能獨全乎蓋聵聞野人之歌而慚歸言於夫人夫人惡其斥已而誣之耳且宋為夫人南子之家殺母而入母之家敢乎哉其言深得情事左氏所記則南子之讒言與戲陽速迎合夫人以希免禍之飾言耳然南子何忍以母而誣子蓋世之母淫而失恩於子者有之矣南子懼聵以野人之歌告君故反訴以先制之耳夫經書世子有二就君父起義以明國本晉申生宋痤是也就臣子起義以正大逆蔡般許止是也若書奔非大逆比也以繼體而獲罪至無所容子固不子然有子而不能明至撥國本父亦不父其書世子蓋兩罪之辭逮靈卒而輒立趙鞅納聵猶書世子直與鄭忽歸鄭同文矣世有欲殺母而可始終稱世子者乎即云奔失子道然不去而見殺更陷父於大惡其奔固未可深罪也衛公孟彄出奔鄭彄屢帥師當國之卿也世子逐大臣出皆以南子也嬖於內寵難逃首惡之責其數世亂也宜哉宋公之弟辰自蕭來奔與辰共叛者凡五人奔止書辰舉首惡也書自蕭明久叛也書來奔罪容賊也賊臣為亂敗猶有所容斯易為亂矣罪容賊所以止亂也屢書弟傷天倫之變交罪之也大搜于比蒲邾子來㑹公㑹不地則知于比蒲矣公在比蒲則知親搜矣不書公者自昭而軍分於三桓今雖公在公不得為政也莊二十三年公及齊侯遇于穀蕭叔朝公朝非其所也此大搜于比蒲邾子來㑹公㑹非其所也皆譏之也城莒父及霄大搜以瀆武兼城二邑以勞民魯政復亂矣是年不書冬闕也十有五年春王正月邾子來朝前來㑹蓋必有求於魯也今又朝以示服焉不自强而求人其能國乎鼷鼠食郊牛牛死改卜牛牛體遍食故不言其所食處漫也二月辛丑楚子滅胡以胡子豹歸胡與頓世服於楚晉紏十八國為召陵之㑹將伐楚而胡與頓並歸晉乃楚未能伐而胡與頓則為所誤矣前書滅頓今書滅胡深罪晉也許亦從召陵未幾遷于容城意自明其不得己之情因請遷以媚楚乎及鄭滅之楚復封焉是晉無能為而小國且任楚之好惡為存亡矣夏五月辛亥郊日至之郊在正月祈穀之郊在三月五月則過時久矣失禮之中又失禮也壬申公薨于高寢高寢别宮非正也公立於季氏不敢討賊陽虎專政三桓亦微虎奔而孔子用事紀綱粗立東周可為之時也公惛於女樂不竟其用其何以逭其責鄭罕逹帥師伐宋宋公子地奔鄭故鄭伐宋哀十二年傳云宋元平之族自蕭奔鄭鄭為之城嵒戈錫是也鄰難既不能定乃納叛而又助叛其罪大矣二國搆怨不解自此始齊侯衛侯次于渠蒢鄭之伐宋宋直而鄭曲然宋新附於齊而鄭則舊好也齊右鄭義不足服宋右宋情不足結鄭故次以觀望於二國之間而幸其自解耳五氏垂葭欲伐晉而不敢渠蒢欲救宋而不能屢書次深譏之也李亷曰五氏垂葭之次皆謀伐晉此次疑亦謀晉而出故明年伐晉時鄭從齊方堅齊肯救宋仇鄭耶其說亦近情事存以備參邾子來奔喪非王與父母之喪不奔奔急辭也邾子之來魯之受罪均也秋七月壬申姒氏卒定公之妾哀之母也八月庚辰朔日有食之九月滕子來㑹葬近者奔喪遠者㑹葬皆事王之禮也魯嘗奔齊晉之喪㑹楚之葬矣不書諱之也蓋此失禮而彼受之此罪為重故諱之彼失禮而此受之彼罪為重則不必諱也丁巳葬我君定公雨不克葬戊午日下昃乃克葬此與宣八年葬敬嬴皆越日也彼日中此日昃葬日虞所以寧親也曰而克葬轉辭也猶及虞也曰乃克葬難辭也失虞期矣志禮之變以存孝子之心也辛巳葬定姒成風敬嬴以妾母而書夫人薨書葬小君矣定姒亦妾母何以無夫人小君之稱公羊曰哀未君也然孟子為昭公之配何以不書夫人薨公穀皆曰諱取同姓也但諱取同姓書孟子足矣何必削夫人之號削則貶也非諱也且葬定姒左云不成喪孟子不葬愈不成喪矣蓋季孫為之也書孟子卒而不葬見季孫之疾其君書定姒卒葬見季孫之弱其君以子未逾年而其母因不成喪蓋假正義以抑其君而豈用典哉成風敬嬴僭禮也是時魯尚有君也定姒卒葬似禮也而魯無君矣凡此類直書其事而義自見禮並有喪葬先母後父今定公薨在五月姒氏卒在七月喪非同時故葬各有期也姒氏不别諡且與襄公生母同諡典禮益紊矣冬城漆漆邾庶其邑魯受叛而取其地今將伐邾而城之以為固非義甚矣且二喪甫畢又興土功勞民甚矣
